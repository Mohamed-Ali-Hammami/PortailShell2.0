<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	lang="fr">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Acces Refuse Banque</title>
	<style type="text/css">
		body {
			margin: 0;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 24px;
			background:
				linear-gradient(135deg, rgba(195, 0, 0, 0.88), rgba(247, 202, 72, 0.78)),
				url(../../2.png) center center / cover no-repeat;
			font-family: "Trebuchet MS", Verdana, sans-serif;
		}

		.denied-card {
			width: 100%;
			max-width: 520px;
			background: rgba(255, 248, 220, 0.96);
			border: 1px solid rgba(110, 48, 0, 0.18);
			box-shadow: 0 18px 50px rgba(0, 0, 0, 0.22);
			border-radius: 14px;
			padding: 28px;
			text-align: center;
		}

		.denied-title {
			margin: 0 0 10px 0;
			font-size: 26px;
			color: #8a1200;
		}

		.denied-copy {
			margin: 0 0 20px 0;
			color: #5d4b22;
		}

		.denied-action {
			min-width: 180px;
			height: 38px;
			border: none;
			border-radius: 999px;
			cursor: pointer;
			font-size: 13px;
			font-weight: bold;
			color: #fff9e6;
			background: linear-gradient(180deg, #83c7ff 0%, #449df3 48%, #2368c9 100%);
			box-shadow: 0 10px 22px rgba(35, 104, 201, 0.28);
		}
	</style>
</head>
<h:body>
	<h:form>
		<div class="denied-card">
			<h1 class="denied-title">Acces refuse</h1>
			<p class="denied-copy">Tu n'as pas les droits necessaires pour ouvrir le module Banque.</p>
			<p:commandButton value="Se deconnecter"
				id="logout"
				action="#{LoginBean.logout}"
				ajax="false"
				styleClass="denied-action" />
		</div>
	</h:form>
</h:body>
</html>
