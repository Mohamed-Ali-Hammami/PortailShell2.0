<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:c="http://java.sun.com/jsp/jstl/core"
	template="/WEB-INF/templates/app.xhtml">
	<ui:define name="title">Shell-Banque</ui:define>
	<ui:define name="moduleNav">
		<ui:include src="/SHELL-banque/HeaderbanqueNav.xhtml" />
	</ui:define>
	<ui:define name="content">
		<c:choose>
			<c:when test="#{param.view eq 'indexCompte'}">
				<h:outputText value="#{BanqueBean.getAll()}" style="display:none" />
				<ui:include src="/SHELL-banque/fragments/indexCompte.xhtml" />
			</c:when>
			<c:when test="#{param.view eq 'nouveauBanque'}">
				<h:outputText value="#{BanqueBean.nouveauBanque()}" style="display:none" />
				<ui:include src="/SHELL-banque/fragments/nouveauBanque.xhtml" />
			</c:when>
			<c:when test="#{param.view eq 'nouveauCompte'}">
				<h:outputText value="#{BanqueBean.nouveauBanque()}" style="display:none" />
				<ui:include src="/SHELL-banque/fragments/nouveauCompte.xhtml" />
			</c:when>
			<c:when test="#{param.view eq 'saisieoperation'}">
				<h:outputText value="#{BanqueBean.ajouterTransaction()}" style="display:none" />
				<ui:include src="/SHELL-banque/fragments/saisieoperation.xhtml" />
			</c:when>
			<c:when test="#{param.view eq 'modifieroperation'}">
				<h:outputText value="#{BanqueBean.success()}" style="display:none" />
				<ui:include src="/SHELL-banque/fragments/modifieroperation.xhtml" />
			</c:when>
			<c:when test="#{param.view eq 'extrait'}">
				<h:outputText value="#{BanqueBean.extrait()}" style="display:none" />
				<ui:include src="/SHELL-banque/fragments/extrait.xhtml" />
			</c:when>
			<c:otherwise>
				<h:outputText value="#{BanqueBean.getAll()}" style="display:none" />
				<ui:include src="/SHELL-banque/fragments/home.xhtml" />
			</c:otherwise>
		</c:choose>
	</ui:define>
</ui:composition>
