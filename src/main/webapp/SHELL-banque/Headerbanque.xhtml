<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:ui="http://java.sun.com/jsf/facelets">

<h:head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link type="text/css" rel="stylesheet" href="style.css" />
    <title>Shell-Sejoumi</title>
    <script type="text/javascript">
        function noBack() {
            window.history.forward();
        }
        noBack();
        window.onload = noBack;
        window.onpageshow = function(evt) {
            if (evt.persisted) noBack();
        }
        window.onunload = function() { void(0); }
    </script>
</h:head>

<h:body>

    <h:form>
        <!-- Messages -->
        <p:growl id="messages" showDetail="true" />

        <!-- Menubar -->
        <p:menubar style="height:30px; margin: 0 50px; background-image: linear-gradient(#FAF281, #FAF292);" autoDisplay="true">

            <p:menuitem icon="ui-icon-home" action="#{CompteBean.getAll}" style="font-size:12px" />

            <p:menuitem value="Banque" style="font-size:12px" action="#{BanqueBean.getAll}" />

            <p:menuitem value="Cheques impayés" style="font-size:12px" styleClass="ui-priority-primary" action="#{BanqueBean.getchequeImpayees}" />

            <p:menuitem value="Cheques antidatés" style="font-size:12px" styleClass="ui-priority-primary" action="#{BanqueBean.getchequeAntidatee}" />

            <p:menuitem value="Cheques entrées" style="font-size:12px" styleClass="ui-priority-primary" action="#{BanqueBean.getchequeEntree}" />

            <p:menuitem value="Cheques Préavis" style="font-size:12px" styleClass="ui-priority-primary" action="#{BanqueBean.getchequePreavis}" />

            <p:menuitem value="Cheque en Circulation" style="font-size:12px" action="#{BanqueBean.getchequeCierculations}" />

            <p:menuitem value="Cheque en Cours" style="font-size:12px" action="#{BanqueBean.getchequeencours}" />

            <!-- Logout Option -->
            <f:facet name="options">
                <p:commandLink id="nonAjax" action="#{LoginBean.logout}" ajax="false">
                    <p:graphicImage url="/images/logout.png" />
                    <h:outputText value="#{msg['logout.user']}" style="color:#db0b32; font-size:12px;" />
                </p:commandLink>
            </f:facet>

        </p:menubar>
    </h:form>

</h:body>
</html>
