<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      lang="fr">

<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Shell-Banque</title>
</head>

<h:body style="background-color:#CECECE;">

<div style="text-align:center;">

    <!-- Headers -->
    <ui:include src="/SHELL-banque/Header.xhtml"/>
    <ui:include src="/SHELL-banque/Headerbanque.xhtml"/>

    <p:growl id="msgs" showDetail="true"/>

    <p:panel style="min-height:900px;margin:0 50px;
                    background-image:url('#{request.contextPath}/2.png');">

        <h:form id="form">

            <!-- Account info -->
            <fieldset style="margin-bottom:20px;background-color:#eeeec6;">
                <legend>
                    <h:outputText value="Numéro de compte : #{BanqueBean.compte.numerodecompte}"
                                  style="font-size:18px;color:white;
                                  background-image:linear-gradient(black, white);font-weight:bold;"/>
                    <br/>
                    <h:outputText value="Raison Sociale : Shell Sijoumi Fathi Sassi"
                                  style="font-size:18px;color:white;
                                  background-image:linear-gradient(black, white);font-weight:bold;"/>
                </legend>

                <div style="text-align:center;">
                    <table>
                        <tr>

                            <td style="width:250px;height:80px;color:white;
                                       background-image:linear-gradient(green, white);
                                       text-align:center;">
                                <h:outputText value="Cumul crédit #{BanqueBean.compte.soldecredit}"/>
                            </td>

                            <td style="width:30px;"></td>

                            <td style="width:250px;height:80px;color:white;
                                       background-image:linear-gradient(red, white);
                                       text-align:center;">
                                <h:outputText value="Cumul débit #{BanqueBean.compte.soldedebit}"/>
                            </td>

                            <td style="width:30px;"></td>

                            <td style="width:250px;height:80px;color:white;
                                       background-image:linear-gradient(blue, white);
                                       text-align:center;">
                                <h:outputText value="Solde arrêté au #{BanqueBean.dates} #{BanqueBean.compte.solde}"/>
                            </td>

                            <td style="width:30px;"></td>

                            <td style="width:250px;height:80px;color:white;
                                       background-image:linear-gradient(gray, white);
                                       text-align:center;">
                                <p:commandLink value="Ajouter transaction"
                                               action="#{BanqueBean.ajouterTransaction}"/>
                            </td>

                        </tr>
                    </table>
                </div>

            </fieldset>

            <!-- Search -->
            <table>
                <tr style="background-image:linear-gradient(gray, white);">

                    <td>
                        <h:outputText value="Date opération :" style="font-size:12px"/>
                    </td>

                    <td>
                        <p:calendar value="#{BanqueBean.date1}" size="10"/>
                    </td>

                    <td>
                        <p:calendar value="#{BanqueBean.date2}" size="10"/>
                    </td>

                    <td>
                        <p:commandButton value="Recherche"
                                         action="#{BanqueBean.extrait}"
                                         ajax="false"
                                         style="width:150px;height:30px;
                                         background-color:#abc8e2;"/>
                    </td>

                </tr>
            </table>

            <br/>

            <h:outputText value="Liste des derniers mouvements (Dernière mise à jour le #{BanqueBean.dates})"
                          style="font-size:12px;font-weight:bold;"/>

            <br/><br/>

            <!-- Transaction Table -->
            <p:dataTable id="emp"
                         var="tr"
                         value="#{BanqueBean.listtransaction}"
                         selection="#{BanqueBean.selectedTranaction}"
                         rowKey="#{tr.id}"
                         selectionMode="single"
                         emptyMessage="Aucune donnée">

                <p:column headerText="Date">
                    <h:outputText value="#{tr.dates}">
                        <f:convertDateTime pattern="dd/MM/yyyy"/>
                    </h:outputText>
                </p:column>

                <p:column headerText="Intitulé">
                    <h:outputText value="#{tr.description}"/>
                </p:column>

                <p:column headerText="Référence">
                    <h:outputText value="#{tr.reference}"/>
                </p:column>

                <p:column headerText="Montant">
                    <h:outputText value="#{tr.montant}"
                                  style="background-color:green;color:#fff;"
                                  rendered="#{tr.typetransaction == 'Credit'}"/>
                    <h:outputText value="#{tr.montant}"
                                  style="background-color:red;color:#fff;"
                                  rendered="#{tr.typetransaction == 'Debit'}"/>
                </p:column>

                <p:column headerText="Etat">
                    <h:outputText value="#{tr.etatcheque}"/>
                </p:column>

                <p:column headerText="Opération" style="text-align:center;width:40px;">
                    <p:commandLink action="#{BanqueBean.success}"
                                   ajax="false"
                                   rendered="#{tr.reglement == 'Cheque'}"
                                   process="@this">
                        <p:graphicImage url="/images/icone-actualiser.png" style="width:20px"/>
                        <f:setPropertyActionListener value="#{tr}"
                                                     target="#{BanqueBean.selectedTranaction}"/>
                    </p:commandLink>
                </p:column>

            </p:dataTable>

        </h:form>

    </p:panel>

</div>

</h:body>
</html>
