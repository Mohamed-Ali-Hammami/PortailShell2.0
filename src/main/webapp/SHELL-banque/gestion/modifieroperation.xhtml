<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      lang="fr">

<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Shell-Banque</title>
</head>

<h:body style="background-color:#CECECE;">

<div style="text-align:center;">

    <!-- Headers -->
    <ui:include src="/SHELL-banque/Header.xhtml"/>
    <ui:include src="/SHELL-banque/Headerbanque.xhtml"/>

    <p:growl id="msgs" showDetail="true"/>

    <p:panel id="basic"
             style="min-height:900px;margin:0 50px;background-image:url('#{request.contextPath}/2.png');">

        <h:form>

            <div style="text-align:center;">

                <fieldset style="margin-bottom:20px;background-color:#eeeec6;">

                    <h:outputLabel rendered="#{BanqueBean.selectedTranaction != null}">

                        <h:panelGrid columns="2" columnClasses="label,value">

                            <h:outputText value="Numéro Chèque" style="font-size:14px;color:#483d8b"/>
                            <h:inputText value="#{BanqueBean.selectedTranaction.reference}" id="num"/>

                            <h:outputText value="Etat de Chèque" style="font-size:14px;color:#483d8b"/>
                            <p:selectOneMenu value="#{BanqueBean.etatcheque}"
                                             filter="true"
                                             filterMatchMode="contains"
                                             style="width:200px;font-size:12px"
                                             id="type">
                                <f:selectItem itemLabel="Sélectionner type d'opération"/>
                                <f:selectItems value="#{BanqueBean.etatcheques}"/>
                            </p:selectOneMenu>

                            <h:outputText value="Date" style="font-size:14px;color:#483d8b"/>
                            <p:calendar id="popup3" value="#{BanqueBean.date3}" size="10"/>

                        </h:panelGrid>

                    </h:outputLabel>

                    <br/><br/>

                    <p:commandButton value="Valider"
                                     styleClass="bespece"
                                     style="width:150px;font-size:12px;height:30px;
                                            color:white;background-image:linear-gradient(#FAF281, red);"
                                     action="#{BanqueBean.updateoperation}" ajax="false"/>

                </fieldset>

                <script>
                    function validerespece(input) {
                        $(document).keypress(function(event) {
                            var keycode = event.keyCode ? event.keyCode : event.which;
                            if (keycode === 13) {
                                if (input.value !== "") {
                                    $('.butontpe').click();
                                }
                            }
                        });
                    }
                </script>

            </div>

        </h:form>

    </p:panel>

</div>

</h:body>
</html>
