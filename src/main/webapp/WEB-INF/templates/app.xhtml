<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
	<html xmlns="http://www.w3.org/1999/xhtml">
	<h:head>
		<title><ui:insert name="title">Portail Shell</ui:insert></title>
		<h:outputStylesheet library="css" name="tokens.css" />
		<h:outputStylesheet library="css" name="app.css" />
		<h:outputStylesheet library="css" name="components.css" />
		<h:outputStylesheet library="css" name="fragments.css" />
		<h:outputStylesheet library="css" name="utilities.css" />
		<ui:insert name="head" />
	</h:head>
	<h:body styleClass="app-page"
		style="--shell-hero-url:url('#{request.contextPath}/2.png');">
		<div class="app-shell">
			<div class="app-shell__backdrop"></div>
			<div class="app-shell__inner">
				<div class="app-frame">
					<ui:include src="/Header.xhtml" />
					<div class="app-module-nav">
						<ui:insert name="moduleNav" />
					</div>
					<p:panel id="appContent" closable="true" styleClass="app-content-card">
						<ui:insert name="content" />
					</p:panel>
				</div>
			</div>
		</div>
		<script type="text/javascript">
			//<![CDATA[
			(function preserveQueryParamsOnForms() {
				var query = window.location.search;
				if (!query) {
					return;
				}
				var forms = document.getElementsByTagName("form");
				for (var i = 0; i < forms.length; i++) {
					var form = forms[i];
					if (!form || !form.action) {
						continue;
					}
					if (form.action.indexOf("?") !== -1) {
						continue;
					}
					form.action = form.action + query;
				}
			})();
			//]]>
		</script>
	</h:body>
	</html>
</ui:composition>
