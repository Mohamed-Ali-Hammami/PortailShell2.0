<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>
	<title>Shell-Shop</title>
</h:head>

<h:body style="background-color:#CECECE">

	<div align="center">
		<ui:insert name="menu">
			<ui:include src="Headershop.xhtml" />
		</ui:insert>
		<p:growl id="msgs" showDetail="true" />
		 <p:panel id="basic2" closable="true"
			style="min-height:900px;margin-left: 50px;margin-right: 50px;background-image: url(../2.png)">

			<h:form id="f">
			 <h:panelGroup rendered="#{LoginBean.listProduit.size()>0}">
		    <audio autoplay="autoplay" id="audioID" >
		<source src="AlarmeLS.wav" type="audio/mp3"/>
		</audio>
		</h:panelGroup>
			

				<div align="left">
					<p:commandButton title="imprimer" value="imprimer">
						<p:printer target="imprimer" />
					</p:commandButton>

				</div>
				<p:outputPanel id="imprimer">
					<div align="center">

						<h:outputText value="Liste Des Articles En Alerte  de Stock" />
						<br /><br />
						<p:dataTable id="article" var="p" value="#{LoginBean.listProduit}"
							widgetVar="ArticleTable"
							emptyMessage="aucun produit dans le stock">
                             
                             <p:column>
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b" value="Code" />
								</f:facet>
								<h:outputText style="font-size:12px " value="#{p.codeshop}" id="code" />
							</p:column>
							<p:column>
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b" value="Nom" />
								</f:facet>
								<h:outputText style="font-size:12px " value="#{p.nom}" id="nom" />
							</p:column>
							
							<p:column>
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b" value="Quantite" />
								</f:facet>
								<h:outputText style="font-size:12px " value="#{p.quantite}" id="quantitestock" />
							</p:column>
							
							 
							
							<p:column>
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b" value="Qtemin" />
								</f:facet>
								<h:outputText style="font-size:12px " value="#{p.qtemin}" id="qtemin" />
							</p:column>
							
							<p:column>
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b" value="famille" />
								</f:facet>
								<h:outputText style="font-size:12px " value="#{p.famille.nom}" id="famille" />
							</p:column>
							
							
						</p:dataTable>
					</div>

				</p:outputPanel>
			</h:form>
	</p:panel>
		</div>
 
</h:body>
</html>
