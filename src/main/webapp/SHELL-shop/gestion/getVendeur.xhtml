<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>

</h:head>


<h:body  style="width:98%;margin:auto;" >
 <p:panel style="width:100%;margin:auto;min-height:900px;">
		<ui:insert name="menu">
			<ui:include src="/SHELL-shop/Header.xhtml" />
		</ui:insert>
		<ui:insert name="menu">
			<ui:include src="/SHELL-shop/Headershop.xhtml" />
		</ui:insert>
		<p:panel id="basic2" closable="true"
			style="min-height:900px;margin-left: 50px;margin-right: 50px;background-image: url(../2.png)">

			
			
			<h:form id="f">
			<fieldset style="margin-bottom: 20px; background-color: #eeeec6;">
					<legend>
						<b><h:outputText style="font-size:12px ;color:#2e8b57"
								value="Ajouter Utilisateur " name="outTxtcin" /> </b>
					</legend>
					<br />

					<table>
						<tr>

							<td width="20%"><h:outputText value="Utilisateur"
									style="font-size:12px " /></td>
							<td><h:inputText style="font-size:12px "
									value="#{LoginBean.nom}" size="10" /> </td>
						</tr>

						<tr>
							<td><h:outputText value="Login" style="font-size:12px " /></td>
							<td><h:inputText style="font-size:12px "
									value="#{LoginBean.logine}" /></td>

						</tr>

						<tr>
							<td><h:outputText value="Mot de passe"
									style="font-size:12px " /></td>
							<td><p:password value="#{LoginBean.motdepass}"
									required="true" label="Mot de Passe :" feedback="true"
									inline="true" /></td>
						</tr>

						<tr>
							<td><h:outputText value="Role" style="font-size:12px " /></td>
							<td><p:selectOneMenu value="#{LoginBean.profil}"
									required="true" requiredMessage="selectionner fournisseur"
									style="width:215px;font-size:12px " id="etat">
									<f:selectItem itemLabel="selectionner role" />
									<f:selectItems value="#{LoginBean.profils}"  />
								</p:selectOneMenu></td>
						</tr>

						<tr>
							<td />
							<td><p:commandButton value="Ajouter" ajax="false"
									style="width:150px;font-size:12px;height:30;color:#0000ff;background-color:#abc8e2;"
									action="#{LoginBean.saveuser}" /></td>
						</tr>

					</table>
					<p:messages id="msg" closable="true" showDetail="true" />

				</fieldset>

				
				<br />

				<p:growl showDetail="true" id="msgs" />
				<p:dataTable id="user" var="util" style="background:#a2b5bf"
					value="#{LoginBean.listuser}" widgetVar="ArticleTable"
					emptyMessage="aucun utilisateur dans la liste" paginator="true"
					rows="10" paginatorPosition="bottom" selectionMode="single"
					selection="#{LoginBean.user}" rowKey="#{util.login}"
					editable="true">
					<p:ajax event="rowEdit" listener="#{LoginBean.onRowEdit1}" />
					 <p:column filterBy="#{util.nom}" filterMatchMode="contains">
						<f:facet name="header">
							<h:outputText style="font-size:12px ;color:#483d8b"
								value="Utilisateur" />
						</f:facet>


						<p:cellEditor>
							<f:facet name="output">
								<h:outputText style="font-size:12px " value="#{util.nom}" />
								 
							</f:facet>
							<f:facet name="input">

								<h:inputText style="font-size:12px " value="#{util.nom}"
									id="innom" />
								 

							</f:facet>
						</p:cellEditor>

					</p:column>
                      
					<p:column>
						<f:facet name="header">
							<h:outputText style="font-size:12px ;color:#483d8b" value="Login" />
						</f:facet>


					
						
						<p:cellEditor>
							<f:facet name="output">
								<h:outputText style="font-size:12px " value="#{util.login}" />
							</f:facet>
							<f:facet name="input">
									<h:inputText style="font-size:12px " value="#{util.login}" />
							</f:facet>
						</p:cellEditor>

					</p:column>
                      
					<p:column> 
						<f:facet name="header">
							<h:outputText style="font-size:12px ;color:#483d8b" value="Role" />
						</f:facet>
						<p:cellEditor>
							<f:facet name="output">
								<h:outputText style="font-size:12px " value="#{util.role.role}" />
							</f:facet>
							<f:facet name="input">
								<p:selectOneMenu value="#{LoginBean.profil}"
									style="width:215px;font-size:12px " id="etat">

									<f:selectItems value="#{LoginBean.profils}" />
								</p:selectOneMenu>
							</f:facet>
						</p:cellEditor>
					</p:column>
                       
					<p:column>
						<f:facet name="header">
							<h:outputText style="font-size:12px ;color:#483d8b"
								value="Mot de passe" />
						</f:facet>
						<p:cellEditor>
							<f:facet name="output">
								<h:outputText style="font-size:12px " value="#{util.motdepasse}" />
							</f:facet>
							<f:facet name="input">
								<p:inputText id="mpnput" value="#{util.motdepasse}"
									style="width:96%" />
							</f:facet>
						</p:cellEditor>
					</p:column>
                     
					<p:column style="width:40px;text-align:center">
						<f:facet name="header">
							<h:outputText style="font-size:9px;color:#483d8b"
								value="supprimer" />
						</f:facet>
						<div align="center">
							<p:commandLink action="#{LoginBean.deleteuser}">
								<p:graphicImage url="/images/delete.png" />

								<f:setPropertyActionListener target="#{LoginBean.user}"
									value="#{util}"></f:setPropertyActionListener>

								<p:confirm header="Confirmation"
									message="Voulez-vous vraiment supprimer l' utilisateur ?"
									icon="ui-icon-alert" />
							</p:commandLink>
						</div>
					</p:column>
                          
					<p:column style="width:40px">
						<f:facet name="header">
							<h:outputText style="font-size:9px;color:#483d8b"
								value="modifier" />
						</f:facet>
						<p:rowEditor />
					</p:column>  
				</p:dataTable>

				<div align="center">
					<p:confirmDialog global="true" showEffect="fade" hideEffect="fade"
						style="width:150px" widgetVar="suppressionDialog">
						<div align="center">
							<p:commandButton value="oui" type="button"
								styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
							<p:commandButton value="Non" type="button"
								styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
						</div>
					</p:confirmDialog>
				</div>
 

			</h:form>
		 </p:panel>
		 </p:panel>
		 </h:body>
		 </html>
