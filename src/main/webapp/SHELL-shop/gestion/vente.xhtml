
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
	 
</h:head>

<h:body onload="init()" style="width:98%;margin:auto;" >


	<p:panel style="width:100%;margin:auto;min-height:900px;">
		<h:panelGroup
			rendered="#{LoginBean.user.isAdmin()==true || LoginBean.user.isResponsableshops()==true || LoginBean.user.isSuperviseur()==true}">
			<ui:insert name="menu">
				<ui:include src="/SHELL-shop/Header.xhtml" />
			</ui:insert>
		</h:panelGroup>
		<ui:insert name="menu">
			<ui:include src="/SHELL-shop/Headershop.xhtml" />
		</ui:insert>
		<p:panel id="basic2" closable="true"
			style="min-height:900px;margin-left: 50px;margin-right: 50px;background-image: url(../2.png)">

			<h:form id="ff" prependId="false">
			 	 <div align="center">

					<h:panelGrid columns="2">
						<b><h:outputText value="DATE/" style="font-size:16px" /></b>
						<p:calendar value="#{VenteBean.date}" required="true"
							requiredMessage="entrer date" />
					</h:panelGrid>
				</div>

				<br />
				<br />

				<p:commandLink
					onclick="PF('carDialog').show();PF('table').clearFilters()"
				   
					update="dataTable" process="@this" partialSubmit="true" >
					<p:graphicImage url="/images/bubble.png" style="width:50px" />
				</p:commandLink>


				<p:growl id="message" showDetail="true" />





				<p:dialog widgetVar="carDialog" styleClass="dialog"
					header="Liste des Articles" closeOnEscape="true" closable="true"
					draggable="true"
					style="margin-top: 0px;
                     margin-right: 20px; margin-bottom: 15px; margin-left: 5px;"
					id="produitsss" height="300" width="800">
					<ui:insert name="menu">
						<ui:include src="/SHELL-shop/sousdossier/listProduit.xhtml" />
					</ui:insert>
				</p:dialog>

				<table>

					<tr>
						<td><b><h:outputText value="Vente N°"
									style="font-size:48px ;text-decoration: underline" /></b></td>
						<td><h:inputText value="#{VenteBean.numvente}" id="vente"
								style="font-size:20px " readonly="true" /></td>
						<td />
						<td />
						<td><b><h:outputText value="Du"
									style="font-size:48px;text-decoration: underline " /></b></td>
						<td><p:calendar value="#{VenteBean.date}" readonly="true"
								showOn="false" style="font-size:20px " id="popup"
								pattern="dd-MM-yyyy" mask="true" /></td>

					</tr>
				</table>




				<p:remoteCommand name="refreshFooter"
					update="emp:ttc emp:qte ff:recus ff:msgs" />
				<p:messages id="msgs" closable="true" autoUpdate="true" />

			 	<p:dataTable id="emp" var="p" editable="true" rowIndexVar="rowId"
					scrollable="true" scrollHeight="400"
					value="#{VenteBean.listelignevente}" editMode="cell"
					widgetVar="articleTable" rowKey="#{p.id}"
					emptyMessage="aucune ligne dans la base">

					<p:column style="width:250:px">
						<f:facet name="header">
							<h:outputText style="font-size:12px ;color:#483d8b" value="CODE" />
						</f:facet>

						 
                      <h:inputText value="#{p.produit.code}"   onkeyup="nextsvente(this);"
                      styleClass="scode" rendered="#{p.produit!=null}"    
							 
							 id="id3"  
							style="background-color:transparent;border:none;">
							  	<p:ajax event="focus" update=" qtes"  listener="#{VenteBean.getCodefocus}"  process="@this" partialSubmit="true" />
								 <f:attribute name="test" value="#{rowId}"/>					 
							
						</h:inputText> 
						
						 
						<h:inputText value="#{p.libelle}" styleClass="inpdes" id="id2" onchange="javascript:this.value=this.value.toUpperCase();"
							 rendered="#{p.produit==null}" style="background-color:transparent;border:none;">
							 
							<p:ajax event="keyup" listener="#{VenteBean.updateCode}" update="qtes"  
							oncomplete="refreshFooter();init();"  process="@this" partialSubmit="true"/> 
							 <p:ajax event="focus"   listener="#{VenteBean.getCodefocus}"  process="@this" partialSubmit="true" />
								 <f:attribute name="test" value="#{rowId}"/>					 
							
						</h:inputText>
						 
					</p:column>

					<p:column style="width:150px">

						<f:facet name="header">
							<h:outputText style="font-size:12px ;color:#483d8b"
								value="LIBELLE" />
						</f:facet>

						<h:outputText style="font-size:12px ;" value="#{p.produit.nom}"
							id="des" />
					</p:column>




					<p:column >
						<f:facet name="header">
							<h:outputText style="font-size:12px ;color:#483d8b"
								value="QUANTITE" />
						</f:facet>
						<h:inputText value="#{p.quantite}"   id="qtes" onkeyup="nextsquantite(this);"
							styleClass="inputs" 
							style="background-color:transparent;border:none;">


							<p:ajax event="change" process="@this" partialSubmit="true" 
								listener="#{VenteBean.updatetotalvente}"
								oncomplete="refreshFooter();" update="montant"
								/>
							<f:attribute name="test" value="#{rowId}" />
						</h:inputText>

					</p:column>




					<p:column>
						<f:facet name="header">
							<h:outputText style="font-size:12px ;color:#483d8b"
								value="P.Unitaire" />
						</f:facet>
						<h:outputText style="font-size:12px "
							value="#{p.produit.prixventes}" id="prix" />
					</p:column>

					<p:column>
						<f:facet name="header">
							<h:outputText style="font-size:12px ;color:#483d8b"
								value="Montant" />
						</f:facet>
						<h:outputText style="font-size:12px " value="#{p.totalttcs}"
							id="montant" />
					</p:column>


					<p:column>
						<f:facet name="header">
							<h:outputText style="font-size:12px ;color:#483d8b" value="STOCK" />
						</f:facet>
						<h:outputText style="font-size:12px "
							value="#{p.produit.quantitestock}" id="qs" />
					</p:column>

					<p:column>
						<f:facet name="header">
							<h:outputText style="font-size:12px ;color:#483d8b" value="DEPOT" />
						</f:facet>
						<h:outputText style="font-size:12px "
							value="#{p.produit.quantitedepot}" id="qd" />
					</p:column>


					<f:facet name="footer">
					Nombre d'Articles:
					<h:outputText id="qte" value="#{VenteBean.totalquantite}" />
                                Total:
                           <h:outputText id="ttc"
							value="#{VenteBean.totalttcs}" />


					</f:facet>


				</p:dataTable>

				<div align="right">


					<p:commandButton value="Valider Shift F12" ajax="false"
						styleClass="button" oncomplete="pressenter1();"
						style="width:200px;height:30;color:white;background-image:linear-gradient( #FAF281, red);font-size:12px"
						action="#{VenteBean.savevente}">

						<f:setPropertyActionListener target="#{VenteBean.ticket}"
							value="#{VenteBean.ticket}" />


					</p:commandButton>






					<p:commandButton value="F2 Modification Vente" ajax="false"
						style="width:200px;height:30;color:white;background-image:linear-gradient( #FAF281, red);font-size:12px"
						onclick="clickbuttonf2();" />





				</div>
				<div align="left">
					<p:selectOneRadio value="#{VenteBean.typepayement}"
						style="width:200px;font-size:12px" styleClass="typepayement">

						<f:selectItems value="#{VenteBean.typepayements}" />
						<f:ajax event="change" />
					</p:selectOneRadio>
				</div>
				<div align="right">
					<h:panelGrid columns="2" style="align=">
						<h:outputText style="font-size:20px ;color:#483d8b"
							value="Total Recus" />

						<h:inputText id="recus" size="5" value="#{VenteBean.totalrecus}"
							styleClass="recus">
							<p:ajax listener="#{VenteBean.updateTotalrecus}" update="rendu"
								event="change" />
						</h:inputText>

						<h:outputText style="font-size:20px ;color:#483d8b"
							value="Total Rendus" />

						<h:inputText id="rendu" size="5" value="#{VenteBean.totalrendus}">
						</h:inputText>

					</h:panelGrid>
				</div>

				<script type="text/javascript">
            document.addEventListener("keydown", function(event) {
            	if( event.altKey==true){
            		
            		if(event.which==76){
            			PF('carDialog').show();
						PF('table').clearFilters();
            		}
            	}
              });
            
            document.addEventListener("keydown", function(event) {
            	if( event.ctrlKey==true){
            		
            		if(event.which==113){
            			 
            			var index = 0;
						$('.inputs').eq(index).focus();
						$('.inputs').eq(index).select();
            		}
            	}
              });
            
            document.addEventListener("keydown", function(event) {
            	if( event.ctrlKey==true){
            		
            		if(event.which==112){
            			 
            			var index = 0;
						$('.scode').eq(index).focus();
						$('.scode').eq(index).select();
						return false;
            		}
            	}
              });
            
            document.addEventListener("keydown", function(event) {
            	if( event.ctrlKey==true){
            		
            		if(event.which==123){
            			 
            			pressenter();
            		}
            	}
              });
            
            function pressenter() {
				if (window.confirm('Vous etes sur de valider le bon ?')) {
					$('.button').click();
					//$('.typepayement').focus();
					return true;

				} else {
					return false;
				}

			}
					
					function init() {
						var index = 0;
						$('.inpdes').eq(index).focus();
						 
					} 

					 

					function pressenter1() {
						$('.recus').focus();

					}
					
					function nextsvente(input) {
						$(document)
								.keypress(
										function(event) {
											var keycode = (event.keyCode ? event.keyCode
													: event.which);
											if (keycode == '13') {
												if (input.value != "") {
													 $(input).closest('tr')
														.next()
														.find('input[type=text]').eq(0)
														.focus().select();
													return false;
												}
											}

										});

						//	getcodfocus();
					}

					function nextsquantite(input) {
						$(document)
								.keypress(
										function(event) {
											var keycode = (event.keyCode ? event.keyCode
													: event.which);
											if (keycode == '13') {
												$(input).closest('tr')
												.next()
												.find('input[type=text]').eq(1)
												.focus().select();
											    
												return false;
											}

										});
					}
				</script>
				<style type="text/css">
.dialog {
	position: fixed;
	top: 20% !important;
	left: 20% !important;
}

.dialog2 {
	position: fixed;
	top: 30% !important;
	left: 40% !important;
}
</style>



			</h:form>

		</p:panel>
	</p:panel>
</h:body>
</html>
