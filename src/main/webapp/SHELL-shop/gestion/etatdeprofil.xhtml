<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>

</h:head>


<h:body  style="width:98%;margin:auto;" >
 <p:panel style="width:100%;margin:auto;min-height:900px;">
		<ui:insert name="menu">
			<ui:include src="/SHELL-shop/Header.xhtml" />
		</ui:insert>
		<ui:insert name="menu">
			<ui:include src="/SHELL-shop/Headershop.xhtml" />
		</ui:insert>
		<p:panel id="basic2" closable="true"
			style="min-height:900px;margin-left: 50px;margin-right: 50px;background-image: url(../2.png)">

			<h:form id="f">

				<div align="left">
					<h:panelGrid columns="2">
						<p:commandButton title="imprimer" value="imprimer">
							<p:printer target="imprimer" />
						</p:commandButton>

						<p:commandButton value="Valider"
							action="#{EtatshopBean.calculeretatdeprofil}" />
					</h:panelGrid>

					<h:panelGrid columns="4">
						<b><h:outputText value="Date Debut" style="font-size:12px" />
						</b>

						<p:calendar value="#{EtatshopBean.date1}" id="d1"   pattern="dd/MM/yyyy" buttonTabindex="-1"  
  mask="99/99/?9999" placeholder="__/__/____" />

						<b><h:outputText value="Date Fin" style="font-size:12px" /> </b>
						<p:calendar value="#{EtatshopBean.date2}" id="d2"   pattern="dd/MM/yyyy" buttonTabindex="-1"  
  mask="99/99/?9999" placeholder="__/__/____" />
					</h:panelGrid>

				</div>
				<p:outputPanel id="imprimer">
					<div align="center">

						<b><h:outputText value="Profit Brut par Famille"
								style="font-size:20px" /></b> <br />
						<h:panelGrid columns="2">
							<h:outputText value="Du #{EtatshopBean.dates1} " />
							<h:outputText value="Au #{EtatshopBean.dates2} " />
						</h:panelGrid>
						<br />
						<br />
						<p:dataTable id="article" var="p" value="#{EtatshopBean.listfamile}"
							widgetVar="ArticleTable"
							emptyMessage="aucun produit dans le stock">

							<p:column>
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b"
										value="Code" />
								</f:facet>
								<h:outputText style="font-size:12px " value="#{p.code}"
									id="code" />
							</p:column>
							<p:column>
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b" value="Nom" />
								</f:facet>
								<h:outputText style="font-size:12px " value="#{p.nom}" id="nom" />
							</p:column>

							  <p:column>
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b"
										value="Ca" />
								</f:facet>
								<h:outputText style="font-size:12px "
									value="#{p.montant}" id="quantitestock" />
							</p:column>
                          
							<p:column>
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b"
										value="Profit brut" />
								</f:facet>
								<h:outputText style="font-size:12px " value="#{p.profilbrut}"
									id="qtemin" />
							</p:column>
                            							<p:column>
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b"
										value="%CA" />
								</f:facet>
								<h:outputText style="font-size:12px " value="#{p.pourcentCAffTotal}"
									id="famille" />
							</p:column>  
							
							
							<p:column>
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b"
										value="%Pro" />
								</f:facet>
								<h:outputText style="font-size:12px " value="#{p.pourcenPBTotal}"
									id="famille2" />
							</p:column>  

							 <p:columnGroup type="footer" style="border: 0px"  >
								<p:row styleClass="table">
								<p:column/><p:column/> 
				<b><p:column footerText="#{EtatshopBean.totaCA}" style="font-size:16px " >	 
                                </p:column>
                     <p:column footerText="#{EtatshopBean.totalProfil}" style="font-size:16px ">    </p:column>
                         <p:column/>
                         <p:column footerText="#{EtatshopBean.totaltva}" style="font-size:16px ">    </p:column></b>
						 </p:row>
						 </p:columnGroup>
						</p:dataTable>


					</div>

				</p:outputPanel>
			</h:form>
		 </p:panel>
		 </p:panel>
		 </h:body>
		 </html>
