<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>

</h:head>

<h:body  style="width:98%;margin:auto;" >
 <p:panel style="width:100%;margin:auto;min-height:900px;">
		<ui:insert name="menu">
			<ui:include src="/SHELL-shop/Header.xhtml" />
		</ui:insert>
		<ui:insert name="menu">
			<ui:include src="/SHELL-shop/Headershop.xhtml" />
		</ui:insert>
		<p:panel id="basic2" closable="true"
			style="min-height:900px;margin-left: 50px;margin-right: 50px;background-image: url(../2.png)">
			<h:form id="f">
				<div align="center">
					 
					<h:panelGrid columns="3">
						<h:outputText value="Numero Tickets" style="font-size:16px" />
						<h:inputText value="#{VenteBean.numticket}" id="p" >
							  <f:ajax listener="#{VenteBean.getticketbyId}"
								render="imprimer msg"   />  
						</h:inputText>

						<p:commandButton title="imprimer" value="valider">
							 
							<p:printer target="imprimer"/>
						 
					</p:commandButton>
					<br />
					<br />
                     </h:panelGrid>
                     
                      <p:messages id="msg" />
					<p:outputPanel id="imprimer"> 
					 
						<div align="center">
							<b><h:outputText
									value="SHOP SHELL SIJOUMI"
									style="font-size:20px" />   </b>


						
						<br />
						 <table><tr><td>
						<b><h:outputText value="Ticket N° :" style="font-size:16px"/></b></td>
						<td><h:outputText value="#{VenteBean.ticket.id}"/></td></tr>
						 <tr><td>
						<b><h:outputText value="Date :" style="font-size:16px"/></b></td>
						<td><h:outputText value="#{VenteBean.ticket.dates} a #{VenteBean.ticket.heure} "/> </td>
						</tr>
						 </table>
						</div>
						<div align="center">
						<TABLE>
						<tr>
						<td><b><h:outputText value="Nom" style="font-size:12px"/></b></td>
						<td><b><h:outputText value="Qte" style="font-size:12px"/></b></td>
						<td><b><h:outputText value="P.U" style="font-size:12px"/></b></td>
						<td><b><h:outputText value="Montant" style="font-size:12px"/></b></td>
						</tr>
						<ui:repeat var="t" value="#{VenteBean.listelignevente}">
						<tr>
						<td> <h:outputText value="#{t.produit.nom}" style="font-size:12px"/> </td>
						<td> <h:outputText value="#{t.quantite}" style="font-size:12px"/> </td>
						<td> <h:outputText value="#{t.produit.prixventes}" style="font-size:12px"/> </td>
						<td> <h:outputText value="#{t.totalttc}" style="font-size:12px"/> </td>
						</tr>
						</ui:repeat>
						</TABLE>
						<TABLE>
						<tr>
						<td>
						<b><h:outputText value="Total Ventes" style="font-size:12px"/></b></td>
						<td><h:outputText value="#{VenteBean.ticket.total_ventes}"/><br/></td>
						</tr>
						<tr>
						
					<td>	<b><h:outputText value="Total Recus" style="font-size:12px"/></b></td>
						<td><h:outputText value="#{VenteBean.ticket.total_recus}"/></td>
						</tr>
						<tr>
					<td>	<b><h:outputText value="Total Rendu" style="font-size:12px"/></b></td>
					<td>	<h:outputText value="#{VenteBean.ticket.total_rendus}"/></td>
					</tr></TABLE>
						 <br/>
						<b><h:outputText value="M E R C I" style="font-size:16px"/></b>
						</div>
					</p:outputPanel>
				</div>
			</h:form>
		 </p:panel>
		 </p:panel>
		 </h:body>
		 </html>
