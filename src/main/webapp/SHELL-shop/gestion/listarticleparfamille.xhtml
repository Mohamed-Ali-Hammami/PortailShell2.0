<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>

</h:head>


<h:body  style="width:98%;margin:auto;" >
 <p:panel style="width:100%;margin:auto;min-height:900px;">
		<ui:insert name="menu">
			<ui:include src="/SHELL-shop/Header.xhtml" />
		</ui:insert>
		<ui:insert name="menu">
			<ui:include src="/SHELL-shop/Headershop.xhtml" />
		</ui:insert>
		<p:panel id="basic2" closable="true"
			style="min-height:900px;margin-left: 50px;margin-right: 50px;background-image: url(../2.png)">	
			 
					<h:form>
					<div align="center">
					<h:outputText value="Liste Des Articles pae Famille"/><br/>
					<h:panelGrid columns="2" style="margin-bottom:10px" cellpadding="5" columnClasses="label, value">
					 <p:outputLabel for="basic" value="Famille:" />
					<p:selectManyMenu id="basic" value="#{FamilleBean.selectedfamilles}"  style="width:400px">
					 
                      <f:selectItems   value="#{FamilleBean.listFamille}" var="f" itemLabel="#{f.nom}" itemValue="#{f.nom}"/>
                             <f:ajax listener="#{FamilleBean.getArticlebyfamille}"  render="article" /> 
                      </p:selectManyMenu>
                      </h:panelGrid>
					</div>
					
					<br/><br/>
				 
					<p:dataTable id="article" var="p"
							value="#{FamilleBean.listProduit}"
							widgetVar="ArticleTable"   filteredValue="#{FamilleBean.filterproduits}"
							  selection="#{FamilleBean.selectedProduit}" rowKey="#{p.id}"
							emptyMessage="aucun produit dans le stock" paginator="true"
							rows="10" paginatorPosition="bottom"  > 
                              	
							<p:column>
								<f:facet name="header">
									<h:outputText style="font-size:12px color:#483d8b" value="Code" />
								</f:facet>
								<h:outputText style="font-size:12px " value="#{p.id}" />
							</p:column>
							
						 <p:column filterBy="#{p.nom}" sortBy="#{p.nom}" filterStyle="font-size:14px;color:blue" filterMatchMode="contains" >
								<f:facet name="header">
									<h:outputText style="font-size:12px color:#483d8b" value="Nom" />
								</f:facet>
								
									 <h:outputText  id="codeInput" value="#{p.nom}" style="width:96%"/>	 
							</p:column>
							
							<p:column   >
								<f:facet name="header">
									<h:outputText style="font-size:12px color:#483d8b" value="Quantite" />
								</f:facet>
								 <h:outputText style="font-size:12px "
									value="#{p.quantitestock}" /> 
								  
							</p:column>
							   
								
							  <p:column >
								<f:facet name="header">
									<h:outputText style="font-size:12px color:#483d8b" value="Vente" />
								</f:facet>
								
								 <h:outputText style="font-size:12px "
									value="#{p.prixventes}" /> 
								 
								 
							</p:column>
							
							
							 <p:column >
								<f:facet name="header">
									<h:outputText style="font-size:12px color:#483d8b" value="Qtemin" />
								</f:facet>
								
									 <h:outputText style="font-size:12px "
									value="#{p.qtemin}" /> 
							</p:column>
						 
						</p:dataTable>
					
					</h:form>
				 
			 </p:panel>
			 </p:panel>
			 </h:body>
			 </html>
