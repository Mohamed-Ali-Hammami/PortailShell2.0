<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>

</h:head>


<h:body  style="width:98%;margin:auto;" >
 <p:panel style="width:100%;margin:auto;min-height:900px;">
		<ui:insert name="menu">
			<ui:include src="/SHELL-shop/Header.xhtml" />
		</ui:insert>
		<ui:insert name="menu">
			<ui:include src="/SHELL-shop/Headershop.xhtml" />
		</ui:insert>
		<p:panel id="basic2" closable="true"
			style="min-height:900px;margin-left: 50px;margin-right: 50px;background-image: url(../2.png)">
			 
			<p:panel>
				 
					<div align="center">
						 
						<fieldset style="margin-bottom: 20px;background-color:#eeeec6;">
							<legend>
								<b><h:outputText style="font-size:12px; color:#2e8b57"
										value="Mise a jour des Familles " name="outTxtcin" /> </b>
							</legend>
							 
							<h:form>
							 
								
								<table>
									<tr>

										<td width="20%"><b><h:outputText value="Famille :"
												style="font-size:12px " /></b></td>
										<td><h:inputText value="#{FamilleBean.famille}" id="nom" rendered="true" size="30"
												style="font-size:14px " required="true" requiredMessage="entrer libelle de famille">
												
											</h:inputText>
											
											<p:messages for="nom"  autoUpdate="true" closable="true"   />	
												</td>
									</tr>
									 

									<tr>
										 <td  /> 
									  <td  >
                                    <p:commandButton value="Ajouter"
												style="width:200px;height:30;color:#0000ff;background-color:#abc8e2;font-size:12px"
												action="#{FamilleBean.saveFamille}" /> 
												</td></tr></table>
								 
							</h:form>
						</fieldset>
						
						  <h:form id="form">
						  
						
						
						  <p:growl id="msgs2" showDetail="true"/>
						 <p:dataTable id="f" var="f"
							value="#{FamilleBean.listFamille}"
							widgetVar="ArticleTable"  editable="true" filteredValue="#{FamilleBean.filterFamillearticles}"
							  selection="#{FamilleBean.selectedFamillearticle}" rowKey="#{f.id}"
							emptyMessage="aucune famille dans le stock" paginator="true"
							rows="10" paginatorPosition="bottom"  > 
                              <p:ajax event="rowEdit" listener="#{FamilleBean.onRowEdit}" update=":form:msgs2"/>
						
							
							<p:column>
								<f:facet name="header">
									<h:outputText style="font-size:12px color:#483d8b" value="Code" />
								</f:facet>
								<h:outputText style="font-size:12px " value="#{f.code}" />
							</p:column>
						
							<p:column filterBy="#{f.nom}" filterStyle="font-size:14px;color:blue" filterMatchMode="contains" >
								<f:facet name="header">
									<h:outputText style="font-size:12px color:#483d8b" value="Nom" />
								</f:facet>
								
									<p:cellEditor>
								<f:facet name="output"><h:outputText style="font-size:12px "
									value="#{f.nom}" /></f:facet>
								<f:facet name="input"><p:inputText  id="codeInput" value="#{f.nom}" style="width:96%"/>	</f:facet>
								
								</p:cellEditor>
							</p:column>
							 

							<p:column style="width:40px;text-align:center">
								<f:facet name="header">
									<h:outputText style="font-size:9px;color:#483d8b" value="supprimer" />
								</f:facet> 
								<div align="center">
								<p:commandLink action="#{FamilleBean.deletefamille}" onclick="PF('suppressionDialog').show();">									 
									<p:graphicImage url="/images/trash.png" />
									
									<f:setPropertyActionListener
											target="#{FamilleBean.selectedFamillearticle}"
											value="#{f}"></f:setPropertyActionListener>
									
									<p:confirm header="Confirmation"
											message="Voulez-vous vraiment supprimer la famille ?"
											icon="ui-icon-alert" />
								</p:commandLink>
								</div>
							</p:column>
                              
							<p:column style="width:40px"  >
							<f:facet name="header">
									<h:outputText style="font-size:9px;color:#483d8b"
										value="modifier" />
								</f:facet>
							<p:rowEditor/>
							</p:column> 
							 
						</p:dataTable>
						
						
						<p:confirmDialog global="true" showEffect="fade" hideEffect="fade" style="width:150px"
							widgetVar="suppressionDialog">
							<div align="center">
							<p:commandButton value="oui" type="button"
								styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
							<p:commandButton value="Non" type="button"
								styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
								</div>
						</p:confirmDialog>
                          
                         
                          
								
								
						
							 </h:form>	

					</div>
					
				 </p:panel>
				 </p:panel>
				 </p:panel>
				 </h:body>
				 </html>
