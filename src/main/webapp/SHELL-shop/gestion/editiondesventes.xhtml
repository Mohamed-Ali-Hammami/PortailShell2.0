<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>

</h:head>


<h:body  style="width:98%;margin:auto;" >
 <p:panel style="width:100%;margin:auto;min-height:900px;">
		<ui:insert name="menu">
			<ui:include src="/SHELL-shop/Header.xhtml" />
		</ui:insert>
		<ui:insert name="menu">
			<ui:include src="/SHELL-shop/Headershop.xhtml" />
		</ui:insert>
		<p:panel id="basic2" closable="true"
			style="min-height:900px;margin-left: 50px;margin-right: 50px;background-image: url(../2.png)">

			<h:form id="f">

				<div align="center">
					
					 
					<h:panelGrid columns="2">
						<h:outputText value="DATE" style="font-size:16px" />
						<p:calendar value="#{VenteBean.date}" id="p" required="true"
							requiredMessage="entrer date">
							<p:ajax  
								event="dateSelect"   /> 
						</p:calendar>
						<p:selectOneRadio value="#{VenteBean.poste}"
						style="width:200px;font-size:14px" required="true"
						requiredMessage="choisir la poste">
						<f:selectItems value="#{VenteBean.postes}" />
						<f:ajax render="p" />
					</p:selectOneRadio>
						
				 <p:commandButton  value="valider" action="#{VenteBean.imprimeretatventeparDate}" ajax="false"
						style="width:200px;height:30;color:white;background-image:linear-gradient( #FAF281, red);font-size:14px" >
							 
							 
					</p:commandButton>
                    
						<p:commandButton title="imprimer" value="imprimer">
							 
							<p:printer target="imprimer" />
						 
					</p:commandButton>
					</h:panelGrid>
					<br />
					<br />
                     
					<p:outputPanel id="imprimer" >
						<div align="center">
							<b><h:outputText
									value="EDITION DES VENTES DU : #{VenteBean.dates} #{VenteBean.poste}"
									style="font-size:20px" />   </b>


						</div>
						<br /> 
						<div align="right">
						<p:dataTable id="produit" var="p"  
							value="#{VenteBean.listelignevente}"
							emptyMessage="aucune ligne dans la base">
							 
								<p:column width="20%" style="border: 0.5px #000000 solid;">
									<f:facet name="header">
										<h:outputText style="font-size:14px ;color:#000000"
											value="Code" />
									</f:facet>


									<h:outputText style="font-size:14px ;color:#000000"
										value="#{p.produit.codeshop}"  />
								</p:column>

								<p:column style="border: 0.5px #000000 solid;">
									<f:facet name="header">
										<h:outputText style="font-size:14px ;color:#000000"
											value="Nom" />
									</f:facet>


									<h:outputText style="font-size:14px ;color:#000000" value="#{p.produit.nom}"
										  />
								</p:column>

								<p:column width="12%" style="border: 0.5px #000000 solid;">
									<f:facet name="header">
										<h:outputText style="font-size:14px ;color:#000000"
											value="QUANTITE" />
									</f:facet>


									<h:outputText style="font-size:14px ;color:#000000" value="#{p.quantites}"
										  />
								</p:column>

								<p:column width="15%" style="border: 0.5px #000000 solid;text-aligh:right">
									<f:facet name="header">
										<h:outputText style="font-size:14px ;color:#000000;text-aligh:right"
											value="Prix" />
									</f:facet>


									<h:outputText style="font-size:14px ;color:#000000"
										value="#{p.produit.prixventes}"  />
								</p:column>
								
								<p:column width="15%" style="border: 0.5px #000000 solid;text-aligh:right">
									<f:facet name="header">
										<h:outputText style="font-size:14px ;color:#000000;text-aligh:right"
											value="Montant" />
									</f:facet>


									<h:outputText style="font-size:14px ;color:#000000"
										value="#{p.totalttcs}"  />
								</p:column>


								<p:column width="10%" style="border: 0.5px #000000 solid;text-aligh:right">
									<f:facet name="header">
										<h:outputText style="font-size:14px ;color:#000000;text-aligh:right"
											value="STOCK" />
									</f:facet>


									<h:outputText style="font-size:14px ;color:#000000"
										value="#{p.produit.quantitestocks}"   />
								</p:column>
						 
						</p:dataTable></div><br/>
						
						<table style="width: 70%" border="1">
						<tr>
						<td><h:outputText style="font-size:14px ;"	 value="Total HT"  /></td>
						<td><h:outputText style="font-size:14px ;"	 value="Total TVA"  /></td>
						<td><h:outputText style="font-size:14px ;"	 value="Total TTC"  /></td>						
						</tr>
						<tr>
						<td><h:outputText style="font-size:14px ;"	 value="#{VenteBean.totalht}"  /></td>
						<td><h:outputText style="font-size:14px ;"	 value="#{VenteBean.totaltva}"  /></td>
						<td><h:outputText style="font-size:14px ;"	 value="#{VenteBean.totalttcs}"  /></td>
						</tr>
						</table>
                             <br />
                             
                           <h:panelGroup rendered="#{VenteBean.listtransfert.size()>0}"> 
						<b><h:outputText value="TRANSFERT" style="font-size:20px ;" /></b>
						<br />
						 
							 <p:dataGrid value="#{VenteBean.listtransfert}" var="p" columns="2"  
			   styleClass="grid">
			 
			               <h:panelGrid columns="2">

                                <p:panel style="text-align:center;width:180px;height:20px ;  border: 0.5px #000000 solid;">
                                
                                
                                <b><h:outputText style="font-size:12px ;color:#000000"
										value="#{p.produit.nom}"  /></b>	 
                                </p:panel>     
									
									
                                <p:panel style="text-align:center;width:30px;height:20px ;border: 0.5px #000000 solid;">
                               
                                <b><h:outputText style="font-size:12px ;color:#000000"
										value="#{p.quantites}"  /></b> 
                                 
                                </p:panel>     
									</h:panelGrid>
							 
			  
			 
			 
			 
			  </p:dataGrid>	
								 
										  
										  
						  </h:panelGroup>  
						<br/>
						<h:panelGroup rendered="#{VenteBean.listticketnegtif.size()>0}">
						 
						<b><h:outputText value="TICKETS EN -" style="font-size:20px ;" /></b>
						<br />

						<p:dataTable id="produit2" var="p"
							value="#{VenteBean.listticketnegtif}"
							emptyMessage="aucune ligne dans la base">
							 
								<p:column>
									<f:facet name="header">
										<h:outputText style="font-size:14px ;color:#000000"
											value="Code" />
									</f:facet>


									<h:outputText style="font-size:14px ;"
										value="#{p.produit.codeshop}"  />
								</p:column>
                              
								<p:column>
									<f:facet name="header">
										<h:outputText style="font-size:14px ;color:#000000"
											value="LIBELLE" />
									</f:facet>


									<h:outputText style="font-size:14px ;" value="#{p.produit.nom}"
										 />
								</p:column>

								<p:column>
									<f:facet name="header">
										<h:outputText style="font-size:14px ;color:#000000"
											value="QUANTITE" />
									</f:facet>


									<h:outputText style="font-size:14px ;" value="#{p.quantites}"
										  />
								</p:column>
                                    
								<p:column>
									<f:facet name="header">
										<h:outputText style="font-size:14px ;color:#000000"
											value="Num TICKET" />
									</f:facet>


									<h:outputText style="font-size:14px ;" value="#{p.vente.ticket.id}"
										  />
								</p:column>

                               
								<p:column>
									<f:facet name="header">
										<h:outputText style="font-size:14px ;color:#000000"
											value="HEURE" />
									</f:facet>


									<h:outputText style="font-size:14px ;"	 value="#{p.vente.ticket.heure}" id="qte2" />
								</p:column>
                                   
								  
								<p:row>
									 
									<p:column colspan="3" footerText="#{VenteBean.totalqteTicknegatif}"
										id="total" />
									  
								</p:row>  
								  
							 
						</p:dataTable>
					
						<h:outputText value=" Nombre de ligne #{VenteBean.listticketnegtif.size()}"/>
						</h:panelGroup>
						 <br/>
						 
						 	 
						 <h:panelGroup rendered="#{VenteBean.listtransfertnegatif.size()>0}">
						<b><h:outputText value="TRANSFERT EN -" style="font-size:20px ;" /></b>
						<br />
						<p:dataTable id="transfertnegatif" var="p"
							value="#{VenteBean.listtransfertnegatif}"
							emptyMessage="aucune ligne dans la base">
							 
								<p:column>
									<f:facet name="header">
										<h:outputText style="font-size:14px ;color:#000000"
											value="Nom" />
									</f:facet>


									<h:outputText style="font-size:14px ;"
										value="#{p.produit.nom}"  />
								</p:column>
								
								<p:column>
									<f:facet name="header">
										<h:outputText style="font-size:14px ;color:#000000"
											value="QUANTITE" />
									</f:facet>


									<h:outputText style="font-size:14px ;" value="#{p.quantite}"
										  />
								</p:column> 
                               
							<!--  <p:row>
									 
									<p:column colspan="3" footerText="#{VenteBean.totalqteTransnegatif}"
										id="total2" />
									  
								</p:row> -->  
						</p:dataTable>
						
						<h:outputText value=" Nombre de ligne #{VenteBean.listtransfertnegatif.size()}"/>
						</h:panelGroup>
						<br/>
					</p:outputPanel>
				</div>
			</h:form>
	 </p:panel>
	 </p:panel>
	 </h:body>
	 </html>
