
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>

</h:head>

<h:body onload="init()" style="width:98%;margin:auto;" >


	<p:panel style="width:100%;margin:auto;min-height:900px;">
		<ui:insert name="menu">
			<ui:include src="/SHELL-shop/Header.xhtml" />
		</ui:insert>
		<ui:insert name="menu">
			<ui:include src="/SHELL-shop/Headershop.xhtml" />
		</ui:insert>
		<p:panel id="basic2" closable="true"
			style="min-height:900px;margin-left: 50px;margin-right: 50px;background-image: url(../2.png)">

			<h:form id="ff">

                    <p:dialog widgetVar="carDialog" styleClass="dialog"  
					header="Liste des Articles" closeOnEscape="true" closable="true"
					draggable="true"
					style="margin-top: 0px;
                     margin-right: 20px; margin-bottom: 15px; margin-left: 5px;"
					id="produitsss" height="300" width="800">
					<ui:insert name="menu">
						<ui:include src="/SHELL-shop/sousdossier/listProduitachat.xhtml" />
					</ui:insert>
				</p:dialog>
				  <h:panelGrid columns="4">
						<h:outputText value="Code Fournisseur" style="font-size:16px " />
						
                     
                     <p:selectOneMenu value="#{AchatshopBean.nomfournissuer}"  
								style="width:200px;font-size:12px " filter="true"
								filterMatchMode="contains">
								<f:selectItem itemLabel="selectionner fournisseur" />
								<f:selectItems value="#{AchatshopBean.listfournisseur}" var="f"
									itemValue="#{f.nom}" itemLabel="#{f.nom}" />
								<p:ajax update="nom achat"  oncomplete="gettonumfacture(this)"
									listener="#{AchatshopBean.getFournisseurbyname}" />
							</p:selectOneMenu>

						<h:outputText value="Du"
							style="font-size:16px;text-decoration: underline " />
						<p:calendar value="#{AchatshopBean.date}" required="true"
							style="font-size:16px " id="popup" pattern="dd-MM-yyyy"
							mask="true" />


						<h:outputText value="Nom Fournisseur" style="font-size:16px " />
						<h:inputText value="#{AchatshopBean.nomfournissuer}" id="nom"  />
						<h:outputText value="Numero Facture"
							style="font-size:16px ;text-decoration: underline" />

						<h:inputText tabindex="2"   styleClass="fact" onchange="init2();"
							value="#{AchatshopBean.numFacture}"  >
                                
						</h:inputText>

						<b><h:outputText value="Achat N°"
									style="font-size:48px ;text-decoration: underline" /></b>
						<h:inputText value="#{AchatshopBean.numAchat}" id="achat"
								style="font-size:20px " readonly="true" />
					</h:panelGrid>
                  
				<br />
				<br />

                <p:commandLink onclick="PF('carDialog').show();PF('table').clearFilters();" process="@this"
					update="dataTable">
					<p:graphicImage url="/images/bubble.png" style="width:50px" />
				</p:commandLink>
				<p:remoteCommand name="refreshFooter" update=" emp emp:ttc emp:qte" />
				
				
				
				<p:dataTable id="emp" var="p" editable="true" rowIndexVar="rowId"
					scrollable="true" scrollHeight="400"
					value="#{AchatshopBean.listeLigne}" editMode="cell"
					widgetVar="articleTable" rowKey="#{p.id}"
					emptyMessage="aucune ligne dans la base">

					<p:column style="width:250:px">
						<f:facet name="header">
							<h:outputText style="font-size:12px ;color:#483d8b" value="CODE" />
						</f:facet>

						 
                      <h:inputText value="#{p.produit.code}"   onkeyup="nextsvente(this);"
                      styleClass="scode" rendered="#{p.produit!=null}"    
							 
							 id="id3"  
							style="background-color:transparent;border:none;">
							  	<p:ajax event="focus" update=" qtes"  listener="#{AchatshopBean.getCodefocus}"  process="@this" partialSubmit="true" />
								 <f:attribute name="test" value="#{rowId}"/>					 
							
						</h:inputText> 
						
						 
						<h:inputText value="#{p.libelle}" styleClass="inpdes" id="id2" onchange="javascript:this.value=this.value.toUpperCase();"
							 rendered="#{p.produit==null}" style="background-color:transparent;border:none;">
							 
							<p:ajax event="keyup" listener="#{AchatshopBean.updateCode2}" update="qtes"  
							oncomplete="refreshFooter();init();"  process="@this" partialSubmit="true"/> 
							 <p:ajax event="focus"   listener="#{AchatshopBean.getCodefocus}"  process="@this" partialSubmit="true" />
								 <f:attribute name="test" value="#{rowId}"/>					 
							
						</h:inputText>
						 
					</p:column>

					<p:column style="width:150px">

						<f:facet name="header">
							<h:outputText style="font-size:12px ;color:#483d8b"
								value="LIBELLE" />
						</f:facet>

						<h:outputText style="font-size:12px ;" value="#{p.produit.nom}"
							id="des" />
					</p:column>




					<p:column >
						<f:facet name="header">
							<h:outputText style="font-size:12px ;color:#483d8b"
								value="QUANTITE" />
						</f:facet>
						<h:inputText value="#{p.quantite}"   id="qtes" onkeyup="nextsquantite(this);"
							styleClass="inputs" 
							style="background-color:transparent;border:none;">


							<p:ajax event="change" process="@this" partialSubmit="true" 
								 
								listener="#{AchatshopBean.updatetotalachat}"
								oncomplete="refreshFooter();" update="montant"
								/>
							<f:attribute name="test" value="#{rowId}" />
						</h:inputText>

					</p:column>




					<p:column>
						<f:facet name="header">
							<h:outputText style="font-size:12px ;color:#483d8b"
								value="P.U HT" />
						</f:facet>
						<h:inputText onkeyup="nextsquantite(this);"  style="background-color:transparent;border:none;" value="#{p.produit.achat}"  rendered="#{p.produit !=null }"
							id="prix" >
							<p:ajax event="change" process="@this" listener="#{AchatshopBean.updateprixacht}"
								oncomplete="refreshFooter();" update="montant"
								partialSubmit="true" />
							<f:attribute name="test" value="#{rowId}" />
							</h:inputText>
					</p:column>

					<p:column>
						<f:facet name="header">
							<h:outputText style="font-size:12px ;color:#483d8b"
								value="Montant" />
						</f:facet>
						<h:outputText style="font-size:12px " value="#{p.montants}"
							id="montant" > 
							</h:outputText>
					</p:column>


					<p:column>
						<f:facet name="header">
							<h:outputText style="font-size:12px ;color:#483d8b" value="STOCK" />
						</f:facet>
						<h:outputText style="font-size:12px "
							value="#{p.produit.quantitestock}" id="qs" />
					</p:column>

					<p:column>
						<f:facet name="header">
							<h:outputText style="font-size:12px ;color:#483d8b" value="DEPOT" />
						</f:facet>
						<h:outputText style="font-size:12px "
							value="#{p.produit.quantitedepot}" id="qd" />
					</p:column>


					<f:facet name="footer">
					Nombre d'Articles:
					<h:outputText id="qte" value="#{AchatshopBean.totalquantite}" />
                                Total:
                           <h:outputText id="ttc"
							value="#{AchatshopBean.totalttcs}" />


					</f:facet>


				</p:dataTable>
				
					<div align="center">
					<br />
					<p:outputPanel>
						<b> <h:outputText value="Type Payement"
								style="font-size:12px ;color:#000000" /></b>
						<br />

						<h:selectOneRadio id="etat_payement" style="font-size:12px ;"  
							value="#{AchatshopBean.typepayement}">
							<f:selectItems   value="#{AchatshopBean.typepayements}" />
							 
							<f:ajax render="cheque" />
						</h:selectOneRadio>
						<br />
						<h:panelGroup id="cheque">
							<table>

								<tr>
									<td><b><h:outputText value="Banque" 
												rendered="#{AchatshopBean.typepayement=='cheque'}"
												style="font-size:12px ;color:#000000" /> </b></td>

									<td><h:inputText  
											rendered="#{AchatshopBean.typepayement=='cheque'}"
											value="#{AchatshopBean.banque}"
											style="width:215px;font-size:12px ">

										</h:inputText></td>
								</tr>
								<tr>
									<td><b> <h:outputText value="Numero Cheque"
												rendered="#{AchatshopBean.typepayement=='cheque'}"
												style="font-size:12px ;color:#000000" /></b></td>

									<td><h:inputText value="#{AchatshopBean.numcheque}"  
											rendered="#{AchatshopBean.typepayement=='cheque'}">

										</h:inputText></td>

								</tr>

								<tr>
									<td><b> <h:outputText value="Echeance"
												rendered="#{AchatshopBean.typepayement=='cheque'}"
												style="font-size:12px ;color:#000000" /></b></td>

									<td><p:calendar value="#{AchatshopBean.echeance}" size="20"
											rendered="#{AchatshopBean.typepayement=='cheque'}">

										</p:calendar></td>

								</tr>

							</table>
						</h:panelGroup>
					</p:outputPanel>

					<p:commandButton value="Valider" ajax="false" styleClass=".button"
						style="width:200px;height:30;color:white;background-image:linear-gradient( #FAF281, red);font-size:12px"
						action="#{AchatshopBean.saveAchat}" />
				</div>
				
				<script type="text/javascript">
            document.addEventListener("keydown", function(event) {
            	if( event.altKey==true){
            		
            		if(event.which==76){
            			PF('carDialog').show();
						PF('table').clearFilters();
            		}
            	}
              });
           
            document.addEventListener("keydown", function(event) {
            	if( event.ctrlKey==true){
            		
            		if(event.which==113){
            			 
            			var index = 0;
						$('.inputs').eq(index).focus();
						$('.inputs').eq(index).select();
            		}
            	}
              });
            
            document.addEventListener("keydown", function(event) {
            	if( event.ctrlKey==true){
            		
            		if(event.which==112){
            			 
            			var index = 0;
						$('.scode').eq(index).focus();
						$('.scode').eq(index).select();
						return false;
            		}
            	}
              });
            
            document.addEventListener("keydown", function(event) {
            	if( event.ctrlKey==true){
            		
            		if(event.which==123){
            			 
            			pressenter();
            		}
            	}
              });
            
			
			function gettonumfacture(input) {
				 
			 $('.fact').focus();
									 
			}
			function inits() {
			 var index = 0;
				$('.inputs').eq(index).focus();
				$('.inputs').eq(index).select();
			}
            function pressenter() {
				if (window.confirm('Vous etes sur de valider le bon ?')) {
					$('.button').click();
					//$('.typepayement').focus();
					return true;

				} else {
					return false;
				}

			}
					
					function init() {
						var index = 0;
						$('.inpdes').eq(index).focus();
						 
					} 

					 

					function pressenter1() {
						$('.recus').focus();

					}
					
					function nextsvente(input) {
						$(document)
								.keypress(
										function(event) {
											var keycode = (event.keyCode ? event.keyCode
													: event.which);
											if (keycode == '13') {
												if (input.value != "") {
													$(input).closest('td').next(
													'td').find(
													'input[type=text]')
													.focus().select();
													return false;
												}
											}

										});

						//	getcodfocus();
					}

					function nextsquantite(input) {
						$(document)
								.keypress(
										function(event) {
											var keycode = (event.keyCode ? event.keyCode
													: event.which);
											if (keycode == '13') {
												$(input).closest('tr')
												.next()
												.find('input[type=text]').eq(1)
												.focus().select();
											    
												return false;
											}

										});
					}
				</script>
				<style type="text/css">
.dialog {
	position: fixed;
	top: 20% !important;
	left: 20% !important;
}

.dialog2 {
	position: fixed;
	top: 30% !important;
	left: 40% !important;
}
</style>

				
				</h:form>
				</p:panel>
				</p:panel>
				</h:body>
				</html>
