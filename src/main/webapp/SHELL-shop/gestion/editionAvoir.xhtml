<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>

</h:head>

<h:body  style="width:98%;margin:auto;" >
 <p:panel style="width:100%;margin:auto;min-height:900px;">
		<ui:insert name="menu">
			<ui:include src="/SHELL-shop/Header.xhtml" />
		</ui:insert>
		<ui:insert name="menu">
			<ui:include src="/SHELL-shop/Headershop.xhtml" />
		</ui:insert>
		<p:panel id="basic2" closable="true"
			style="min-height:900px;margin-left: 50px;margin-right: 50px;background-image: url(../2.png)">
			 
                  <h:form>
                  <div align="left">
                  <h:commandLink title="imprimer">
									<p:graphicImage url="/images/imprimante-icone.png"
										style="width:25px" />
									<p:printer target="imprimer"></p:printer>
								</h:commandLink>
			 <p:outputPanel id="imprimer">
				<table   style="width:100%">
					<tr>
						<td><b><h:outputText value="EDITION FACTURE ACHAT N° #{AvoirBean.factureavoir.code}"
								style="font-size:12px " /></b></td>
								<td/>
				 <td>
				 
				 <b><h:outputText value="Bon De Livraison N° #{AvoirBean.avoir.id}"
								style="font-size:12px " /></b>
				 </td>
					 </tr>
					 <tr>
					 <td><b><h:outputText value="Fournisseur #{AvoirBean.fourniseur.nom}"
								style="font-size:12px " /></b></td>
								<td/>
					 
					 </tr>
					 </table>
					 <br/>
					 <table>
					 <tr style="">
					 <td>
					 <b><h:outputText value="DATE #{AvoirBean.dates}"
								style="font-size:12px " /></b>
					 </td>
					 </tr>
					 
					 </table>
					 <br/><br/>
					 <table border="1" style="width: 100%">
					 <tr>
					 <td> <b><h:outputText value="Code"	style="font-size:12px " /></b></td>
					  <td> <b><h:outputText value="Nom"	style="font-size:12px " /></b></td>
					   <td> <b><h:outputText value="Quantite"	style="font-size:12px " /></b></td>
					    <td> <b><h:outputText value="Prix"	style="font-size:12px " /></b></td>
					     <td> <b><h:outputText value="Tva"	style="font-size:12px " /></b></td>
					      <td> <b><h:outputText value="Montant"	style="font-size:12px " /></b></td>
					 </tr>
					 <ui:repeat var="a" value="#{AvoirBean.listeLigne}">
					  <tr>
					 <td>  <h:outputText value="#{a.produit.code}"	style="font-size:12px " /></td>
					  <td> <h:outputText value="#{a.produit.nom}"	style="font-size:12px " /></td>
					   <td> <h:outputText value="#{a.quantite}"	style="font-size:12px " /></td>
					    <td> <h:outputText value="#{a.produit.achat}"	style="font-size:12px " /></td>
					     <td> <h:outputText value="#{a.produit.tva}"	style="font-size:12px " /></td>
					      <td> <h:outputText value="#{a.montant}"	style="font-size:12px " /></td>
					 </tr>
					 </ui:repeat>
					 </table>
					 <table  style="width: 100%"> 
					 <tr><td>
					  <b><h:outputText value="Total HT"	style="font-size:12px " /></b></td>
					   <td><h:outputText value="#{AvoirBean.totalht}"	style="font-size:12px " /></td><td>
					   
					    <b><h:outputText value="Total TVA"	style="font-size:12px " /></b></td><td>
					   <h:outputText value="#{AvoirBean.totaltva}"	style="font-size:12px " /></td><td>
					   
					    <b><h:outputText value="Total TTC"	style="font-size:12px " /></b></td><td>
					   <h:outputText value="#{AvoirBean.totalttc}"	style="font-size:12px " />
					   </td></tr></table>
					 
					 </p:outputPanel>
					 </div>
				</h:form>
	 </p:panel>
	 </p:panel>
