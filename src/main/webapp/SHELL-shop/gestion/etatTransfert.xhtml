<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>

</h:head>

<h:body  style="width:98%;margin:auto;" >
 <p:panel style="width:100%;margin:auto;min-height:900px;">
		<ui:insert name="menu">
			<ui:include src="/SHELL-shop/Header.xhtml" />
		</ui:insert>
		<ui:insert name="menu">
			<ui:include src="/SHELL-shop/Headershop.xhtml" />
		</ui:insert>
		<p:panel id="basic2" closable="true"
			style="min-height:900px;margin-left: 50px;margin-right: 50px;background-image: url(../2.png)">

			<h:form id="f">

				<div align="center">
					<h:panelGrid columns="3">
						<h:outputText value="DATE" style="font-size:16px" />
						<p:calendar value="#{TransfertBean.date}" id="p" required="true"
							requiredMessage="entrer date">
							<p:ajax listener="#{TransfertBean.gettrasfertbydate}"
							update="imprimer" event="dateSelect"/>
						</p:calendar>
						
						<h:commandLink title="imprimer">
									<p:graphicImage url="/images/imprimante-icone.png"
										style="width:25px" />
									<p:printer target="imprimer"></p:printer>
								</h:commandLink>
					</h:panelGrid>
                     <br/><br/>
					<p:outputPanel id="imprimer">

						<p:dataTable id="produit" var="p"
							value="#{TransfertBean.listLignetransfert}"
							emptyMessage="aucune ligne dans la base">
							
							<p:column>
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b"
										value="Code" />
								</f:facet>


								<h:outputText style="font-size:12px ;" value="#{p.produit.code}"
									id="qte2" /> 
							</p:column>
							
							<p:column>
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b"
										value="Designation" />
								</f:facet>


								<h:outputText style="font-size:12px ;" value="#{p.produit.nom}"
									id="nom" /> 
							</p:column>

							<p:column>
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b"
										value="QUANTITE" />
								</f:facet>


								<h:outputText style="font-size:12px ;" value="#{p.quantite}"
									id="qte" /> 
							</p:column>
						</p:dataTable>
					</p:outputPanel>
				</div>
			</h:form>
		 </p:panel>
		 </p:panel>
		 </h:body>
		 </html>
