<html xmlns="http://www.w3.org/1999/xhtml"

<h:head>

<h:body  style="width:98%;margin:auto;" >
 <p:panel style="width:100%;margin:auto;min-height:900px;">
		<ui:insert name="menu">
			<ui:include src="/SHELL-shop/Header.xhtml" />
		</ui:insert>
		<ui:insert name="menu">
			<ui:include src="/SHELL-shop/Headershop.xhtml" />
		</ui:insert>
		<p:panel id="basic2" closable="true"
			style="min-height:900px;margin-left: 50px;margin-right: 50px;background-image: url(../2.png)">
			<div align="center">
			<h:form id="f">

				

					<b> <h:outputText value="Mouvement Articles par Famille"
							style="font-size:24px color:#483d8b" /></b><br />
					<br />
				 
						<p:dataTable id="f" var="f" value="#{FamilleBean.listFamille}"
							selection="#{FamilleBean.selectedFamillearticle}"  selectionMode="single"
							rowKey="#{f.code}" emptyMessage="aucune famille dans le stock"
							paginator="true" rows="10" paginatorPosition="bottom">

							<p:ajax event="rowSelect"
								listener="#{FamilleBean.getArticlebyfamilles2}"
								update=":f:produit" />

							<p:column>
								<f:facet name="header">
									<h:outputText style="font-size:12px color:#483d8b" value="Code" />
								</f:facet>
								<h:outputText style="font-size:12px " value="#{f.code}" />
							</p:column>

							<p:column filterBy="#{f.nom}"
								filterStyle="font-size:14px;color:blue"
								filterMatchMode="contains">
								<f:facet name="header">
									<h:outputText style="font-size:12px color:#483d8b" value="Nom" />
								</f:facet>
								<h:outputText style="font-size:12px " value="#{f.nom}" />

							</p:column>

						</p:dataTable>
			
					<br /> <br />
					 
						<p:dataTable id="produit" value="#{FamilleBean.listProduit}"
							var="p" selection="#{FamilleBean.selectedProduit}" 
							selectionMode="single" rowKey="#{p.id}">

							<p:ajax event="rowSelect"
								listener="#{FamilleBean.getVentebyarticle}" update=":f:vente" />



							<p:column>
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b"
										value="Code" />
								</f:facet>


								<h:outputText style="font-size:12px ;" value="#{p.id}" />
							</p:column>

							<p:column>
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b" value="Nom" />
								</f:facet>


								<h:outputText style="font-size:12px ;" value="#{p.nom}" />
							</p:column>

							<p:column>
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b"
										value="Quantite" />
								</f:facet>


								<h:outputText style="font-size:12px ;" value="#{p.quantite}" />
							</p:column>
							<p:column>
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b"
										value="Vente" />
								</f:facet>


								<h:outputText style="font-size:12px ;" value="#{p.prixventes}" />
							</p:column>

						</p:dataTable>

					 
					<br />
					<br /> 
					
						 
				 
					 	
							<p:dataTable id="vente" value="#{FamilleBean.listelignevente}"
								var="p">
								<p:column>
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="Code" />
									</f:facet>


									<h:outputText style="font-size:12px ;"
										value="#{p.produit.code}" />
								</p:column>
								
								<p:column>
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="Date" />
									</f:facet>


									<h:outputText style="font-size:12px ;"
										value="#{p.dates}" />
								</p:column>
 

								<p:column>
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="Vente" />
									</f:facet>


									<h:outputText style="font-size:12px ;" value="#{p.prixs}" />
								</p:column>

								<!-- <p:column>
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="Avoir" />
									</f:facet>


									<h:outputText style="font-size:12px ;"
										value="#{p.produit.nbAvoir}" />
								</p:column>
								
								<p:column>
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="Achat" />
									</f:facet>


									<h:outputText style="font-size:12px ;"
										value="#{p.produit.nbAchat}" />
								</p:column>
								
								<p:column>
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="Numfac" />
									</f:facet>


									<h:outputText style="font-size:12px ;"
										value="#{p.produit.Numfac}" />
								</p:column>
								 -->

							 

							</p:dataTable>  
					 
					<br />



				
			</h:form>
			</div>
		 </p:panel>
		 </p:panel>
		 </h:body>
		 </html>
