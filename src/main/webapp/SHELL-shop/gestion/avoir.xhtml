<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>

</h:head>

<h:body>




	<p:panel style="min-height:900px;margin-left: 20px;margin-right: 20px;">
		<ui:insert name="menu">
			<ui:include src="/SHELL-shop/Header.xhtml" />
		</ui:insert>
		<ui:insert name="menu">
			<ui:include src="/SHELL-shop/Headershop.xhtml" />
		</ui:insert>
		<p:panel id="basic2" closable="true"
			style="min-height:900px;margin-left: 50px;margin-right: 50px;background-image: url(../2.png)">
                  <h:form>
			 
				<table>
					<tr>
						<td><h:outputText value="Code Fournisseur"
								style="font-size:12px " /></td>
						<td><p:selectOneMenu value="#{AvoirBean.nomfournissuer}"
								style="width:200px;font-size:12px " filter="true"
								filterMatchMode="contains">
								<f:selectItem itemLabel="selectionner fournisseur" />
								<f:selectItems value="#{AvoirBean.listfournisseur}" />
                                <f:ajax render="nom facture" listener="#{AvoirBean.getFournisseurbyname}"/>
							</p:selectOneMenu></td>

						<td><h:outputText value="Nom Fournisseur"
								style="font-size:12px " /></td>
						<td><h:inputText value="#{AvoirBean.nomfournissuer}" id="nom"
								style="font-size:12px " /></td>
						<td><h:outputText value="Facture N°" style="font-size:12px " /></td>
						<td><h:inputText value="#{AvoirBean.numFacture}"
								style="font-size:12px " /></td>
					</tr>
					<tr>
						<td><h:outputText value="Avoir N°" style="font-size:20px ;text-decoration: underline" /></td>
						<td><h:inputText value="#{AvoirBean.numavoir}" id="facture"
								style="font-size:20px " /></td>
						<td /><td />
						<td><h:outputText value="Du" style="font-size:20px;text-decoration: underline " /></td>
						<td><p:calendar value="#{AvoirBean.date}"
								style="font-size:20px "  id="popup" pattern="dd-MM-yyyy" mask="true"/></td>
					</tr>
				</table>

				<br />
				<br />

			 	<p:dataTable id="emp" var="p" editable="true"
					value="#{AvoirBean.listProduit}" editMode="cell"
					widgetVar="articleTable" rowKey="#{p.id}"
					emptyMessage="aucune ligne dans la base">

					<p:ajax event="cellEdit" listener="#{AvoirBean.onCellEdit}" />
					 <p:column>
						<f:facet name="header">
							<h:outputText style="font-size:12px ;color:#483d8b" value="CODE" />
						</f:facet>
						<p:cellEditor>
							<f:facet name="output">
								<b><h:outputText style="font-size:12px ;" value="#{p.id}"
										id="p" /> </b>

							</f:facet>
							<f:facet name="input">

								<h:inputText id="qteInput2" value="#{AvoirBean.codeproduit}"
									style="width:96%" size="2">
									<f:ajax
										listener="#{AvoirBean.updateCode}" /><!--  render="p tva des prix" -->
								</h:inputText>

							</f:facet>
						</p:cellEditor>
					</p:column> 
			  	<p:column>

						<f:facet name="header">
							<h:outputText style="font-size:12px ;color:#483d8b"
								value="LIBELLE" />
						</f:facet>
						<p:cellEditor>
							<f:facet name="output">
								<b><h:outputText style="font-size:12px ;" value="#{p.nom}"
										id="des" /></b>

							</f:facet>

							<f:facet name="input">
								<p:selectOneMenu value="#{AvoirBean.libelle}" filter="true"
									filterMatchMode="contains" style="width:50px;font-size:12px">
									<f:selectItem itemLabel="selectionner produit" />
									<f:selectItems value="#{AvoirBean.listProduits}" />
									<f:ajax 
										listener="#{AvoirBean.updatenom}" /><!-- render="tva prix p des" -->
								</p:selectOneMenu>
							</f:facet>
						</p:cellEditor>

					</p:column>




					<p:column>
						<f:facet name="header">
							<h:outputText style="font-size:12px ;color:#483d8b"
								value="QUANTITE" />
						</f:facet>
						<p:cellEditor>
							<f:facet name="output">
								<b><h:outputText style="font-size:12px ;"
										value="#{p.quantites}" id="qte2" /></b>

							</f:facet>
							<f:facet name="input">


								<h:inputText value="#{p.quantites}" style="width:96%">
                                    <p:ajax  event="change" 
										listener="#{AchatBean.updatemontant}" /><!--  update="montant qte ttc" -->
								</h:inputText>

							</f:facet>
						</p:cellEditor>
					</p:column> 
					 
					<p:column>
						<f:facet name="header">
							<h:outputText style="font-size:12px ;color:#483d8b" value="TVA" />
						</f:facet>
						<h:outputText style="font-size:12px " value="#{p.tva}" id="tva" />
					</p:column>

					<p:column>
						<f:facet name="header">
							<h:outputText style="font-size:12px ;color:#483d8b"
								value="P.U HT" />
						</f:facet>
						<h:outputText style="font-size:12px " value="#{p.prixachats}"
							id="prix" />
					</p:column>
					
					<p:column>
						<f:facet name="header">
							<h:outputText style="font-size:12px ;color:#483d8b"
								value="Montant" />
						</f:facet>
						<h:outputText style="font-size:12px " value="#{p.montant}"
							id="montant" />
					</p:column>
                 <p:columnGroup type="footer">
            <p:row>
                <p:column colspan="2" style="text-align:right" footerText="Totals:" />
                 <p:column  colspan="3" footerText="#{AvoirBean.totalquantite}" id="qte"/>
                <p:column colspan="1"  footerText="#{AvoirBean.totalttc}" id="ttc"/>
 
               
            </p:row>
        </p:columnGroup>
  


				</p:dataTable> 
				<div align="center">
				  
							<p:outputPanel>
								<b> <h:outputText value="Type Payement"
										style="font-size:12px ;color:#000000" /></b>
								<br />

								<h:selectOneRadio id="etat_payement" style="font-size:12px ;"
									value="#{AchatBean.typepayement}"  >
									<f:selectItem itemLabel="espece" itemValue="espece" />
									<f:selectItem itemLabel="cheque" itemValue="cheque" />
									<f:ajax render="cheque" />
									 </h:selectOneRadio>
								<br />
								<h:panelGroup id="cheque">
									<table>

										<tr>
											<td><b><h:outputText value="Banque"
														rendered="#{AchatBean.typepayement=='cheque'}"
														style="font-size:12px ;color:#000000" /> </b></td>

											<td><h:inputText  
													
													rendered="#{AchatBean.typepayement=='cheque'}"
													value="#{AchatBean.banque}"
													style="width:215px;font-size:12px " >
													 
												</h:inputText ></td>
										</tr>
										<tr>
											<td><b> <h:outputText value="Numero Cheque"
														rendered="#{AchatBean.typepayement=='cheque'}"
														style="font-size:12px ;color:#000000" /></b></td>

											<td><h:inputText value="#{AchatBean.numcheque}"
													 
												 
													rendered="#{AchatBean.typepayement=='cheque'}">

												</h:inputText></td>

										</tr>
										
										<tr>
											<td><b> <h:outputText value="Echeance"
														rendered="#{AchatBean.typepayement=='cheque'}"
														style="font-size:12px ;color:#000000" /></b></td>

											<td><p:calendar value="#{AchatBean.echeance}"
													 
													size="20"
													rendered="#{AchatBean.typepayement=='cheque'}">

												</p:calendar></td>

										</tr>

									</table>
								</h:panelGroup>
								</p:outputPanel>
				 
				<p:commandButton value="Valider" ajax="false"
										style="width:200px;height:30;color:white;background-image:linear-gradient( #FAF281, red);font-size:12px"
										action="#{AchatBean.saveAchat}" />
				</div>
				</h:form>
		</p:panel>
		</p:panel>
		</h:body>
		</html>
