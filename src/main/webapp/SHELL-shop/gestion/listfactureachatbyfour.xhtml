<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>

</h:head>


<h:body  style="width:98%;margin:auto;" >
 <p:panel style="width:100%;margin:auto;min-height:900px;">
		<ui:insert name="menu">
			<ui:include src="/SHELL-shop/Header.xhtml" />
		</ui:insert>
		<ui:insert name="menu">
			<ui:include src="/SHELL-shop/Headershop.xhtml" />
		</ui:insert>
		<p:panel id="basic2" closable="true"
			style="min-height:900px;margin-left: 50px;margin-right: 50px;background-image: url(../2.png)">


			<h:form> 
				<div align="center">
					<b><h:outputText value="Liste Des Factures Achats"
							style="font-size:20px;" /></b><br />
					<h:panelGrid columns="2" style="margin-bottom:10px" cellpadding="5"
						columnClasses="label, value">
						<p:outputLabel   value="Fournisseur:" />

						 <p:selectManyMenu id="basic" value="#{AchatBean.listfours}"	
					style="width:300px;font-size:12px ">
					  <f:selectItem itemLabel="selectionner fournisseur"/>
                  <f:selectItems value="#{AchatBean.listfournisseur}" var="f" itemValue="#{f.nom}"  itemLabel="#{f.nom}"/>
                    <f:ajax listener="#{AchatBean.getFacturebyFour}" render="f"/> 
                      </p:selectManyMenu>
					</h:panelGrid>
				</div>




				<br />
				<br />
				 
				 
                      <!--  filteredValue="#{AchatBean.filterachats}"


 selection="#{AchatBean.selectedAchat}" -->
		 
				
				<p:dataTable id="f" var="p"
							value="#{AchatBean.listAchat}"
							widgetVar="ArticleTable"  
							 rowKey="#{p.id}"
							emptyMessage="aucune facture dans le stock" paginator="true"
							rows="10" paginatorPosition="bottom"  > 
                              
							<p:column>
								<f:facet name="header">
									<h:outputText style="font-size:12px color:#483d8b" value="Numfac" />
								</f:facet>
								<h:outputText style="font-size:12px " value="#{p.factureachat.code}" />
							</p:column>
							
							<p:column>
								<f:facet name="header">
									<h:outputText style="font-size:12px color:#483d8b" value="Date" />
								</f:facet>
								<h:outputText style="font-size:12px " value="#{p.factureachat.dates}" />
							</p:column>
							
							<p:column      >
								<f:facet name="header">
									<h:outputText style="font-size:12px color:#483d8b" value="Montant" />
								</f:facet>
								
									 <p:inputText  value="#{p.factureachat.totalttcs}" style="width:96%"/>	 
							</p:column>
							
								<p:column      >
								<f:facet name="header">
									<h:outputText style="font-size:12px color:#483d8b" value="Num achat" />
								</f:facet>
								
									 <p:inputText  id="codeInput" value="#{p.id}" style="width:96%"/>	 
							</p:column>
							
							 
							 
						</p:dataTable>  
				 

			</h:form>
		 </p:panel>
		 </p:panel>
		 </h:body>
		 </html>
