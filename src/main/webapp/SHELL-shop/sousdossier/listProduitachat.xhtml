<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
	<link type="text/css" rel="stylesheet" href="#{request.contextPath}/style.css" />

	<p:commandButton value="Fermer"
		onclick="PF('produitss').hide();"
		oncomplete="init();"
		styleClass="shell-action-button"
		update="ff:emp"
		actionListener="#{AchatshopBean.saveselection}" />

	<p:remoteCommand name="updateCarDialog"
		oncomplete=" PF('carDialog').hide();init();"
		update="ff:emp"
		actionListener="#{AchatshopBean.saveselection}" />

	<div tabindex="1" id="table_div" style="margin-top: 18px;">
		<p:dataTable widgetVar="table"
			var="d"
			value="#{AchatshopBean.listProduit}"
			selectionMode="single"
			selection="#{AchatshopBean.selectedProduit}"
			id="dataTable"
			rowKey="#{d.id}"
			filteredValue="#{AchatshopBean.filteredProduit}"
			styleClass="shell-home-table">
			<f:facet name="header">
				<p:outputPanel>
					<h:outputText value="Search:" />
					<p:inputText id="globalFilter" onkeyup="PF('table').filter()"
						style="width:150px" placeholder="Enter code" />
				</p:outputPanel>
			</f:facet>
			<p:column headerText="Code" filterBy="#{d.code}" filterMatchMode="contains">
				<h:outputText value="#{d.code}" />
			</p:column>
			<p:column headerText="Nom" filterBy="#{d.nom}" filterMatchMode="contains">
				<h:outputText value="#{d.nom}" />
			</p:column>
			<p:column headerText="Vente" filterBy="#{d.vente}" filterMatchMode="contains">
				<h:outputText value="#{d.prixventes}" />
			</p:column>
		</p:dataTable>
	</div>

	<h:outputScript library="js" name="keyboard_navigation.js" />
</ui:composition>
