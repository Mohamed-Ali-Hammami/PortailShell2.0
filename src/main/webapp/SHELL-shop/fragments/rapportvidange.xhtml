<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets">
    <h:panelGroup layout="block" styleClass="shell-module-layout shop-shell-fragment">
 <h:panelGroup layout="block"
            style="min-height:900px; margin:0 20px; padding:24px; background-image:url(./2.png); background-size:cover; background-repeat:no-repeat;">
		<ui:insert name="menu">
			
		</ui:insert>
		<h:panelGroup layout="block"
                style="min-height:900px; margin:0 30px; padding:24px; background:rgba(255,255,255,0.92);">

			 <h:form>
					<h:panelGroup layout="block" style="text-align:left;">
						<h:panelGrid columns="2">
							<h:commandLink title="imprimer">
								<p:graphicImage url="/images/imprimante-icone.png"
									style="width:25px" />
								<p:printer target="imprimer"></p:printer>
							</h:commandLink>
						</h:panelGrid>
						<table>
							<tr>
								<td><h:outputText value="à partir du :"
										style="font-size:12px " /></td>
								<td><p:calendar id="popup" pattern="dd-MM-yyyy" mask="true" value="#{RapportLavage.date1}"
										size="10" >

									</p:calendar></td>

								<td><h:outputText value="jusqu'au :"
										style="font-size:12px " /></td>
								<td><p:calendar id="popup2" value="#{RapportLavage.date2}"
										size="10" pattern="dd-MM-yyyy" mask="true">

									</p:calendar></td>
							</tr>

							 
							<tr>
								<td />
								<td><p:commandButton styleClass="ui-priority-primary"
										value="Recherche" action="#{RapportLavage.getrapportvidange}"
										style="width:150px;font-size:12px;height:30;color:#0000ff;background-color:#abc8e2;" /></td>
							</tr>
						</table>

					</h:panelGroup>
					<p:outputPanel id="imprimer"
						style="width:100%; ">
						<table>
							<tr>
								<td><p:panel style="width:600px;">
										<b><h:outputText value="Rapport Vidange par jours #{RapportLavage.mois} #{RapportLavage.annee}"
												style=" font-style: italic;font-size: large;font-size:20px;" />
										</b>
									</p:panel></td>
								 
							</tr>
						</table>
						
						<br/>
						 <style type="text/css">
						.old{
                        Font-Weight:Bold;
                        }
                   </style>
						
						 <p:dataTable var="sale" value="#{RapportLavage.listvidange}" rowStyleClass="#{sale.dates == 'Total' ? 'old' : null}" >
       
 
        <p:columnGroup type="header">
            <p:row>
                <p:column rowspan="3" headerText="Date" width="220:px" style="color:red;font-size:14px "/>
                <p:column colspan="4" headerText="Recette" />
            </p:row>
            <p:row>
                <p:column colspan="2" headerText="Poste" style="color:red;font-size:14px "/>
                
                 <p:column colspan="2" headerText="Total Journee" style="color:red;font-size:14px "/>
                
            </p:row>
            <p:row>
                <p:column headerText="Poste1" style="color:blue;font-size:14px "/>
                <p:column headerText="Poste2" style="color:blue;font-size:14px "/>
                
                <p:column rowspan="2" headerText="Recette" style="color:blue;font-size:14px "/>
                <p:column rowspan="2" headerText="Nb voiture" style="color:blue;font-size:14px "/>
            </p:row>
        </p:columnGroup>
  <p:column>
           <b><h:outputText value="#{sale.dates}" /></b> 
        </p:column>
        <p:column>
            <h:outputText value="#{sale.nbvoiturej}" />
        </p:column>
        <p:column>
            <h:outputText value="#{sale.nbvoiturejp}" />
        </p:column>
        
          <p:column>
            <h:outputText value="#{sale.totalrecette}">
               
            </h:outputText>
        </p:column> 
        <p:column>
            <h:outputText value="#{sale.totaljournee}">
               
            </h:outputText>
        </p:column>  
 
      <!--   <p:columnGroup type="footer">
            <p:row>
                <p:column colspan="3" style="text-align:right" footerText="Totals:" />
                <p:column footerText="\$#{RapportLavage.lastYearTotal}" />
 
                <p:column footerText="\$#{RapportLavage.thisYearTotal}" />
            </p:row>
        </p:columnGroup>
 
        <f:facet name="footer">
            Data between 2013-2014
        </f:facet> -->
    </p:dataTable>
     
						 </p:outputPanel>
						 </h:form>
			
			 
		</h:panelGroup>
	</h:panelGroup>
    </h:panelGroup>
</ui:composition>
