<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets">
    <h:panelGroup layout="block" styleClass="shell-module-layout shop-shell-fragment">
	<h:panelGroup layout="block"
            style="min-height:900px; margin:0 20px; padding:24px; background-image:url(./2.png); background-size:cover; background-repeat:no-repeat;">
		<ui:insert name="menu">
			
		</ui:insert>
		<h:panelGroup layout="block"
                style="min-height:900px; margin:0 30px; padding:24px; background:rgba(255,255,255,0.92);">

			<h:form id="f">

				<h:panelGroup layout="block" style="text-align:left;">
					<p:commandButton title="imprimer" value="imprimer">
						<p:printer target="imprimer" />
					</p:commandButton>

				</h:panelGroup>
				<p:outputPanel id="imprimer">
					<h:panelGroup layout="block" style="text-align:center;">

						<h:outputText value="Liste Des Articles En Alerte  de Stock" />
						<br /><br />
						<p:dataTable id="article" var="p" value="#{EtatshopBean.listProduit}"
							widgetVar="ArticleTable"
							emptyMessage="aucun produit dans le stock">
                             
                             <p:column>
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b" value="Code" />
								</f:facet>
								<h:outputText style="font-size:12px " value="#{p.code}" id="code" />
							</p:column>
							<p:column>
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b" value="Nom" />
								</f:facet>
								<h:outputText style="font-size:12px " value="#{p.nom}" id="nom" />
							</p:column>
							
							<p:column>
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b" value="Quantite" />
								</f:facet>
								<h:outputText style="font-size:12px " value="#{p.quantite}" id="quantitestock" />
							</p:column>
							
							 
							
							<p:column>
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b" value="Qtemin" />
								</f:facet>
								<h:outputText style="font-size:12px " value="#{p.qtemin}" id="qtemin" />
							</p:column>
							
							<p:column>
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b" value="famille" />
								</f:facet>
								<h:outputText style="font-size:12px " value="#{p.famille.nom}" id="famille" />
							</p:column>
							
							
						</p:dataTable>
					</h:panelGroup>

				</p:outputPanel>
			</h:form>
	</h:panelGroup>
	</h:panelGroup>
	
    </h:panelGroup>
</ui:composition>
