<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets">
    <h:panelGroup layout="block" styleClass="shell-module-layout shop-shell-fragment">
 <h:panelGroup layout="block"
            style="min-height:900px; margin:0 20px; padding:24px; background-image:url(./2.png); background-size:cover; background-repeat:no-repeat;">
		<ui:insert name="menu">
			
		</ui:insert>
		<h:panelGroup layout="block"
                style="min-height:900px; margin:0 30px; padding:24px; background:rgba(255,255,255,0.92);">

			<h:form id="f">

				<h:panelGroup layout="block" style="text-align:left;">
					<h:panelGrid columns="2">
						<p:commandButton title="imprimer" value="imprimer">
							<p:printer target="imprimer" />
						</p:commandButton>

						<p:commandButton value="Valider"
							action="#{EtatshopBean.calculeretatdeprofil2}" />
					</h:panelGrid>

					<h:panelGrid columns="4">
						<b><h:outputText value="Date Debut" style="font-size:12px" />
						</b>

						<p:calendar value="#{EtatshopBean.date1}" id="d1" />

						<b><h:outputText value="Date Fin" style="font-size:12px" /> </b>
						<p:calendar value="#{EtatshopBean.date2}" id="d2" />
					</h:panelGrid>

				</h:panelGroup>
				<p:outputPanel id="imprimer">
					<h:panelGroup layout="block" style="text-align:center;">

						<b><h:outputText value="Profit Brut par Famille"
								style="font-size:20px" /></b> <br />
						<h:panelGrid columns="2">
							<h:outputText value="Du #{EtatshopBean.dates1} " />
							<h:outputText value="Au #{EtatshopBean.dates2} " />
						</h:panelGrid>
						<br />
						<br />
						<p:dataTable id="article" var="p" value="#{EtatshopBean.listfamile}"
							widgetVar="ArticleTable" editable="true" editMode="cell"   rowIndexVar="rowId"
							emptyMessage="aucun produit dans le stock">

							<p:column>
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b"
										value="Code" />
								</f:facet>
								<h:outputText style="font-size:12px " value="#{p.code}"
									id="code" />
							</p:column>
							<p:column>
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b" value="Nom" />
								</f:facet>
								<h:outputText style="font-size:12px " value="#{p.nom}" id="nom" />
							</p:column>

							  <p:column>
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b"
										value="Ca" />
								</f:facet>
								
									
								<p:cellEditor>
											<f:facet name="output">
										<h:outputText style="font-size:12px "
									value="#{p.montant}" id="quantitestock" />
											</f:facet>
											<f:facet name="input">
											<h:inputText style="font-size:12px " valueChangeListener="#{EtatshopBean.handleChange1}"
											value="#{p.montants}" >
											<f:attribute name="test" value="#{rowId}" />
											<p:ajax event="change" update="quantitestock"/>
											</h:inputText>
											</f:facet>
										</p:cellEditor>
							</p:column>
                          
							<p:column>
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b"
										value="Profit brut" />
								</f:facet>
								
									
								<p:cellEditor>
											<f:facet name="output">
									<h:outputText style="font-size:12px " value="#{p.profilbrut}"
									id="qtemin" />
											</f:facet>
											<f:facet name="input">
											<h:inputText style="font-size:12px " valueChangeListener="#{EtatshopBean.handleChange2}"
											value="#{p.montants}" >
											<f:attribute name="test" value="#{rowId}" />
											<p:ajax event="change" update="qtemin"/>
											</h:inputText>
											</f:facet>
										</p:cellEditor>
							</p:column>
                            							<p:column>
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b"
										value="%CA" />
								</f:facet>
								<h:outputText style="font-size:12px " value="#{p.pourcentCAffTotal}"
									id="famille" />
							</p:column>  
							
							
							<p:column>
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b"
										value="%Pro" />
								</f:facet>
								<h:outputText style="font-size:12px " value="#{p.pourcenPBTotal}"
									id="famille2" />
							</p:column>  

							 <p:columnGroup type="footer" style="border: 0px"  >
								<p:row styleClass="table">
								<p:column/><p:column/> 
				         <b><p:column footerText="#{EtatshopBean.totaCA}" style="font-size:16px " >	 
                                </p:column>
                     <p:column footerText="#{EtatshopBean.totalProfil}" style="font-size:16px ">    </p:column>
                         <p:column/>
                         <p:column footerText="#{EtatshopBean.totaltva}" style="font-size:16px ">    </p:column></b>
						 </p:row>
						 </p:columnGroup>
						</p:dataTable> 
						
						<br/>
						<p:commandButton value="Valider"
							action="#{EtatshopBean.validercalculeretatdeprofil2}" />
					</h:panelGroup>

				</p:outputPanel>
			</h:form>
		 </h:panelGroup>
		 </h:panelGroup>
		 
    </h:panelGroup>
</ui:composition>
