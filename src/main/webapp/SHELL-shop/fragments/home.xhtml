<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
	<div class="shell-module-layout">
		<p:growl id="msgs" showDetail="true" />

		<p:panel id="basic2" closable="true" styleClass="shell-home-panel">
			<h:form id="f">
				<h:panelGroup rendered="#{LoginBean.listProduit.size()>0}">
					<div class="shell-audio-hint">Alerte stock detectee</div>
					<audio autoplay="autoplay" id="audioID">
						<source src="AlarmeLS.wav" type="audio/mp3" />
					</audio>
				</h:panelGroup>

				<div class="shell-page-tools">
					<p:commandButton title="imprimer" value="Imprimer" styleClass="shell-action-button">
						<p:printer target="imprimer" />
					</p:commandButton>
				</div>

				<p:outputPanel id="imprimer">
					<h2 class="shell-page-title">Articles En Alerte De Stock</h2>
					<p class="shell-page-subtitle">Suivi rapide des produits dont la quantite est sous le seuil minimal.</p>

					<p:dataTable id="article"
						var="p"
						value="#{LoginBean.listProduit}"
						widgetVar="ArticleTable"
						styleClass="shell-home-table"
						emptyMessage="Aucun produit en alerte de stock">
						<p:column>
							<f:facet name="header">
								<h:outputText value="Code" />
							</f:facet>
							<h:outputText value="#{p.codeshop}" id="code" />
						</p:column>
						<p:column>
							<f:facet name="header">
								<h:outputText value="Nom" />
							</f:facet>
							<h:outputText value="#{p.nom}" id="nom" />
						</p:column>
						<p:column>
							<f:facet name="header">
								<h:outputText value="Quantite" />
							</f:facet>
							<h:outputText value="#{p.quantite}" id="quantitestock" />
						</p:column>
						<p:column>
							<f:facet name="header">
								<h:outputText value="Qte min" />
							</f:facet>
							<h:outputText value="#{p.qtemin}" id="qtemin" />
						</p:column>
						<p:column>
							<f:facet name="header">
								<h:outputText value="Famille" />
							</f:facet>
							<h:outputText value="#{p.famille.nom}" id="famille" />
						</p:column>
					</p:dataTable>
				</p:outputPanel>
			</h:form>
		</p:panel>
	</div>
</ui:composition>
