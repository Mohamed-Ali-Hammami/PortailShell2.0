<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets">
    <h:panelGroup layout="block" styleClass="shell-module-layout shop-shell-fragment">
 <h:panelGroup layout="block"
            style="min-height:900px; margin:0 20px; padding:24px; background-image:url(./2.png); background-size:cover; background-repeat:no-repeat;">
	 
		<ui:insert name="menu">
			
		</ui:insert>
		<h:panelGroup layout="block"
                style="min-height:900px; margin:0 30px; padding:24px; background:rgba(255,255,255,0.92);">
		 
			 
					<h:form id="form">
					   <p:remoteCommand name="updatevente" update="produit:vente"/>  
						  <p:growl id="msgss" showDetail="true"/>
						<p:dataTable id="produit" var="p"  editMode="cell"
							value="#{VenteBean.listProduit}"   selectionMode="single"
							widgetVar="ArticleTable"  editable="true" filteredValue="#{VenteBean.filterproduits}"
							  selection="#{VenteBean.selectedProduit}" rowKey="#{p.id}"
							emptyMessage="aucun produit dans le stock" paginator="true"
							rows="34" paginatorPosition="bottom"  > 
                            <p:ajax event="cellEdit"   update=":form:produit" listener="#{VenteBean.onCellEdit}"/>
                              
							 <p:column  >
								<f:facet name="header">
									<h:outputText style="font-size:12px color:#483d8b" value="Code Shop" />
								</f:facet>
								<h:outputText style="font-size:12px " value="#{p.codeshop}" />
							</p:column>
							
							<p:column filterBy="#{p.code}" sortBy="#{p.code}" filterStyle="font-size:14px;color:blue" filterMatchMode="contains" >
								<f:facet name="header">
									<h:outputText style="font-size:12px color:#483d8b" value="Code a barre" />
								</f:facet>
								
									<p:cellEditor>
								<f:facet name="output"><h:outputText style="font-size:12px " id="coden"
									value="#{p.code}" /></f:facet>
								<f:facet name="input">
								<p:inputText    value="#{p.code}" style="width:96%">	
								 <f:ajax listener="#{VenteBean.updatenoms}" render="coden"></f:ajax>  
								</p:inputText>
								</f:facet>
								
								</p:cellEditor>
							</p:column>
							
							 <p:column width="10%" filterBy="#{p.nom}" sortBy="#{p.nom}" filterStyle="font-size:14px;color:blue" filterMatchMode="contains" >
								<f:facet name="header">
									<h:outputText style="font-size:12px color:#483d8b" value="Nom" />
								</f:facet>
								
									<p:cellEditor>
								<f:facet name="output"><h:outputText style="font-size:12px " id="nomn"
									value="#{p.nom}" /></f:facet>
								<f:facet name="input">
								<h:inputText    value="#{p.nom}"   >	
								<f:ajax listener="#{VenteBean.updatenoms}" event="change" render="nomn"></f:ajax>
								</h:inputText>
								</f:facet>
								
								</p:cellEditor>
							</p:column>
							
								<p:column   >
								<f:facet name="header">
									<h:outputText style="font-size:12px color:#483d8b" value="Qtemin" />
								</f:facet>
								
								  
								  
									<p:cellEditor>
								<f:facet name="output"> 
									
							 <h:outputText style="font-size:12px " id="qmin"
									value="#{p.qtemin}" /> 
									 
									</f:facet>
								<f:facet name="input">
								<p:inputText    value="#{p.qtemin}" style="width:96%">	
								<p:ajax listener="#{VenteBean.updateqtemin}" update="qmin"   
								event="change" process="@this" partialSubmit="true" 
								 />
								
								</p:inputText>
								
								</f:facet>
								
								</p:cellEditor>
								  
								  
							</p:column>
							
							<p:column   >
								<f:facet name="header">
									<h:outputText style="font-size:12px color:#483d8b" value="Duree" />
								</f:facet> 
									<p:cellEditor>
								<f:facet name="output"> 
									
							 <h:outputText style="font-size:12px " id="duree"
									value="#{p.duree}" /> 
									 
									</f:facet>
								<f:facet name="input">
								<p:inputText    value="#{p.duree}" style="width:96%">	
								<p:ajax listener="#{VenteBean.updateqtemin}" update="duree"   
								event="change" process="@this" partialSubmit="true" 
								 />
								
								</p:inputText>
								
								</f:facet>
								
								</p:cellEditor> 
							</p:column>
							 
							
						 
                             	  <p:column >
								<f:facet name="header">
									<h:outputText style="font-size:12px color:#483d8b" value="Achat HT" />
								</f:facet>
								
									<p:cellEditor>
								<f:facet name="output"><h:outputText style="font-size:12px "
									value="#{p.achat}" id="ach"/>
									 
									</f:facet>
								<f:facet name="input">
								<p:inputText    value="#{p.achat}" style="width:96%">	
								<p:ajax listener="#{VenteBean.updatevente}" update="ach vente"   
								event="change" process="@this" partialSubmit="true" 
								 />
								
								</p:inputText>
								
								</f:facet>
								
								</p:cellEditor>
							</p:column>
							
							   <p:column  >
								<f:facet name="header">
									<h:outputText style="font-size:12px color:#483d8b" value="Tva" />
								</f:facet>
								
									<p:cellEditor>
								<f:facet name="output"><h:outputText style="font-size:12px " id="tva"
									value="#{p.tva}" /></f:facet>
								<f:facet name="input">
								
								<p:inputText    value="#{p.tva}" style="width:96%">
								<p:ajax listener="#{VenteBean.updatetva}" update="tva" />
								</p:inputText>	</f:facet>
								
								</p:cellEditor>
							</p:column>
							
						
							
							   <p:column  id="ventes">
								<f:facet name="header">
									<h:outputText style="font-size:12px color:#483d8b" value="Vente" />
								</f:facet>
								
									<p:cellEditor>
								<f:facet name="output"><h:outputText style="font-size:12px " id="vente"
									value="#{p.prixventes}" /></f:facet>
								<f:facet name="input">
								<p:inputText   value="#{p.vente}" style="width:96%">
								<p:ajax listener="#{VenteBean.updatemarge}" update="marge vente"/>
								</p:inputText>
								</f:facet>
								
								</p:cellEditor>
							</p:column>
							
							
							<p:column >
								<f:facet name="header">
									<h:outputText style="font-size:12px color:#483d8b" value="Marge" />
								</f:facet>
								
									<p:cellEditor>
								<f:facet name="output"><h:outputText style="font-size:12px " id="marge"
									value="#{p.marges}" /></f:facet>
								<f:facet name="input"><p:inputText   value="#{p.marge}" style="width:96%">
								<f:ajax listener="#{VenteBean.updatevente}" render="vente marge ventes" />
								</p:inputText>
									</f:facet>
								
								</p:cellEditor>
							</p:column>
							
							
							
						
					 <p:column filterBy="#{p.famille.nom}" sortBy="#{p.famille.nm}" filterStyle="font-size:14px;color:blue" filterMatchMode="contains" >
								<f:facet name="header">
									<h:outputText style="font-size:12px color:#483d8b" value="Code famille" />
								</f:facet>
								
									 <h:outputText style="font-size:12px "
									value="#{p.famille.nom}" /> 
							</p:column>
							 
                            	  <p:column  >
								<f:facet name="header">
									<h:outputText style="font-size:12px color:#483d8b" value="quantitedepot" />
								</f:facet>
					 
								 
								<h:outputText style="font-size:12px "
									value="#{p.quantitedepot}" />
									 
							</p:column>
							
							 <p:column   >
								<f:facet name="header">
									<h:outputText style="font-size:12px color:#483d8b" value="quantitestock" />
								</f:facet>
								
									 
									<h:outputText style="font-size:12px "
									value="#{p.quantitestock}" />
									 
							</p:column>  
						 
						</p:dataTable>
						</h:form>
		 </h:panelGroup>
		 </h:panelGroup>
		 
    </h:panelGroup>
</ui:composition>
