<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets">
    <h:panelGroup layout="block" styleClass="shell-module-layout shop-shell-fragment">
 <h:panelGroup layout="block"
            style="min-height:900px; margin:0 20px; padding:24px; background-image:url(./2.png); background-size:cover; background-repeat:no-repeat;">	
 <ui:insert name="menu">
			
		</ui:insert>
		<h:panelGroup layout="block"
                style="min-height:900px; margin:0 30px; padding:24px; background:rgba(255,255,255,0.92);">
<h:form id="f">

				 <h:panelGroup layout="block" style="text-align:center;">
				 	<p:selectOneRadio value="#{VenteBean.poste}"
						style="width:200px;font-size:12px" required="true"
						requiredMessage="choisir la poste">

						<f:selectItems value="#{VenteBean.postes}" />
						<f:ajax  /><!-- render="p" -->
					</p:selectOneRadio>
					<br /> 
					<h:panelGrid columns="3">
						<h:outputText value="DATE" style="font-size:16px" />
						<p:calendar value="#{VenteBean.date}" id="p" required="true"
							requiredMessage="entrer date">
							<f:ajax listener="#{VenteBean.getgenerationVentebyDate}"
								 event="change"  render="date"/><!-- render="imprimer ttc" -->
						</p:calendar>

						<h:commandLink title="imprimer">
							<p:graphicImage url="/images/imprimante-icone.png"
								style="width:25px" />
							<p:printer target="imprimer"></p:printer>
						</h:commandLink>
					</h:panelGrid>
					<br /> <br />

					<p:outputPanel id="imprimer">
						<h:panelGroup layout="block" style="text-align:center;">
							<b><h:outputText id="date"
									value="Regénération des Ventes Date:   #{VenteBean.dates}"
									style="font-size:20px" /> </b>


						</h:panelGroup>
						<br />
						<table>
							<tr>
								<td><p:commandButton value="Valider" ajax="false"
										style="width:200px;height:30;color:white;background-image:linear-gradient( #FAF281, red);font-size:12px"
										action="#{VenteBean.regenerer}" /> <br/><br/>
							 
								
								 <p:panel style="width:200px;" 
										   header="Total Caisse">

										<h:outputText style="font-size:12px ;"
											value="#{VenteBean.totalttcs}" id="ttcs" />
									</p:panel></td>
									 
								 <td rowspan="2">
								 <p:dataTable id="produit" var="p"
										value="#{VenteBean.listelignevente}"
										emptyMessage="aucune ligne dans la base">
										<!-- <h:panelGroup rendered="#{p.quantite >0}"> -->
										<p:column>
											<f:facet name="header">
												<h:outputText style="font-size:12px ;color:#483d8b"
													value="Code" />
											</f:facet>


											<h:outputText style="font-size:12px ;"
												value="#{p.produit.code}" id="code" />
										</p:column>

										<p:column>
											<f:facet name="header">
												<h:outputText style="font-size:12px ;color:#483d8b"
													value="Designation" />
											</f:facet>


											<h:outputText style="font-size:12px ;"
												value="#{p.produit.nom}" id="nom" />
										</p:column>

										<p:column>
											<f:facet name="header">
												<h:outputText style="font-size:12px ;color:#483d8b"
													value="QUANTITE" />
											</f:facet>


											<h:outputText style="font-size:12px ;" value="#{p.quantite}"
												id="qte" />
										</p:column>

										<p:column>
											<f:facet name="header">
												<h:outputText style="font-size:12px ;color:#483d8b"
													value="Prix" />
											</f:facet>


											<h:outputText style="font-size:12px ;"
												value="#{p.produit.prixventes}" id="vente" />
										</p:column>


										<p:column>
											<f:facet name="header">
												<h:outputText style="font-size:12px ;color:#483d8b"
													value="Montant" />
											</f:facet>


											<h:outputText style="font-size:12px ;" value="#{p.totalttc}"
												id="ttc" />
										</p:column>
										<!-- </h:panelGroup> -->
									</p:dataTable>
								 
								 
								 </td>
									 
							</tr>
						</table>

					</p:outputPanel>
				</h:panelGroup>
			</h:form>
			
		 </h:panelGroup>
		 </h:panelGroup>
		 
    </h:panelGroup>
</ui:composition>
