<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets">
    <h:panelGroup layout="block" styleClass="shell-module-layout shop-shell-fragment">
 <h:panelGroup layout="block"
            style="min-height:900px; margin:0 20px; padding:24px; background-image:url(./2.png); background-size:cover; background-repeat:no-repeat;">
		<ui:insert name="menu">
			
		</ui:insert>
		<h:panelGroup layout="block"
                style="min-height:900px; margin:0 30px; padding:24px; background:rgba(255,255,255,0.92);">

			<h:form id="ff">


				<table>
					<tr>
						<td><h:outputText value="Code Fournisseur"
								style="font-size:12px " /></td>
								 <td><p:selectOneMenu value="#{AchatshopBean.nomfournissuer}"
								style="width:200px;font-size:12px " filter="true"
								filterMatchMode="contains">
								<f:selectItem itemLabel="selectionner fournisseur" />
								<f:selectItems value="#{AchatshopBean.listfournisseur}" var="f" itemValue="#{f.nom}"  itemLabel="#{f.nom}"/>
                                <f:ajax   listener="#{AchatshopBean.getFournisseurbyname2}" render="imprimer"/>
							</p:selectOneMenu></td>
						<td><p:selectOneRadio value="#{AchatshopBean.statu}"
								style="width:200px;font-size:12px ">

								<f:selectItems value="#{AchatshopBean.status}" />
								<f:ajax listener="#{AchatshopBean.getEtatFacturebystatus}" render="imprimer"/><!--  -->
							</p:selectOneRadio></td>


					</tr>

				</table>

				<br />
				<br />
                   <p:outputLabel id="imprimer">
				<p:commandButton value="Imprimer" ajax="false"
					style="width:200px;height:30;color:white;background-image:linear-gradient( #FAF281, red);font-size:12px">
                    <p:printer target="imprimer" />
                </p:commandButton>
                      <br/><br/>
                      
                      <h:panelGrid columns="4">
                      <b><h:outputText style="font-size:16px" value="FACTURE" /></b>
                      <b><h:outputText style="font-size:16px" value="#{AchatshopBean.statu}" id="s"/></b>
                      <b><h:outputText style="font-size:16px" value="#{AchatshopBean.nomfournissuer}" id="four"/></b>
                      <b><h:outputText style="font-size:16px" value="#{AchatshopBean.dates}" /></b>
                      
                      </h:panelGrid>
                      <br/>
                     
				<p:dataTable id="emp" var="p"  
					value="#{AchatshopBean.listAchat}"  
					  emptyMessage="aucune ligne dans la base">
					<p:column>
						<f:facet name="header">
							<h:outputText style="font-size:12px color:#483d8b" value="Date" />
						</f:facet>
						<h:outputText style="font-size:12px "
							value="#{p.dates}" />
					</p:column>
					<h:panelGroup rendered="#{p.factureachat.numerocheck!=null}">
					<p:column>
						<f:facet name="header">
							<h:outputText style="font-size:12px color:#483d8b" value="N_cheque" />
						</f:facet>
						<h:outputText style="font-size:12px "
							value="#{p.factureachat.numerocheck}" />
					</p:column>
					</h:panelGroup>
					<h:panelGroup rendered="#{p.factureachat.banque!=null}">
					<p:column>
						<f:facet name="header">
							<h:outputText style="font-size:12px color:#483d8b" value="Banque" />
						</f:facet>
						<h:outputText style="font-size:12px "
							value="#{p.factureachat.banque}" />
					</p:column>

					 </h:panelGroup>
					<p:column>
						<f:facet name="header">
							<h:outputText style="font-size:12px color:#483d8b"
								value="Montant" />
						</f:facet>

						<h:outputText value="#{p.factureachat.totalttcs}" style="width:96%" />
					</p:column>
					
					<p:column>
						<f:facet name="header">
							<h:outputText style="font-size:12px color:#483d8b"
								value="Num Facture" />
						</f:facet>

						<h:outputText value="#{p.factureachat.code}" style="width:96%" />
					</p:column>
                <h:panelGroup rendered="#{p.factureachat.echeance!=null}">
					<p:column>
						<f:facet name="header">
							<h:outputText style="font-size:12px color:#483d8b"
								value="Echeance" />
						</f:facet>

						<h:outputText id="codeInput" value="#{p.factureachat.echeance}" style="width:96%" />
					</p:column>
                    </h:panelGroup>

				</p:dataTable>
               </p:outputLabel>

			</h:form>
		 </h:panelGroup>
		 </h:panelGroup>
		 
    </h:panelGroup>
</ui:composition>
