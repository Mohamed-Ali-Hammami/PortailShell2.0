<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets">
    <h:panelGroup layout="block" styleClass="shell-module-layout shop-shell-fragment">
 <h:panelGroup layout="block"
            style="min-height:900px; margin:0 20px; padding:24px; background-image:url(./2.png); background-size:cover; background-repeat:no-repeat;">	
		<ui:insert name="menu">
			
		</ui:insert>
		<h:panelGroup layout="block"
                style="min-height:900px; margin:0 30px; padding:24px; background:rgba(255,255,255,0.92);">

			<h:form>
				<h:panelGroup layout="block" style="text-align:center;">
					<b> <h:outputText value="Reglement de facture"
							style="font-size:14px " /></b>
				</h:panelGroup>

				<br />
				<h:panelGroup layout="block" style="text-align:center;">
					<table>
						<tr>
							<td><h:outputText value="Num Achat" style="font-size:12px ;color:#2e8b57"  /></td>
							<td><h:inputText value="#{AchatshopBean.numAchat}" id="num"
									style="font-size:12px ">
									<f:ajax listener="#{AchatshopBean.getAchatbynum}"   render="ttc four etat_payement c cb cn1 cn e e1"/>
									 
								</h:inputText></td>
						</tr>
						




						<tr>
							<td><b> <h:outputText value="Fournisseur"
										style="font-size:12px ;color:#2e8b57" /></b></td>

							<td><h:inputText value="#{AchatshopBean.nomfournissuer}"
									id="four" size="20" /></td>

						</tr>

						<tr>
							<td><b> <h:outputText value="Montant"
										style="font-size:12px ;color:#2e8b57"  /></b></td>

							<td><h:inputText value="#{AchatshopBean.totalttcs}" id="ttc"
									size="20" /></td>

						</tr>
						 
						
						<tr>
							<td><b> <h:outputText value="Type Payement"
										style="font-size:12px ;color:#2e8b57"  /></b></td>
							<td><h:selectOneRadio id="etat_payement" 
									style="font-size:12px ;" value="#{AchatshopBean.typepayement}"
									required="true" requiredMessage="choisir le type de payement">
									<f:selectItem itemLabel="espece" itemValue="espece" />
									<f:selectItem itemLabel="cheque" itemValue="cheque" />
									<f:ajax render="cheque" />
							 
								</h:selectOneRadio></td>
						</tr>
						 

                           </table>
						
						 	  <h:panelGroup id="cheque"> 
								<table>

									<tr>
										<td><b><h:outputText value="Banque" id="c"
													 
													style="font-size:12px ;color:#2e8b57"   /> </b></td>

										<td><h:inputText id="cb"
												 
												value="#{AchatshopBean.banque}"
												style="width:215px;font-size:12px ">

											</h:inputText></td>
									</tr>

									<tr>
										<td><b> <h:outputText value="Numero Cheque" id="cn"
													  
													style="font-size:12px ;color:#2e8b57" /></b></td>

										<td><h:inputText value="#{AchatshopBean.numcheque}" id="cn1"
												required="true" requiredMessage="entrer num cheque"
												size="20"  >

											</h:inputText></td>

									</tr>
									
										<tr>
										<td><b> <h:outputText value="Montant Cheque" id="cn5"
													  
													style="font-size:12px ;color:#2e8b57" /></b></td>

										<td><h:inputText value="#{AchatshopBean.montantcheque}" id="montantcheque"
												required="true" requiredMessage="entrer montant cheque"
												size="20"  >

											</h:inputText></td>

									</tr>
									<tr>
										<td><b> <h:outputText value="Echeance" id="e"
													
													style="font-size:12px ;color:#2e8b57" /></b></td>

										<td><p:calendar value="#{AchatshopBean.echeance}" size="20" id="e1"
												 >

											</p:calendar></td>

									</tr>
								</table>

							</h:panelGroup> <!-- rendered="#{AchatshopBean.typepayement=='cheque'}"-->
						 
				 
					<br />
					<br />
					<p:commandButton value="Valider" ajax="false"
						style="width:200px;height:30;color:white;background-image:linear-gradient( #FAF281, red);font-size:12px"
						action="#{AchatshopBean.validerreglement}" />
				</h:panelGroup>
				 
			</h:form>
		 </h:panelGroup>
		 </h:panelGroup>
		 
    </h:panelGroup>
</ui:composition>
