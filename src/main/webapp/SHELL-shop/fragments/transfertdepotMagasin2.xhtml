<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets">
    <h:panelGroup layout="block" styleClass="shell-module-layout shop-shell-fragment">
	<h:panelGroup layout="block"
            style="min-height:900px; margin:0 20px; padding:24px; background-image:url(./2.png); background-size:cover; background-repeat:no-repeat;">
		<ui:insert name="menu">
			
		</ui:insert>
		<h:panelGroup layout="block"
                style="min-height:900px; margin:0 30px; padding:24px; background:rgba(255,255,255,0.92);">
 
			 
                  <h:form id="f">
			    <h:panelGroup layout="block" style="text-align:center;">
			    
			    <h:panelGrid columns="2">
			    <b><h:outputText value="DATE/" style="font-size:16px"  /></b>
			        <p:calendar value="#{TransfertBean.date}" required="true" requiredMessage="entrer date"/>
			    </h:panelGrid>
			    </h:panelGroup>
			    
				<br/><br/>
					
				<p:commandLink onclick="PF('produitss').show();" process="@this">
					<p:graphicImage url="/images/bubble.png"
						style="width:50px" />
				</p:commandLink>
				
					<p:dialog header="Liste Produit" widgetVar="produitss" styleClass="dialog"
					closeOnEscape="true" closable="true" draggable="true"
					id="produitsss" height="300" width="1100" position="top center">



					<ui:insert name="menu">
						<ui:include src="/SHELL-shop/sousdossier/listProduittransfert.xhtml" />
					</ui:insert>

				</p:dialog>
				<!-- <p:remoteCommand name="refreshFooter" update="produit:ttc produit:qte" /> -->
				<p:dataTable id="produit" var="p" editable="true" scrollable="true" scrollHeight="300"
					value="#{TransfertBean.listLignetransfert}" editMode="cell"
					widgetVar="articleTable" rowKey="#{p.id}"  rowIndexVar="rowId"
					emptyMessage="aucune ligne dans la base">


					<p:column >
						<f:facet name="header">
							<h:outputText style="font-size:12px ;color:#483d8b" value="CODE" />
						</f:facet>

						<h:inputText value="#{p.code}" readonly="true"
							valueChangeListener="#{TransfertBean.handleChange}"
							rendered="#{p.code!=null}" id="id2" onkeyup="nextsvente(this);"
							 style="background-color:transparent;border:none;">
							<p:ajax update=" produit" event="keyup" process="@this"
								partialSubmit="true">

							</p:ajax>
							<f:attribute name="test" value="#{rowId}" />
						</h:inputText>
						<p class="selected">
							<h:inputText id="qteInput2" value="#{TransfertBean.codefamille}"
								rendered="#{p.code==null}" styleClass="inpdes"
								style="background-color:transparent;border:none;"
								onkeyup="nexts(this);" >
								<p:ajax listener="#{TransfertBean.updateCode}" update="produit" oncomplete="init()"
									event="change"   />
								<f:attribute name="test" value="#{rowId}" />
							</h:inputText>
						</p>
					</p:column>


					<p:column>  

						<f:facet name="header">
							<h:outputText style="font-size:12px ;color:#483d8b"
								value="LIBELLE" />
						</f:facet>
						<p:cellEditor>
							<f:facet name="output">
								<b><h:outputText style="font-size:12px ;" value="#{p.nom}"
										id="des" /></b>

							</f:facet>

							<f:facet name="input">
								<h:selectOneMenu  value="#{TransfertBean.codefamille}" filter="true"
									filterMatchMode="contains" style="width:50px;font-size:12px">
									<f:selectItem itemLabel="selectionner produit" />
									<f:selectItems value="#{TransfertBean.listProduit}"  var="p" itemValue="#{p.code}" itemLabel="#{p.nom}"/>
									 
										 <p:ajax listener="#{TransfertBean.updatenom}"  
												   update=" des " event="blur" process="@this"  partialSubmit="true"	  											   
												   /> 
								</h:selectOneMenu >
							</f:facet>
						</p:cellEditor>

					</p:column>


					<p:column>
						<f:facet name="header">
							<h:outputText style="font-size:12px ;color:#483d8b"
								value="QUANTITE" />
						</f:facet>
						
							 

                                 <!-- partialSubmit="true" oncomplete="refreshFooter();"  process="@this"-->
								<h:inputText value="#{p.quantites}" style="background-color:transparent;border:none;"
								styleClass="qte" onkeyup="nexts2(this)" >
                                  
                                  
								</h:inputText>

							 
					</p:column>
					 
				</p:dataTable>
				 
				<h:panelGroup layout="block" style="text-align:center;">
				  
							<br/><br/> 
				 
				<p:commandButton value="Valider" ajax="false"
										style="width:200px;height:30;color:white;background-image:linear-gradient( #FAF281, red);font-size:12px"
										action="#{TransfertBean.saveTransfert}" />
				</h:panelGroup>
				<script>
				
				$('td').click(function(event)
				{
					$('td').removeClass('focus');
					$(this).addClass('focus');
				}		
				);
				
			 	function init() {
					var index = 0;
		             $('.inpdes').eq(index).focus();
				}
			 	
			 	function initqte() { 
			 	 
		             $('.qte').eq(rowId).focus();
				}
			 	
			 	
				function nexts2(input) {
					$(document)
							.keypress(
									function(event) {
										var keycode = (event.keyCode ? event.keyCode
												: event.which);
										if (keycode == '13') {
											if (input.value != "") {
												$(input).closest('tr').next(
												'tr').find(
												'input[type=text]')
												.first().focus();
										$(input).closest('tr').next(
												'tr').find(
												'input[type=text]')
												.first().select();

												 return false;
											}
										}
										  

									});
				}
				function nexts(input) {
					$(document)
							.keypress(
									function(event) {
										var keycode = (event.keyCode ? event.keyCode
												: event.which);
										if (keycode == '13') {
											if (input.value != "") {
												//$(input).closest('td').next('td').find('input[type=text]').focus();	 
												$(input).closest('td')
														.nextAll().eq(1)
														.find('input')
														.focus();
												$(input).closest('td')
														.nextAll().eq(1)
														.find('input')
														.select()
											}
											return false;
										}

									});
				}
				function nextsquantite(input) {
					$(document)
							.keypress(
									function(event) {
										var keycode = (event.keyCode ? event.keyCode
												: event.which);
						if (keycode == '13') {	 
							
							 $(input).closest('tr').nextAll().eq(0).find('input[type=text]').focus().select();
							 return false;
										}
										 

									});
				}
				 	
			 	</script>
			 	
			 	<style type="text/css">
				 .dialog{
    position: fixed;
    top: 20% !important;
 
 }
 
  .dialog2{
    position: fixed;
    top: 30% !important;
 left:40% !important;
 }
    </style>
				</h:form> 
		 </h:panelGroup>
		 </h:panelGroup>
		 
    </h:panelGroup>
</ui:composition>
