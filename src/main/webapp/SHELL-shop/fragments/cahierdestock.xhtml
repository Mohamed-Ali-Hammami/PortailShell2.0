<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets">
    <h:panelGroup layout="block" styleClass="shell-module-layout shop-shell-fragment">
	<h:panelGroup layout="block"
            style="min-height:900px; margin:0 20px; padding:24px; background-image:url(./2.png); background-size:cover; background-repeat:no-repeat;">
		<!-- <ui:insert name="menu">
			
		</ui:insert> -->
		<h:form id="f">
		<h:panelGroup layout="block"
                style="min-height:900px; margin:0 30px; padding:24px; background:rgba(255,255,255,0.92);">	

				
					
					 <p:focus  context="basic2" for="code"/>
					 <h:panelGroup layout="block" style="text-align:center;">
					<h:panelGrid columns="8">
						<h:outputText value="Date Debut" style="font-size:16px" />
						<p:calendar value="#{AccueilBean.date1}" id="p" required="true"  
							requiredMessage="entrer date">
							<p:ajax  
								event="dateSelect"   /> 
						</p:calendar>
						
						<h:outputText value="Date fin" style="font-size:16px" />
						<p:calendar value="#{AccueilBean.date2}" id="p2" required="true" styleClass="fact"
							requiredMessage="entrer date">
							<p:ajax  
								event="dateSelect"   /> 
						</p:calendar>
						 <h:outputText value="Code" style="font-size:16px" />
						 <h:inputText value="#{AccueilBean.code}" size="5" id="code" tabindex="1" required="true"  >
						 <f:ajax render="nom" listener="#{AccueilBean.getproduitbycode}" onevent="gettonumfacture(this)"/>
						 </h:inputText>
						 
						 	 <h:outputText value="Stock initial" style="font-size:16px" />
						 <h:inputText value="#{AccueilBean.quantiteinitial}" size="5" required="true" tabindex="2" styleClass="init">
						 <f:ajax render="imprimer f" listener="#{AccueilBean.gethistoriquevente}"/>
						 </h:inputText>
						</h:panelGrid>
						
						<h:panelGrid columns="2">
						 <h:outputText value="Produit" style="font-size:16px" />
						  <h:inputText value="#{AccueilBean.nom}" id="nom"/>
						 <h:outputText value="Stock Final" style="font-size:16px" />
						  <h:inputText value="#{AccueilBean.quantitefinal}" id="f"/>
						</h:panelGrid>
			 
							  
					
					<br />
					<br />
                     
					<p:outputPanel id="imprimer" >
						<h:panelGroup layout="block" style="text-align:center;">
							 

					 
						<p:dataTable id="produit" var="p"  
							value="#{AccueilBean.liststock}"
							emptyMessage="aucune ligne dans la base">
							 
								<p:column   style="border: 0.5px #000000 solid;">
									<f:facet name="header">
										<h:outputText style="font-size:14px ;color:#000000"
											value="Dates" />
									</f:facet>
									<h:outputText style="font-size:14px ;color:#000000"
										value="#{p.date}"  />
								</p:column>

								<p:column style="border: 0.5px #000000 solid;">
									<f:facet name="header">
										<h:outputText style="font-size:14px ;color:#000000"
											value="ENT" />
									</f:facet>


									<h:outputText style="font-size:14px ;color:#000000" value="#{p.entree}" rendered="#{p.entree !='0'}"
										  />										  
									<h:outputText style="font-size:14px ;color:#000000;text-align:left" value=" " rendered="#{p.entree =='0'}"
										  />
								</p:column>

								<p:column  style="border: 0.5px #000000 solid;">
									<f:facet name="header">
										<h:outputText style="font-size:14px ;color:#000000"
											value="VENT" />
									</f:facet>


									<h:outputText style="font-size:14px ;color:#000000" value="#{p.vente}" rendered="#{p.vente !='0'}"
										  />
										  
										  	<h:outputText style="font-size:14px ;color:#000000" value=" " rendered="#{p.vente ==''}"
										  />
								</p:column>

								<p:column width="15%" style="border: 0.5px #000000 solid;text-aligh:right">
									<f:facet name="header">
										<h:outputText style="font-size:14px ;color:#000000;text-aligh:right"
											value="Stock" />
									</f:facet>


									<h:outputText style="font-size:14px ;color:#000000"
										value="#{p.stock}"  />
								</p:column>
								
								     <p:columnGroup type="footer" style="border: 1px #000000 solid; "  >
                       <p:row>
                       
                       <p:column colspan="2"  footerText="#{AccueilBean.totaltransfert}" style="border: 1px #000000 solid;text-align:right"></p:column>
                         <p:column    footerText=" #{AccueilBean.totalvente}" style="text-align:right;border: 1px #000000 solid;;text-align:left" ></p:column>
                       </p:row>
                       </p:columnGroup> 
						 
						</p:dataTable>
						
						 
						</h:panelGroup> 
                             
					</p:outputPanel>
				</h:panelGroup>
					<script>
				function gettonumfacture(input) {
				 $('.init').focus();
				 $('.init').select();
									  
			}
			</script>
			
	 </h:panelGroup>
	 </h:form>
	 </h:panelGroup>
	 
    </h:panelGroup>
</ui:composition>
