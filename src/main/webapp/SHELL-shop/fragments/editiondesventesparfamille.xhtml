<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets">
    <h:panelGroup layout="block" styleClass="shell-module-layout shop-shell-fragment">
 <h:panelGroup layout="block"
            style="min-height:900px; margin:0 20px; padding:24px; background-image:url(./2.png); background-size:cover; background-repeat:no-repeat;">
		<ui:insert name="menu">
			
		</ui:insert>
		<h:panelGroup layout="block"
                style="min-height:900px; margin:0 30px; padding:24px; background:rgba(255,255,255,0.92);">

			<h:form id="f">

				<h:panelGroup layout="block" style="text-align:center;">
					<p:selectOneRadio value="#{VenteBean.poste}"
						style="width:200px;font-size:12px" required="true"
						requiredMessage="choisir la poste">

						<f:selectItems value="#{VenteBean.postes}" />
						<f:ajax render="p" />
					</p:selectOneRadio>
					<br />
					<h:panelGrid columns="3">
						<h:outputText value="DATE" style="font-size:16px" />
						<p:calendar value="#{VenteBean.date}" id="p" event="dateSelect">
							<f:ajax listener="#{VenteBean.getetatventeparDate3}"
								render="imprimer" event="change" />
						</p:calendar>

						<h:commandLink title="imprimer">
							<p:graphicImage url="/images/imprimante-icone.png"
								style="width:25px" />
							<p:printer target="imprimer"></p:printer>
						</h:commandLink>
					</h:panelGrid>
					<br />
					<br />

					<p:outputPanel id="imprimer">
						<h:panelGroup layout="block" style="text-align:center;">
							<b><p:calendar
									value="EDITION DES VENTES DU : #{VenteBean.dates}"
									style="font-size:20px" />     </b>


						</h:panelGroup>
						<br />
						<p:dataTable id="produit" var="p"
							value="#{VenteBean.listelignevente}"
							emptyMessage="aucune ligne dans la base">
							<h:panelGroup rendered="#{p.quantite >0}">
								<p:column>
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="Code" />
									</f:facet>


									<h:outputText style="font-size:12px ;"
										value="#{p.produit.code}" id="qte2" />
								</p:column>

								<p:column>
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="Designation" />
									</f:facet>


									<h:outputText style="font-size:12px ;" value="#{p.produit.nom}"
										id="qte2" />
								</p:column>

								<p:column>
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="QUANTITE" />
									</f:facet>


									<h:outputText style="font-size:12px ;" value="#{p.quantite}"
										id="qte2" />
								</p:column>

								<p:column>
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="Prix" />
									</f:facet>


									<h:outputText style="font-size:12px ;"
										value="#{p.produit.prixventes}" id="qte2" />
								</p:column>


								<p:column>
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="STOCK" />
									</f:facet>


									<h:outputText style="font-size:12px ;"
										value="#{p.produit.quantitestock}" id="qte2" />
								</p:column>
							</h:panelGroup>
						</p:dataTable>

						<br />
						<b><h:outputText value="TICKETS EN -" style="font-size:20px ;" /></b>
						<br />

						<p:dataTable id="produit" var="p"
							value="#{VenteBean.listticketnegtif}"
							emptyMessage="aucune ligne dans la base">
							<h:panelGroup rendered="#{p.quantite lt 0}">
								<p:column>
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="Code" />
									</f:facet>


									<h:outputText style="font-size:12px ;"
										value="#{p.produit.code}" id="qte2" />
								</p:column>

								<p:column>
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="LIBELLE" />
									</f:facet>


									<h:outputText style="font-size:12px ;" value="#{p.produit.nom}"
										id="qte2" />
								</p:column>

								<p:column>
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="QUANTITE" />
									</f:facet>


									<h:outputText style="font-size:12px ;" value="#{p.quantite}"
										id="qte2" />
								</p:column>

								<p:column>
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="Num TICKET" />
									</f:facet>


									<h:outputText style="font-size:12px ;" value="#{p.ticket.id}"
										id="qte2" />
								</p:column>


								<p:column>
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="HEURE" />
									</f:facet>


									<h:outputText style="font-size:12px ;"	 value="#{p.ticket.heure}" id="qte2" />
								</p:column>

								<p:row>
									 
									<p:column colspan="3" footerText="#{VenteBean.listticketnegtif.size()}"
										id="total" />
									 


								</p:row>
							</h:panelGroup>
						</p:dataTable><br/>
						<table>
						<tr>
						<td><h:outputText style="font-size:12px ;"	 value="Total HT"  /></td>
						<td><h:outputText style="font-size:12px ;"	 value="Total TVA"  /></td>
						<td><h:outputText style="font-size:12px ;"	 value="Total TTC"  /></td>						
						</tr>
						<tr>
						<td><h:outputText style="font-size:12px ;"	 value="#{VenteBean.totalht}"  /></td>
						<td><h:outputText style="font-size:12px ;"	 value="#{VenteBean.totaltva}"  /></td>
						<td><h:outputText style="font-size:12px ;"	 value="#{VenteBean.totalttcs}"  /></td>
						</tr>
						</table>
					</p:outputPanel>
				</h:panelGroup>
			</h:form>
		 </h:panelGroup>
		 </h:panelGroup>
		 
    </h:panelGroup>
</ui:composition>
