<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets">
    <h:panelGroup layout="block" styleClass="shell-module-layout shop-shell-fragment">
 <h:panelGroup layout="block"
            style="min-height:900px; margin:0 20px; padding:24px; background-image:url(./2.png); background-size:cover; background-repeat:no-repeat;">
		<ui:insert name="menu">
			
		</ui:insert>
		<h:panelGroup layout="block"
                style="min-height:900px; margin:0 30px; padding:24px; background:rgba(255,255,255,0.92);">
			<h:panelGroup layout="block" style="text-align:center;">
				<fieldset style="margin-bottom: 20px; background-color: #eeeec6;">
					<legend>
						<b><h:outputText style="font-size:12px; color:#2e8b57"
								value="Mise a jour Article " name="outTxtcin" /> </b>
					</legend>
				</fieldset>
			  	<h:form id="inputform">


					<h:panelGroup layout="block" style="text-align:center;">
					 <p:messages id="msg" showDetail="true"/>
						<table>
						<tr>

								<td width="20%"><b><h:outputText value=" Famille :"
											style="font-size:12px " /></b></td>
								<td><p:selectOneMenu filter="true" tabindex="1"
										filterMatchMode="contains" value="#{VenteBean.codefamille}"
										required="true" requiredMessage="selectionner famille article"
										style="width:180px;font-size:12px " id="famille">
										<f:selectItem itemLabel="selectionner famille article" />
										<f:selectItems value="#{VenteBean.listfamile}" var="f" itemValue="#{f.nom}" itemLabel="#{f.nom}"/>
										<f:ajax listener="#{VenteBean.getlistproduitbyfamille}" render="codeshop"/>
									</p:selectOneMenu> 
									<p:messages for="famille" autoUpdate="true" closable="true" />
								</td>
							</tr>
							<tr>

								<td width="20%"><b><h:outputText value="Code a barre :"
											style="font-size:12px " /></b>
											
											</td>
											 
								<td><h:inputText value="#{VenteBean.codess}" id="code"  styleClass="input" tabindex="2"
										size="30" style="font-size:14px " >
										
										</h:inputText>
										
										<p:messages
										for="code" autoUpdate="true" closable="true" />
										</td>
							</tr>
							
							<tr>

								<td width="20%"><b><h:outputText value="Code Shop :"
											style="font-size:12px " /></b>
											
											</td>
											 
								<td><h:inputText value="#{VenteBean.codeshop}" id="codeshop" styleClass="input" tabindex="3"
										size="30" style="font-size:14px " />
										
										<p:messages
										for="codeshop" autoUpdate="true" closable="true" />
										</td>
							</tr>
							
							<tr>

								<td width="20%"><b><h:outputText value="Nom :"
											style="font-size:12px " /></b></td>

								<td><h:inputText value="#{VenteBean.nom}" id="nom" tabindex="4"
										size="30" style="font-size:14px " required="true"
										requiredMessage="entrer nom article" /> <p:messages
										for="nom" autoUpdate="true" closable="true" />
								</td>
							</tr>
                         
							<tr>

								<td width="20%"><b><h:outputText value="Achat :"
											style="font-size:12px " /></b></td>
								<td><h:inputText value="#{VenteBean.achat}" id="achat" tabindex="5"
										size="30" style="font-size:14px " required="true"
										requiredMessage="entrer prix achat" >
										<f:ajax render="vente"/>
										</h:inputText>
										 <p:messages for="achat"
										autoUpdate="true" closable="true" >
										</p:messages>
										</td>
							</tr>
                         
							<tr>

								<td width="20%"><b><h:outputText value="Tva :"
											style="font-size:12px " /></b></td>
								<td><p:selectOneMenu filter="true"
										filterMatchMode="contains" value="#{VenteBean.tva}" tabindex="6"
										required="true" requiredMessage="entrer tva article"
										style="width:180px;font-size:12px " id="tva">
										<f:selectItem itemLabel="selectionner tva" />
										<f:selectItems value="#{VenteBean.listtva}" var="t" itemValue="#{t.valeur}" itemLabel="#{t.valeur}"/>
									<f:ajax render="vente"/>
									</p:selectOneMenu> <p:messages for="tva" autoUpdate="true" closable="true" />
								</td>
							</tr> 
							
							<tr>

								<td width="20%"><b><h:outputText value="Marge :"
											style="font-size:12px " /></b></td>
								<td><h:inputText value="#{VenteBean.marges}" id="marge"  tabindex="7"
										size="30" style="font-size:14px "  
										 >
										  	<f:ajax listener="#{VenteBean.getventebymarge}" render="vente"  />
										</h:inputText> 
										  <p:messages for="marge"
										 closable="true" /></td>
							</tr>
							
							
							<tr>

								<td width="20%"><b><h:outputText value="Vente :"
											style="font-size:12px " /></b></td>
								<td><h:inputText value="#{VenteBean.prixvente}" id="vente" tabindex="8"
										size="30" style="font-size:14px " required="true"
										requiredMessage="entrer prix de vente article" >
										<f:ajax listener="#{VenteBean.getmargebyvente}" render="marge"  />
										</h:inputText>
									<p:messages for="vente" autoUpdate="true" closable="true" />
								</td>
							</tr>   
							
							

							<tr>

								<td width="20%"><b><h:outputText value="Qte min :"
											style="font-size:12px " /></b></td>
								<td><h:inputText value="#{VenteBean.qtemin}" id="qtemin" tabindex="9"
										size="30" style="font-size:14px " required="true"
										requiredMessage="entrer quantite min" /> <p:messages
										for="qtemin" autoUpdate="true" closable="true" />
								</td>
							</tr>

							
 
                            
							<tr>

								<td width="400px"><p:commandButton value="Ok" ajax="false"
										style="width:200px;height:30;color:#0000ff;background-color:#abc8e2;font-size:12px"
										action="#{VenteBean.savearticle}" /></td>

								<td width="400px"><p:commandButton value="Annuler" ajax="false"
										style="width:200px;height:30;color:#0000ff;background-color:#abc8e2;font-size:12px"
										action="#{VenteBean.majarticle}" /></td>
							</tr>    
						</table>

					</h:panelGroup>

                    <script>
   $(function () {
	   $('input[type="text"]').bind("change", event => {
	   var nextTr = $(event.target).closest('tr').nextAll('tr:not(.group)').first(); 
        nextTr.find('input').focus();
	     //nextTr.css({ background: "red" });
	   });
	   
	   
	   $('input[type="text"]').bind("blur", event => {
		   var nextTd = $(event.target).closest('td').nextAll('td:not(.group)').first(); 
	        nextTd.find('input').focus();
		    // nextTd.css({ background: "blue" });
		   });
	   
	     
	    });
   $(function () {
	   $('#inputform').on('keydown', 'input', function (event) {
		    if (event.which == 13) {
		        event.preventDefault();
		        var $this = $(event.target);
		        var index = parseFloat($this.attr('tabindex'));
		        $('[tabindex="' + (index + 1).toString() + '"]').focus();
		         
		    }
		});
   });
  
   </script>

				</h:form>
			</h:panelGroup>
			
			


		 </h:panelGroup>
		 </h:panelGroup>
		 
    </h:panelGroup>
</ui:composition>
