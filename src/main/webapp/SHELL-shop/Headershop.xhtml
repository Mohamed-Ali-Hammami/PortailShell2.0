<h:head>

				<p:menuitem value="MAJ Famille" url="#{request.contextPath}/SHELL-shop/gestion/miseajourFamille.xhtml" rendered="#{LoginBean.user.isAdmin()==true  || LoginBean.user.isResponsableshops()==true}"/>
				<p:menuitem value="Impression Inventaires"  url="#{request.contextPath}/SHELL-shop/gestion/impressioninventaire.xhtml" rendered="#{LoginBean.user.isAdmin()==true  || LoginBean.user.isSuperviseur()==true  || LoginBean.user.isResponsableshops()==true}"/>
				<p:menuitem value="Mouvement Article" url="#{request.contextPath}/SHELL-shop/gestion/mouvementArticle.xhtml" rendered="#{LoginBean.user.isAdmin()==true   || LoginBean.user.isResponsableshops()==true}"/>

				</p:submenu> 
				<p:menuitem value="Transfert Depot Magasin" url="#{request.contextPath}/SHELL-shop/gestion/transfertdepotMagasin.xhtml" rendered="#{LoginBean.user.isAdmin()==true  || LoginBean.user.isSuperviseur()==true || LoginBean.user.isResponsableshops()==true}"/>
				<p:menuitem value="Maj stock" url="#{request.contextPath}/SHELL-shop/gestion/MAJSTOCK.xhtml" rendered="#{LoginBean.user.isAdmin()==true   || LoginBean.user.isResponsableshops()==true}"/>
				<p:menuitem value="Etat Transfert" url="#{request.contextPath}/SHELL-shop/gestion/etatTransfert.xhtml" rendered="#{LoginBean.user.isAdmin()==true  || LoginBean.user.isSuperviseur()==true  || LoginBean.user.isResponsableshops()==true}"/>				 
			

			</p:submenu> 
			
			<p:submenu label="Etat" style="font-size:12px">
			 
				 <p:menuitem value="Article en Alerte de stock" url="#{request.contextPath}/SHELL-shop/gestion/articleEnAlerteDeStock.xhtml" rendered="#{LoginBean.user.isAdmin()==true   || LoginBean.user.isResponsableshops()==true || LoginBean.user.isSuperviseur()==true }"/>
				 <p:menuitem value="Etat de Profit" url="#{request.contextPath}/SHELL-shop/gestion/etatdeprofil.xhtml"  rendered="#{LoginBean.user.isAdmin()==true   || LoginBean.user.isResponsableshops()==true || LoginBean.user.isSuperviseur()==true }"/>
				  <p:menuitem value="ETAT DE PROFIL CT" url="#{request.contextPath}/SHELL-shop/gestion/etatdeprofilCT.xhtml" style="width:280px"/>
				 <p:menuitem value="Etat   Articles Non Vendus" url="#{request.contextPath}/SHELL-shop/gestion/etatarticleNonVendu.xhtml" rendered="#{LoginBean.user.isAdmin()==true   || LoginBean.user.isResponsableshops()==true || LoginBean.user.isSuperviseur()==true }"/>
				 <p:menuitem value="Etat   Articles  Vendus" url="#{request.contextPath}/SHELL-shop/gestion/etatarticleVendu.xhtml"/>
				<p:menuitem value="Etat  des ventes par famille " url="#{request.contextPath}/SHELL-shop/gestion/etatVenteParFamille.xhtml" rendered="#{LoginBean.user.isAdmin()==true   || LoginBean.user.isResponsableshops()==true || LoginBean.user.isSuperviseur()==true}"/>
				<p:menuitem value="Courbes Evolutive des ventes" url="#{request.contextPath}/SHELL-shop/gestion/etatrendement.xhtml" rendered="#{LoginBean.user.isAdmin()==true   || LoginBean.user.isResponsableshops()==true}"/>
				<p:menuitem value="Impression Facture Achat et Avoir" url="#{request.contextPath}/SHELL-shop/gestion/FactureAchatEtAvoir.xhtml" rendered="#{LoginBean.user.isAdmin()==true   || LoginBean.user.isResponsableshops()==true}"/>
				<p:menuitem value="Facturation de Ticket" url="#{request.contextPath}/SHELL-shop/gestion/FacturationDesTickets.xhtml" rendered="#{LoginBean.user.isAdmin()==true   || LoginBean.user.isResponsableshops()==true}"/>
				<p:menuitem value="Etat des ventes par vendeurs" url="#{request.contextPath}/SHELL-shop/gestion/EtatVentesParVenduers.xhtml" rendered="#{LoginBean.user.isAdmin()==true   || LoginBean.user.isResponsableshops()==true || LoginBean.user.isSuperviseur()==true}"/>
				<p:menuitem value="Etat des ventes" url="#{request.contextPath}/SHELL-shop/gestion/editiondesventes.xhtml" rendered="#{LoginBean.user.isAdmin()==true   || LoginBean.user.isResponsableshops()==true || LoginBean.user.isSuperviseur()==true}"/>
			</p:submenu>
			<p:submenu label="Rapport" style="font-size:12px">
			<p:menuitem value="Rapport lavage" url="#{request.contextPath}/SHELL-shop/gestion/rapportLavage.xhtml" rendered="#{LoginBean.user.isAdmin()==true  || LoginBean.user.isSuperviseur()==true  || LoginBean.user.isResponsablelavage()==true}"/>
			<p:menuitem value="Rapport vidange" url="#{request.contextPath}/SHELL-shop/gestion/rapportvidange.xhtml" rendered="#{LoginBean.user.isAdmin()==true   || LoginBean.user.isSuperviseur()==true || LoginBean.user.isResponsablelavage()==true}"/>
			<p:menuitem value="Rendement lavage" url="#{request.contextPath}/SHELL-shop/gestion/rendementlavage.xhtml" rendered="#{LoginBean.user.isAdmin()==true  || LoginBean.user.isSuperviseur()==true || LoginBean.user.isResponsablelavage()==true}"/>
			 <p:menuitem value="Rendement vidange" url="#{request.contextPath}/SHELL-shop/gestion/rendementvidange.xhtml" rendered="#{LoginBean.user.isAdmin()==true   || LoginBean.user.isSuperviseur()==true || LoginBean.user.isResponsablelavage()==true}"/>

            <f:facet name="options">
				<p:commandLink id="nonAjax" action="#{LoginBean.logout}"
					ajax="false">
					<p:graphicImage url="/images/logout.png" />
					<h:outputText value="#{msg['logout.user']}"
						style="color:#db0b32;font-size:12px;" />
				</p:commandLink>
			</f:facet>

		<br/>
		<p:outputPanel style="margin-left: 50px;margin-right: 50px ;">
		 <p:toolbar>		 
		 <f:facet name="left">	 
		  <p:commandButton styleClass="button" type="button" value="Vente Shop" onclick="window.location.href='#{request.contextPath}/SHELL-shop/gestion/vente.xhtml'" style="background-image:linear-gradient( #FAF281, red);width:100px;height:50px;font-size:12px;font-color:#fcfafa"/>
		
		<h:panelGroup rendered="#{LoginBean.user.isAdmin()==true   || LoginBean.user.isResponsableshops()==true || LoginBean.user.isSuperviseur()==true}">
		  <p:commandButton type="button" value="Lavage" onclick="window.location.href='#{request.contextPath}/SHELL-shop/gestion/rapportLavage.xhtml'"  style="background-image:linear-gradient( #FAF281, red);width:100px;height:50px;font-size:12px;font-color:#fcfafa"/>
		   <p:commandButton styleClass="genbutton" type="button" value="Generation Vente" onclick="window.location.href='#{request.contextPath}/SHELL-shop/gestion/generationvente.xhtml'" style="background-image:linear-gradient( #FAF281, red);width:130px;height:50px;font-size:12px;font-color:#fcfafa"/>
		    <p:commandButton styleClass="impbutton" type="button" value="Impression Caisse" onclick="window.location.href='#{request.contextPath}/SHELL-shop/gestion/editiondesventes.xhtml'"  style="background-image:linear-gradient( #FAF281, red);width:140px;height:50px;font-size:12px;font-color:#fcfafa"/>
		    <p:commandButton styleClass="cltbutton" type="button" value="Cloture Caisse" onclick="window.location.href='#{request.contextPath}/SHELL-shop/gestion/coturercaisse.xhtml'"  style="background-image:linear-gradient( #FAF281, red);width:140px;height:50px;font-size:12px;font-color:#fcfafa"/>
		    <p:commandButton type="button" value="Impression Tickets" onclick="window.location.href='#{request.contextPath}/SHELL-shop/gestion/impressionTicket.xhtml'" style="background-image:linear-gradient( #FAF281, red);width:140px;height:50px;font-size:12px;font-color:#fcfafa"/>
		    <p:commandButton type="button" value="Liste Tickets" onclick="window.location.href='#{request.contextPath}/SHELL-shop/gestion/listticket.xhtml'" style="background-image:linear-gradient( #FAF281, red);width:100px;height:50px;font-size:12px;font-color:#fcfafa"/>
		 </h:panelGroup>
		 </f:facet>
		 </p:toolbar>		 
		</p:outputPanel>
		
		<br/>
		<p:outputPanel style="margin-left: 50px;margin-right: 50px ;" rendered="#{LoginBean.user.isResponsablelavage()==true}">
		 <p:toolbar>		 
		 <f:facet name="left">
	 
		<p:commandButton type="button" value="Rapport lavage" onclick="window.location.href='#{request.contextPath}/SHELL-shop/gestion/rapportLavage.xhtml'" style="background-image:linear-gradient( #FAF281, red);width:140px;height:50px;font-size:12px;font-color:#fcfafa" />
			<p:commandButton type="button" value="Rapport vidange" onclick="window.location.href='#{request.contextPath}/SHELL-shop/gestion/rapportvidange.xhtml'" style="background-image:linear-gradient( #FAF281, red);width:140px;height:50px;font-size:12px;font-color:#fcfafa" />
			<p:commandButton type="button" value="Rendement lavage" onclick="window.location.href='#{request.contextPath}/SHELL-shop/gestion/rendementlavage.xhtml'" style="background-image:linear-gradient( #FAF281, red);width:140px;height:50px;font-size:12px;font-color:#fcfafa"/>
			<p:commandButton type="button" value="Rendement vidange" onclick="window.location.href='#{request.contextPath}/SHELL-shop/gestion/rendementvidange.xhtml'" style="background-image:linear-gradient( #FAF281, red);width:140px;height:50px;font-size:12px;font-color:#fcfafa" />
			<p:commandButton type="button" value="Rendement SALARIAL" onclick="window.location.href='#{request.contextPath}/SHELL-shop/gestion/etatrendement.xhtml'" style="background-image:linear-gradient( #FAF281, red);width:170px;height:50px;font-size:12px;font-color:#fcfafa" />
		 </f:facet>
		 </p:toolbar>		 
		</p:outputPanel>
		 <script>
		 document.addEventListener("keydown", function(event) {
         	if( event.ctrlKey==true){
         		
         		if(event.which==86){ pressenterv() ; }
         		if(event.which==71){ pressenterg() ; }
         		if(event.which==73){ pressenterimp() ; }
         		if(event.which==67){ pressentercl() ; }
         		
         	}
           });
		 
		 function pressenterv() { 
					$('.button').click(); 
					return true; 
			}
		 
		 function pressenterg() { 
				$('.genbutton').click(); 
				return true; 
		}
		 
		 function pressentercl() { 
				$('.cltbutton').click(); 
				return true; 
		}
		 
		 function pressenterimp() { 
				$('.impbutton').click(); 
				return true; 
		}
			
		 </script>
	</h:form>



</h:body>
</html>
