<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>

</h:head>

<h:body>
	


	<p:panel style="min-height:900px;margin-left: 20px;margin-right: 20px;">
		<ui:insert name="menu">
			<ui:include src="/shellgestat/Header.xhtml" />
		</ui:insert>
		<ui:insert name="menu">
			<ui:include src="/shellgestat/Headerg.xhtml" />
		</ui:insert>
		<p:panel id="basic2" closable="true"
			style="min-height:900px;margin-left: 50px;margin-right: 50px;background-image: url(../2.png)">		 

			<div align="center">
				<b><h:outputText value="Saisie Depense  Station" /> </b>
		
			<br />
			<br />
			<h:form>
						<p:outputPanel id="panel">
							<p:focus context="panel" />
							<p:messages for="panel" />
							<h:selectOneRadio id="etat_payement" style="font-size:14px ;"
							value="#{CrediClientBean.typecredit}">
							<f:selectItem itemLabel="Passager" itemValue="passager" />
							<f:selectItem itemLabel="Depense" itemValue="depense" />			   
						    <f:ajax render="passager depense" />
					    	</h:selectOneRadio>
					    	
					    	 
					    	
				 <h:panelGroup id="passager" >
				 
				  <h:panelGroup rendered="#{CrediClientBean.typecredit=='passager'}">
							<table>
								 <tr>
									<td  ><b><h:outputText value="Date :"
												style="font-size:12px " /></b></td>
									<td>  <p:calendar value="#{CrediClientBean.date}" id="popup" showOn="button" locale="fr"
										  style="font-size:12px " >
											<p:ajax event="dateSelect" update="popup"  />
										</p:calendar>
										 <p:messages for="date" closable="true"
										autoUpdate="true" />

									 </td>
								</tr>
                              <tr>
                              <td>
                              <b><h:outputText value="Véhicule :"
												style="font-size:12px " /></b>
                              </td>
                              <td>
                              <h:inputText value="#{CrediClientBean.vhecule}"  required="true" requiredMessage="Entrer Matricule " style="font-size:12px " />
                              </td>
                              </tr>
                              
                              
                                <tr>
                              <td>
                              <b><h:outputText value="Chauffeur :"
												style="font-size:12px " /></b>
                              </td>
                              <td>
                              <h:inputText value="#{CrediClientBean.chauffeur}"  required="true" requiredMessage="Entrer Nom chauffeur " style="font-size:12px " />
                              </td>
                              </tr> 
							</table>
							</h:panelGroup>
							
						</h:panelGroup>
						
						 <h:panelGroup id="depense" >
						 <h:panelGroup rendered="#{CrediClientBean.typecredit=='depense'}">
						 <table style="width: 50%">
						 <tr>
									<td  ><b><h:outputText value="Date :"
												style="font-size:12px " /></b></td>
									<td>  <p:calendar value="#{CrediClientBean.date}" id="popup2" showOn="button" locale="fr"
										  style="font-size:12px " >
											<p:ajax event="dateSelect" update="popup"  />
										</p:calendar>
										 <p:messages for="date" closable="true"
										autoUpdate="true" />

									 </td>
								</tr>
						 <tr>
									<td><b><h:outputText value="Vehicule :"    
												style="font-size:12px " /></b></td>
									<td><p:selectOneMenu
											value="#{CrediClientBean.codeclient}"
											requiredMessage="entrer Vehicule" filter="true"
											filterMatchMode="contains"
											style="width:200px;font-size:12px " tabindex="4"
											required="true" id="vehicule">
											<f:selectItem itemLabel="selectionner Vehicule" />
											<f:selectItems value="#{CrediClientBean.listVehecule}"
												itemValue="#{s.matricule}" var="s" itemLabel="#{s.matricule}" />
												
											<p:ajax listener="#{CrediClientBean.getClients}"
												 process="@this" />
									 
										</p:selectOneMenu> <p:messages for="vehicule" closable="true" autoUpdate="true" /></td>

									 
								</tr>
								
                             
                              
						 </table>
						 
						 
						  
						 <h:selectOneRadio id="etat_depense" style="font-size:14px ;"
							value="#{CrediClientBean.groupe}">
							<f:selectItem itemLabel="Groupe" itemValue="groupe" />
							<f:selectItem itemLabel="Kilométrage" itemValue="kilometrage" />			   
						      <f:ajax render="kilometrage" />  
					    	</h:selectOneRadio>
					    	 
					    	
					    	 <h:panelGroup    id="kilometrage">
								 <h:panelGroup rendered="#{CrediClientBean.groupe =='kilometrage'}">
					    	<table style="width: 50%">
					    	
					    	<tr>
                              <td>
                              <b><h:outputText value="kilométrage :"
												style="font-size:12px " /></b>
                              </td>
                              <td>
                              <h:inputText value="#{CrediClientBean.kilometrage}"  required="true" requiredMessage="Entrer kilometrage " style="font-size:12px " />
                             
                              </td>
                              </tr>
					    	</table>
					    	
					    	</h:panelGroup>
					    	</h:panelGroup>
					    	
						 </h:panelGroup>
						 </h:panelGroup>
						 <table>
						 	<tr>
									<td><h:outputText value="Pompes: " /></td>
									<td><h:outputLabel for="multiple" value="Pmpes:" /> <p:selectCheckboxMenu
											id="multiple" value="#{CrediClientBean.selectedspompes}"
											label="Pompes" multiple="true" filter="true"
											filterMatchMode="startsWith" panelStyle="width:250px">
											<f:selectItems value="#{CrediClientBean.listpompes}" />
											<f:ajax render="emp" />
										</p:selectCheckboxMenu></td>
								</tr>
								<tr>
									<td><b><h:outputText value="Time: "
												style="font-size:12px " /></b></td>
									<td><p:calendar id="time"
											value="#{CrediClientBean.date11}" pattern="HH:mm:ss"
											timeOnly="true">
											<f:ajax render="emp" />
										</p:calendar></td>
									<td><p:calendar id="time2"
											value="#{CrediClientBean.date12}" pattern="HH:mm:ss"
											timeOnly="true">
											 
										</p:calendar></td>
										
										<td> <p:commandLink action="#{CrediClientBean.getTransactionBetweenTime2}" ajax="false"  >
										<p:graphicImage url="/images/icone-actualiser.png" style="width:40px" />
										</p:commandLink>
										</td>
								</tr>
						 </table>
							 
							<p:dataTable id="emp" var="car"  selection="#{CrediClientBean.selectedlistjournaldep}"
								 
								value="#{CrediClientBean.listjournaldep}"
								rowKey="#{car.id2}" selectionMode="single"
								style="margin-bottom:0" 
								emptyMessage="aucune ligne dans le serveur">
								 <p:ajax event="rowSelect"  update="emp " listener="#{CrediClientBean.onRowSelect}" 
							   />
						 
									 
									 
								  <p:ajax event="rowUnselect" update="emp"
									listener="#{CrediClientBean.onRowUnselect}" />
								<p:column headerText="Heure">
									<h:outputText value="#{car.time}" />
								</p:column>
								  
								<p:column headerText="Pompe">
									<h:outputText value="#{car.pompe}" />
								</p:column>
								<p:column headerText="Pistolet">
									<h:outputText value="#{car.pistolet}" />
								</p:column>
								<p:column headerText="Article">
									<h:outputText value="#{car.article}" />
								</p:column>
								<p:column headerText="Prix">
									<h:outputText value="#{car.prix}" />
								</p:column>
								<p:column headerText="Quantite">
									<h:outputText value="#{car.quantite}" />
								</p:column>
								
								<p:column headerText="Montant">
									<h:outputText value="#{car.montant}" />
								</p:column>
								
		 
							</p:dataTable>
							<br/>
							
							 
							
							 
										 
				 
						 		  
			 
						 
				
				
				
				 
				<br/>
				<br/>
				
				<p:commandButton id="b1" value="Valider"  
										ajax="false"
										style="width:150px;font-size:12px;height:30;color:white;background-image:linear-gradient( #FAF281, red);"
										action="#{CrediClientBean.validersaisieDepense}" /> 
										
							 
						</p:outputPanel>


				</h:form>
					</div>
				</p:panel>
				</p:panel>
				</h:body>
				</html>
