<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>

</h:head>

<h:body>




	<p:panel style="min-height:900px;margin-left: 20px;margin-right: 20px;">
		<ui:insert name="menu">
			<ui:include src="/shellgestat/Header.xhtml" />
		</ui:insert>
		<ui:insert name="menu">
			<ui:include src="/shellgestat/Headerg.xhtml" />
		</ui:insert>
		<p:panel id="basic2" closable="true"
			style="min-height:900px;margin-left: 50px;margin-right: 50px;background-image: url(../2.png)">

			<br />

			<h:form>
				<table>
					<tr>
						<td><h:outputText value="Date  Début:"
								style="font-size:12px " /></td>
						<td><p:calendar id="popup" value="#{EtatBean.date1}" navigator="true"
  pattern="dd/MM/yyyy" buttonTabindex="-1" type="tel"
  mask="99/99/?9999" placeholder="__/__/____" 
							>
                            <p:ajax update="imprimer"  event="dateSelect" process="@this"/>
								 
							</p:calendar></td>

						<td><h:outputText value="Date Fin:" style="font-size:12px " /></td>
						<td><p:calendar id="popup2" value="#{EtatBean.date2}"
								navigator="true"
  pattern="dd/MM/yyyy" buttonTabindex="-1" type="tel"
  mask="99/99/?9999" placeholder="__/__/____" >
								 <p:ajax  event="dateSelect"   update="imprimer"/>
							</p:calendar></td>
					</tr>

				</table>
				 <br/><br/>
				 <h:panelGrid columns="2">
					<p:commandButton  value="Valider" action="#{EtatBean.getetatdebanque}" ajax="false"/> 
					<p:commandButton title="imprimer"   value="imprimer">
							 
							<p:printer target="imprimer"></p:printer>
						</p:commandButton>
						</h:panelGrid>
					 <p:outputPanel id="imprimer" style="width:99%">
					<h3><h:outputText id="date2"
						value="ETAT  BANQUE DU :  #{EtatBean.dates1} AU :   #{EtatBean.dates2} "
						style=" font-style: italic;font-size: large;" /></h3>

					 
					 <br/>
					 	<p:dataTable id="caisse" var="c" value="#{EtatBean.listcaisse}"
							rowKey="#{c.id}" emptyMessage="aucune ligne dans la base">
           
							<p:column  >
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b"
										value="Date" />
								</f:facet>
								<h:outputText style="font-size:12px ;text-align:right" value="#{c.dates}"
									id="dates" />
							</p:column>
							
							
							<p:column style="text-align:right">
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b"
										value="Achat Carburant" />
								</f:facet>
								<h:outputText style="font-size:12px;text-align:right " value="#{c.totalAchatcarburant}"
									id="totalAchatcarburant" />
							</p:column>

							<p:column style="text-align:right">
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b"
										value="Cheques" />
								</f:facet>
								<h:outputText style="font-size:12px;text-align:right " value="#{c.totalCheques}"
									id="totalCheques" />
							</p:column>

							<p:column style="text-align:right">
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b"
										value="Credits" />
								</f:facet>
								<h:outputText style="font-size:12px ;text-align:right" value="#{c.totalCredits}"
									id="totalCredits" />
							</p:column>
							
								<p:column style="text-align:right">
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b"
										value="Especes" />
								</f:facet>
								<h:outputText style="font-size:12px ;text-align:right" value="#{c.totalespeces}"
									id="totalespeces" />
							</p:column>
							
								<p:column style="text-align:right">
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b;text-align:right"
										value="C Banquaire" />
								</f:facet>
								<h:outputText style="font-size:12px;text-align:right " value="#{c.carteBanquaires}"
									id="carteBanquaires" />
							</p:column>
							
								<p:column style="text-align:right">
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b"
										value="C Shell" />
								</f:facet>
								<h:outputText style="font-size:12px;text-align:right " value="#{c.carteShells}"
									id="montant" />
							</p:column>
							
							 <p:columnGroup type="footer" style="border: 1px #000000 solid; "  >
                       <p:row>
                        <p:column colspan="2"  style="text-align:right;border: 1px #000000 solid;text-align:right" footerText="#{EtatBean.totalachatCar}"></p:column>
                       <p:column  style="text-align:right;border: 1px #000000 solid;text-align:right" footerText="#{EtatBean.totaCA}"></p:column>
                          <p:column   style="text-align:right;border: 1px #000000 solid;text-align:right" footerText="#{EtatBean.totalProfil}"></p:column>
                             <p:column   style="text-align:right;border: 1px #000000 solid;text-align:right" footerText="#{EtatBean.totalProfilBrut}"></p:column>
                                <p:column   style="text-align:right;border: 1px #000000 solid;text-align:right" footerText="#{EtatBean.totaltva}"></p:column>
                                   <p:column   style="text-align:right;border: 1px #000000 solid;text-align:right" footerText="#{EtatBean.totalCA}"></p:column>
                        </p:row>
                       </p:columnGroup> 
						</p:dataTable><br/>
						
						<h:outputText value="Nombre de ligne #{EtatBean.listcaisse.size()}"></h:outputText>
					</p:outputPanel>
					
					
					
					<br/><br/>
					
						 <h:panelGrid columns="3">
						 	<h:outputText value="Total espèce"></h:outputText>
						 
						 <h:inputText value="#{EtatBean.montantcheque}"/>
					<p:commandButton  value="Valider" action="#{EtatBean.validerespectobanque}" ajax="false"/> 
					
					</h:panelGrid>/

							<td><h:outputText value="Date Fin:" style="font-size:12px " /></td>

									size="10">

						</tr>

					</table>

				</div>
                 <h:outputText id="date1"
						value="ETAT  DES VENTES DU #{EtatBean.dates1} AU  #{EtatBean.dates2} "
						style=" font-style: italic;font-size: large;" />

				 -->
			</h:form>

		 </p:panel>
		 </p:panel>
		 </h:body>
		 </html>
