<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>

</h:head>

<h:body>




	<p:panel style="min-height:900px;margin-left: 20px;margin-right: 20px;">
		<ui:insert name="menu">
			<ui:include src="/shellgestat/Header.xhtml" />
		</ui:insert>
		<ui:insert name="menu">
			<ui:include src="/shellgestat/Headerg.xhtml" />
		</ui:insert>
		<p:panel id="basic2" closable="true"
			style="min-height:900px;margin-left: 50px;margin-right: 50px;background-image: url(../2.png)">
          <h:form>
           <p:commandButton value="Imprimer" ajax="false"
					style="width:200px;height:30;color:white;background-image:linear-gradient( #FAF281, red);font-size:12px">
					<p:printer target="imprimer" />
				</p:commandButton>
				<br/><br/>
			<p:outputPanel id="imprimer">
				<div align="center">
                   
                    
                   <b><h:outputText
							style="font-size:24px ;color:black"
							value="STATION SHELL SEDJOUMI " name="outTxtcin" />  
							
							 <h:outputText
							style="font-size:24px ;color:black"
							value="INVENTAIRE CARBURANTS " name="outTxtcin" /> </b>
                    
                                    <br/>
					
                         <b>   <h:outputText style="font-size:24px ;color:black"
							value="#{ArticleBean.dates}" name="outTxtcin" /> </b>

 
                             <br/><br/>
                            <p:dataTable value="#{ArticleBean.listArticlecarburant}" var="s">
                            <p:column headerText="Code">
                            <h:outputText style="font-size:14px " id="id"
											size="30" value="#{s.id}" />
                            </p:column>
                            
                             <p:column headerText="Nom">
                            <h:outputText style="font-size:14px " id="nom"
											size="30" value="#{s.nom}" />
                            </p:column>
                             <p:column headerText="Quantite">
                            <h:outputText style="font-size:14px " id="qte"
											size="30" value="#{s.quantites}" />
                            </p:column>
                             <p:column headerText="Vente">
                            <h:outputText style="font-size:14px " id="vente"
											size="30" value="#{s.prixventes}" />
                            </p:column>
                             <p:column headerText="TOTAL">
                            <h:outputText style="font-size:14px " size="30"
											value="#{s.montants}" />
                            </p:column>
                            
                            <p:columnGroup type="footer" style="border: 0px"  >
								<p:row styleClass="table">
								<p style="height:15px; "><b>	<p:column colspan="4" styleClass="td"
										style="text-align:right;font-size:14px; "
										footerText="Totaux"></p:column> 
									<p:column footerText="#{ArticleBean.totals}"
										style=" font-size:14px" styleClass="td"></p:column>
									 
										</b></p>
								</p:row>
							</p:columnGroup>
                            </p:dataTable>
							 				
								 
								   
								 
                                
							
					 
					
				</div>
			</p:outputPanel>
			</h:form>
	 </p:panel>
	 </p:panel>
	 </h:body>
	 </html>
