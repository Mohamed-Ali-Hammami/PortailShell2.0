<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>

</h:head>

<h:body onload="init();"> 
	<p:panel style="min-height:900px;margin-left: 20px;margin-right: 20px;">
		<ui:insert name="menu">
			<ui:include src="/shellgestat/Header.xhtml" />
		</ui:insert>
		<ui:insert name="menu">
			<ui:include src="/shellgestat/Headerg.xhtml" />
		</ui:insert>
		<p:panel id="basic2" closable="true"
			style="min-height:900px;margin-left: 50px;margin-right: 50px;background-image: url(../2.png)">
			 
				<div align="center">

					<fieldset style="margin-bottom: 20px; background-color: #eeeec6;">
						<legend>
							<b><h:outputText
									style="font-size:14px ;color:white;background-image:linear-gradient( #FAF281, red);"
									value="Ajouter Client " name="outTxtcin" /> </b>
						</legend>
						<div align="center">



							<h:form>
								<table>
									<tr>

										<td width="20%"><b><h:outputText value="Nom :"
													style="font-size:12px " /></b></td>
										<td><h:inputText style="font-size:14px " id="nom" tabindex="1"
												size="30" value="#{ClientgestatBean.nom}" styleClass="inpdes" required="true"
												requiredMessage="entrer nom client" /> <p:messages
												for="nom" closable="true" autoUpdate="true" /></td>
									</tr>
									
								
									<tr>

										<td width="20%"><b><h:outputText value="Prenom :"
													style="font-size:12px " /></b></td>
										<td><h:inputText style="font-size:14px " id="prenom" tabindex="2"
												size="30" value="#{ClientgestatBean.prenom}" 
												  /> <p:messages
												for="prenom" closable="true" autoUpdate="true" /></td>
									</tr>
								 
									 
                              
									<tr>

										<td><b><h:outputText value="Tel: "
													style="font-size:12px " /></b></td>
										<td><h:inputText value="#{ClientgestatBean.tel}" size="30" tabindex="3"
												id="tel" style="font-size:14px " /></td>
									</tr>

									<tr>

										<td><b><h:outputText value="Ca: "
													style="font-size:12px " /></b></td>
										<td><h:inputText value="#{ClientgestatBean.ca}" size="30" tabindex="4"
												id="compt" style="font-size:14px " /></td>
									</tr>

									<tr>

										<td><b><h:outputText value="Reste: "
													style="font-size:12px " /></b></td>
										<td><h:inputText value="#{ClientgestatBean.reste}" tabindex="5"
												size="30" id="reste" style="font-size:14px " /> </td>

									</tr>
								
								 

									<tr>

										<td width="320px"><p:commandButton value="Ajouter"
											 ajax="false"
												style="width:150px;font-size:12px;height:30;color:white;background-image:linear-gradient( #FAF281, red);"
												action="#{ClientgestatBean.saveclient}" /></td>
									</tr>
								</table>
								
							</h:form>
							
							<script>
			
			function init() {				 
				$('.inpdes').focus();
			}
			</script>
						</div>
					</fieldset>


				</div>
		 </p:panel>
		 </p:panel>
		 </h:body>
		 </html>
