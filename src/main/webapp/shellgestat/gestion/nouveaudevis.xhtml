<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>

</h:head>

<h:body>
	<p:panel style="min-height:900px;margin-left: 20px;margin-right: 20px;">
		<ui:insert name="menu">
			<ui:include src="/shellgestat/Header.xhtml" />
		</ui:insert>
		<ui:insert name="menu">
			<ui:include src="/shellgestat/Headerg.xhtml" />
		</ui:insert>
		<p:panel id="basic2" closable="true"
			style="min-height:900px;margin-left: 50px;margin-right: 50px;background-image: url(../2.png)">


			<fieldset style="margin-bottom: 20px; background-color: #eeeec6;">
				<legend>
					<b><h:outputText
							style="font-size:14px ;color:white;background-image:linear-gradient( #FAF281, red);"
							value="Fiche Facture " name="outTxtcin" /> </b>
				</legend>
				<div align="center">



					<h:form id="form">
						<table>
							<tr>

								<td width="20%"><b><h:outputText value="Date :"
											style="font-size:12px " /></b></td>
								<td><p:calendar value="#{DevisBena.date}" showOn="button" locale="fr" 
										requiredMessage="entrer La date" style="font-size:12px "
										required="true" >
										<p:ajax event="dateSelect" listener="#{DevisBena.getdates2}" update="client" partialSubmit="true" process="@this"/>
	
										</p:calendar>
										 <p:messages for="date" closable="true"
										autoUpdate="true" /></td>
							</tr>
 

 




							<tr>
								<td><b><h:outputText value="Client :"
											style="font-size:12px " /></b></td>
								<td><p:selectOneMenu value="#{DevisBena.codeclient}"
										requiredMessage="entrer client"
										style="width:200px;font-size:12px " required="true"
										id="client" filter="true" filterMatchMode="contains">
										<f:selectItem itemLabel="selectionner client" />
										<f:selectItems value="#{DevisBena.listeClients}"
											itemValue="#{s.nom}" var="s" itemLabel="#{s.nom}" />
										<p:ajax listener="#{DevisBena.getTransportbyclient2}"
											update="mf" />
									</p:selectOneMenu> <p:messages for="client" closable="true" autoUpdate="true" /></td>

								<td><h:outputText value="MF :" style="font-size:12px " /></td>
								<td><h:inputText value="#{DevisBena.mf}" id="mf"
										style="font-size:14px " /></td>
							</tr>
							 

						</table>
                        <br/>
						<p:messages autoUpdate="true" closable="true" id="message" />
						<p:remoteCommand name="refreshFooter" update="emp:totalttc" />

						<p:dataTable id="emp" var="p" editable="true"
							value="#{DevisBena.listeProduits}" editMode="cell"
							widgetVar="articleTable" rowKey="#{p.id}" 	scrollable="true" scrollHeight="620"
							emptyMessage="aucune ligne dans la base">

							<p:ajax event="cellEdit" listener="#{DevisBena.onCellEdit2}" />
							<p:column>
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b"
										value="CODE" />
								</f:facet>
								<p:cellEditor>
									<f:facet name="output">
										<b><h:outputText style="font-size:12px ;" value="#{p.id}"
												id="p" /> </b>

									</f:facet>
									<f:facet name="input">

										<h:inputText id="qteInput2" value="#{DevisBena.codeproduit}"
											style="width:96%" size="2">


											<p:ajax update="p tva des prix qte" event="blur"
												process="@this" partialSubmit="true"
												listener="#{DevisBena.updateCode}" />
										</h:inputText>

									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column>

								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b"
										value="LIBELLE" />
								</f:facet>
								<p:cellEditor>
									<f:facet name="output">
										<b><h:outputText style="font-size:12px ;" value="#{p.nom}"
												id="des" /></b>

									</f:facet>

									<f:facet name="input">
										<p:selectOneMenu value="#{DevisBena.code}" filter="true"
											id="list" filterMatchMode="contains"
											style="width:50px;font-size:12px">
											<f:selectItem itemLabel="selectionner produit" />
											<f:selectItems value="#{DevisBena.listeProduit}"
												itemValue="#{s.nom}" var="s" itemLabel="#{s.nom}" />
											<p:ajax update="p tva des prix qte" event="blur"
												process="@this" partialSubmit="true" oncomplete="refreshFooter();" 
												listener="#{DevisBena.updatenom}" />
										</p:selectOneMenu>
									</f:facet>
								</p:cellEditor>

							</p:column>




							<p:column>
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b"
										value="QUANTITE" />
								</f:facet>
								<p:cellEditor>
									<f:facet name="output">
										<b><h:outputText style="font-size:12px ;"
												value="#{p.quantites}" id="qte" /> </b>

									</f:facet>
									<f:facet name="input">


										<h:inputText value="#{p.quantites}" style="width:96%">


											<p:ajax event="change"
												listener="#{DevisBena.updatemontant}" process="@this"
												oncomplete="refreshFooter();" update="qte"
												partialSubmit="true" />
										</h:inputText>

									</f:facet>
								</p:cellEditor>
							</p:column>

							<p:column>
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b" value="P.U" />
								</f:facet>
								<h:outputText style="font-size:12px " value="#{p.prixventes}"
									id="prix" />
							</p:column>


							<p:column>
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b" value="TVA" />
								</f:facet>
								<h:outputText style="font-size:12px " value="#{p.tva}" id="tva" />
							</p:column>
							<f:facet name="footer">
								 Totals TTC:
								 <h:outputText value="#{DevisBena.totalttcs}" id="totalttc" />
							</f:facet>


						</p:dataTable>

						<table>
							<tr>

								<td width="320px"><p:commandButton value="Ajouter"
										ajax="false"
										style="width:150px;font-size:12px;height:30;color:white;background-image:linear-gradient( #FAF281, red);"
										action="#{DevisBena.savefacture}" /></td>


							</tr>

						</table>



					</h:form>
				</div>
			</fieldset>


		</p:panel>
	</p:panel>
</h:body>
</html>
