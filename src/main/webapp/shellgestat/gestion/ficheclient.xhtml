<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"

	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>

</h:head>
<h:body>
	<p:panel style="min-height:900px;margin-left: 20px;margin-right: 20px;">
		<ui:insert name="menu">
			<ui:include src="/shellgestat/Header.xhtml" />
		</ui:insert>
		<ui:insert name="menu">
			<ui:include src="/shellgestat/Headerg.xhtml" />
		</ui:insert>
		<p:panel id="basic2" closable="true"
			style="min-height:900px;margin-left: 50px;margin-right: 50px;background-image: url(../2.png)">


			<h:form id="f">

				<div align="center">
				
					<b><h:outputText value="List Credit Passation" /></b><br />
					<h:panelGrid columns="2">
					<h:outputLabel value="Client " ></h:outputLabel>
					<h:outputText value="#{CreditPassationBean.clientpassation.nom}"></h:outputText>
					
					
					<h:outputLabel value="Tel " ></h:outputLabel>
					<h:outputText value="#{CreditPassationBean.clientpassation.tel}"></h:outputText>
					
					</h:panelGrid>

					 
				</div><br/>



                
				<p:dataTable id="emp" var="p" rendered="#{CreditPassationBean.listcreditpassation.size()!=0}"
					value="#{CreditPassationBean.listcreditpassation}" selection="#{CreditPassationBean.selectdeCredit}"
					 widgetVar="articleTable"   rowIndexVar="rowId"  rowKey="#{p.id}"
					  
					emptyMessage="aucune ligne dans la base">
                      <p:column selectionMode="multiple"
									style="width:16px;text-align:center" />
                      
                     
						
					    
                      <p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="Montant" />
							</f:facet> 
							<h:outputText value="#{p.montants}"/>
							</p:column>
							
							<!--  <p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="Tels" />
							</f:facet> 
							<h:outputText value="#{p.tel}"/>
							</p:column> -->
							
							
							 <p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="Num Bon" />
							</f:facet> 
							<h:outputText value="#{p.numBon}"/>
							</p:column>
							
							
							 <p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="Dates" />
							</f:facet> 
							<h:outputText value="#{p.dates}"/>
							
							
							</p:column>
							
							<p:column style="width:32px;text-align: center">
                       <p:commandButton    icon="ui-icon-search" title="Payement"   action="#{CreditPassationBean.payer}">
                           <f:setPropertyActionListener value="#{p}" target="#{CreditPassationBean.selectioncreditpasstion}" />
                        
                           </p:commandButton>
                                  </p:column>
							
							<!--  <p:column style="width:32px;text-align: center">
                       <p:commandButton    icon="ui-icon-search" title="Payement" update="f:carDetail" onclick="PF('dlg1').show();" actionListener="#{CreditPassationBean.payer}">
                         <f:setPropertyActionListener value="#{p}" target="#{CreditPassationBean.selectioncreditpasstion}" />
                           </p:commandButton>
                                  </p:column>  -->

				</p:dataTable>
				
			 
 
                   <div align="center">
                   <p:commandButton value="Retour" action="#{CreditPassationBean.accesPassation}"></p:commandButton>
                   
                    <p:commandButton value="Valider Payement" action="#{CreditPassationBean.payementMutiple}"></p:commandButton>
                   
                   </div>
					
					
			</h:form>
			
			
		</p:panel>
		
		
		
		
		
		
			<script type="text/javascript">
				PrimeFaces.locales['fr'] = {
					closeText : 'Fermer',
					prevText : 'Précédent',
					nextText : 'Suivant',
					monthNames : [ 'Janvier', 'Février', 'Mars', 'Avril',
							'Mai', 'Juin', 'Juillet', 'Août', 'Septembre',
							'Octobre', 'Novembre', 'Décembre' ],
					monthNamesShort : [ 'Jan', 'Fév', 'Mar', 'Avr', 'Mai',
							'Jun', 'Jul', 'Aoû', 'Sep', 'Oct', 'Nov', 'Déc' ],
					dayNames : [ 'Dimanche', 'Lundi', 'Mardi', 'Mercredi',
							'Jeudi', 'Vendredi', 'Samedi' ],
					dayNamesShort : [ 'Dim', 'Lun', 'Mar', 'Mer', 'Jeu', 'Ven',
							'Sam' ],
					dayNamesMin : [ 'D', 'L', 'M', 'M', 'J', 'V', 'S' ],
					weekHeader : 'Semaine',
					firstDay : 1,
					isRTL : false,
					showMonthAfterYear : false,
					yearSuffix : '',
					timeOnlyTitle : 'Choisir l\'heure',
					timeText : 'Heure',
					hourText : 'Heures',
					minuteText : 'Minutes',
					secondText : 'Secondes',
					currentText : 'Maintenant',
					ampm : false,
					month : 'Mois',
					week : 'Semaine',
					day : 'Jour',
					allDayText : 'Toute la journée'
				};
				
				function nexts2(input) {
					$(document)
							.keypress(
									function(event) {
										var keycode = (event.keyCode ? event.keyCode
												: event.which);
										if (keycode == '13') {
											$(input).closest('tr').next(
													'tr').find(
													'input[type=text]')
													.focus();
											$(input).closest('tr').next(
													'tr').find(
													'input[type=text]')
													.select();
											return false;
										}

									});
				}
				
				
				function next() {
					var index = 0;
		             $('.id').eq(index).focus();
				}
			</script>
			
			<style type="text/css">
    .value {
        font-weight: bold;
    }
     
    .ui-datatable {
        margin-bottom: 25px
    }
     
    .ui-datatable .ui-datatable-footer {
        text-align:left;
    }
     
    .ui-datalist ul {
        padding: 0 0 0 10px;
        margin: 5px 0;
    }
     
    .ui-datatable .ui-button-icon-only .ui-button-text {
        padding: 0;
        line-height: 1.2;
    }
</style>
			 
	</p:panel>
</h:body>
</html>
