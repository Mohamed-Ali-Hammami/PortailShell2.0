<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>

</h:head>

<h:body onload="init();">




	<p:panel style="min-height:900px;margin-left: 20px;margin-right: 20px;">
		<ui:insert name="menu">
			<ui:include src="/shellgestat/Header.xhtml" />
		</ui:insert>
		<ui:insert name="menu">
			<ui:include src="/shellgestat/Headerg.xhtml" />
		</ui:insert>
		<p:panel id="basic2" closable="true"
			style="min-height:900px;margin-left: 50px;margin-right: 50px;background-image: url(../2.png)">


			<h:form id="f">
              <div align="center">

		<fieldset style="margin-bottom: 20px; background-color: #eeeec6;">
			<legend>
				<b> <h:outputText value="SAISIE Avoir Sell" />
				</b>

			</legend>



			 
			 <p:dataTable id="avoirs" var="c" editable="true"  scrollable="true"  
					scrollHeight="180"
				value="#{AvoirBean.listavoir}" editMode="cell" rowKey="#{c.id}"
				emptyMessage="aucune ligne dans la base">


				<p:ajax event="cellEdit" listener="#{AvoirBean.onCellEdit}"
					partialSubmit="true" partialSubmitFilter="true" />


				<p:column style="width:150px;">
					<f:facet name="header">
						<h:outputText style="font-size:12px ;color:#483d8b" value="Numero" />
					</f:facet>
					 
					 
							<h:inputText  value="#{c.numero}" onkeyup="nextsch3(this)"
							style="background-color:transparent;border:none;"  styleClass="inpdes">

								 
							</h:inputText>
						 

				</p:column>

				 


				<p:column style="width:250px;">
					<f:facet name="header">
						<h:outputText style="font-size:12px ;color:#483d8b"
							value="Montant" />
					</f:facet> 
							<h:inputText value="#{c.montant}" onkeyup="nextsch3(this)"
							style="background-color:transparent;border:none;">
							 
							</h:inputText>

						 
				</p:column>
				
				
					<p:column style="width:250px;">
					<f:facet name="header">
						<h:outputText style="font-size:12px ;color:#483d8b"
							value="Litrage" />
					</f:facet> 
							<h:inputText value="#{c.litrage}" onkeyup="nextsch2(this)"
							style="background-color:transparent;border:none;">
							 
							</h:inputText>

						 
				</p:column>



 

			</p:dataTable>
			  


			<br /> <br />

			<p:commandButton value="Valider"
				style="width:150px;font-size:12px;height:30;color:white;background-image:linear-gradient( #FAF281, red);"
				ajax="false" action="#{AvoirBean.validersaisieavoir}" />

 	<script>
 	function init() {
		var index = 0;
         $('.inpdes').eq(index).focus();
	}
	
					function nextchs(input) {
						$(input).closest('td').next('td').find(
								'input[type=text]').focus();
					}

					function nextsch2(input) {
						$(document)
						.keypress(
								function(event) {
									var keycode = (event.keyCode ? event.keyCode
											: event.which);
									if (keycode == '13') {
					 $(input).closest('tr').next('tr').find('input[type=text]').first().focus();
						 
									}

								});
			}
					function nextsch3(input) {
						$(document)
						.keypress(
								function(event) {
									var keycode = (event.keyCode ? event.keyCode
											: event.which);
									if (keycode == '13') {
										 
						$(input).closest('td').next('td').find(
								'input[type=text]').focus();
						$(input).closest('td').next('td').find(
						'input[type=text]').select();
						return false;
									}

								});
			}

					function nextsch4(input) {
						$(input).closest('tr').next('tr').find(
								'input[type=text]').focus();
						// $(input).closest('td').next('td').find('input[type=text]').focus();
					}
				</script>
		</fieldset>
 
	</div>         
			</h:form>
		 </p:panel>
		 </p:panel>
		 </h:body>
		 </html>
