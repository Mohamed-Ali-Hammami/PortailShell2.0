<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>

</h:head>

<h:body> 
	<p:panel style="min-height:900px;margin-left: 20px;margin-right: 20px;">
		<ui:insert name="menu">
			<ui:include src="/shellgestat/Header.xhtml" />
		</ui:insert>
		<ui:insert name="menu">
			<ui:include src="/shellgestat/Headerg.xhtml" />
		</ui:insert>
		<p:panel id="basic2" closable="true"
			style="min-height:900px;margin-left: 50px;margin-right: 50px;background-image: url(../2.png)">
		 
			 
					<h:form id="form">
					<div align="center">
					
					<p:commandButton value="Cahier de stock" ajax="false" action="#{ProduitgestatBean.cahierstock}"
						style="width:200px;height:30;color:white;background-image:linear-gradient( #FAF281, red);font-size:12px">
						
					</p:commandButton>
					
					 <p:commandButton value="Imprimer" ajax="false"
						style="width:200px;height:30;color:white;background-image:linear-gradient( #FAF281, red);font-size:12px">
						<p:printer target="imprimer" />
					</p:commandButton>
				</div>
				<br/>
			 	<p:outputPanel id="imprimer">
			 	<h:outputText value="List Produit dont le stock n'est pas valide"/><br/>
						   
						<p:dataTable id="produit" var="p"   
							value="#{ProduitgestatBean.listProduit2}"    
							widgetVar="ArticleTable"    						  
							emptyMessage="aucun produit dans le stock"  
							  >                                
							 <p:column >
								<f:facet name="header">
									<h:outputText style="font-size:12px color:#483d8b" value="Code" />
								</f:facet>
								<h:outputText style="font-size:12px " value="#{p.codeshop}" />
							</p:column>
							
						<p:column  >
								<f:facet name="header">
									<h:outputText style="font-size:12px color:#483d8b" value="Nom" />
								</f:facet>								
									 <h:outputText style="font-size:12px "
									value="#{p.nom}" /> 
							</p:column>
							
							<p:column   >
								<f:facet name="header">
									<h:outputText style="font-size:12px color:#483d8b" value="Quantite" />
								</f:facet>
								 <h:outputText style="font-size:12px "
									value="#{p.quantite}" /> 
								  
							</p:column>
							 
                             	  <p:column  >
								<f:facet name="header">
									<h:outputText style="font-size:12px color:#483d8b" value="Quantite Prevu " />
								</f:facet>
								
									 <h:outputText style="font-size:12px "
									value="#{p.quantiteprevu}" id="ach"/>
									 
									 
								 
							</p:column>
							
							    
						 
						</p:dataTable>
						</p:outputPanel>
						</h:form>
		 </p:panel>
		 </p:panel>
		 </h:body>
		 </html>
