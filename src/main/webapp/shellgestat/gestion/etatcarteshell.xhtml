<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>

</h:head>

<h:body>




	<p:panel style="min-height:900px;margin-left: 20px;margin-right: 20px;">
		<ui:insert name="menu">
			<ui:include src="/shellgestat/Header.xhtml" />
		</ui:insert>
		<ui:insert name="menu">
			<ui:include src="/shellgestat/Headerg.xhtml" />
		</ui:insert>
		<p:panel id="basic2" closable="true"
			style="min-height:900px;margin-left: 50px;margin-right: 50px;background-image: url(../2.png)">


			<h:form id="f">
				<div align="center">
					<b><h:outputText value=" ETAT CARTE SHELL" /></b><br />
					<h:panelGrid columns="6">
						<h:outputLabel value="DATE" />
						<p:calendar value="#{AvoirBean.date}" id="pupop" >
						<p:ajax 
										event="dateSelect"  />
						</p:calendar>
						<h:outputLabel value="Solde" />
						<h:inputText value="#{AvoirBean.solde.soldes}"  id="soldes"/>
						<h:outputLabel value="DATE" />
						<p:calendar value="#{AvoirBean.date2}" id="pupop2">
							<p:ajax listener="#{AvoirBean.getavorirbydate}"
								update="imprimer soldes"  event="dateSelect"/>
						</p:calendar>
					</h:panelGrid>
					<br />
					<br />
               <p:outputPanel id="imprimer">
					<h:panelGrid columns="2" >


						<p:dataTable id="caisse" var="c" value="#{AvoirBean.listpcaisses}"
							rowKey="#{c.id}" emptyMessage="aucune ligne dans la base">

							<p:column>
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b"
										value="Date" />
								</f:facet>
								<h:outputText style="font-size:12px " value="#{c.dates}"
									id="dates" />
							</p:column>

							<p:column>
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b"
										value="Poste" />
								</f:facet>
								<h:outputText style="font-size:12px " value="#{c.poste}"
									id="poste" />
							</p:column>

							<p:column>
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b"
										value="Monatnt" />
								</f:facet>
								<h:outputText style="font-size:12px " value="#{c.carteShells}"
									id="montant" />
							</p:column>
						</p:dataTable>

						<p:dataTable id="avoir" var="c" value="#{AvoirBean.listavoir}"
							rowKey="#{c.id}" emptyMessage="aucune ligne dans la base">
							
						 

                         <p:column>
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b"
										value="Date" />
								</f:facet>
								<h:outputText style="font-size:12px " value="#{c.dates}"
									id="dates" />
							</p:column>

							<p:column>
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b"
										value="Numero" />
								</f:facet>
								<h:outputText style="font-size:12px " value="#{c.numero}"
									id="numero" />
							</p:column>

							<p:column>
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b"
										value="Monatnt" />
								</f:facet>
								<h:outputText style="font-size:12px " value="#{c.montants}"
									id="montants" />
							</p:column>
							
							 
						</p:dataTable>

					</h:panelGrid>
					</p:outputPanel>
				</div>
			</h:form>
		 </p:panel>
		 </p:panel>
		 </h:body>
		 </html>
