<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>

</h:head>

<h:body>




	<p:panel style="min-height:900px;margin-left: 20px;margin-right: 20px;">
		<ui:insert name="menu">
			<ui:include src="/shellgestat/Header.xhtml" />
		</ui:insert>
		<ui:insert name="menu">
			<ui:include src="/shellgestat/Headerg.xhtml" />
		</ui:insert>
		<p:panel id="basic2" closable="true"
			style="min-height:900px;margin-left: 50px;margin-right: 50px;background-image: url(../2.png)">
			<div align="center">
				<fieldset style="margin-bottom: 20px; background-color: #eeeec6;">
					<legend>
						<b><h:outputText style="font-size:12px; color:#2e8b57"
								value="Ajouter Fournisseur " name="outTxtcin" /> </b>
					</legend>
					<h:form>
						<table>
							<tr>

								<td width="20%"><b><h:outputText value="Fournisseur :"
											style="font-size:12px " /></b></td>
								<td><h:inputText value="#{FournisseursBean.nom}" id="nom"
										size="30" style="font-size:14px " required="true"
										requiredMessage="entrer non fournisseur">

									</h:inputText> <p:messages for="nom" autoUpdate="true" closable="true"
										id="msgs" /></td>
							</tr>
							
							 
							<tr>

								<td width="20%"><b><h:outputText value="Matricule Fiscal :"
											style="font-size:12px " /></b></td>
								<td><h:inputText value="#{FournisseursBean.matriculfisacl}" id="matriculfisacl"
										size="30" style="font-size:14px "  
									 >

									</h:inputText> </td>
							</tr>
							
							  

							<tr>

								<td width="20%"><b><h:outputText value="Tel :"
											style="font-size:12px " /></b></td>
								<td><h:inputText value="#{FournisseursBean.tel}" size="30"
										style="font-size:14px ">

									</h:inputText></td>
							</tr>

							<tr>

								<td width="20%"><b><h:outputText value="Ca :"
											style="font-size:12px " /></b></td>
								<td><h:inputText value="#{FournisseursBean.ca}" size="30"
										style="font-size:14px ">

									</h:inputText></td>
							</tr>
							
							
							<tr>

								<td width="20%"><b><h:outputText value="Reste :"
											style="font-size:12px " /></b></td>
								<td><h:inputText value="#{FournisseursBean.reste}" size="30"
										style="font-size:14px ">

									</h:inputText></td>
							</tr>
							

							<tr>
								<td />
								<td width="400px"><p:commandButton value="Ajouter" ajax="false"
										style="width:200px;height:30;color:#0000ff;background-color:#abc8e2;font-size:12px"
										action="#{FournisseursBean.savefournisseur}" /></td>
							</tr>
						</table>
					</h:form>
				</fieldset>

				<h:form id="form">

					<p:growl id="msgs" showDetail="true" />
					<p:dataTable id="Fournisseur" var="fournisseur"
						value="#{FournisseursBean.listfournisseur}"
						widgetVar="ArticleTable" editable="true"
						filteredValue="#{FournisseursBean.filterfournisseurs}"
						selection="#{FournisseursBean.fournisseur2}"
						rowKey="#{fournisseur.code}" selectionMode="single"
						emptyMessage="aucun fournisseur dans le stock" paginator="true"
						rows="10" paginatorPosition="bottom">
						
						
						<p:ajax event="rowEdit" listener="#{FournisseursBean.onRowEdit}"
							update=":form:msgs" />
						<p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px color:#483d8b" value="Code" />
							</f:facet>
							<h:outputText style="font-size:12px " value="#{fournisseur.code}" />
						</p:column>

						<p:column filterBy="#{fournisseur.nom}"
							filterStyle="font-size:14px;color:blue"
							filterMatchMode="contains">
							<f:facet name="header">
								<h:outputText style="font-size:12px color:#483d8b"
									value="Fournisseur" />
							</f:facet>

							<p:cellEditor>
								<f:facet name="output">
									<h:outputText style="font-size:12px "
										value="#{fournisseur.nom}" />
								</f:facet>
								<f:facet name="input">
									<p:inputText id="codeInput" value="#{fournisseur.nom}"
										style="width:96%" />
								</f:facet>

							</p:cellEditor>
						</p:column>
						
				 
						<p:column  
							 >
							<f:facet name="header">
								<h:outputText style="font-size:12px color:#483d8b"
									value="Matriculfisacl" />
							</f:facet>

							<p:cellEditor>
								<f:facet name="output">
									<h:outputText style="font-size:12px "
										value="#{fournisseur.matriculfisacl}" />
								</f:facet>
								<f:facet name="input">
									<p:inputText  value="#{fournisseur.matriculfisacl}"
										style="width:96%" />
								</f:facet>

							</p:cellEditor>
						</p:column>
						
					  
						
						<p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px color:#483d8b"
									value="Tel" />
							</f:facet>

							<p:cellEditor>
								<f:facet name="output">
									<h:outputText style="font-size:12px "
										value="#{fournisseur.tel}" />
								</f:facet>
								<f:facet name="input">
									<p:inputText   value="#{fournisseur.tel}"
										style="width:96%" />
								</f:facet>

							</p:cellEditor>
						</p:column>
						
						
						<p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px color:#483d8b"
									value="adresse" />
							</f:facet>

							<p:cellEditor>
								<f:facet name="output">
									<h:outputText style="font-size:12px "
										value="#{fournisseur.address}" />
								</f:facet>
								<f:facet name="input">
									<p:inputText   value="#{fournisseur.address}"
										style="width:96%" />
								</f:facet>

							</p:cellEditor>
						</p:column>
						
						
						<p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px color:#483d8b"
									value="Reste" />
							</f:facet>

							<p:cellEditor>
								<f:facet name="output">
									<h:outputText style="font-size:12px "
										value="#{fournisseur.restes}" />
								</f:facet>
								<f:facet name="input">
									<p:inputText   value="#{fournisseur.reste}"
										style="width:96%" />
								</f:facet>

							</p:cellEditor>
						</p:column>


						<p:column style="width:40px;text-align:center">
							<f:facet name="header">
								<h:outputText style="font-size:9px;color:#483d8b"
									value="supprimer" />
							</f:facet>
							<div align="center">
								<p:commandLink action="#{FournisseursBean.deletefournisseur}" ajax="false"
									 >
									<p:graphicImage url="/images/trash.png" />

									<f:setPropertyActionListener
										target="#{FournisseursBean.fournisseur2}"
										value="#{fournisseur}"></f:setPropertyActionListener>

									 
								</p:commandLink>
							</div>
						</p:column>

						<p:column style="width:40px">
							<f:facet name="header">
								<h:outputText style="font-size:9px;color:#483d8b"
									value="modifier" />
							</f:facet>
							<p:rowEditor />
						</p:column>
					</p:dataTable>


					<p:confirmDialog global="true" modal="true"  
						style="width:150px" widgetVar="suppressionDialog">
						<div align="center">
							<p:commandButton value="oui" type="button"
								styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
							<p:commandButton value="Non" type="button"
								styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
						</div>
					</p:confirmDialog>





				</h:form>

			</div>


		 </p:panel>
		 </p:panel>
		 </h:body>
		 </html>
