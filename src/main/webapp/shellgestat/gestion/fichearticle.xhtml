<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>

</h:head>

<h:body>




	<p:panel style="min-height:900px;margin-left: 20px;margin-right: 20px;">
		<ui:insert name="menu">
			<ui:include src="/shellgestat/Header.xhtml" />
		</ui:insert>
		<ui:insert name="menu">
			<ui:include src="/shellgestat/Headerg.xhtml" />
		</ui:insert>
		<p:panel id="basic2" closable="true"
			style="min-height:900px;margin-left: 50px;margin-right: 50px;background-image: url(../2.png)">


			<div align="center">

				  <fieldset style="margin-bottom: 20px; background-color: #eeeec6;">
						<legend>
							<b><h:outputText
									style="font-size:24px ;color:white;background-image:linear-gradient( #FAF281, red);"
									value="Fiche d'un Article Carburant " name="outTxtcin" /> </b>
						</legend>
						<div align="center">



								<h:form>
					<p:commandButton type="button" onclick="PF('switcher').previous();"
						icon="ui-icon-circle-triangle-w" id="prev" />
						<p:spacer width="50:px"/>
					<p:commandButton type="button" onclick="PF('switcher').next();"  
						icon="ui-icon-circle-triangle-e" id="next"   />
                      <br/><br/>
					<p:imageSwitch effect="wipe" widgetVar="switcher"   
						id="manuelSwitcher" slideshowAuto="false">
						<ui:repeat value="#{ArticleBean.listArticlecarburant}" var="s"
							id="manuelSwitcherImages">

							 
							<table>
									<tr>

										<td width="20%"><b><h:outputText value="Nom :"
													style="font-size:12px " /></b></td>
										<td><h:inputText style="font-size:14px " id="nom"
												size="30" value="#{s.nom}" required="true"
												requiredMessage="entrer nom client" /> <p:messages
												for="nom" closable="true" autoUpdate="true" /></td>
									</tr>
									
									<tr>

										<td width="20%"><b><h:outputText value="Quantite:"
													style="font-size:12px " /></b></td>
										<td><h:inputText style="font-size:14px " id="qte"
												size="30" value="#{s.quantites}" 
												  /> <p:messages
												for="qte" closable="true" autoUpdate="true" /></td>
									</tr>
									
									<tr>

										<td width="20%"><b><h:outputText value="Qtemin:"
													style="font-size:12px " /></b></td>
										<td><h:inputText style="font-size:14px " id="qtemin"
												size="30" value="#{s.qtemin}" 
												  /> <p:messages
												for="qtemin" closable="true" autoUpdate="true" /></td>
									</tr>
									
									<tr>

										<td width="20%"><b><h:outputText value="Achat:"
													style="font-size:12px " /></b></td>
										<td><h:inputText style="font-size:14px " id="achat"
												size="30" value="#{s.achat}" 
												  /> <p:messages
												for="achat" closable="true" autoUpdate="true" /></td>
									</tr>
									
										<tr>

										<td width="20%"><b><h:outputText value="Vente:"
													style="font-size:12px " /></b></td>
										<td><h:inputText style="font-size:14px " id="vente"
												size="30" value="#{s.vente}" 
												  /> <p:messages
												for="vente" closable="true" autoUpdate="true" /></td>
									</tr>
									
									
									<tr>

										<td width="320px"><p:commandButton value="Modifier"
												ajax="false"
												style="width:150px;font-size:12px;height:30;color:white;background-image:linear-gradient( #FAF281, red);"
												action="#{ArticleBean.modifierArticle}" >
												<f:setPropertyActionListener value="#{s}" target="#{ArticleBean.articlecarburant}"/>
												</p:commandButton>
												</td>
												
												 
									</tr>
									</table>
						</ui:repeat>
					</p:imageSwitch>
				
							 
								
							</h:form> 
						</div>
					</fieldset>
                       
			
			</div>

		 </p:panel>
		 </p:panel>
		 </h:body>
		 </html>
