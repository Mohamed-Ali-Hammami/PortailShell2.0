<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>

</h:head>
<h:body>
	<p:panel style="min-height:900px;margin-left: 20px;margin-right: 20px;">
		<ui:insert name="menu">
			<ui:include src="/shellgestat/Header.xhtml" />
		</ui:insert>
		<ui:insert name="menu">
			<ui:include src="/shellgestat/Headerg.xhtml" />
		</ui:insert>
		<p:panel id="basic2" closable="true"
			style="min-height:900px;margin-left: 50px;margin-right: 50px;background-image: url(../2.png)"> 
			<h:form id="f">

				<div align="center">
				
				<p:commandButton title="imprimer">
							 
							  <p:printer target="imprimer"></p:printer> 
						</p:commandButton>
						
						<br/>
						<br/>
					<b><h:outputText value="Gestion de Credit Passation" /></b><br />

					<h:panelGrid columns="3">
				Date
				 
        <p:calendar id="popup" value="#{CreditPassationBean.date}" locale="fr">

							 
						</p:calendar>
						<p:commandButton value="Rechercher" action="#{CreditPassationBean.getCreditPassationByCaisseanddates}"/>
						 
						</h:panelGrid>
				</div>
                
				<p:dataTable id="emp" var="p" rendered="#{CreditPassationBean.listcreditpassation.size()!=0}"
					value="#{CreditPassationBean.listcreditpassation}"
					 widgetVar="articleTable" editable="true" rowIndexVar="rowId" editMode="cell"
					
					emptyMessage="aucune ligne dans la base">
                      
                     
						
					    
                      <p:column >
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="Montant" />
							</f:facet> 
							<h:outputText value="#{p.montants}"/>
							</p:column>
							
							 
							
							
							 <p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="Num Bon" />
							</f:facet> 
							<h:outputText value="#{p.numBon}"/>
							</p:column>
							
							
								 <p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="Dates" />
							</f:facet> 
							<h:outputText value="#{p.dates}"/>
							</p:column>
							
							
								 <p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="Poste" />
							</f:facet> 
							<h:outputText value="#{p.credit.caisse.poste}"/>
							</p:column>
							
							 <p:column style="width:32px;text-align: center">
                       <p:commandButton    icon="ui-icon-search" title="View" action="#{CreditPassationBean.visualise}">
                         <f:setPropertyActionListener value="#{p}" target="#{CreditPassationBean.selectioncreditpasstion}" />
                           </p:commandButton>
                                  </p:column> 

				</p:dataTable>

				 <br/><br/>
				 	<p:outputPanel id="imprimer" style="width:99%">
				 <div align="center">
					<b><h:outputText value="Etat Des Clients" /></b><br />
					  <h:outputText value="#{CreditPassationBean.dates}"/>       
					</div>
				 <br />
                   
                   	<p:dataTable id="emp2" var="p" rendered="#{CreditPassationBean.listclientpassations.size()!=0}"
					value="#{CreditPassationBean.listclientpassations}"
					 widgetVar="articleTable"   rowIndexVar="rowId"  
					 
					emptyMessage="aucune ligne dans la base">
					
					    
                      <p:column style="border: 1px #000000 solid; width:40%;   ">
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="Client" />
							</f:facet> 
							<h:outputText value="#{p.nom}"/>
							</p:column>
							
							    
                      <p:column  style="border: 1px #000000 solid; width:12%;   ">
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="Montant" />
							</f:facet> 
							<h:outputText value="#{p.restes}"/>
							</p:column>
							
							
							    
                      <p:column   style="border: 1px #000000 solid; width:12%;   ">
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="Date" />
							</f:facet> 
							<h:outputText value="#{p.dernierdates}"/>
							</p:column>
							
							  <p:column   style="border: 1px #000000 solid; width:12%;   ">
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="Tel" />
							</f:facet> 
							<h:outputText value="#{p.tel}"/>
							</p:column> 
							
							 <p:column style="border: 1px #000000 solid; width:3%;   " >
                             <p:commandButton outcome="Payement"   style="margin-right:10px;" title="Payer"  icon="pi pi-star"   action="#{CreditPassationBean.visualise2}">
                            <f:setPropertyActionListener value="#{p}" target="#{CreditPassationBean.clientpassation}" />
                            </p:commandButton>
                            </p:column> 
							</p:dataTable>
							<br/><div align="center">
							
						   
						   
							 <table border="0"><tr><td>
							<h5><h:outputText value="Total : " /> </h5></td>
						<td>	<h5><h:outputText value="#{CreditPassationBean.total}"  style="font-size:18px ;color:#483d8b"></h:outputText>
						</h5></td>
						</tr>
						 </table>
						 
						 
						<h3> <h:outputText value="CREDIT ANTERIEUR"/></h3><br/>
						<p:dataTable var="b"  value="#{CreditPassationBean.listcreditanteirur }">
						
						<p:column headerText="Client">
						<h:outputText value="#{b.creditpassation.clientpassation.nom}"/>
						</p:column>
						
						<p:column headerText="Montant">
						<h:outputText value="#{b.montants}"/>
						</p:column>
						</p:dataTable>
							</div>
							
							
							</p:outputPanel>
					
					
			</h:form>
			
			
		</p:panel>
		
		
		
		
		 
				 
			 
	</p:panel>
</h:body>
</html>
