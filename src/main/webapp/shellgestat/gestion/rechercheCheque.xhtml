<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>

</h:head>

<h:body>




	<p:panel style="min-height:900px;margin-left: 20px;margin-right: 20px;">
		<ui:insert name="menu">
			<ui:include src="/shellgestat/Header.xhtml" />
		</ui:insert>
		<ui:insert name="menu">
			<ui:include src="/shellgestat/Headerg.xhtml" />
		</ui:insert>
		<p:panel id="basic2" closable="true"
			style="min-height:900px;margin-left: 50px;margin-right: 50px;background-image: url(../2.png)">
			<h:form>
				<br />
				<div align="center">
					<b><h:outputText value="Recherche d'un Chèque"
							style="font-size:20px " /></b><br />
					<table>

						<tr>
							<td><h:outputText value="Numero cheque"
									style="font-size:16px " /></td>
							<td><h:inputText value="#{ChequeBean.numcheque}">

								</h:inputText></td>

							<td><h:outputText value="Banque" style="font-size:16px " /></td>
							<td><h:inputText value="#{ChequeBean.banque}">

								</h:inputText></td>
						</tr>
						<tr>
							<td><h:outputText value="Date" style="font-size:16px " /></td>
							<td><p:calendar value="#{ChequeBean.date}" /></td>

							<td><h:outputText value="Montant" style="font-size:16px " /></td>
							<td><h:inputText value="#{ChequeBean.montant}" /></td>
						</tr>
						<tr>
							<td><h:outputText value="Poste" style="font-size:16px " /></td>
							<td><h:inputText value="#{ChequeBean.poste}">
								</h:inputText></td>
						</tr>
					</table>
					<br />

					<p:commandButton value="Chercher" ajax="false"
						style="width:150px;font-size:12px;height:30;color:white;background-image:linear-gradient( #FAF281, red);"
						action="#{ChequeBean.validerrecherche}" />
						<br/><br/><br/>
						
						<p:commandButton title="imprimer" value="imprimer" style="width:150px;font-size:12px;height:30;color:white;background-image:linear-gradient( #FAF281, red);">
									 	<p:printer target="imprimer"/>	 
								</p:commandButton>
				</div>




			 
			<br />
			 
			<p:outputPanel id="imprimer">
			<b><h:outputText value="LISTE DES MOUVEMENTS PAR CHEQUE" style="font-size:20px;"/></b>
			<br/><br/>
				<p:dataTable id="cheque" var="c" style="background:#a2b5bf"
					value="#{ChequeBean.listcheques}" scrollable="true" scrollHeight="280"
					emptyMessage="aucun cheque dans la liste">
					
					
					<p:column filterBy="#{c.date}" filterMatchMode="contains"
									filterStyle="font-size:12px ;color:blue;" width="400px">
						<f:facet name="header">
							<h:outputText style="font-size:12px ;color:#483d8b"
								value="Date" />
						</f:facet>
                          <h:outputText style="font-size:12px ;color:#483d8b"
								value="#{c.dates}" />
					</p:column>
					
					<p:column filterBy="#{c.numero}" filterMatchMode="contains"
									filterStyle="font-size:12px ;color:blue;" width="400px">
						<f:facet name="header">
							<h:outputText style="font-size:12px ;color:#483d8b"
								value="Référence" />
						</f:facet>
                          <h:outputText style="font-size:12px ;color:#483d8b"
								value="#{c.numero}" />
					</p:column>
					
					<!-- <p:column>
						<f:facet name="header">
							<h:outputText style="font-size:12px ;color:#483d8b"
								value="Référence" />
						</f:facet>
                          <h:outputText style="font-size:12px ;color:#483d8b"
								value="#{c.numero}" />
					</p:column> -->
					<p:column>
						<f:facet name="header">
							<h:outputText style="font-size:12px ;color:#483d8b"
								value="Montant" />
						</f:facet>
                          <h:outputText style="font-size:12px ;color:#483d8b"
								value="#{c.montant}" />
					</p:column>
					
				<!-- 	<p:column>
						<f:facet name="header">
							<h:outputText style="font-size:12px ;color:#483d8b"
								value="Poste" />
						</f:facet>
                          <h:outputText style="font-size:12px ;color:#483d8b"
								value="#{c.poste}" />
					</p:column> -->
					
				</p:dataTable>
				
				</p:outputPanel>
			</h:form>

	 </p:panel>
	 </p:panel>
	 </h:body>
	 </html>
