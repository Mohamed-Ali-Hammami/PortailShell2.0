<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>

</h:head>

<h:body>




	<p:panel style="min-height:900px;margin-left: 20px;margin-right: 20px;">
		<ui:insert name="menu">
			<ui:include src="/shellgestat/Header.xhtml" />
		</ui:insert>
		<ui:insert name="menu">
			<ui:include src="/shellgestat/Headerg.xhtml" />
		</ui:insert>
		<p:panel id="basic2" closable="true"
			style="min-height:900px;margin-left: 50px;margin-right: 50px;background-image: url(../2.png)"> 
				
				<br/> <br/><br/><br/>
				 
					<h:form>
					<div align="left">
				<h:panelGrid columns="2">
				<h:commandLink title="imprimer">
									<p:graphicImage url="/images/imprimante-icone.png"
										style="width:25px" />
									<p:printer target="imprimer"></p:printer>
								</h:commandLink>
			 </h:panelGrid>
				<table>
		<tr>
		<td><h:outputText value="à partir du :" style="font-size:12px "/></td>
		<td> <p:calendar id="popup" value="#{EtatBean.date1}" size="10">
		 
		</p:calendar>
		</td>
		
		<td><h:outputText value="jusqu'au :" style="font-size:12px "/></td>
		<td> <p:calendar id="popup2" value="#{EtatBean.date2}" size="10">
		 
		</p:calendar>
		</td>
		</tr>
		 <tr>
						<td><h:outputText value="Nom famille depense"
								style="font-size:20px " /></td>
						<td><p:selectOneMenu value="#{EtatBean.matricule}"
								style="width:200px;font-size:20px " filter="true"
								filterMatchMode="contains" >
								<f:selectItem itemLabel="selectionner famille" />
								<f:selectItems value="#{EtatBean.familledepense}" var="f"
									itemValue="#{f.libelle}" itemLabel="#{f.libelle}"  />
								<f:ajax render="nom"
									  />
							</p:selectOneMenu></td>


						<td><h:outputText value="Famille depense"
								style="font-size:20px " /></td>
						<td><h:inputText value="#{EtatBean.matricule}" id="nom"
								style="font-size:20px " /></td>
								
								
				<td><h:outputText value="Designation"
								style="font-size:20px " /></td>
						<td><h:inputText value="#{EtatBean.designation}" id="des"
								style="font-size:20px " /></td>
						 
					</tr>
	 
		 
										
		<tr>
		<td/>
		 <td><p:commandButton value="Recherche" action="#{EtatBean.getetatDepenses1}" style="width:150px;font-size:12px;height:30;color:#0000ff;background-color:#abc8e2;"/></td>
		 </tr>
		</table>				
				
				</div>
				
				<p:outputPanel id="imprimer" style="width:99%">
				<h:outputText value="ETAT des depenses du #{EtatBean.date1} #{EtatBean.date2} #{EtatBean.matricule}  " style=" font-style: italic;font-size: large;"/>
				 
				<br/> <br/><br/><br/>
				
								<p:dataTable id="fd" var="fd"
									value="#{EtatBean.listDepense}" widgetVar="articleTable"
									 
									rowKey="#{fd.id}" style="margin-bottom:10px"
									emptyMessage="aucune depense dans la base"  >
									
									<p:column  >
										<f:facet name="header">
											<h:outputText style="font-size:12px ;color:#483d8b"
												value="Date" />
										</f:facet>
										<h:outputText style="font-size:12px "
											value="#{fd.dates}" />
									</p:column>
									<p:column  >
										<f:facet name="header">
											<h:outputText style="font-size:12px ;color:#483d8b"
												value="Designation" />
										</f:facet>
										<h:outputText style="font-size:12px "
											value="#{fd.libelle}" />
									</p:column>

								 <p:column  >
										<f:facet name="header">
											<h:outputText style="font-size:12px ;color:#483d8b"
												value="Montant" />
										</f:facet>
										<h:outputText style="font-size:12px "
											value="#{fd.montants}" />
									</p:column>
									
									
                                        
        <p:columnGroup type="footer">
            <p:row>
                <p:column   style="text-align:right" footerText="Nomre de lignes #{EtatBean.listDepense.size()}" />
                <p:column   style="text-align:right" footerText="Totals: #{EtatBean.totaCA}" />
               <!--  <p:column footerText="#{EtatBean.totaltransports}" /> -->
 
                 
            </p:row>
        </p:columnGroup>
								 
									</p:dataTable>
				</p:outputPanel>
				</h:form>
				 
		 </p:panel>
		 </p:panel>
		 </h:body>
		 </html>
