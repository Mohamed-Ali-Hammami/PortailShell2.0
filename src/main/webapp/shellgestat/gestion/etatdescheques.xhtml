<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>

</h:head>

<h:body>




	<p:panel style="min-height:900px;margin-left: 20px;margin-right: 20px;">
		<ui:insert name="menu">
			<ui:include src="/shellgestat/Header.xhtml" />
		</ui:insert>
		<ui:insert name="menu">
			<ui:include src="/shellgestat/Headerg.xhtml" />
		</ui:insert>
		<p:panel id="basic2" closable="true"
			style="min-height:900px;margin-left: 50px;margin-right: 50px;background-image: url(../2.png)">

			<br />
			 
			<h:form>

				<div align="center">
					<h:panelGrid columns="2">
						<p:commandButton title="imprimer">
							 
							  <p:printer target="imprimer"></p:printer> 
						</p:commandButton>
					</h:panelGrid>
					<table>
						<tr>
							<td><h:outputText value="Date de début:"
									style="font-size:12px " /></td>
							<td><p:calendar id="popup" value="#{EtatBean.date1}"
									size="10" >
                                  <p:ajax 
										event="dateSelect" update="imprimer" />
								</p:calendar></td>

							<td><h:outputText value="Date de fin:"
									style="font-size:12px " /></td>
							<td><p:calendar id="popup2" value="#{EtatBean.date2}"
									size="10" event="dateSelect">

								</p:calendar></td>
						</tr>




						<tr>
							<td />
							<td><p:commandButton value="Valider" ajax="false"
									action="#{EtatBean.getetatCheques}"
									style="width:150px;font-size:12px;height:30;color:#0000ff;background-color:#abc8e2;" /></td>
						</tr>
					</table>

				</div>
				
				<p:outputPanel id="imprimer" style="width:99%">
				<h:outputText value="ETAT  CHEQUES DU #{EtatBean.dates1} AU  #{EtatBean.dates2} "  style=" font-style: italic;font-size: large;"/>
				 
				<br/> <br/><br/><br/>
				  
								<p:dataTable id="fd" var="fd"
									value="#{EtatBean.listecheque}" widgetVar="articleTable"
									 
									rowKey="#{fd.id}" style="margin-bottom:10px"
									emptyMessage="aucun cheque dans la base"  >
									
									<p:column  >
										<f:facet name="header">
											<h:outputText style="font-size:12px ;color:#483d8b"
												value="Date" />
										</f:facet>
										<h:outputText style="font-size:12px "
											value="#{fd.dates}" />
									</p:column>
									<p:column  >
										<f:facet name="header">
											<h:outputText style="font-size:12px ;color:#483d8b"
												value="Banque" />
										</f:facet>
										<h:outputText style="font-size:12px "
											value="#{fd.banque}" />
									</p:column>

								 <p:column  >
										<f:facet name="header">
											<h:outputText style="font-size:12px ;color:#483d8b"
												value="Montant" />
										</f:facet>
										<h:outputText style="font-size:12px "
											value="#{fd.montants}" />
									</p:column>
									
									 
								 
                                        
        <p:columnGroup type="footer">
            <p:row>
                <p:column   style="text-align:right" footerText="Nomre de lignes #{EtatBean.listecheque.size()}" />
                <p:column   style="text-align:right" footerText="Totals:" />
                <p:column footerText="#{EtatBean.montantcheques}" />
 
                 
            </p:row>
        </p:columnGroup>
								 
									</p:dataTable> 
				</p:outputPanel>
					 
			</h:form>

		 </p:panel>
		 </p:panel>
		 </h:body>
		 </html>
