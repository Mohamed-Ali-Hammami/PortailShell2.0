<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>

</h:head>

<h:body>




	<p:panel style="min-height:900px;margin-left: 20px;margin-right: 20px;">
		<ui:insert name="menu">
			<ui:include src="/shellgestat/Header.xhtml" />
		</ui:insert>
		<ui:insert name="menu">
			<ui:include src="/shellgestat/Headerg.xhtml" />
		</ui:insert>
		<p:panel id="basic2" closable="true"
			style="min-height:900px;margin-left: 50px;margin-right: 50px;background-image: url(../2.png)">

			 

			<div align="center">
				<b><h:outputText value="Etat des Accomptes et Manques" /> </b>
			</div>
			<br />
			<br />
			<h:form>
				<h:panelGrid columns="4">
					<b><h:outputText value="Date Debut" style="font-size:12px" />
					</b>
					<p:calendar value="#{AvancegestatBean.date1}" id="d1" >
					<f:ajax event="dateSelect" render="imprimer"/>
					</p:calendar>
					
					<b><h:outputText value="Date Fin" style="font-size:12px" /> </b>

					<p:calendar value="#{AvancegestatBean.date2}" id="d2" >
					<f:ajax event="dateSelect" render="imprimer"/>
					</p:calendar>
				</h:panelGrid>
				<h:panelGrid columns="3">
					<h:outputText value="Code Ouvrier : " style="font-size:12px" />
					<p:selectOneMenu value="#{AvancegestatBean.nom}"
						style="width:200px;font-size:12px " id="emp" filter="true"
						filterMatchMode="contains">

						<f:selectItem itemLabel="Veuillez choisir un employer" />
						<f:selectItems value="#{AvancegestatBean.listeEmployee}"
							itemValue="#{e.nom}" var="e" itemLabel="#{e.nom}" />
						<p:ajax listener="#{AvancegestatBean.getEmployeeByNom2}" update="imprimer mat nom" />
					</p:selectOneMenu>

				</h:panelGrid>
				<br />
				<div align="left">
					<p:commandButton title="imprimer" value="Valider"
						 >
						<p:printer target="imprimer" />
					</p:commandButton>
				</div>
				<p:outputPanel id="imprimer">
				
				<div align="center">
				<b><h:outputText value="ETAT DES ACCOMPTES ET MANQUES"/></b><br/>
				<h:panelGrid columns="4">
				<b><h:outputText value="Du :"/></b>  <h:outputText value="#{AvancegestatBean.dates1}"/> 
				<b><h:outputText value="AU :"/></b>  <h:outputText value="#{AvancegestatBean.dates2}"/> 
				</h:panelGrid> <br/>
				<h:panelGrid columns="4">
				<b><h:outputText value="Code Ouvrier :"/></b>  <h:outputText value="#{AvancegestatBean.employee.matricule}" id="mat"/> 
				<b><h:outputText value="Nom  :"/></b>  <h:outputText value="#{AvancegestatBean.employee.nom}" id="nom"/>				
				</h:panelGrid>
				
				</div><br/>
					
					
					<p:dataTable id="paie" var="avance"  
						value="#{AvancegestatBean.listAvenc}"  						 
						style="margin-bottom:10px" emptyMessage="aucune avance en cours"
						 >
						 
						 <p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b" value="Date" />
							</f:facet>
							<h:outputText style="font-size:12px " value="#{avance.dates}" id="dates"/>
						</p:column>
						
						<p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b" value="Poste" />
							</f:facet>
							<h:outputText style="font-size:12px " value="#{avance.caisse.poste}" id="poste"/>
						</p:column>
						
						<p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b" value="Manque" />
							</f:facet>
							<h:outputText style="font-size:12px " value="#{avance.montant_avances}" id="montant_manque"/>
						</p:column>
						  <p:columnGroup type="footer" style="border: 0px"  >
								<p:row styleClass="table">
								<p:column/><p:column/> <p:column footerText="#{AvancegestatBean.total}"/>
								</p:row>
								</p:columnGroup>
					</p:dataTable>
					

				</p:outputPanel>
			</h:form>
		 </p:panel>
		 </p:panel>
		 </h:body>
		 </html>
