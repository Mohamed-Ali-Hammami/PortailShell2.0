<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>

</h:head>

<h:body>




	<p:panel style="min-height:900px;margin-left: 20px;margin-right: 20px;">
		<ui:insert name="menu">
			<ui:include src="/shellgestat/Header.xhtml" />
		</ui:insert>
		<ui:insert name="menu">
			<ui:include src="/shellgestat/Headerg.xhtml" />
		</ui:insert>
		<p:panel id="basic2" closable="true"
			style="min-height:900px;margin-left: 50px;margin-right: 50px;background-image: url(../2.png)">
          <h:form>
           <p:commandButton value="Imprimer" ajax="false"
					style="width:200px;height:30;color:white;background-image:linear-gradient( #FAF281, red);font-size:12px">
					<p:printer target="imprimer" />
				</p:commandButton>
				
				<p:commandButton action="#{ArticleBean.validerregulationinventaire}" value="Valider" style="width:200px;height:30;color:white;background-image:linear-gradient( #FAF281, red);font-size:12px"/>
				<br/><br/>
			<p:outputPanel id="imprimer">
				<div align="center">
                   
                    
                   <b><h:outputText
							style="font-size:24px ;color:black"
							value="STATION SHELL SEDJOUMI " name="outTxtcin" />  
							
							 <h:outputText
							style="font-size:24px ;color:black"
							value="Régulation Inventaire Carburants " name="outTxtcin" /> </b>
                    

					


 
                             <br/><br/>
                             
                             	<p:remoteCommand name="refreshFooter2" update="emp:ttc" />
                             <p:dataTable id="emp" var="emp"   editable="true" editMode="cell"
								  value="#{ArticleBean.listArticlecarburant}"
								  selectionMode="single"
								selection="#{ArticleBean.articlecarburant}"								 
								rowKey="#{emp.id}" style="margin-bottom:10px"
								emptyMessage="aucun employer dans la base" >
								   
								    
						<p:ajax event="cellEdit" listener="#{ArticleBean.onCellEdit}"
							partialSubmit="true" partialSubmitFilter="true" />
									  
									  <p:column>
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="Code" />
									</f:facet>
									<h:outputText style="font-size:12px "
										value="#{emp.id}" />
								</p:column>
								
								<p:column>
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="Libelle" />
									</f:facet>
									<h:outputText style="font-size:12px "
										value="#{emp.nom}" />
								</p:column>

                                   <p:column>
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="Quantite Comptable" />
									</f:facet>
									<h:outputText style="font-size:12px "
										value="#{emp.quantites}" />
								</p:column>
									  
									  <p:column  >
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="Quantite Physique" />
									</f:facet>
								 
										
										<p:cellEditor>
										<f:facet name="output">
											<h:outputText style="font-size:12px "
												value="#{emp.qte}" id="qte" />
										</f:facet>
										<f:facet name="input">
											<p:inputText   value="#{emp.qte}"
												style="width:96%" >
												 
									 <p:ajax event="change" listener="#{ArticleBean.updatemontant}"
										process="@this" update="montant valeur qte" oncomplete="refreshFooter2();"
										 partialSubmit="true" />
												</p:inputText>
										</f:facet>

									</p:cellEditor>
								</p:column>
								
								   <p:column>
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="Difference" />
									</f:facet>
									<h:outputText style="font-size:12px "
										value="#{emp.montant}"  id="montant"/>
								</p:column>
								
								<p:column>
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="Valeur" />
									</f:facet>
									<h:outputText style="font-size:12px "
										value="#{emp.valeur}"  id="valeur"/>
								</p:column>
								
                      <f:facet name="footer">
					   TOTAL  :<h:outputText id="ttc" value="#{ArticleBean.total}" 
							  size="8" />
					   </f:facet>
									  </p:dataTable>
						 
				</div>
			</p:outputPanel>
			</h:form>
		 </p:panel>
		 </p:panel>
		 </h:body>
		 </html>
