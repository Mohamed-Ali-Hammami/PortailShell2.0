<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>

</h:head>

<h:body>




	<p:panel style="min-height:900px;margin-left: 20px;margin-right: 20px;">
		<ui:insert name="menu">
			<ui:include src="/shellgestat/Header.xhtml" />
		</ui:insert>
		<ui:insert name="menu">
			<ui:include src="/shellgestat/Headerg.xhtml" />
		</ui:insert>
		<p:panel id="basic2" closable="true"
			style="min-height:900px;margin-left: 50px;margin-right: 50px;background-image: url(../2.png)">

			<br />

			<h:form>
				<div align="center">
					<h:panelGrid columns="2">
						<p:commandButton title="imprimer" value="imprimer">

							<p:printer target="imprimer"></p:printer>
						</p:commandButton>
                

					</h:panelGrid>
					<br />
					 

				</div>
				<h:panelGroup id="imprimer">
					<p:outputPanel style="width:99%">
						<h:panelGrid columns="2">

							<H3>
								<b><h:outputText value="STATION SHELL SEDJOUMI" /> <h:outputText
										value="" /> <h:outputText
										value="DU #{CaisseBeans.dates}   #{CaisseBeans.poste}" id="d1" /></b>
										
										
							</H3>

						</h:panelGrid>
						<br />

                     
                    
						<table border="1" style="width: 70%">
							<tr>
								<td><h:outputText value="Pompe" style="font-size:12px" /></td>
								<td><h:outputText value="index Fermeture"
										style="font-size:12px" /></td>
								<td><h:outputText value="index Ouverture"
										style="font-size:12px" /></td>
								<td><h:outputText value="Quantite" style="font-size:12px" /></td>
								<td><h:outputText value="Prix de Vente"
										style="font-size:12px" /></td>
								<td><h:outputText value="Montant" style="font-size:12px" /></td>

							</tr>
							<ui:repeat var="c" value="#{CaisseBeans.ligneindex}">
								<tr>
									<td><h:outputText value="#{c.pompe.libelle}"
											style="font-size:12px" /></td>
									<td><h:outputText value="#{c.indexfermutures}"
											style="font-size:12px" /></td>
									<td><h:outputText value="#{c.indexouvertures}"
											style="font-size:12px" /></td>

									<td><h:outputText value="#{c.quantites}"
											style="font-size:12px" /></td>
									<td><h:outputText
											value="#{c.pompe.articlecarburant.prixventes}"
											style="font-size:12px" /></td>
									<td><h:outputText value="#{c.mantants}"
											style="font-size:12px" /></td>

								</tr>

							</ui:repeat>
							<tr>
								<td colspan="3"><h:outputText value="Totaux"
										style="font-size:12px" /></td>
								<td><h:outputText value="#{CaisseBeans.totalLitrages}"
										style="font-size:12px" /></td>
								<td />

								<td><h:outputText
										value="#{CaisseBeans.totalventecarburants}"
										style="font-size:12px" /></td>

							</tr>
						</table>
						<br />
                    
                     
					</p:outputPanel>
				</h:panelGroup> 
			</h:form>

		 </p:panel>
		 </p:panel>
		 </h:body>
		 </html>
