<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>

</h:head>

<h:body>
	<p:panel style="min-height:900px;margin-left: 20px;margin-right: 20px;">
		<ui:insert name="menu">
			<ui:include src="/shellgestat/Header.xhtml" />
		</ui:insert>
		<ui:insert name="menu">
			<ui:include src="/shellgestat/Headerg.xhtml" />
		</ui:insert>
		<h:form id="f">
			<p:panel id="basic2" closable="true"
				style="min-height:500px;margin-left: 50px;margin-right: 50px;background-image: url(../2.png)">
				<p:commandButton value="Imprimer"
					style="width:200px;height:30;color:white;background-image:linear-gradient( #FAF281, red);font-size:12px">
					<p:printer target="imprimers" />
				</p:commandButton>
				<p:outputPanel id="imprimers">
					<div align="center">
						<h5>
							<h:outputLabel value="EDITION DU CAHIER DE LITRAGE"
								style=" border-color: #5cb85c;font-color : green" />
							<br />
							<h:outputText
								value="DU  #{SituationBean.dates1} AU #{SituationBean.dates2}" />
							<br />

						</h5>
						<!--
				  <h:outputText value="#{b.dates}" style="font-size:14px "/> -->

						<style type="text/css">
.ui-dataGrid-no-border>.ui-datagrid-content {
	border: none;
}

.ui-datatable {
	border: 1px solid black;
}

.ui-datatable tbody tr {
	border: 1px solid black;
}

.ui-datatable tbody th {
	border: 1px solid black;
}
</style>
						<p:dataGrid var="c" value="#{SituationBean.listArticlecarburants}"
							styleClass="ui-dataGrid-no-border" rowIndexVar="rowid"
							columns="3" id="produits" style="width:100%">


							<p:dataTable var="b" value="#{c.listcumil}">


								<p:column rendered="#{rowid mod 3 ==0}">
									<f:facet name="header">
										<h:outputText value="Date" style="font-size:12px " />
									</f:facet>

									<p style="height: 11px">
										<h:outputText value="#{b.dates}" style="font-size:14px "
											rendered="#{rowid mod 3 ==0}" />
									</p>

								</p:column>

								<p:column rendered="#{rowid!=0}" style="border:none #important" 
									width="0%">

                                    <f:facet name="header">
										<h:outputText value="date" style="font-size:12px ;color :gris " />
									</f:facet>
									<p style="height: 11px">
										<h:outputText style="font-size:12px;color :white " value="date"
											rendered="#{rowid!=0}" />
									</p>

								</p:column>



								 
		<p:column   >
		<f:facet name="header" >
					<h:outputText value="#{c.nom}" style="font-size:10px " rendered="#{c.id != 2  and c.id != 3 }" />
				 
					 
					<h:outputText value="Super" style="font-size:12px " rendered="#{c.id ==2}"/> 
					<h:outputText value="50 PPM" style="font-size:12px " rendered="#{c.id ==3}"/>
						</f:facet>
						
		 <p style="height:11px">	 <h:outputText value="#{b.quantites}" style="font-size:14px "/></p>
		 	   
		</p:column>	
		
		 
	
		<p:column    >
		<f:facet name="header" >
					<h:outputText value="Cumul" style="font-size:12px " />
						</f:facet>
						
		  <p style="height:11px">		<h:outputText value="#{b.cumul}" style="font-size:14px "/> </p>
		 	   
		</p:column>
		
		<p:column    style="border:none #important"   rendered="#{rowid==3}" >
		      <f:facet name="header" >
					<h:outputText value="T.Journée" style="font-size:12px " />
						</f:facet>
						
		 	 <p style="height:11px">	     <h:outputText value="#{b.totaljournees}" style="font-size:14px "   /></p>
		 	   
		       </p:column>	
		       
		        <p:column rendered="#{rowid==3}"     >
		      <f:facet name="header" >
					<h:outputText value="Cumul" style="font-size:12px " />
						</f:facet>
						
		 	 <p style="height:11px">	     <h:outputText value="#{b.cumuljournees}" style="font-size:14px "  /></p>
		 	   
		       </p:column>	
		       
		
		 



							</p:dataTable>
							<p style="page-break-before: always"></p>

						</p:dataGrid>

					</div>
				</p:outputPanel>
			</p:panel>

		</h:form>
	</p:panel>
</h:body>

<style type="text/css">
.table {
	border-collapse: collapse;
	width: 100%;
}

.td {
	height: 30px;
	border: 1px solid black;
	text-align: center;
}
</style>
</html>
