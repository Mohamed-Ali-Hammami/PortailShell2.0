<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets">

    <h:panelGroup layout="block" styleClass="shell-module-layout gestat-shell-fragment">
        <ui:insert name="menu" />

        <h:form id="impressionClientForm">
            <h:panelGroup layout="block"
                style="min-height:900px; margin:0 20px; padding:24px; background-image:url(./2.png); background-size:cover; background-repeat:no-repeat;">

                <h:panelGroup layout="block"
                    style="min-height:900px; margin:0 30px; padding:24px; background:rgba(255,255,255,0.92);">

                    <h:panelGroup layout="block" style="text-align:center;">
                        <p:commandButton value="Imprimer"
                            ajax="false"
                            style="width:200px; height:30px; color:white; background-image:linear-gradient(#FAF281, red); font-size:12px;">
                            <p:printer target="imprimer" />
                        </p:commandButton>
                        <br />
                        <br />
                    </h:panelGroup>

                    <p:outputPanel id="imprimer" styleClass="cahiercredit-print">
                        <h:outputText value="CAHIER DE CREDIT CLIENTS" style="font-size:14px; font-weight:bold;" />
                        <br />
                        <br />

                        <ui:repeat var="client" value="#{ClientgestatBean.listclient}">
                            <h:panelGroup layout="block" styleClass="cahiercredit-client-block">

                            <table class="cahiercredit-client-table">
                                <tr>
                                    <td><h:outputText value="Code client" /></td>
                                    <td><h:outputText value="#{client.code}" /></td>
                                    <td><h:outputText value="Solde" /></td>
                                    <td><h3><h:outputText value="#{client.restes}" /></h3></td>
                                </tr>
                                <tr>
                                    <td><h:outputText value="Nom client" /></td>
                                    <td><h:outputText value="#{client.nom}" /></td>
                                    <td><h:outputText value="Tel" /></td>
                                    <td><h:outputText value="#{client.tel}" /></td>
                                </tr>
                            </table>

                            <p:dataTable var="credit"
                                value="#{ClientgestatBean.listcredits}"
                                emptyMessage="Aucun credit disponible"
                                style="width:100%;">

                                <p:column width="7%">
                                    <f:facet name="header">
                                        <h:outputText value="Date" style="font-size:12px;" />
                                    </f:facet>
                                    <p style="height:20px;">
                                        <h:outputText value="#{credit}" style="font-size:12px;" />
                                    </p>
                                </p:column>

                                <p:column headerText="CR/JOUR" width="48%">
                                    <h:outputText value=" " style="font-size:12px;" />
                                </p:column>

                                <p:column headerText="TOT Credit/J">
                                    <h:outputText value=" " style="font-size:12px;" />
                                </p:column>

                                <p:column headerText="Cumul">
                                    <h:outputText value=" " style="font-size:12px;" />
                                </p:column>

                                <p:column headerText="Paiement">
                                    <h:outputText value=" " style="font-size:12px;" />
                                </p:column>

                            </p:dataTable>
                            </h:panelGroup>

                            <h:panelGroup layout="block" styleClass="cahiercredit-pagebreak" />

                        </ui:repeat>

                    </p:outputPanel>

                </h:panelGroup>
            </h:panelGroup>

        </h:form>

    </h:panelGroup>
</ui:composition>
