<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets">
    <h:panelGroup layout="block" styleClass="shell-module-layout gestat-shell-fragment">
	<h:panelGroup layout="block"
            style="min-height:900px; margin:0 20px; padding:24px; background-image:url(./2.png); background-size:cover; background-repeat:no-repeat;">
<h:panelGroup layout="block"
                style="min-height:900px; margin:0 30px; padding:24px; background:rgba(255,255,255,0.92);">
				<h:form>
				<p:messages closable="true" autoUpdate="true" />
					<h:panelGroup layout="block" style="text-align:center;">
					
					<b><h:outputText value="ACCOMPTE OUVRIER" style="font-size:48px;color:white"/>
					</b>
						<table>
							<tr><td></td>
								<td ><p:commandButton value="Retour"
										style="width:200px;height:30px;color:white;background-image:linear-gradient( #FAF281, red);font-size:12px"
										action="#{AvancegestatBean.getAllavance}" /></td>

								
							</tr>
						</table>
					</h:panelGroup></h:form><h:form>
					<br/><br/>
					 
						 
							<h:panelGrid columns="1" cellpadding="5">
								 
								<h:outputText value="Employer : " style="font-size:12px" /> 
								<p:selectOneMenu  value="#{AvancegestatBean.nom}"  
						        style="width:200px;font-size:12px " id="emp" filter="true" filterMatchMode="contains"
						             >
						        
							    <f:selectItem itemLabel="Veuillez choisir un employer"  />
							     <f:selectItems value="#{AvancegestatBean.listeEmployee}" itemValue="#{e.nom}" var="e"  itemLabel="#{e.nom}"  />
							     <p:ajax listener="#{AvancegestatBean.getEmployeeByNom}" />							 
						         </p:selectOneMenu>
						         <p:messages for="emp"
												closable="true" autoUpdate="true" />
								 	
						         
								<h:outputText value="Montant : " style="font-size:12px" /> 
								<h:inputText style="font-size:12px" value="#{AvancegestatBean.montant}" id="montant"   required="true" requiredMessage="entrer montant " />
								<p:messages for="montant"
												closable="true" autoUpdate="true" />
								 
                               <p:commandButton value="Valider"
										style="width:200px;height:30px;color:white;background-image:linear-gradient( #FAF281, red);font-size:12px"
										action="#{AvancegestatBean.nouvellesAvances}" />
							</h:panelGrid>
						 
								  
	</h:form>
			 
			
			 </h:panelGroup>
			 </h:panelGroup>
			 
    </h:panelGroup>
</ui:composition>
