<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets">
    <h:panelGroup layout="block" styleClass="shell-module-layout gestat-shell-fragment">
 
	<h:panelGroup layout="block"
            style="min-height:900px; margin:0 20px; padding:24px; background-image:url(./2.png); background-size:cover; background-repeat:no-repeat;">
<h:panelGroup layout="block"
                style="min-height:900px; margin:0 30px; padding:24px; background:rgba(255,255,255,0.92);">

			<br />
			 
			<h:form>

				<h:panelGroup layout="block" style="text-align:center;">
					<h:panelGrid columns="2">
						<p:commandButton title="imprimer">
							 
							  <p:printer target="imprimer"></p:printer> 
						</p:commandButton>
					</h:panelGrid>
					<table>
						<tr>
							<td><h:outputText value="Date de début:"
									style="font-size:12px " /></td>
							<td><p:calendar id="popup" value="#{Rapportgestat.date1}"  pattern="dd/MM/yyyy" buttonTabindex="-1"  
  mask="99/99/-9999" placeholder="__/__/____" 
									 >
                                 	<p:ajax event="dateSelect"  />
								</p:calendar></td>

							<td><h:outputText value="Date de fin:"
									style="font-size:12px " /></td>
							<td><p:calendar id="popup2" value="#{Rapportgestat.date2}"  pattern="dd/MM/yyyy" buttonTabindex="-1"  
  mask="99/99/-9999" placeholder="__/__/____" 
									   >
                                   	<p:ajax event="dateSelect"  />
								</p:calendar></td>
						</tr>




						<tr>
							<td />
							<td><p:commandButton value="Valider" ajax="false"
									action="#{Rapportgestat.getrapportgestat}"
									style="width:150px;font-size:12px;height:30px;color:#0000ff;background-color:#abc8e2;" /></td>
						</tr>
					</table>

				</h:panelGroup>
				
				<p:outputPanel id="imprimer" style="width:99%">
				<h:outputText value="RAPPORT #{Rapportgestat.mois} #{Rapportgestat.annee} "  style=" font-style: italic;font-size: large;"/>
				 <br/>
				 
				<br/> <br/> 
				
				 <style type="text/css">
				    .ui-dataGrid-no-border>.ui-datagrid-content{
				    border:none;  
                       }
                       
                       
                    .ui-datatable {
                   border :1px solid black;
                   }
                   .ui-datatable tbody tr {
                  border :1px solid black;
                   }
 
                         .ui-datatable tbody th {
                         border :1px solid black;
                        }
                        .ui-datatable* {
                        border:0px ! important;  
                        }
                        
                        .old{
                        Font-Weight:Bold;
                        }
                   </style>	
				  
	  <p:dataTable var="sale" value="#{Rapportgestat.rapportpistes}" id="table" >

            <p:row>

                <p:column  headerText="BENEFICE"  />

                <p:column   headerText="Montant"  /> 
            </p:row>
            
       
            <p:row>

                  <p:column   headerText="MAISON"  style=" font-size:14px " />

            </p:row>
            
            <p:row>

            <!-- <p:row>
                <p:column   headerText="TABAC" style=" font-size:14px " />
                <p:column  headerText="#{Rapportgestat.rapportpiste.margetabac}" style=" font-size:12px "  />  
                
                   <p:column   headerText="Depense Nouvelle Station"  style=" font-size:14px " />
                <p:column   headerText="#{Rapportgestat.rapportpiste.depnouvelelstation}"  style=" font-size:12px " /> 
            </p:row>
             -->            
            
              
            
            <p:row>
                <p:column   headerText="GAZ" style=" font-size:14px " />

                <p:column   headerText="#{Rapportgestat.rapportpiste.stade}"  style=" font-size:12px " />  
            </p:row>

                <p:column   headerText="LAVAGE" style=" font-size:14px " />

                <p:column   headerText="VIDANGE" style=" font-size:14px " />
                <p:column  headerText="#{Rapportgestat.rapportpiste.margevidange}" style=" font-size:12px "  /> 
                  
            </p:row>
           
           
             
         </p:columnGroup>
         
          <p:column >
          <h:outputText value="Total"/>
          </p:column>
          
           <p:column >
          <h:outputText value="#{sale.totalbenifice}"/>
          </p:column>
          
           <p:column >
          <h:outputText value="Total"/>
          </p:column>
          
           <p:column >
          
          <h:outputText value="#{sale.totaldepense}"/>
          </p:column>
             <f:facet name="footer">
           
           BENEFICES Net <b>  <h:outputText value="#{Rapportgestat.rapportpiste.benificenets}"/></b> 
        </f:facet>
      
    </p:dataTable>
		  			 
								
							<p style="page-break-before:always"/>			 
								 
				
				<br/>
				
				<h:outputText value="ETAT des depenses de la Damille FATHI " style=" font-style: italic;font-size: large;"/>
				 
				<br/> <br/><br/><br/>
				
								<p:dataTable id="fd2" var="fd"
									value="#{Rapportgestat.listDepenseFathi}" widgetVar="articleTable"

									emptyMessage="aucune depense dans la base"  >

										<f:facet name="header">
											<h:outputText style="font-size:12px ;color:#483d8b"

										</f:facet>
										<h:outputText style="font-size:12px "
											value="#{fd.dates}" />
									</p:column>
									<p:column  >
										<f:facet name="header">
											<h:outputText style="font-size:12px ;color:#483d8b"

										<h:outputText style="font-size:12px "
											value="#{fd.libelle}" />
									</p:column>

								 <p:column  >
										<f:facet name="header">
											<h:outputText style="font-size:12px ;color:#483d8b"

											value="#{fd.montants}" />
									</p:column>
									
									
                                        
        
								 
									</p:dataTable>
									
									
									<br/>

				<br/> <br/><br/><br/>
				
								<p:dataTable id="fd3" var="fd"

									<br/>

				<h:outputText value="ETAT des depenses Par cheque " style=" font-style: italic;font-size: large;"/>
				 
				<br/> <br/><br/><br/>
				
							<p:dataTable id="cheque" var="cheque"

						</p:column>

						<p:column >
							<f:facet name="header">
								<h:outputText style="font-size:12px color:#483d8b"
									value="Banque" />
							</f:facet>

							 
									<h:outputText style="font-size:12px "
										value="#{cheque.banque}" />
								 
						</p:column>
						
				 
						<p:column  
							 >

									<h:outputText style="font-size:12px "
										value="#{cheque.libelle}" />
								 
						</p:column>
						
					  
						
						<p:column>

							</f:facet>

							 
									<h:outputText style="font-size:12px "
										value="#{cheque.dates}" />
								 
						</p:column>
						
						
						<p:column>

									<h:outputText style="font-size:12px "
										value="#{cheque.familledepense.libelle}" />
								 
						</p:column>
						 
                             <p:column>

							</f:facet>

							 
									<h:outputText style="font-size:12px "
										value="#{cheque.typeDepense}" />
								 
						</p:column>
						 


					 
					</p:dataTable>
									
								</p:outputPanel>
