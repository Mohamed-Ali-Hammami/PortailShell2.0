<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets">

    <h:panelGroup layout="block" styleClass="shell-module-layout gestat-shell-fragment">

        <ui:insert name="menu" />

        <h:form id="impressionEmployeeForm">

            <h:panelGroup layout="block"
                style="min-height:900px; margin:0 20px; padding:24px; background-image:url(./2.png); background-size:cover; background-repeat:no-repeat;">

                <h:panelGroup layout="block"
                    style="min-height:900px; margin:0 30px; padding:24px; background:rgba(255,255,255,0.92);">

                    <h:panelGroup layout="block" style="text-align:center;">
                        <p:commandButton value="Valider"
                            ajax="false"
                            style="width:200px; height:30px; color:white; background-image:linear-gradient(#FAF281, red); font-size:12px;">
                            <p:printer target="imprimer" />
                        </p:commandButton>
                        <br />
                        <br />
                        <br />
                    </h:panelGroup>

                    <p:outputPanel id="imprimer">

                        <style type="text/css">
                            .ui-dataGrid-no-border > .ui-datagrid-content {
                                border: none;
                            }

                            .ui-datatable {
                                border: 1px solid black;
                            }

                            .ui-datatable tbody tr {
                                border: 1px solid black;
                            }

                            .ui-datatable tbody th {
                                border: 1px solid black;
                            }

                            .ui-datatable * {
                                border: 0 !important;
                            }

                            .table {
                                border-collapse: collapse;
                                vertical-align: middle;
                                border-width: 0;
                                border-style: solid;
                                border-color: white;
                            }

                            .td {
                                border-style: solid;
                                border-collapse: collapse;
                                vertical-align: middle;
                                border-color: black;
                            }
                        </style>

                        <p:dataGrid id="produits"
                            var="c"
                            value="#{EmployeeBean.listEmp2}"
                            columns="5"
                            rowIndexVar="l"
                            style="width:100%;"
                            styleClass="ui-dataGrid-no-border">

                            <p:dataTable var="b" value="#{EmployeeBean.listcredits}">

                                <p:column width="18%" rendered="#{l mod 5 == 0}">
                                    <p style="height:21px;">
                                        <h:outputText value="#{b}"
                                            rendered="#{l mod 5 == 0}"
                                            style="font-size:12px;" />
                                    </p>
                                </p:column>

                                <p:column width="0%" rendered="#{l mod 5 != 0}" style="border:none !important;">
                                    <p style="height:21px;">
                                        <h:outputText value=" "
                                            style="font-size:12px;" />
                                    </p>
                                </p:column>

                                <p:column>
                                    <f:facet name="header">
                                        <p style="height:45px;">
                                            <b>
                                                <h:outputText value="#{c.nom}"
                                                    style="font-size:14px; color:black;" />
                                            </b>
                                            <br />
                                            <b>
                                                <h:outputText value="#{c.code}"
                                                    style="font-size:14px;" />
                                            </b>
                                        </p>
                                    </f:facet>

                                    <p style="height:21px;"></p>
                                    <h:outputText value=" " style="font-size:9px;" />
                                </p:column>

                            </p:dataTable>

                            <p style="page-break-before:always;"></p>

                        </p:dataGrid>

                    </p:outputPanel>

                </h:panelGroup>
            </h:panelGroup>

        </h:form>

    </h:panelGroup>
</ui:composition>
