<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets">

    <h:panelGroup layout="block" styleClass="shell-module-layout gestat-shell-fragment">
        <ui:insert name="menu" />

        <h:form id="cahierStockForm">
            <h:panelGroup layout="block"
                style="min-height:900px; margin:0 20px; padding:24px; background-image:url(./2.png); background-size:cover; background-repeat:no-repeat;">

                <h:panelGroup layout="block"
                    style="min-height:900px; margin:0 30px; padding:24px; background:rgba(255,255,255,0.92);">

                    <h:panelGroup layout="block" style="text-align:center;">
                        <p:commandButton value="Rafraichir"
                            ajax="false"
                            action="#{ProduitgestatBean.cahierstock}"
                            style="width:200px; height:30px; color:white; background-image:linear-gradient(#FAF281, red); font-size:12px;" />
                        <p:commandButton value="Imprimer"
                            ajax="false"
                            style="width:200px; height:30px; color:white; background-image:linear-gradient(#FAF281, red); font-size:12px;">
                            <p:printer target="imprimer" />
                        </p:commandButton>
                        <br />
                        <br />
                    </h:panelGroup>

                    <p:outputPanel id="imprimer">
                        <h:outputText value="CAHIER DE STOCK PRODUITS" style="font-size:14px; font-weight:bold;" />
                        <br />
                        <br />
                        <p:dataTable id="produits"
                            var="p"
                            value="#{ProduitgestatBean.listProduit}"
                            widgetVar="cahierStockTable"
                            emptyMessage="Aucun produit disponible"
                            style="width:100%;">

                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Code Shop" />
                                </f:facet>
                                <h:outputText value="#{p.codeshop}" />
                            </p:column>

                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Produit" />
                                </f:facet>
                                <h:outputText value="#{p.nom}" />
                            </p:column>

                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Depot" />
                                </f:facet>
                                <h:outputText value="#{p.quantitedepots}" />
                            </p:column>

                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Stock" />
                                </f:facet>
                                <h:outputText value="#{p.quantitestocks}" />
                            </p:column>

                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Total" />
                                </f:facet>
                                <h:outputText value="#{p.quantitetr}" />
                            </p:column>

                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Stock Initial" />
                                </f:facet>
                                <h:outputText value="#{p.stockinitial}" />
                            </p:column>
                        </p:dataTable>
                    </p:outputPanel>
                </h:panelGroup>
            </h:panelGroup>
        </h:form>
    </h:panelGroup>
</ui:composition>
