<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets">
    <h:panelGroup layout="block" styleClass="shell-module-layout gestat-shell-fragment">
	<h:panelGroup layout="block"
            style="min-height:900px; margin:0 20px; padding:24px; background-image:url(./2.png); background-size:cover; background-repeat:no-repeat;">
<h:panelGroup layout="block"
                style="min-height:900px; margin:0 30px; padding:24px; background:rgba(255,255,255,0.92);">

			<br />
			 
			<h:form>

				<h:panelGroup layout="block" style="text-align:center;">
					<h:panelGrid columns="2">
						<p:commandButton title="imprimer">
							 
							  <p:printer target="imprimer"></p:printer> 
						</p:commandButton>
					</h:panelGrid>
					<table>
						<tr>
							<td><h:outputText value="Date de début:"
									style="font-size:12px " /></td>
							<td><p:calendar id="popup" value="#{EtatBean.date1}"
									 >
                                 	<p:ajax event="dateSelect"  />
								</p:calendar></td>

							<td><h:outputText value="Date de fin:"
									style="font-size:12px " /></td>
							<td><p:calendar id="popup2" value="#{EtatBean.date2}"
									   >
                                   	<p:ajax event="dateSelect"  />
								</p:calendar></td>
						</tr>




						<tr>
							<td />
							<td><p:commandButton value="Valider" ajax="false"
									action="#{EtatBean.calculeretatdeprofil2}"
									style="width:150px;font-size:12px;height:30px;color:#0000ff;background-color:#abc8e2;" /></td>
						</tr>
					</table>

				</h:panelGroup>
				
				<p:outputPanel id="imprimer" style="width:99%">
				<h:outputText value="ETAT  DE PROFIL "  style=" font-style: italic;font-size: large;"/>
				 <br/>
				 <h:outputText value="DU #{EtatBean.dates1} AU  #{EtatBean.dates2} "  style=" font-style: italic;font-size: large;"/>
				<br/> <br/><br/><br/>
				  
								<p:dataTable id="fd" var="fd" editable="true" editMode="cell"
									value="#{EtatBean.listetatprofil}" widgetVar="articleTable"
									 
									rowKey="#{fd.id}" style="margin-bottom:10px"  rowIndexVar="rowId"
									emptyMessage="aucun cheque dans la base"  >
									
									<p:column  >
										<f:facet name="header">
											<h:outputText style="font-size:12px ;color:#483d8b"
												value="Nom" />
										</f:facet>
										<h:outputText style="font-size:12px "
											value="#{fd.article.nom}" />
									</p:column>
									<p:column  >
										<f:facet name="header">
											<h:outputText style="font-size:12px ;color:#483d8b"
												value="Quantite" />
										</f:facet>
											<p:cellEditor>
											<f:facet name="output">
										<h:outputText style="font-size:12px "
											value="#{fd.quantite}" id="qte" />
											</f:facet>
											<f:facet name="input">
											<h:inputText style="font-size:12px " valueChangeListener="#{EtatBean.handleChange1}"
											value="#{fd.quantites}" >
											<f:attribute name="test" value="#{rowId}" />
											<p:ajax event="change" update="qte vente marge"/>
											</h:inputText>
											</f:facet>
										</p:cellEditor>
									</p:column>

								 <p:column  >
										<f:facet name="header">
											<h:outputText style="font-size:12px ;color:#483d8b"
												value="Val vente" />
										</f:facet>
										<h:outputText style="font-size:12px " id="vente"
											value="#{fd.totalvente}" />
									</p:column>
									
									 <p:column  >
										<f:facet name="header">
											<h:outputText style="font-size:12px ;color:#483d8b"
												value="Marge" />
										</f:facet>
										<h:outputText style="font-size:12px " id="marge"
											value="#{fd.marge}" />
									</p:column>
									
									 <p:column  >
										<f:facet name="header">
											<h:outputText style="font-size:12px ;color:#483d8b"
												value="%" />
										</f:facet>
										<h:outputText style="font-size:12px "
											value="#{fd.pourcent}" />
									</p:column>
									
									 
								 
                                        
        <p:columnGroup type="footer">
            <p:row>
                <p:column   style="text-align:right" footerText="Total" />
                <p:column   style="text-align:right" footerText="#{EtatBean.totalquantite}" />
                <p:column footerText="#{EtatBean.totalvente}" />
                 <p:column footerText="#{EtatBean.totalmarge}" />
 
                 
            </p:row>
        </p:columnGroup>
								 
									</p:dataTable> 
									
									<br/>
									<h:panelGroup layout="block" style="text-align:center;">
									<p:commandButton value="Valider" ajax="false"
									action="#{EtatBean.validerProfil}"
									style="width:150px;font-size:12px;height:30px;color:#0000ff;background-color:#abc8e2;" /> 
					
									<br/> 
									</h:panelGroup>
				</p:outputPanel>
					 
			</h:form>

		 </h:panelGroup>
		 </h:panelGroup>
		 
    </h:panelGroup>
</ui:composition>
