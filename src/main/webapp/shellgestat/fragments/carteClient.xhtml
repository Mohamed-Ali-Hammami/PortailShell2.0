<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets">

    <h:panelGroup layout="block" styleClass="shell-module-layout gestat-shell-fragment">

        <h:form id="cartes">

            <h:panelGroup layout="block"
                style="min-height:900px; margin:0 20px; padding:24px; background-image:url(./2.png); background-size:cover; background-repeat:no-repeat;">

                <h:panelGroup layout="block"
                    style="min-height:900px; margin:0 30px; padding:24px; background:rgba(255,255,255,0.92);">

                    <h:panelGroup layout="block" style="text-align:right;">
                        <table>
                            <tr>
                                <td>
                                    <p:commandButton value="Nouvelle Carte"
                                        action="#{CarteClientBean.addcarteClient}"
                                        ajax="false"
                                        style="width:170px; font-size:12px; height:30px; color:white; background-image:linear-gradient(#FAF281, red);" />
                                </td>
                                <td>
                                    <p:commandButton value="Affecter Carte"
                                        action="#{CarteClientBean.affecterCarte}"
                                        ajax="false"
                                        style="width:170px; font-size:12px; height:30px; color:white; background-image:linear-gradient(#FAF281, red);" />
                                </td>
                                <td>
                                    <p:commandButton value="Historique"
                                        action="#{CarteClientBean.historiquecarteClient}"
                                        ajax="false"
                                        style="width:170px; font-size:12px; height:30px; color:white; background-image:linear-gradient(#FAF281, red);" />
                                </td>
                            </tr>
                        </table>
                    </h:panelGroup>

                    <br />

                    <p:growl id="msgs2" showDetail="true" />

                    <p:dataTable id="tableCartes"
                        var="c"
                        value="#{CarteClientBean.listcartes}"
                        filteredValue="#{CarteClientBean.filtercartes}"
                        rowKey="#{c.id}"
                        selectionMode="single"
                        selection="#{CarteClientBean.carte2}"
                        emptyMessage="aucune carte client">

                        <p:ajax event="rowEdit"
                            listener="#{CarteClientBean.onRowEdit}"
                            update=":cartes:msgs2" />

                        <p:column width="8%">
                            <f:facet name="header">
                                <h:outputText value="Code" />
                            </f:facet>
                            <h:outputText value="#{c.id}" />
                        </p:column>

                        <p:column width="20%">
                            <f:facet name="header">
                                <h:outputText value="Client" />
                            </f:facet>
                            <h:outputText value="#{c.client.nom}" />
                        </p:column>

                        <p:column width="15%">
                            <f:facet name="header">
                                <h:outputText value="Plafond" />
                            </f:facet>
                            <p:cellEditor>
                                <f:facet name="output">
                                    <h:outputText value="#{c.plafonds}" />
                                </f:facet>
                                <f:facet name="input">
                                    <p:inputText value="#{c.plafond}"
                                        style="width:96%;"
                                        required="true"
                                        requiredMessage="Plafond obligatoire">
                                        <f:validateDoubleRange minimum="0.0" />
                                    </p:inputText>
                                </f:facet>
                            </p:cellEditor>
                        </p:column>

                        <p:column width="15%">
                            <f:facet name="header">
                                <h:outputText value="Chauffeur" />
                            </f:facet>
                            <p:cellEditor>
                                <f:facet name="output">
                                    <h:outputText value="#{c.chauffeur}" />
                                </f:facet>
                                <f:facet name="input">
                                    <p:inputText value="#{c.chauffeur}" style="width:96%;" />
                                </f:facet>
                            </p:cellEditor>
                        </p:column>

                        <p:column width="15%">
                            <f:facet name="header">
                                <h:outputText value="Vehicule" />
                            </f:facet>
                            <p:cellEditor>
                                <f:facet name="output">
                                    <h:outputText value="#{c.vehicule}" />
                                </f:facet>
                                <f:facet name="input">
                                    <p:inputText value="#{c.vehicule}" style="width:96%;" />
                                </f:facet>
                            </p:cellEditor>
                        </p:column>

                        <p:column width="12%">
                            <f:facet name="header">
                                <h:outputText value="Date Affectation" />
                            </f:facet>
                            <p:cellEditor>
                                <f:facet name="output">
                                    <h:outputText value="#{c.dateaffectations}" />
                                </f:facet>
                                <f:facet name="input">
                                    <p:calendar value="#{c.dateaffectation}" pattern="dd/MM/yyyy" />
                                </f:facet>
                            </p:cellEditor>
                        </p:column>

                        <p:column width="7%">
                            <f:facet name="header">
                                <h:outputText value="Affectee" />
                            </f:facet>
                            <h:outputText value="#{c.affectee}" />
                        </p:column>

                        <p:column style="width:40px;">
                            <p:rowEditor />
                        </p:column>

                    </p:dataTable>

                    <br />

                    <p:commandButton value="Supprimer Carte"
                        action="#{CarteClientBean.deletecarteClient}"
                        ajax="false"
                        style="width:170px; font-size:12px; height:30px; color:white; background-image:linear-gradient(#FAF281, red);" />

                </h:panelGroup>
            </h:panelGroup>

        </h:form>

    </h:panelGroup>
</ui:composition>
