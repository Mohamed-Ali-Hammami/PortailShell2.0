<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets">
    <h:panelGroup layout="block" styleClass="shell-module-layout gestat-shell-fragment">
 
	<h:panelGroup layout="block"
            style="min-height:900px; margin:0 20px; padding:24px; background-image:url(./2.png); background-size:cover; background-repeat:no-repeat;">
<h:panelGroup layout="block"
                style="min-height:900px; margin:0 30px; padding:24px; background:rgba(255,255,255,0.92);">
		 
			 
					<h:form id="form">
					<h:panelGroup layout="block" style="text-align:center;">
					
					<p:commandButton value="Cahier de stock" ajax="false" action="#{ProduitgestatBean.cahierstock}"
						style="width:200px;height:30px;color:white;background-image:linear-gradient( #FAF281, red);font-size:12px">
						
					</p:commandButton>
					
					 <p:commandButton value="Imprimer" ajax="false"
						style="width:200px;height:30px;color:white;background-image:linear-gradient( #FAF281, red);font-size:12px">
						<p:printer target="imprimer" />
					</p:commandButton>
				</h:panelGroup>
				<br/>
			 	<p:outputPanel id="imprimer">
			 	<h:outputText value="List Produit dont le stock n'est pas valide"/><br/>
						   
						<p:dataTable id="produit" var="p"   
							value="#{ProduitgestatBean.listProduit2}"    
							widgetVar="ArticleTable"    						  
							emptyMessage="aucun produit dans le stock"  
							  >                                
							 <p:column >
								<f:facet name="header">
									<h:outputText style="font-size:12px color:#483d8b" value="Code" />
								</f:facet>
								<h:outputText style="font-size:12px " value="#{p.codeshop}" />
							</p:column>
							
						<p:column  >
								<f:facet name="header">
									<h:outputText style="font-size:12px color:#483d8b" value="Nom" />
								</f:facet>								
									 <h:outputText style="font-size:12px "
									value="#{p.nom}" /> 
							</p:column>
							
							<p:column   >
								<f:facet name="header">
									<h:outputText style="font-size:12px color:#483d8b" value="Quantite" />
								</f:facet>
								 <h:outputText style="font-size:12px "
									value="#{p.quantite}" /> 
								  
							</p:column>
							 
                             	  <p:column  >
								<f:facet name="header">
									<h:outputText style="font-size:12px color:#483d8b" value="Quantite Prevu " />
								</f:facet>
								
									 <h:outputText style="font-size:12px "
									value="#{p.quantiteprevu}" id="ach"/>
									 
									 
								 
							</p:column>
							
							    
						 
						</p:dataTable>
						</p:outputPanel>
						</h:form>
		 </h:panelGroup>
		 </h:panelGroup>
		 
    </h:panelGroup>
</ui:composition>
