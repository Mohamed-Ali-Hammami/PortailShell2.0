<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets">
    <h:panelGroup layout="block" styleClass="shell-module-layout gestat-shell-fragment">
	<h:panelGroup layout="block"
            style="min-height:900px; margin:0 20px; padding:24px; background-image:url(./2.png); background-size:cover; background-repeat:no-repeat;">
<h:panelGroup layout="block"
                style="min-height:900px; margin:0 30px; padding:24px; background:rgba(255,255,255,0.92);">


			<h:panelGroup layout="block" style="text-align:center;">

				  <fieldset style="margin-bottom: 20px; background-color: #eeeec6;">
						<legend>
							<b><h:outputText
									style="font-size:24px ;color:white;background-image:linear-gradient( #FAF281, red);"
									value="Mise A Jour Des Pompes " name="outTxtcin" /> </b>
						</legend>
						<h:panelGroup layout="block" style="text-align:center;">



								<h:form>
					<p:commandButton type="button" onclick="PF('switcher').previous();"
						icon="ui-icon-circle-triangle-w" id="prev" />
						<p:spacer width="50:px"/>
					<p:commandButton type="button" onclick="PF('switcher').next();"
						icon="ui-icon-circle-triangle-e" id="next" />
                      <br/><br/>
					<p:imageSwitch effect="wipe" widgetVar="switcher"
						id="manuelSwitcher" slideshowAuto="false">
						<ui:repeat value="#{ProduitgestatBean.listpompe}" var="s"
							id="manuelSwitcherImages">

							 
							<table>
									<tr>

										<td width="20%"><b><h:outputText value="N° Pompe :"
													style="font-size:12px " /></b></td>
										<td><h:inputText style="font-size:14px " id="id"
												size="30" value="#{s.id}"  
											  />  </td>
									</tr>
									
									<tr>

										<td width="20%"><b><h:outputText value="Libelle"
													style="font-size:12px " /></b></td>
										<td><h:inputText style="font-size:14px " id="libelle"
												size="30" value="#{s.libelle}" 
												  />  </td>
									</tr>
									
									<tr>

										<td width="20%"><b><h:outputText value="NomFamille"
													style="font-size:12px " /></b></td>
													
										<td width="20%"><b><h:inputText value="#{s.articlecarburant.nom}"
													style="font-size:12px" id="nom" /></b></td>
										<td><p:selectOneMenu
											value="#{ProduitgestatBean.libelle}" 
											style="width:200px;font-size:12px "  id="dep"
											filter="true" filterMatchMode="contains">
											<f:selectItem itemLabel="selectionner famille" />
											<f:selectItems value="#{ProduitgestatBean.listArticlecarburant}" var="f" itemLabel="#{f.nom}" itemValue="#{f.nom}"/>
											<f:ajax listener="#{ProduitgestatBean.getarticlebynom}" render="achat vente nom" >
											
											</f:ajax>

										</p:selectOneMenu>  </td>
									</tr>
									
									<tr>

										<td width="20%"><b><h:outputText value="Achat:"
													style="font-size:12px " /></b></td>
										<td><h:inputText style="font-size:14px " id="achat"
												size="30" value="#{s.articlecarburant.achat}" 
												  /> <p:messages
												for="achat" closable="true" autoUpdate="true" /></td>
									</tr>
									
										<tr>

										<td width="20%"><b><h:outputText value="Vente:"
													style="font-size:12px " /></b></td>
										<td><h:inputText style="font-size:14px " id="vente"
												size="30" value="#{s.articlecarburant.vente}" 
												  /> <p:messages
												for="vente" closable="true" autoUpdate="true" /></td>
									</tr>
									
									
									<tr>

										<td width="320px"><p:commandButton value="Modifier"
												ajax="false"
												style="width:150px;font-size:12px;height:30px;color:white;background-image:linear-gradient( #FAF281, red);"
												action="#{ProduitgestatBean.modifierPome}" >
												<f:setPropertyActionListener value="#{s}" target="#{ProduitgestatBean.pompe}"/>
												</p:commandButton>
												</td>
												
												 
									</tr>
									</table>
						</ui:repeat>
					</p:imageSwitch>
				
							 
								
							</h:form> 
						</h:panelGroup>
					</fieldset>
                       
			
			</h:panelGroup>

		 </h:panelGroup>
		 </h:panelGroup>
		 
    </h:panelGroup>
</ui:composition>
