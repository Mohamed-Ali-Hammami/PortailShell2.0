<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets">
    <h:panelGroup layout="block" styleClass="shell-module-layout gestat-shell-fragment">
	<h:panelGroup layout="block"
            style="min-height:900px; margin:0 20px; padding:24px; background-image:url(./2.png); background-size:cover; background-repeat:no-repeat;">
<h:panelGroup layout="block"
                style="min-height:900px; margin:0 30px; padding:24px; background:rgba(255,255,255,0.92);">


			<h:form id="f">

				<h:panelGroup layout="block" style="text-align:center;">
					<b><h:outputText value="Gestion de Credit Passation" /></b><br />
					<h:panelGrid columns="2">
					<h:outputLabel value="Numero "/>  
					<h:inputText value="#{CreditPassationBean.selectioncreditpasstion.numBon}"></h:inputText>
					
					
					<h:outputLabel value="Montant "/>  
					<h:inputText value="#{CreditPassationBean.selectioncreditpasstion.montant}"></h:inputText>
					
					
						
					<h:outputLabel value="Client "/>  
					  <p:selectOneMenu
											value="#{CreditPassationBean.nom}"  
											style="width:200px;font-size:12px "   id="dep"
											filter="true" filterMatchMode="contains">
											<f:selectItem itemLabel="selectionner Client" />
											<f:selectItems value="#{CreditPassationBean.listclientpassation}" var="n" itemLabel="#{n.nom}"  itemValue="#{n.nom}"/>
                                      <f:ajax listener="#{CreditPassationBean.getclientpasationByname}" render="tel nom avance"/>
										</p:selectOneMenu>
										
										
						
					<h:outputLabel value="Nom Client " />  
					<h:inputText value="#{CreditPassationBean.nom}" id="nom"/>					
					
					<h:outputLabel value="Avance " />  
					<h:inputText value="#{CreditPassationBean.avance}" id="avance"/>
					
					<h:outputLabel value="Num tel Client " />  
					<h:inputText value="#{CreditPassationBean.tel}" id="tel"/>					
					
					<h:outputLabel value="Suivant  " /> 
					<p:commandButton value="Suivant" action="#{CreditPassationBean.suivant}" ajax="false"/>
					
					<h:outputLabel value="Annuler " /> 
					<p:commandButton value="Annuler" action="#{CreditPassationBean.accesPassation}"/>
					
					</h:panelGrid>
					
					
					</h:panelGroup>
					</h:form>
					</h:panelGroup>
					</h:panelGroup>
					
    </h:panelGroup>
</ui:composition>
