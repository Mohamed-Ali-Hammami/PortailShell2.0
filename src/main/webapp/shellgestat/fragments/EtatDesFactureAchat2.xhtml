<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets">
    <h:panelGroup layout="block" styleClass="shell-module-layout gestat-shell-fragment">
	<h:panelGroup layout="block"
            style="min-height:900px; margin:0 20px; padding:24px; background-image:url(./2.png); background-size:cover; background-repeat:no-repeat;">
<h:panelGroup layout="block"
                style="min-height:900px; margin:0 30px; padding:24px; background:rgba(255,255,255,0.92);">
			<br />
			<br />
			<h:form>
				 
				<h:panelGroup layout="block" style="text-align:left;">
					<h:panelGrid columns="2">
						<h:commandLink title="imprimer">
							<p:graphicImage url="/images/imprimante-icone.png"
								style="width:25px" />
							<p:printer target="imprimer"></p:printer>
						</h:commandLink>
					</h:panelGrid>
					<table>


						<tr>
							<td><h:outputText value="Date 1" style="font-size:12px " /></td>
							<td><p:calendar value="#{AchatcarburantBean.date1}" id="popup" >
							 <p:ajax 
										event="dateSelect" update="imprimer" />
							</p:calendar>
							</td>

							<td><h:outputText value="Date 2" style="font-size:12px " /></td>
							<td><p:calendar value="#{AchatcarburantBean.date2}" id="popup2">
									<p:ajax listener="#{AchatcarburantBean.getetatFactureAchat2}"
										event="dateSelect" update="imprimer" />
								</p:calendar></td>
						</tr>

					</table>

				</h:panelGroup><br/><br/>
				 
				<p:outputPanel id="imprimer" style="width:99%">

					<table>
						<tr>
							<td><p:panel style="width:400px;">
									<h:panelGroup layout="block" style="text-align:left;">
										<b><h:outputText value="STATION SHELL SEDJOUMI "
												style="font-size:20px " /></b><br /> <b><h:outputText
												value="SIDI HASSINE " style="font-size:20px " /></b><br /> <b><h:outputText
												value="TVA : 805781/Q/P/C/000 " style="font-size:20px " /></b>
									</h:panelGroup>
								</p:panel></td>
							<td><p:graphicImage url="/images/images.png"
									style="width:200" /></td>
							<td><p:panel style="width:400px;">
									<h:panelGroup layout="block" style="text-align:left;">
										<b><h:outputText value="TEL : 71 590 360 / 92 519 806 "
												style="font-size:20px " /></b><br /> <b><h:outputText
												value="FAX : 71 934 700" style="font-size:20px " /></b><br />
										<b><h:outputText value="RIB : 10002001010839678839 TND"
												style="font-size:20px " /></b>
									</h:panelGroup>
								</p:panel></td>
						</tr>
					</table>
					<br />
					<h:panelGrid columns="4">
						<h:outputText value="Facture  Achats"
							style=" font-style: italic;font-size: large;" />



						<h:outputText value="Carburants"
							style=" font-style: italic;font-size: large;" />
						<h:outputText value="Du #{AchatcarburantBean.dates1}" id="date1"
							style=" font-style: italic;font-size: large;" />
						<h:outputText value=" Au  #{AchatcarburantBean.dates2}" id="date2"
							style=" font-style: italic;font-size: large;" />
					</h:panelGrid>

					<br />
					<br />
					<br />
					<br />


					<p:dataTable id="fd" var="fd" value="#{AchatcarburantBean.listachat}"
						widgetVar="articleTable" rowKey="#{fd.id}"
						style="margin-bottom:10px"
						emptyMessage="aucune depense dans la base">

						<p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b" value="Date" />
							</f:facet>
							<h:outputText style="font-size:12px "
								value="#{fd.factureachat.dates}" />
						</p:column>
						<p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="N°Facture" />
							</f:facet>
							<h:outputText style="font-size:12px "
								value="#{fd.factureachat.code}" />
						</p:column>

						<p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="Fournisseur" />
							</f:facet>
							<h:outputText style="font-size:12px "
								value="#{fd.fournisseur.nom}" />
						</p:column>

						<p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="Montant HT" />
							</f:facet>
							<h:outputText style="font-size:12px "
								value="#{fd.factureachat.totalhts}" />
						</p:column>

						<p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="Montant TVA" />
							</f:facet>
							<h:outputText style="font-size:12px "
								value="#{fd.factureachat.totaltvas}" />
						</p:column>

						<p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="Montant TTC" />
							</f:facet>
							<h:outputText style="font-size:12px "
								value="#{fd.factureachat.totalttcs}" />
						</p:column>

						<f:facet name="footer">
					   TOTAL HT  :<h:outputText id="ttc" value="#{AchatcarburantBean.totaCA}"
								size="8" />
								
								  TOTAL TVA  :<h:outputText id="ttc2" value="#{AchatcarburantBean.totaltva}"
								size="8" />
								
								  TOTAL TTC  :<h:outputText id="ttc3" value="#{AchatcarburantBean.totalProfil}"
								size="8" />
						</f:facet>

					</p:dataTable> 
				 
				</p:outputPanel>
				
				 
			</h:form>
		 </h:panelGroup>
		 </h:panelGroup>
		 
    </h:panelGroup>
</ui:composition>
