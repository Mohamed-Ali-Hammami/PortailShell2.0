<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets">

    <h:panelGroup layout="block" styleClass="shell-module-layout gestat-shell-fragment">

        <ui:insert name="menu" />

        <h:outputScript target="body">
            function init() {
                $('.inpdes').focus();
            }
        </h:outputScript>

        <h:form id="clientGestatForm">

            <h:panelGroup layout="block"
                style="min-height:900px; margin:0 20px; padding:24px; background-image:url(./2.png); background-size:cover; background-repeat:no-repeat;">

                <h:panelGroup layout="block"
                    style="min-height:900px; margin:0 30px; padding:24px; background:rgba(255,255,255,0.92); text-align:center;">

                    <fieldset style="margin-bottom:20px; background-color:#eeeec6;">
                        <legend>
                            <b>
                                <h:outputText value="Ajouter Client"
                                    style="font-size:14px; color:white; background-image:linear-gradient(#FAF281, red);" />
                            </b>
                        </legend>

                        <h:panelGroup layout="block" style="text-align:center;">

                            <table>
                                <tr>
                                    <td width="20%">
                                        <b><h:outputText value="Nom :" style="font-size:12px;" /></b>
                                    </td>
                                    <td>
                                        <h:inputText id="nom"
                                            value="#{ClientgestatBean.nom}"
                                            tabindex="1"
                                            size="30"
                                            style="font-size:14px;"
                                            styleClass="inpdes"
                                            required="true"
                                            requiredMessage="entrer nom client" />
                                        <p:messages for="nom" closable="true" autoUpdate="true" />
                                    </td>
                                </tr>

                                <tr>
                                    <td width="20%">
                                        <b><h:outputText value="Prenom :" style="font-size:12px;" /></b>
                                    </td>
                                    <td>
                                        <h:inputText id="prenom"
                                            value="#{ClientgestatBean.prenom}"
                                            tabindex="2"
                                            size="30"
                                            style="font-size:14px;" />
                                        <p:messages for="prenom" closable="true" autoUpdate="true" />
                                    </td>
                                </tr>

                                <tr>
                                    <td>
                                        <b><h:outputText value="Tel:" style="font-size:12px;" /></b>
                                    </td>
                                    <td>
                                        <h:inputText id="tel"
                                            value="#{ClientgestatBean.tel}"
                                            tabindex="3"
                                            size="30"
                                            style="font-size:14px;" />
                                    </td>
                                </tr>

                                <tr>
                                    <td>
                                        <b><h:outputText value="Ca:" style="font-size:12px;" /></b>
                                    </td>
                                    <td>
                                        <h:inputText id="compt"
                                            value="#{ClientgestatBean.ca}"
                                            tabindex="4"
                                            size="30"
                                            style="font-size:14px;" />
                                    </td>
                                </tr>

                                <tr>
                                    <td>
                                        <b><h:outputText value="Reste:" style="font-size:12px;" /></b>
                                    </td>
                                    <td>
                                        <h:inputText id="reste"
                                            value="#{ClientgestatBean.reste}"
                                            tabindex="5"
                                            size="30"
                                            style="font-size:14px;" />
                                    </td>
                                </tr>

                                <tr>
                                    <td width="320px">
                                        <p:commandButton value="Ajouter"
                                            action="#{ClientgestatBean.saveclient}"
                                            ajax="false"
                                            style="width:150px; font-size:12px; height:30px; color:white; background-image:linear-gradient(#FAF281, red);" />
                                    </td>
                                </tr>
                            </table>

                        </h:panelGroup>
                    </fieldset>

                </h:panelGroup>
            </h:panelGroup>

        </h:form>

    </h:panelGroup>
</ui:composition>
