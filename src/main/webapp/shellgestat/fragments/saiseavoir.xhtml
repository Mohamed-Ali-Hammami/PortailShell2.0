<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"

    <h:panelGroup layout="block" styleClass="shell-module-layout gestat-shell-fragment">
<script>
 	function init() {
		var index = 0;
         $('.inpdes').eq(index).focus();
	}
	
					function nextchs(input) {
						$(input).closest('td').next('td').find(
								'input[type=text]').focus();
					}

					function nextsch2(input) {
						$(document)
						.keypress(
								function(event) {
									var keycode = (event.keyCode ? event.keyCode
											: event.which);
									if (keycode == '13') {
					 $(input).closest('tr').next('tr').find('input[type=text]').first().focus();
						 
									}

								});
			}
					function nextsch3(input) {
						$(document)
						.keypress(
								function(event) {
									var keycode = (event.keyCode ? event.keyCode
											: event.which);
									if (keycode == '13') {
										 
						$(input).closest('td').next('td').find(
								'input[type=text]').focus();
						$(input).closest('td').next('td').find(
						'input[type=text]').select();
						return false;
									}

								});
			}

					function nextsch4(input) {
						$(input).closest('tr').next('tr').find(
								'input[type=text]').focus();
						// $(input).closest('td').next('td').find('input[type=text]').focus();
					}
				</script>
	<h:panelGroup layout="block"

<h:panelGroup layout="block"

			<h:form id="f">

			</legend>

				<p:ajax event="cellEdit" listener="#{AvoirBean.onCellEdit}"

					<p:column style="width:250px;">

							<h:inputText value="#{c.litrage}" onkeyup="nextsch2(this)"
