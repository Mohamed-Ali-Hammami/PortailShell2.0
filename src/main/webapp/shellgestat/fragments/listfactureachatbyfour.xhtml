<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets">
    <h:panelGroup layout="block" styleClass="shell-module-layout gestat-shell-fragment">
        <h:panelGroup layout="block"
            style="min-height:900px; margin:0 20px; padding:24px; background-image:url(./2.png); background-size:cover; background-repeat:no-repeat;">
            <h:panelGroup layout="block"
                style="min-height:900px; margin:0 30px; padding:24px; background:rgba(255,255,255,0.92);">
                <h:form id="f">
                    <h:panelGroup layout="block" style="text-align:center;">
                        <b><h:outputText value="Liste Des Factures Achats" style="font-size:20px;" /></b>
                        <br />
                        <h:panelGrid columns="2" cellpadding="5">
                            <p:outputLabel value="Fournisseur:" />
                            <p:selectManyMenu id="basic" value="#{AchatcarburantBean.listfours}"
                                style="width:300px;font-size:12px">
                                <f:selectItem itemLabel="selectionner fournisseur" />
                                <f:selectItems value="#{AchatcarburantBean.listfournisseur}" var="four"
                                    itemValue="#{four.nom}" itemLabel="#{four.nom}" />
                                <f:ajax listener="#{AchatcarburantBean.getFacturebyFour}" render="f" />
                            </p:selectManyMenu>
                        </h:panelGrid>
                    </h:panelGroup>

                    <br />
                    <p:dataTable id="f" var="p" value="#{AchatcarburantBean.listAchat}"
                        emptyMessage="aucune facture dans le stock" paginator="true"
                        rows="10" paginatorPosition="bottom">
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Numfac" />
                            </f:facet>
                            <h:outputText value="#{p.factureachat.code}" />
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Date" />
                            </f:facet>
                            <h:outputText value="#{p.factureachat.dates}" />
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Montant" />
                            </f:facet>
                            <h:outputText value="#{p.factureachat.totalttcs}" />
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Num achat" />
                            </f:facet>
                            <h:outputText value="#{p.id}" />
                        </p:column>
                    </p:dataTable>
                </h:form>
            </h:panelGroup>
        </h:panelGroup>
    </h:panelGroup>
</ui:composition>
