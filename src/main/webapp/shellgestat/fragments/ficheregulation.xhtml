<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets">
    <h:panelGroup layout="block" styleClass="shell-module-layout gestat-shell-fragment">
	<h:panelGroup layout="block"
            style="min-height:900px; margin:0 20px; padding:24px; background-image:url(./2.png); background-size:cover; background-repeat:no-repeat;">
<h:panelGroup layout="block"
                style="min-height:900px; margin:0 30px; padding:24px; background:rgba(255,255,255,0.92);">
          <h:form>
           <p:commandButton value="Imprimer" ajax="false"
					style="width:200px;height:30px;color:white;background-image:linear-gradient( #FAF281, red);font-size:12px">
					<p:printer target="imprimer" />
				</p:commandButton>
				<br/><br/>
			<p:outputPanel id="imprimer">
				<h:panelGroup layout="block" style="text-align:center;">                  
                    <h:panelGrid columns="3">
                   <b><h:outputText
							style="font-size:24px ;color:black"
							value="STATION SHELL SEDJOUMI " name="outTxtcin" /> </b><br/> 
							
							 <h:outputText
							style="font-size:20px ;color:black"
							value="Facture Carburants" name="outTxtcin" /> 
                    
                    
                          <h:outputText
							style="font-size:12px ;color:black"
							value="#{ArticleBean.dates}" name="outTxtcin" /> 
							
                         </h:panelGrid>
					


 
                             <br/><br/>

							<table border="1" style="width:100%">							
							<tr>

									 
								<td><b><h:outputText value="Nom"
												style="font-size:12px " /></b></td>				
								<td width="20%"><b><h:outputText value="Quantite"
												style="font-size:12px " /></b></td>	
												
												<td width="20%"><b><h:outputText value="Stock"
												style="font-size:12px " /></b></td>	
												
												<td width="20%"><b><h:outputText value="Achat"
												style="font-size:12px " /></b></td>	
												
								<td width="20%"><b><h:outputText value="Montant"
												style="font-size:12px " /></b></td>				
							</tr>
							<ui:repeat value="#{ArticleBean.listArticlecarburant}" var="s"
							id="manuelSwitcherImages">
								<tr>
								 
									<td><h:outputText style="font-size:14px " id="nom"
											size="30" value="#{s.nom}" /></td>
											
											<td><h:outputText style="font-size:14px " id="qte"
											size="30" value="#{s.quantite}" /></td>
											
											<td><h:outputText style="font-size:14px " id="vente"
											size="30" value="#{s.prixventes}" /></td>	
											
											<td><h:outputText style="font-size:14px " size="30"
											value="#{s.montant}" /></td>	
								</tr>	
															 
                                  </ui:repeat>

								  <tr>
								  <td  colspan="5" style=" text-align: right">
								  <b><h:outputText style="font-size:14px " size="30"
											value="#{ArticleBean.totals}" /></b>
											</td>
                                 </tr>

							</table>
							
					 
					
				</h:panelGroup>
			</p:outputPanel>
			</h:form>
		 </h:panelGroup>
		 </h:panelGroup>
		 
    </h:panelGroup>
</ui:composition>
