<script>
				function init() {
					var index = 0;
					$('.inpdes').eq(index).focus();
				}
				function initcar() {
					var index = 29;
					$('.inpdescar').eq(index).focus();
					$('.inpdescar').eq(index).select();

					$('.styletpe').focus();

	<h:panelGroup layout="block"
            style="min-height:900px; margin:0 20px; padding:24px; background-image:url(./2.png); background-size:cover; background-repeat:no-repeat;">
<h:form id="f"   >
			<h:panelGroup layout="block"
                style="min-height:900px; margin:0 30px; padding:24px; background:rgba(255,255,255,0.92);">

				<h:panelGroup layout="block" style="text-align:center;">
					<h1>
						<h:outputLabel value="Recapitulation Carburant"
							style=" border-color: #5cb85c;font-color : green" />
					</h1>
					<h:panelGrid columns="2">
				Date
				 
        <p:calendar id="popup" value="#{CaisseBeans.date}">

		 <p:ajax event="dateSelect" listener="#{CaisseBeans.getdates}" />
	    </p:calendar>
					</h:panelGrid>
					<h:panelGrid columns="2">Poste
				<p:selectOneRadio value="#{CaisseBeans.poste}"

							requiredMessage="choisir la poste">

							<f:selectItems value="#{CaisseBeans.postes}" />
							<f:ajax listener="#{CaisseBeans.getCaissebydate}" event="change"
								render="affiche fcar:ps fcar:dcs" />
						</p:selectOneRadio>
					</h:panelGrid>

				</h:panelGroup>

					<p:growl id="growl" />

							<tr>

								<td><h:panelGrid columns="2">
										<p:inputText size="8" readonly="true"
											value="#{CaisseBeans.caisse.totalventeCarburants}" />
										 
									</h:panelGrid></td>
								<td width="5%" />
								<td><h:outputLabel value="Total  Caisse " /></td>
								<td><p:inputText size="8" readonly="true" id="totalcaisses"
										value="#{CaisseBeans.totalcaisse}" /></td>
							</tr>

							<tr>
								<td>
									<!-- <h:outputLabel value="Total Magasin" /> -->
								</td>
								<td>
									<!-- <h:panelGrid columns="2">
										<p:inputText size="8"
											value="#{CaisseBeans.caisse.totalventesmagasin}" />
										<p:commandLink>
											<p:graphicImage url="/images/icone-actualiser.png"
												style="width:15px" />
										</p:commandLink>
									</h:panelGrid> -->
								</td>
								<td width="5%" />
								<td><h:outputLabel value="Observation " /></td>
								<td><p:inputText size="8" readonly="true" id="observations"
										value="#{CaisseBeans.observations}" /></td>
							</tr>

								<td><h:outputLabel value="Total Lavage" /></td>

										<p:inputText size="8"

										<p:commandLink>

												style="width:15px" />
										</p:commandLink>
									</h:panelGrid></td>
								<td width="5%" />
								<td />
							</tr>

						 -->

							<tr>

											value="#{CaisseBeans.caisse.totalDepenses}"
											id="totalDepenses" />

											process="@this" update="affiche depenses"
											actionListener="#{CaisseBeans.chargerfamilledepense}">
											<p:graphicImage url="/images/icone-actualiser.png"
												style="width:15px" />
										</p:commandLink>

									</h:panelGrid></td>
								<td width="5%" />


								<td>Mr.</td>
								<td><p:inputText size="8" id="p1" readonly="true"

										<p:ajax listener="#{CaisseBeans.getEmployeeByNom}"
											update="p1 p2 fcar:ppp3 fcar:p4" event="change"/>
									</p:selectOneMenu></td>
							</tr>



							<tr>

											process="@this" update="dataTable affiche"
											actionListener="#{CaisseBeans.chargerclient2}">

										</p:commandLink>
									</h:panelGrid></td>

								<td>Vous avez</td>

								<td>dans votre caisse</td>

										<p:commandLink onclick="PF('cheque').show();init();" process="@this"

											actionListener="#{CaisseBeans.chargercheque}">
											<p:graphicImage url="/images/icone-actualiser.png"
												style="width:15px" />

										</p:commandLink>
									</h:panelGrid></td>
								<td width="5%" />
								<td />
							</tr>

								<td>

								</td>
								<td>

										</p:commandLink>

												style="width:15px" />
										</p:commandLink>
									</h:panelGrid></td>

												style="width:15px" />

											update="affiche"
											actionListener="#{CaisseBeans.chargerespece}">
											<p:graphicImage url="/images/icone-actualiser.png"
												style="width:15px" />
										</p:commandLink>
									</h:panelGrid></td>
								<td width="5%" />
								<td><h:outputLabel value="Total Carte Bancaire" /></td>
								<td><h:panelGrid columns="3">
										<p:inputText size="8" readonly="true"

										<p:commandLink onclick="PF('cartebanque').show();initinput();"

											actionListener="#{CaisseBeans.chargertpe}">
											<p:graphicImage url="/images/icone-actualiser.png"
												style="width:15px" />
										</p:commandLink>
									</h:panelGrid></td>
							</tr>


							<tr>
								<td><h:outputLabel value="Retour Cuve " /></td>

											<p:graphicImage url="/images/icone-actualiser.png"
												style="width:15px" />
										</p:commandLink>
									</h:panelGrid></td>
								<td width="5%" />

											actionListener="#{CaisseBeans.chargerachat}">
											<p:graphicImage url="/images/icone-actualiser.png"
												style="width:15px" />
										</p:commandLink>
									</h:panelGrid></td>
							</tr>

				<p:dialog header="Saisie Vente Carburant" widgetVar="carburant"

					<ui:insert name="menu">

							src="/shellgestat/sousdosssier/saisieventecarburants.xhtml" />
					</ui:insert>
				</p:dialog>

				</p:dialog>

						<ui:include src="/shellgestat/sousdosssier/credit.xhtml" />

				</p:dialog>

						<ui:include src="/shellgestat/sousdosssier/saisiecheques.xhtml" />
					</ui:insert>

				</p:dialog>

					<ui:insert name="menu">
						<ui:include src="/shellgestat/sousdosssier/manqueouvrier.xhtml" />
					</ui:insert>

				</p:dialog>

					<ui:insert name="menu">
						<ui:include src="/shellgestat/sousdosssier/creditanterieur.xhtml" />
					</ui:insert>

				</p:dialog>
				<p:dialog header="Total TPE" widgetVar="tpe" modal="true" id="tpe"
