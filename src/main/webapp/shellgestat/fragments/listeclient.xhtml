<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets">
    <h:panelGroup layout="block" styleClass="shell-module-layout gestat-shell-fragment">
 
	<h:panelGroup layout="block"
            style="min-height:900px; margin:0 20px; padding:24px; background-image:url(./2.png); background-size:cover; background-repeat:no-repeat;">
	
<h:panelGroup layout="block"
                style="min-height:900px; margin:0 30px; padding:24px; background:rgba(255,255,255,0.92);">


			<h:form>
				<h:panelGroup layout="block" style="text-align:right;">
					<table>
						<tr>
							<td><p:commandButton value="Nouveau"
									action="#{ClientgestatBean.nouvauclient}" ajax="false"
									style="width:150px;font-size:12px;height:30px;color:white;background-image:linear-gradient( #FAF281, red);" /></td>

							  <td><p:commandButton value="Imprimer" ajax="false"   
								 
					style="width:200px;height:30px;color:white;background-image:linear-gradient( #FAF281, red);font-size:12px">
					 <p:printer target="affiche"/>
				</p:commandButton></td> 
						</tr>
					</table>
				</h:panelGroup>
				<p:outputPanel id="affiche">
			  
			
			<h:panelGroup layout="block" style="text-align:center;">
			 <H3><h:outputText value="ETAT DES CLIENTS EN DEPASSEMENTS"/></H3>
			             <h:outputText value="#{ClientgestatBean.dates1}"/>
					<p:growl id="msgs2" showDetail="true" />

					<p:dataTable id="Client" var="client" style="background:#a2b5bf"
						value="#{ClientgestatBean.listclient}"  
						widgetVar="cellClients"
						filteredValue="#{ClientgestatBean.filterclients}"
						emptyMessage="aucun client dans la liste"  
						  selectionMode="single"
						selection="#{ClientgestatBean.client2}" rowKey="#{client.code}">

						<p:ajax event="rowEdit" listener="#{ClientgestatBean.onRowEdit}"
						 />

						<p:column  width="8%" style="border: 0.5px #000000 solid;">
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="Code" />
							</f:facet>

							<p:cellEditor>
								<f:facet name="output">
									<h:outputText style="font-size:12px " value="#{client.code}" />
								</f:facet>
								<f:facet name="input">
									<p:inputText value="#{client.code}" style="width:96%" />
								</f:facet>

							</p:cellEditor>
						</p:column>

						<p:column  width="30%" style="border: 0.5px #000000 solid;"  >
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b" value="Nom" />
							</f:facet>
							<p:cellEditor>
								<f:facet name="output">
									<h:outputText style="font-size:12px " value="#{client.nom}" />
								</f:facet>
								<f:facet name="input">
									<p:inputText id="codeInput" value="#{client.nom}"
										style="width:96%" />
								</f:facet>

							</p:cellEditor>



						</p:column>





						<p:column   width="20%" style="border: 0.5px #000000 solid;">
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="Prenom" />
							</f:facet>
							<p:cellEditor>
								<f:facet name="output">
									<h:outputText style="font-size:12px " value="#{client.prenom}" />
								</f:facet>
								<f:facet name="input">
									<p:inputText value="#{client.prenom}" style="width:96%" />
								</f:facet>

							</p:cellEditor>



						</p:column>

						 
 


						


						<p:column style="border: 0.5px #000000 solid;">
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="Plafond" />
							</f:facet>

							<p:cellEditor>
								<f:facet name="output">
									<h:outputText style="font-size:12px " value="#{client.plafond}" />
								</f:facet>
								<f:facet name="input">
									<p:inputText value="#{client.plafond}" style="width:96%" />
								</f:facet>

							</p:cellEditor>
						</p:column>
						
						<p:column   style="border: 0.5px #000000 solid;">
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="Reste" />
							</f:facet>

						 
							<b> <h:outputText style="font-size:13px " value="#{client.restes}" /></b>
							 
						</p:column>


                          <f:facet name="footer">
					   TOTAL  :<h:outputText id="ttc" value="#{ClientgestatBean.totals}"
							size="8" />
					</f:facet>
                          
					</p:dataTable>
					</h:panelGroup>
					<br/>
					<h:panelGroup layout="block" style="text-align:center;">
					 <H3><h:outputText value="ETAT AVANCES CLIENTS"/></H3>
			
			 
					 


					<p:dataTable id="Client2" var="client" style="background:#a2b5bf"
						value="#{ClientgestatBean.listclient2}"  
						widgetVar="cellClients"
						filteredValue="#{ClientgestatBean.filterclients}"
						emptyMessage="aucun client dans la liste"  
						  selectionMode="single"
						selection="#{ClientgestatBean.client2}" rowKey="#{client.code}">

						<p:ajax event="rowEdit" listener="#{ClientgestatBean.onRowEdit}"
						 />

						<p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="Code" />
							</f:facet>

							<p:cellEditor>
								<f:facet name="output">
									<h:outputText style="font-size:12px " value="#{client.code}" />
								</f:facet>
								<f:facet name="input">
									<p:inputText value="#{client.code}" style="width:96%" />
								</f:facet>

							</p:cellEditor>
						</p:column>

						<p:column  >
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b" value="Nom" />
							</f:facet>
							<p:cellEditor>
								<f:facet name="output">
									<h:outputText style="font-size:12px " value="#{client.nom}" />
								</f:facet>
								<f:facet name="input">
									<p:inputText id="codeInput" value="#{client.nom}"
										style="width:96%" />
								</f:facet>

							</p:cellEditor>



						</p:column>





						<p:column  >
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="Prenom" />
							</f:facet>
							<p:cellEditor>
								<f:facet name="output">
									<h:outputText style="font-size:12px " value="#{client.prenom}" />
								</f:facet>
								<f:facet name="input">
									<p:inputText value="#{client.prenom}" style="width:96%" />
								</f:facet>

							</p:cellEditor>



						</p:column>

						 

						 



						<p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="Plafond" />
							</f:facet>

							<p:cellEditor>
								<f:facet name="output">
									<h:outputText style="font-size:12px " value="#{client.plafond}" />
								</f:facet>
								<f:facet name="input">
									<p:inputText value="#{client.plafond}" style="width:96%" />
								</f:facet>

							</p:cellEditor>
						</p:column>
						
						
						<p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="Reste" />
							</f:facet>

						 
									<b><h:outputText style="font-size:13px " value="#{client.restes}" /></b>
							 
						</p:column>



					 
                       
                          <f:facet name="footer">
					   TOTAL  :<h:outputText id="ttc" value="#{ClientgestatBean.totalants}"
							size="8" />
					</f:facet>
					</p:dataTable>
					</h:panelGroup>
</p:outputPanel>
 

			 <!-- 	<p:dialog header="Etat Clients En Depassements" widgetVar="etat" modal="true"
				id="etat" height="500" width="1100">
				<ui:insert name="menu">
					<ui:include src="/shellgestat/sousdosssier/imprimeretatclient.xhtml" />
				</ui:insert>
			</p:dialog> -->
			 
</h:form>
		 </h:panelGroup>
		 </h:panelGroup>
		 
    </h:panelGroup>
</ui:composition>
