<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	template="/WEB-INF/templates/app.xhtml">
	<f:metadata>
		<f:event type="preRenderView" listener="#{AccueilBean.gestat}" />
	</f:metadata>
	<ui:define name="title">Shell-Gestat</ui:define>
	<ui:define name="content">
		<h:panelGroup rendered="#{LoginBean.user.isAdmin()==true || LoginBean.user.isResponsableshops()==true}">
			<ui:include src="/shellgestat/indexg.xhtml" />
		</h:panelGroup>
		<h:panelGroup rendered="#{LoginBean.user.isAdmin()==false and LoginBean.user.isResponsableshops()==false}">
			<ui:include src="/unsecure/accessDenied.xhtml" />
		</h:panelGroup>
	</ui:define>
</ui:composition>
