<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>
	<title>Shell-Gestat</title>
</h:head>

<h:body style="background-color:#CECECE">

	<div align="center">
		<ui:insert name="menu">
			<ui:include src="Headerg.xhtml" />
		</ui:insert>
		<p:growl id="msgs" showDetail="true" />
		<p:panel id="basic"
			style="min-height:900px;margin-left: 50px;margin-right: 50px ;background-image: url(../2.png)">

			  <h:form id="f">
			 <h:panelGroup rendered="#{not empty AccueilBean.listemployee}">
		    <audio autoplay="autoplay" id="audioID" >
		<source src="AlarmeLS.wav" type="audio/mp3"/>
		</audio>
		</h:panelGroup>
			

				<div align="left">
					<p:commandButton title="imprimer" value="imprimer">
						<p:printer target="imprimer" />
					</p:commandButton>

				</div>
				<p:outputPanel id="imprimer">
					<div align="center">

						<h:outputText value="Liste Des Employées Qui Ont terminé leur Contrat De Travail" />
						<br /><br />
						<h:panelGroup rendered="#{empty AccueilBean.listemployee}">
							<h:outputText value="Aucun employe en fin de contrat a afficher." />
							<br /><br />
						</h:panelGroup>
						<p:dataTable id="article" var="p" value="#{AccueilBean.listemployee}"
							widgetVar="ArticleTable"
							emptyMessage="Aucun employe en fin de contrat">
                             
                             <p:column>
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b" value="Matricule" />
								</f:facet>
								<h:outputText style="font-size:12px " value="#{p.code}" id="code" />
							</p:column>
							<p:column>
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b" value="Nom" />
								</f:facet>
								<h:outputText style="font-size:12px " value="#{p.nom}" id="nom" />
							</p:column>
							
							<p:column>
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b" value="Date de contrat" />
								</f:facet>
								<h:outputText style="font-size:12px " value="#{p.datecontrat}" id="quantitestock" />
							</p:column>
							
							 
							
						 
						</p:dataTable>
					</div>

				</p:outputPanel>
			</h:form>
            
		</p:panel>
		</div>
 
</h:body>
</html>
