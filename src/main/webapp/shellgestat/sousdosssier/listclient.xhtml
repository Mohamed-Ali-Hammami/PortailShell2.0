<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
	<link type="text/css" rel="stylesheet" href="#{request.contextPath}/style.css" />

	<div tabindex="1" id="table_div">
		<p:dataTable widgetVar="table2"
			var="d"
			value="#{CaisseBeans.listclients}"
			selectionMode="single"
			selection="#{CaisseBeans.client}"
			id="dataTable3"
			rowKey="#{d.code}"
			filteredValue="#{CaisseBeans.filteredClients}"
			styleClass="shell-home-table">
			<p:column headerText="Code">
				<h:outputText value="#{d.code}" />
			</p:column>
			<p:column headerText="Nom">
				<h:outputText value="#{d.nom}" />
			</p:column>
		</p:dataTable>
	</div>

	<h:outputScript library="js" name="keyboard_navigation.js" />
</ui:composition>
