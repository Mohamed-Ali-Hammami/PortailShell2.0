
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>
	<meta http-equiv="content-type" content="text/html; charset=UTF-8"
		charset="UTF-8"></meta>
	<link type="text/css" rel="stylesheet" href="#{request.contextPath}/style.css" />
	<title>Shell-Sejoumi</title>

</h:head>
<h:body>
<h:form id="cb" prependId="false">
    
    <p:outputPanel id="dcb">
	<div align="center"  >

		<fieldset style="margin-bottom: 20px; background-color: #eeeec6;">
			<legend>
				<b> <h:outputText value="SAISIE DES CARTES BANCAIRES " />
				</b>

			</legend>
              <h:outputLabel id="cartesbancaires">
               
			<table>
                  <tr>
                  
                  <td><h:outputLabel value="Montant Total Carte Bancaires" /></td>
							<td> 
									<p:inputText size="8" id="mm"
										value="#{CaisseBeans.caisse.carteBanquaires}" />
								 
								 </td>
              </tr>
              <tr>
              
              <td>
          <h:outputLabel value="Montant Ã  ajouter" /> </td> <td>    <h:inputText size="8" id="m2" styleClass="styletpe" onkeyup="validercb(this);"
										value="#{CaisseBeans.totalcartebanqaire}" >
										<p:ajax listener="#{CaisseBeans.savecartebancaire}" update="f:affiche" />
										</h:inputText>
              </td>
              </tr>
			</table></h:outputLabel>



			<br /> <br />

			<p:commandButton value="Valider" update="totalcaisses" id="bcb" styleClass="butoncb"
				style="width:150px;font-size:12px;height:30;color:white;background-image:linear-gradient( #FAF281, red);"
				ajax="false" action="#{CaisseBeans.savecartebancaire}" />

<script>
				function validercb(input) {
					$(document)
					.keypress(
							function(event) {
								var keycode = (event.keyCode ? event.keyCode
										: event.which);
								if (keycode == '13') {
									if (input.value != "") {
										 $('.butoncb').click(); 
									}
								}
								  

							});
				}
				</script>

		</fieldset>




	</div>
	</p:outputPanel>
</h:form>

</h:body>
</html>
