			<script>
			
			function initnumbon(input) {
				var cell = $(input).parent("td");

				var row_index = $(cell).parent("tr");
				 //var row_index = $(input).closest("tr").index();
				  
	             $('.inpcredit2').eq(row_index).focus();
			}
			function initcredit() {
				 var index = 0
	             $('.inpcredit').eq(index).focus();
			}
				function nextscredit(input) {
					$(document).keypress(
							function(event) {
								var keycode = (event.keyCode ? event.keyCode
										: event.which);
								if (keycode == '13') {
									if (input.value != "") {
										//$(input).closest('td').next('td').find('input[type=text]').focus();	 
										$(input).closest('td').nextAll().eq(1)
												.find('input').focus()

										$(input).closest('td').nextAll().eq(1)
												.find('input').select();
									}
									return false;
									 
								}

							});
				}

				function nextscredit2(input) {
					$(document)
							.keypress(
									function(event) {
										var keycode = (event.keyCode ? event.keyCode
												: event.which);
										if (keycode == '13') {
											$(input).closest('tr').next('tr')
													.find('input[type=text]')
													.first().focus();
											
											$(input).closest('tr').next('tr')
											.find('input[type=text]')
											.first().select();
                                          return false;
										}

									});
				}

				function nextscredit3(input) {

					$(document).keypress(
							function(event) {
								var keycode = (event.keyCode ? event.keyCode
										: event.which);
								if (keycode == '13') {
									$(input).closest('td').next('td').find(
											'input[type=text]').focus();
									$(input).closest('td').next('td').find(
											'input[type=text]').select();
									return false;
								}

							});
				}
			</script>
			 
			<h:panelGrid columns="2">
			<p:commandButton value="Save credit" id="saveid" ajax="false"

			</p:commandButton>
			
			<b><h:outputText value="Pour supprimer un credit client il faut mettre le montant a zero " style="font-size:20px ;color:#483d8b"/></b>
