<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
	<link type="text/css" rel="stylesheet" href="#{request.contextPath}/style.css" />

	<p:commandButton value="Fermer"
		onclick="PF('carDialog1').hide();"
		oncomplete="initmanque();"
		styleClass="shell-action-button" />

	<div tabindex="1" id="table_div" style="margin-top: 18px;">
		<p:dataTable widgetVar="tables"
			var="d"
			value="#{CaisseBeans.listeEmployee}"
			selectionMode="single"
			selection="#{CaisseBeans.employee}"
			id="dataTable2"
			rowKey="#{d.matricule}"
			filteredValue="#{CaisseBeans.filteredEmployee}"
			styleClass="shell-home-table">
			<p:column headerText="Code">
				<h:outputText value="#{d.code}" />
			</p:column>
			<p:column headerText="Nom">
				<h:outputText value="#{d.nom}" />
			</p:column>
		</p:dataTable>
	</div>

	<h:outputScript library="js" name="keyboard_navigation.js" />
</ui:composition>
