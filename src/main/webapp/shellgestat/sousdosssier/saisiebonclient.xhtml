<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
	<link type="text/css" rel="stylesheet" href="#{request.contextPath}/style.css" />
	<p:dialog header="Saise Bon Client" widgetVar="carDialog"
		draggable="true" id="dialog" height="500" width="1000">
		<h:panelGroup id="display">
			<h:panelGrid columns="8" id="bonclients2">
				<h:outputLabel value="Date" />
				<p:calendar value="#{CaisseBeans.caisse.date}" />
				<h:outputLabel value="Poste" />
				<h:inputText value="#{CaisseBeans.poste}" />
				<h:outputLabel value="Client" />
				<h:inputText value="#{CaisseBeans.credit.client.nom}" />
				<h:outputLabel value="Bon N?" />
				<h:inputText value="#{CaisseBeans.credit.numbon}" />
			</h:panelGrid>
		</h:panelGroup>
	</p:dialog>
</ui:composition>
