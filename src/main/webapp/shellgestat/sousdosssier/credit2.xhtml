							<f:attribute name="test" value="#{rowId}" />
						</h:inputText>
						<h:inputText value="#{CaisseBeans.id}" id="idcredit"
							onkeyup="nextscredit(this);" rendered="#{d.client==null}"
							style="background-color:transparent;border:none;">
							<p:ajax update="nomc" vent="change" listener="#{CaisseBeans.updatenomclient}"

							</p:ajax>
							<f:attribute name="test" value="#{rowId}" />
						</h:inputText>

					</p:column>
					<p:column>
						<f:facet name="header">

						</f:facet>



						<h:outputText value="#{d.client.nom}" id="nomc" />




					</p:column>

					<p:column>
						<f:facet name="header">
							<h:outputText style="font-size:12px ;color:#483d8b"
								value="Montant_credit" />
						</f:facet>


						<h:inputText value="#{d.montant}" onkeyup="nextscredit3(this)"
							style="background-color:transparent;border:none;">
							<p:ajax event="change" oncomplete="refreshFootercredit();"
								listener="#{CaisseBeans.updatemontantcredit}" process="@this"
								  partialSubmit="true" />

						</h:inputText>

					</p:column>


					<p:column>
						<f:facet name="header">
							<h:outputText style="font-size:12px ;color:#483d8b"
								value="Num bon" />
						</f:facet>

						<h:inputText value="#{d.numbon}" onkeyup="nextscredit2(this)"
							style="background-color:transparent;border:none;">
							 

						</h:inputText>

					</p:column>




					<f:facet name="footer">
					   TOTAL  :<h:outputText id="ttccreditcli"
							value="#{CaisseBeans.totals}" size="8" />
					</f:facet>


				</p:dataTable>

				 
					
					

				<script>
					function nextscredit(input) {
						$(document)
								.keypress(
										function(event) {
											var keycode = (event.keyCode ? event.keyCode
													: event.which);
											if (keycode == '13') {
												if (input.value != "") {
													//$(input).closest('td').next('td').find('input[type=text]').focus();	 
													$(input).closest('td')
															.nextAll().eq(1)
															.find('input')
															.focus()
															
															$(input).closest('td')
															.nextAll().eq(1)
															.find('input')
															.select()
												}
												if (input.value == "") {
													alert("Code client inexistant");
												}

											}

										});
					}

					function nextscredit2(input) {
						$(document)
								.keypress(
										function(event) {
											var keycode = (event.keyCode ? event.keyCode
													: event.which);
											if (keycode == '13') {
												$(input).closest('tr').next(
														'tr').find(
														'input[type=text]')
														.first().focus();

											}

										});
					}

					function nextscredit3(input) {

						$(document)
								.keypress(
										function(event) {
											var keycode = (event.keyCode ? event.keyCode
													: event.which);
											if (keycode == '13') {
												$(input).closest('td').next(
														'td').find(
														'input[type=text]')
														.focus();
												$(input).closest('td').next(
														'td').find(
														'input[type=text]')
														.select();

											}

										});
					}
				</script>
