
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>
	<meta http-equiv="content-type" content="text/html; charset=UTF-8"
		charset="UTF-8"></meta>
	<link type="text/css" rel="stylesheet" href="#{request.contextPath}/style.css" />
	<title>Shell-Sejoumi</title>

</h:head>
<h:body>
 <h:form id="ftpe" prependId="false">
	<div align="center">

		<fieldset style="margin-bottom: 20px; background-color: #eeeec6;">
			<legend>
				<b> <h:outputText value="SAISIE TPE " />
				</b>

			</legend>

                <p:hotkey bind="Enter" handler="validertpe()" update="btpe"/>
			<table id="t">
                  <tr>
                  
                  <td><h:outputLabel value="Montant Total Des TPE" /></td>
							<td> 
									<p:inputText size="8"   id="carteShells"
										value="#{CaisseBeans.caisse.carteShells}" />
								 
								 </td>
              </tr>
              <tr>
               
              <td>
          <h:outputLabel value="Montant Ã  ajouter" /></td><td>   
           <p:inputText size="8" id="tpem3" styleClass="styletpe" onkeyup="validerstpe(this);"
										value="#{CaisseBeans.totalcarteshell}" >
										<p:ajax listener="#{CaisseBeans.savetpe}" update="f:affiche"/>
										</p:inputText>
              </td>
              </tr>
			</table>
            		 


			<br /> <br />

			<p:commandButton value="Valider" id="btpe" update="totalcaisses f:observations f:totalcaisses" styleClass="butontpe"
				style="width:150px;font-size:12px;height:30;color:white;background-image:linear-gradient( #FAF281, red);"
				ajax="false" action="#{CaisseBeans.savetpe}" />

		<script>
				 
					  
					function validerstpe(input) {

						$(document)
								.keypress(
										function(event) {
											var keycode = (event.keyCode ? event.keyCode
													: event.which);
											if (keycode == '13') {
												if (input.value != "") {
												$('.butontpe').click(); 
												 
												}
											}

										});
					}
				</script>
		</fieldset>




	</div>
 
</h:form>
</h:body>

</html>
