<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
	<h:outputStylesheet library="css" name="tokens.css" />
	<h:outputStylesheet library="css" name="app.css" />
	<h:outputStylesheet library="css" name="components.css" />
	<h:outputStylesheet library="css" name="utilities.css" />

	<h:form>
		<div class="app-header">
			<div class="app-brand">
				<p:graphicImage url="/images.png" styleClass="app-brand__logo" />
				<div>
					<h1 class="app-brand__title">Portail Shell</h1>
					<p class="app-brand__subtitle">Gestion multi-activites et acces rapide aux modules</p>
				</div>
			</div>

			<div class="app-nav">
				<p:commandButton value="TRANSPORT"
					type="button"
					styleClass="app-nav__button"
					onclick="window.location.href='#{request.contextPath}/SHELL-transport/index.xhtml'" />
				<p:commandButton value="SHOP"
					type="button"
					styleClass="app-nav__button"
					onclick="window.location.href='#{request.contextPath}/SHELL-shop/index.xhtml'" />
				<p:commandButton value="GESTAT"
					type="button"
					styleClass="app-nav__button"
					onclick="window.location.href='#{request.contextPath}/shellgestat/index.xhtml'" />
				<p:commandButton value="BANQUE"
					type="button"
					styleClass="app-nav__button"
					onclick="window.location.href='#{request.contextPath}/SHELL-banque/index.xhtml'" />
				<p:commandButton value="LAVAGE"
					type="button"
					styleClass="app-nav__button"
					onclick="window.location.href='#{request.contextPath}/SHELL-lavage/index.xhtml'" />
				<p:commandButton value="PAIE"
					type="button"
					styleClass="app-nav__button"
					onclick="window.location.href='#{request.contextPath}/shellpaie/index.xhtml'" />
			</div>

			<div class="app-user">
				<div class="app-user__card">
					<span class="app-user__label">Utilisateur connecte</span>
					<h:outputText styleClass="app-user__name"
						value="#{empty LoginBean.user ? 'Session active' : LoginBean.user.nom.concat(' !')}" />
				</div>
			</div>
		</div>
	</h:form>
</ui:composition>
