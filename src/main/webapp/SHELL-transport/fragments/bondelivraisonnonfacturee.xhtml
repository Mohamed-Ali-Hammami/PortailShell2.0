<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets">
	<h:panelGroup layout="block" styleClass="shell-module-layout transport-shell-fragment"
            style="min-height:900px; margin:0 20px; padding:24px; background-image:url(./2.png); background-size:cover; background-repeat:no-repeat;">
		 
		
		<h:panelGroup layout="block"
                style="min-height:900px; margin:0 30px; padding:24px; background:rgba(255,255,255,0.92);">
					<h:panelGroup layout="block" style="text-align:left;">
						<b> <h:outputText
								value="Liste des bons de livraison Non Facturés"
								style="color:#2e8b57;font-size:12px" />


						</b>
						<p:separator></p:separator>

						<h:form id="form">




							<table>


								<tr>
									<td><h:outputText value="Client" style="font-size:12px " /></td>
									<td><p:selectOneMenu value="#{FactureBean.clients}"
											style="width:200px;font-size:12px " id="client" filter="true"
											filterMatchMode="contains">
											<f:selectItem itemLabel="selectionner client" />
											<f:selectItems value="#{FactureBean.listeclient}" />

										</p:selectOneMenu></td>


									<td><p:commandButton value="Recherche"
											action="#{FactureBean.getBLnonfacturee2}"
											style="width:150px;font-size:12px ;height:30;color:#0000ff;background-color:#abc8e2;" /></td>


									<td width="800px" />

									<td>
										<!-- rendered="#{FactureBean.selectedsBl.size()>0}" --> <p:commandButton
											value="Retour" id="b" action="#{FactureBean.listbls}"
											style="width:100px;height:30;color:#0000ff;background-color:#abc8e2;">

										</p:commandButton>
									</td>
									<td>
										<!-- rendered="#{FactureBean.selectedsBl.size()>0}" --> <p:commandButton
											value="Facture" id="b2" action="#{FactureBean.facturelistbl}"
											style="width:100px;height:30;color:#0000ff;background-color:#abc8e2;">
											<f:setPropertyActionListener
												target="#{FactureBean.selectedsBl}"
												value="#{FactureBean.selectedsBl}" />
										</p:commandButton>
									</td>

								</tr>
							</table>
							<br />

							<p:growl showDetail="true" id="msgs" />
							<p:messages closable="true" autoUpdate="true" />
							<p:dataTable id="bl" var="bl"
								value="#{FactureBean.listbonlivraison}" widgetVar="blTable"
								style="background-color:#eeeec6" emptyMessage="aucun BL"
								selection="#{FactureBean.selectedsBl}" rowKey="#{bl.numero}"
								paginator="true" rows="20" paginatorPosition="bottom"
								resizableColumns="true" liveResize="true">



								<p:column selectionMode="multiple"
									style="width:16px;text-align:center" />


								<p:ajax event="rowSelect" listener="#{FactureBean.onRowSelect}" />
								<p:ajax event="rowUnselect"
									listener="#{FactureBean.onRowUnselect}" />
								<p:column filterBy="#{bl.codes}"
									style="width:95px;text-align:center" filterMatchMode="contains"
									filterStyle="font-size:13px;color:blue;text-align:center ">
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="Numero" />
									</f:facet>
									<h:outputText style="font-size:12px ;" value="#{bl.codes}" />

								</p:column>


								<p:column sortBy="#{bl.dates}">
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="Date" />
									</f:facet>
									<h:outputText style="font-size:12px " value="#{bl.dates}" />
								</p:column>
								<p:column style="width:400px">
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="Client" />
									</f:facet>
									<h:outputText style="font-size:12px ;color:#483d8b"
										value="#{bl.client.nom}" />
								</p:column>
								 

								<p:column>
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="Etat" />
									</f:facet>
									<h:outputText style="font-size:12px ;color:#483d8b"
										value="#{bl.status}" />
								</p:column>


								<p:column style="width:32px;text-align:center">
									<f:facet name="header">
										<h:outputText style="font-size:11px;color:#483d8b"
											value="visualiser" />
									</f:facet>
									<p:commandLink action="#{FactureBean.visualiserBL}"
										title="visualiser">
										<f:setPropertyActionListener value="#{bl}"
											target="#{FactureBean.selectedBL}" />
										<p:graphicImage url="/images/vis.png" style="width:40px" />
									</p:commandLink>
								</p:column>

								<p:column style="width:40px;text-align:center">

									<f:facet name="header">
										<h:outputText style="font-size:9px;color:#483d8b"
											value="supprimer" />
									</f:facet>

									<h:panelGroup layout="block" style="text-align:center;">
										<p:commandLink action="#{FactureBean.supprimerBL}"
											onclick="PF('suppressionDialog').show();"
											rendered="#{bl.status=='NonFacturée'}">
											<p:graphicImage url="/images/delete.png" />
											<f:setPropertyActionListener
												target="#{FactureBean.selectedBL}" value="#{bl}" />

											<p:confirm header="Confirmation"
												message="Voulez-vous vraiment supprimer le BL -"
												icon="ui-icon-alert" />
										</p:commandLink>
									</h:panelGroup>
								</p:column>
							</p:dataTable>
							<h:panelGroup layout="block" style="text-align:center;">
								<p:confirmDialog global="true" showEffect="fade"
									hideEffect="fade" style="width:150px"
									widgetVar="suppressionDialog">
									<h:panelGroup layout="block" style="text-align:center;">
										<p:commandButton value="oui" type="button"
											styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
										<p:commandButton value="Non" type="button"
											styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
									</h:panelGroup>
								</p:confirmDialog>
							</h:panelGroup>
							<br />


						</h:form>
					</h:panelGroup>

				 </h:panelGroup>
				 </h:panelGroup>
				 
</ui:composition>
