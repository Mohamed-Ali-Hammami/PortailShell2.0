<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets">
	<h:panelGroup layout="block" styleClass="shell-module-layout transport-shell-fragment"
            style="min-height:900px; margin:0 20px; padding:24px; background-image:url(./2.png); background-size:cover; background-repeat:no-repeat;">
		 
		
		<h:panelGroup layout="block"
                style="min-height:900px; margin:0 30px; padding:24px; background:rgba(255,255,255,0.92);">

			<br />
			<br />
			<br />
			<br />

			<h:form>
				<h:panelGroup layout="block" style="text-align:left;">
					<h:panelGrid columns="2">
						<h:commandLink title="imprimer">
							<p:graphicImage url="/images/imprimante-icone.png"
								style="width:25px" />
							<p:printer target="imprimer"></p:printer>
						</h:commandLink>
					</h:panelGrid>
					<table>
						<tr>
							<td><h:outputText value="à partir du :"
									style="font-size:12px " /></td>
							<td><p:calendar id="popup"
									value="#{FamilledepensetransportBean.date1}" size="10">
									<!-- <p:ajax update="etatvente  ttc ht tva timbre" listener="#{FamilledepensetransportBean.getetatventebydate1}"   /> -->
								</p:calendar></td>

							<td><h:outputText value="jusqu'au :" style="font-size:12px " /></td>
							<td><p:calendar id="popup2"
									value="#{FamilledepensetransportBean.date2}" size="10">
									<!--  <f:ajax listener="#{FamilledepensetransportBean.getetatventebydate}" render="etatvente  ttc ht tva timbre" />-->
								</p:calendar></td>
						</tr>




						<tr>
							<td />
							<td><p:commandButton value="Recherche"
									action="#{FamilledepensetransportBean.calculrapportcamion}"
									style="width:150px;font-size:12px;height:30;color:#0000ff;background-color:#abc8e2;" /></td>
						</tr>
					</table>

				</h:panelGroup>

				<p:outputPanel id="imprimer" style="width:99%">
					<h:outputText
						value="RAPPORT CAMION du #{FamilledepensetransportBean.dates1} #{FamilledepensetransportBean.dates2}"
						style=" font-style: italic;font-size: large;" />

					<br />
					<br />
					<br />
					<br />

					<p:dataTable id="fd" var="fd"
						value="#{FamilledepensetransportBean.listcarburant}"
						widgetVar="articleTable" rowKey="#{fd.id}"
						style="margin-bottom:10px"
						emptyMessage="aucune depense dans la base">

						<p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="N° Véhicule" />
							</f:facet>
							<h:outputText style="font-size:12px " value="#{fd.matricule}" />
						</p:column>
						<p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="Dépense carburant" />
							</f:facet>
							<h:outputText style="font-size:12px "
								value="#{fd.depensecarburants}" />
						</p:column>

						<p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="Autres Dépenses" />
							</f:facet>
							<h:outputText style="font-size:12px " value="#{fd.autredepenses}" />
						</p:column>

						<p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="Salaires chauffeurs" />
							</f:facet>
							<h:outputText style="font-size:12px "
								value="#{fd.salairchauffeurs}" />
						</p:column>

						<p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b" value="N CH" />
							</f:facet>
							<h:outputText style="font-size:12px " value="#{fd.chauffeur}" />
						</p:column>

						<p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="Total Dépenses" />
							</f:facet>
							<h:outputText style="font-size:12px " value="#{fd.totaldepenses}" />
						</p:column>

						<p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="Total Transport" />
							</f:facet>
							<h:outputText style="font-size:12px "
								value="#{fd.totaltransports}" />
						</p:column>

						<p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b" value="D.F" />
							</f:facet>
							<h:outputText style="font-size:12px " value="#{fd.dfs}" />
						</p:column>


						<p:columnGroup type="footer">
							<p:row>
								<p:column style="text-align:center" footerText="TOTAL" />
								<p:column style="text-align:center"
									footerText="#{FamilledepensetransportBean.totalcarburants}" />
								<p:column style="text-align:center"
									footerText="#{FamilledepensetransportBean.totalautrecarburants}" />

								<p:column style="text-align:center"
									footerText="N#{FamilledepensetransportBean.totalsalaires}" />
								<p:column style="text-align:center" footerText="######" />
								<p:column footerText="#{FamilledepensetransportBean.totaldepenses}"
									style="text-align:center" />

								<p:column style="text-align:center"
									footerText="N#{FamilledepensetransportBean.totaltransports}" />
								<p:column style="text-align:center"
									footerText="#{FamilledepensetransportBean.totaldfs}" />



							</p:row>
						</p:columnGroup>

					</p:dataTable>
				</p:outputPanel>
			</h:form>
		</h:panelGroup>
	</h:panelGroup>
</ui:composition>
