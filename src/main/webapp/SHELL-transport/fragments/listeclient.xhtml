<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets">
	<h:panelGroup layout="block" styleClass="shell-module-layout transport-shell-fragment"
            style="min-height:900px; margin:0 20px; padding:24px; background-image:url(./2.png); background-size:cover; background-repeat:no-repeat;">
	 
		
		<h:panelGroup layout="block"
                style="min-height:900px; margin:0 30px; padding:24px; background:rgba(255,255,255,0.92);">	 
			<h:form>
				<h:panelGroup layout="block" style="text-align:right;"> 
				<table>
							<tr>	
								 	<td><p:commandButton value="Nouveau"
										action="#{ClientBean.nouvauclient}" ajax="false"
										style="width:150px;font-size:12px;height:30;color:white;background-image:linear-gradient( #FAF281, red);" /></td>
                       

							</tr>
							</table></h:panelGroup>
							</h:form>
					<h:panelGroup layout="block" style="text-align:center;"> 
						<h:form id="form">
							<p:growl id="msgs" showDetail="true" />
							 
							<p:dataTable id="Client" var="client" style="background:#a2b5bf"
								value="#{ClientBean.listclient}" editable="true"
								widgetVar="cellClients" filteredValue="#{ClientBean.filterclients}"
								emptyMessage="aucun client dans la liste" paginator="true"
								rows="10" paginatorPosition="bottom" selectionMode="single"
								selection="#{ClientBean.client2}" rowKey="#{client.code}">

								<p:ajax event="rowEdit" listener="#{ClientBean.onRowEdit}"
									update=":form:msgs" />
								 

								<p:column filterBy="#{client.nom}" filterMatchMode="contains"
									filterStyle="font-size:12px ;color:blue;" width="400px">
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="Nom" />
									</f:facet>
									<p:cellEditor>
										<f:facet name="output">
											<h:outputText style="font-size:12px " value="#{client.nom}" />
										</f:facet>
										<f:facet name="input">
											<p:inputText id="codeInput" value="#{client.nom}"
												style="width:96%" />
										</f:facet>

									</p:cellEditor>
									
									

								</p:column>
								<p:column>
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="Tel" />
									</f:facet>

									<p:cellEditor>
										<f:facet name="output">
											<h:outputText style="font-size:12px "
												value="#{client.tel}" />
										</f:facet>
										<f:facet name="input">
											<p:inputText   value="#{client.tel}"
												style="width:96%" />
										</f:facet>

									</p:cellEditor>
								</p:column>
								
								<p:column>
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="Mf" />
									</f:facet>

									<p:cellEditor>
										<f:facet name="output">
											<h:outputText style="font-size:12px "
												value="#{client.mf}" />
										</f:facet>
										<f:facet name="input">
											<p:inputText   value="#{client.mf}"
												style="width:96%" />
										</f:facet>

									</p:cellEditor>
								</p:column>
								<p:column>
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="Adresse" />
									</f:facet>

									<p:cellEditor>
										<f:facet name="output">
											<h:outputText style="font-size:12px "
												value="#{client.adresse}" />
										</f:facet>
										<f:facet name="input">
											<p:inputText id="adresseInput" value="#{client.adresse}"
												style="width:96%" />
										</f:facet>

									</p:cellEditor>
								</p:column>
								
								<p:column>
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="Ca" />
									</f:facet>

									<p:cellEditor>
										<f:facet name="output">
											<h:outputText style="font-size:12px "
												value="#{client.compteur}" />
										</f:facet>
										<f:facet name="input">
											<p:inputText   value="#{client.compteur}"
												style="width:96%" />
										</f:facet>

									</p:cellEditor>
								</p:column>

                                 <p:column>
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="Code client" />
									</f:facet>

									<p:cellEditor>
										<f:facet name="output">
											<h:outputText style="font-size:12px "
												value="#{client.code}" />
										</f:facet>
										<f:facet name="input">
											<p:inputText   value="#{client.code}"
												style="width:96%" />
										</f:facet>

									</p:cellEditor>
								</p:column>
                                 
                                  <p:column>
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="nbre" />
									</f:facet>

									<p:cellEditor>
										<f:facet name="output">
											<h:outputText style="font-size:12px "
												value="#{client.nbre}" />
										</f:facet>
										<f:facet name="input">
											<p:inputText   value="#{client.nbre}"
												style="width:96%" />
										</f:facet>

									</p:cellEditor>
								</p:column>
                                 
                                    <p:column>
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="transport" />
									</f:facet>

									<p:cellEditor>
										<f:facet name="output">
											<h:outputText style="font-size:12px "
												value="#{client.transport}" />
										</f:facet>
										<f:facet name="input">
											<p:inputText   value="#{client.transport}"
												style="width:96%" />
										</f:facet>

									</p:cellEditor>
								</p:column>
								
								<p:column style="width:40px;text-align:center">
									<f:facet name="header">
										<h:outputText style="font-size:9px;color:#483d8b"
											value="supprimer" />
									</f:facet>
									<h:panelGroup layout="block" style="text-align:center;">
										<p:commandLink action="#{ClientBean.deleteclient}"
											onclick="PF('suppressionDialog').show();">
											<p:graphicImage url="/images/delete.png" />

											<f:setPropertyActionListener target="#{ClientBean.client2}"
												value="#{client}" />

											<p:confirm header="Confirmation"
												message="Voulez-vous vraiment supprimer le client ?"
												icon="ui-icon-alert" />
										</p:commandLink>
									</h:panelGroup>
								</p:column>


								<p:column style="width:40px">
									<f:facet name="header">
										<h:outputText style="font-size:9px;color:#483d8b"
											value="modifier" />
									</f:facet>
									<p:rowEditor />
								</p:column>
							</p:dataTable>

							<h:panelGroup layout="block" style="text-align:center;">
								<p:confirmDialog global="true" showEffect="fade"
									hideEffect="fade" style="width:150px"
									widgetVar="suppressionDialog">
									<h:panelGroup layout="block" style="text-align:center;">
										<p:commandButton value="oui" type="button"
											styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
										<p:commandButton value="Non" type="button"
											styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
									</h:panelGroup>
								</p:confirmDialog>
							</h:panelGroup>

						</h:form>
					</h:panelGroup>
				 
		 </h:panelGroup>
		 </h:panelGroup>
		 
</ui:composition>
