<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets">
	<h:panelGroup layout="block" styleClass="shell-module-layout transport-shell-fragment"
            style="min-height:900px; margin:0 20px; padding:24px; background-image:url(./2.png); background-size:cover; background-repeat:no-repeat;">
		 
		
		<h:panelGroup layout="block"
                style="min-height:900px; margin:0 30px; padding:24px; background:rgba(255,255,255,0.92);">	
					<h:form>
					<fieldset style="margin-bottom: 20px; background-color: #eeeec6;">
<legend>
<b><h:outputText style="font-size:14px ;color:white;background-image:linear-gradient( #FAF281, red);"
value="MAJ CAMION " name="outTxtcin" /> <h:outputText value="#{VheculeBean.vhecule2.matricule}"
												style="font-size:12px " /></b>
</legend>
 <h:panelGroup layout="block" style="text-align:center;">
    
 
	<h:form>
	<table>
	<tr>

										<td width="20%"><b>
										
										<h:outputText value="Date Asurance :"
												style="font-size:12px " /></b></td>
										<td><p:calendar style="font-size:14px " id="date1" size="30"
												value="#{VheculeBean.date1}" required="true" pattern="dd-MM-yyyy" mask="true"
												requiredMessage="entrer date assurance" /> <p:messages for="date1"
												closable="true" autoUpdate="true" /></td>
									</tr>
									<tr>
									<td>
										<b><h:outputText value="Date Visite :"
												style="font-size:12px " /></b></td>
										<td><p:calendar style="font-size:14px " id="date2" size="30" pattern="dd-MM-yyyy" mask="true"
												value="#{VheculeBean.date3}" required="true"
												requiredMessage="entrer date visite" /> <p:messages for="date2"
												closable="true" autoUpdate="true" /></td>
									</tr>
									
									<tr>
									<td>
										<b><h:outputText value="Date Quittance :"
												style="font-size:12px " /></b></td>
										<td><p:calendar style="font-size:14px " id="date3" size="30" pattern="dd-MM-yyyy" mask="true"
												value="#{VheculeBean.date2}" required="true"
												requiredMessage="entrer date Quittace" /> <p:messages for="date3"
												closable="true" autoUpdate="true" /></td>
									</tr>

									
									<tr>
								 
										<td width="320px"><p:commandButton value="Modifier"
												ajax="false"
												style="width:150px;font-size:12px;height:30;color:white;background-image:linear-gradient( #FAF281, red);" 
												action="#{VheculeBean.modifierDate}" /></td>
												<td width="320px"><p:commandButton value="Retour"
												ajax="false"
												style="width:150px;font-size:12px;height:30;color:white;background-image:linear-gradient( #FAF281, red);" 
												action="#{VheculeBean.getvhecule}" /></td>
									</tr>
								</table>

							</h:form></h:panelGroup>
						</fieldset>
					</h:form>
			 </h:panelGroup>
			 </h:panelGroup>
			 
</ui:composition>
