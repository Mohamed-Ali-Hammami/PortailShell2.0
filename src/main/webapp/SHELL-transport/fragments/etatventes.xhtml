<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets">
	<h:panelGroup layout="block" styleClass="shell-module-layout transport-shell-fragment"
            style="min-height:900px; margin:0 20px; padding:24px; background-image:url(./2.png); background-size:cover; background-repeat:no-repeat;">
	 
		
		<h:panelGroup layout="block"
                style="min-height:900px; margin:0 30px; padding:24px; background:rgba(255,255,255,0.92);">
			<br />
			<br />
			<br />
			<br />
			<h:panelGroup layout="block" style="text-align:left;">
				<b><h:outputText value="ETAT DE LA FACTURATION"
						style="font-size:12px ;color:#2e8b57" /></b>
				<p:separator />
			</h:panelGroup>
			<h:panelGroup layout="block" style="text-align:center;">
				<h:form>
					<p:messages closable="true" autoUpdate="true" />


					<table>
						<tr>
							<td><h:outputText value="Edition à partir du :"
									style="font-size:12px " /></td>
							<td><p:calendar id="popup" value="#{EtattransportBean.date1}" 
									size="10">
                                  <f:ajax event="dateSelect"/>
								</p:calendar></td>

							<td><h:outputText value="Edition jusqu'au :"
									style="font-size:12px " /></td>
							<td><p:calendar id="popup2" value="#{EtattransportBean.date2}"
									size="10">
                               <f:ajax event="dateSelect"/>
								</p:calendar></td>
						</tr>


						<tr>
							<td><h:outputText value="Client" style="font-size:12px " /></td>
							<td><p:selectOneMenu value="#{EtattransportBean.clients}"
									style="width:200px;font-size:12px " id="client" filter="true"
									filterMatchMode="contains">
									<f:selectItem itemLabel="selectionner client" />
									<f:selectItems value="#{EtattransportBean.listeclient}" />

								</p:selectOneMenu></td>

							<td />
							<td><p:commandButton value="Recherche"
									action="#{EtattransportBean.getetatventebydate}"
									style="width:150px;font-size:12px;height:30;color:#0000ff;background-color:#abc8e2;" /></td>
						</tr>
					</table>

					<br />
					<p:separator />
					<br />
					<p:dataTable id="etatvente" var="f"
						value="#{EtattransportBean.factureventes}" widgetVar="articleTable"
						emptyMessage="aucun facture dans le stock"
						style="margin-bottom:10px" paginator="true" rows="50"
						paginatorPosition="bottom">

						<p:column sortBy="#{f.code}">
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="Numero" />
							</f:facet>
							<h:outputText style="font-size:12px " value="#{f.codes}" />
						</p:column>

						<p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="Client" />
							</f:facet>
							<h:outputText style="font-size:12px " value="#{f.bl.client.nom}" />
						</p:column>

						<p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="Date d'édition" />
							</f:facet>
							<h:outputText style="font-size:12px " value="#{f.date}" />
						</p:column>

						<p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="Montant HT" />
							</f:facet>
							<h:outputText style="font-size:12px " value="#{f.totalhts}" />
						</p:column>

						<p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="Montant TVA" />
							</f:facet>
							<h:outputText style="font-size:12px " value="#{f.totaltvas}" />
						</p:column>

						<p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="Montant TTC" />
							</f:facet>
							<h:outputText style="font-size:12px " value="#{f.totalttcs}" />
						</p:column>

					</p:dataTable>

					<table style="width: 50%">
						<tr>
							<td><b><h:outputText value="Total HT=   "
										style="font-size:12px " /></b></td>
							<td><h:outputText value="#{EtattransportBean.totalhts}"
									style="font-size:12px " id="ht" /></td>
						</tr>
						<tr>
							<td><b><h:outputText value="Total TVA=   "
										style="font-size:12px " /></b></td>
							<td><h:outputText value="#{EtattransportBean.totaltvas}"
									style="font-size:12px " id="tva" /></td>
						</tr>
						<tr>
							<td><b><h:outputText value="Total Timbres=  "
										style="font-size:12px " /></b></td>
							<td><h:outputText value="#{EtattransportBean.totaltimbres}"
									style="font-size:12px " id="timbre" /></td>
						</tr>
						<tr>
							<td><b><h:outputText value="Total TTC=  "
										style="font-size:12px " /></b></td>
							<td><h:outputText value="#{EtattransportBean.totalttcs}"
									style="font-size:12px " id="ttc" /></td>
						</tr>
					</table>
				</h:form>
			</h:panelGroup>
		</h:panelGroup>
	</h:panelGroup>
</ui:composition>
