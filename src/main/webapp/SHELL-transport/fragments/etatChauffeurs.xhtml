<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets">
	<h:panelGroup layout="block" styleClass="shell-module-layout transport-shell-fragment"
            style="min-height:900px; margin:0 20px; padding:24px; background-image:url(./2.png); background-size:cover; background-repeat:no-repeat;">
		 
		
		<h:panelGroup layout="block"
                style="min-height:900px; margin:0 30px; padding:24px; background:rgba(255,255,255,0.92);"> 
				
				<br/> <br/><br/><br/>
			  
					<h:form>
					<h:panelGroup layout="block" style="text-align:left;">
				<h:panelGrid columns="2">
				<h:commandLink title="imprimer">
									<p:graphicImage url="/images/imprimante-icone.png"
										style="width:25px" />
									<p:printer target="imprimer"></p:printer>
								</h:commandLink>
			 </h:panelGrid>
				<table>
		<tr>
		<td><h:outputText value="à partir du :" style="font-size:12px "/></td>
		<td> <p:calendar id="popup" value="#{EtattransportBean.date1}" size="10" pattern="dd-MM-yyyy" mask="true" >
		 
		</p:calendar>
		</td>
		
		<td><h:outputText value="jusqu'au :" style="font-size:12px "/></td>
		<td> <p:calendar id="popup2" value="#{EtattransportBean.date2}" size="10" pattern="dd-MM-yyyy" mask="true">
		 
		</p:calendar>
		</td>
		</tr>
		 
		 
		 
										
		<tr>
		<td/>
		 <td><p:commandButton styleClass="ui-priority-primary"
		  value="Recherche" action="#{EtattransportBean.getetatLivraisons2}" style="width:150px;font-size:12px;height:30;color:#0000ff;background-color:#abc8e2;"/></td>
		 </tr>
		</table>				
				
				</h:panelGroup>
				<p:outputPanel id="imprimer" style="width:99%;background-color: #F5F4F0;" >
				<table><tr><td>
				<p:panel style="width:350px;">
				<b><h:outputText value="ETAT PAR CHAUFFEURS du :"  style=" font-style: italic;font-size: large;font-size:20px;"/>
				</b></p:panel></td>
				<td> <h:outputText value="#{EtattransportBean.date1s } "  style=" font-style: italic;font-size: large;"/></td>
				<td colspan="2"/>
				<td><h:outputText value=" #{ EtattransportBean.date2s}"  style=" font-style: italic;font-size: large;"/></td>
				</tr></table>
				 <br/> 
				 <h:outputText value=" #{EtattransportBean.matricule}  #{EtattransportBean.chauffeur}"  style=" font-style: italic;font-size: large;"/>
				
				<br/> <br/><br/><br/>
				 
								<table border="1" style="width: 100%; text-align: center
									 ;
									text-align: left;
									margin-bottom: 0px;
									border-color: #000000; 
									border-bottom-color: #ffffff;
									border-right-color: #ffffff
									;border-left-color: #ffffff
									;border-top-color:  #ffffff;
									">
								<tr style="background-color: #FAED94;">
								<td>
								<h:outputText style="font-size:12px ;color:#483d8b"
											value="C_chauffeur" />
								</td>
								<td><h:outputText style="font-size:12px ;color:#483d8b"
											value="nom_chauffeur" /></td>
								 
								<!-- <td><h:outputText style="font-size:12px ;color:#483d8b"
											value="Vehicule" /></td> -->
								 
							    <td><h:outputText style="font-size:12px ;color:#483d8b"
											value="Prix TRS" /></td>
							  <td><h:outputText style="font-size:12px ;color:#483d8b"
											value="Gasoil" /></td>
							<td><h:outputText style="font-size:12px ;color:#483d8b"
											value="Petrole" /></td>
							<td><h:outputText style="font-size:12px ;color:#483d8b"
											value="SSP" /></td>
							<td><h:outputText style="font-size:12px ;color:#483d8b"
											value="G 50" /></td>
								 
								</tr>
								<ui:repeat var="bl" value="#{EtattransportBean.listBonlivraison}">
								<tr>
								<td> <h:outputText style="font-size:12px " value="#{bl.chauffeur.id}" /></td>
								<td>
								  <h:outputText style="font-size:12px " value="#{bl.chauffeur.nompenom}" />
								</td>								 
								<!-- <td>
								<h:outputText style="font-size:12px " value="#{bl.vhecule.matricule}" />
								</td> -->
								 
								<td>
								<h:outputText style="font-size:12px " value="#{bl.transport}" />
								</td>
								 	<td><h:outputText style="font-size:12px "
													value="#{bl.gasoil}"  rendered="#{bl.gasoil !=0}" /></td>
											<td><h:outputText style="font-size:12px "
													value="#{bl.petrole}"  rendered="#{bl.petrole !=0}" /></td>
											<td><h:outputText style="font-size:12px "
													value="#{bl.ssp}"   rendered="#{bl.ssp !=0}"/></td>
											<td><h:outputText style="font-size:12px "
													value="#{bl.g50}"  rendered="#{bl.g50 !=0}" /></td>
								</tr>
								</ui:repeat>
								<tr/>
								<tr style="background-color: #red;">
								<td>
								<b><h:outputText style="font-size:12px " value="Totals #{EtattransportBean.listBonlivraison.size()}" /></b>
								</td>
								<td colspan="1"/>
								<td><h:outputText style="font-size:12px " value="#{EtattransportBean.totaltransport}" /></td>
								<td><h:outputText style="font-size:12px " value="#{EtattransportBean.gasoil}" /></td>
								<td><h:outputText style="font-size:12px " value="#{EtattransportBean.petrole}" /></td>
								
								<td><h:outputText style="font-size:12px " value="#{EtattransportBean.ssp}" /></td>
								<td><h:outputText style="font-size:12px " value="#{EtattransportBean.g50}" /></td>
								 
								</tr>
							 
								</table>
									 
								   
					
				</p:outputPanel>
				
				
				 
				</h:form>
				 
			 </h:panelGroup>
			 </h:panelGroup>
			 
</ui:composition>
