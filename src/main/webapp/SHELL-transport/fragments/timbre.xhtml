<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
	<div class="shell-module-layout">
		<p:panel styleClass="shell-home-panel">
			<h2 class="shell-page-title">Timbre Fiscal</h2>
			<p class="shell-page-subtitle">Parametrage du timbre fiscal utilise par le module Transport.</p>

			<h:form id="form2">
				<p:growl showDetail="true" id="msgs" />

				<p:dataTable id="paramettre"
					var="p"
					value="#{ParametrageBean.listparamettres}"
					widgetVar="ArticleTable"
					styleClass="shell-home-table"
					paginator="true"
					editable="true"
					rows="6"
					paginatorPosition="bottom"
					selectionMode="single"
					selection="#{ParametrageBean.paramettre}"
					rowKey="#{p.id}">
					<p:ajax event="rowEdit" listener="#{ParametrageBean.onRowEdit2}" />

					<p:column>
						<f:facet name="header">
							<h:outputText value="Timbre Fiscal" />
						</f:facet>
						<p:cellEditor>
							<f:facet name="output">
								<h:outputText value="#{p.timbre}" />
							</f:facet>
							<f:facet name="input">
								<p:inputText id="tombreinput" value="#{p.timbre}" style="width:96%" />
							</f:facet>
						</p:cellEditor>
					</p:column>

					<p:column style="width:40px">
						<f:facet name="header">
							<h:outputText value="Modifier" />
						</f:facet>
						<p:rowEditor />
					</p:column>
				</p:dataTable>
			</h:form>
		</p:panel>
	</div>
</ui:composition>
</ui:composition>
