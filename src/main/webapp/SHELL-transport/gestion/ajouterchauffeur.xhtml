<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>

</h:head>

<h:body>




	<p:panel style="min-height:900px;margin-left: 20px;margin-right: 20px;">
		 
		<ui:insert name="menu">
			<ui:include src="/SHELL-transport/Headertr.xhtml" />
		</ui:insert>
		<p:panel id="basic2" closable="true"
			style="min-height:900px;margin-left: 50px;margin-right: 50px;background-image: url(../2.png)">	
 
<div align="center">
						 
<fieldset style="margin-bottom: 20px; background-color: #eeeec6;">
<legend>
<b><h:outputText style="font-size:14px ;color:white;background-image:linear-gradient( #FAF281, red);"
value="Ajouter Chauffeur " name="outTxtcin" /> </b>
</legend>
 <div align="center">
    
 
	<h:form>
	<table>
	<tr>

										<td width="20%"><b>
										
										<h:outputText value="Nom :"
												style="font-size:12px " /></b></td>
										<td><h:inputText style="font-size:14px " id="nom" size="30"
												value="#{ChauffeurBean.nom}" required="true"
												requiredMessage="entrer nom chauffeur" /> <p:messages for="nom"
												closable="true" autoUpdate="true" /></td>
									</tr>
									<tr>
										<td><b><h:outputText value="Telephone :"
												style="font-size:12px " /></b></td>
										<td><h:inputText style="font-size:14px " id="tel" size="30"
												required="true" requiredMessage="entrer tel"
												value="#{ChauffeurBean.num}" /> <p:messages for="tel"
												closable="true" autoUpdate="true" /></td>

									</tr>

									
									<tr>
								 
										<td width="320px"><p:commandButton value="Ajouter"
												ajax="false"
												style="width:150px;font-size:12px;height:30;color:white;background-image:linear-gradient( #FAF281, red);" 
												action="#{ChauffeurBean.savechauffeur}" /></td>
									</tr>
								</table>

							</h:form></div>
						</fieldset>
						 
						 
					</div>
				 
		 </p:panel>
		 </p:panel>
		 </h:body>
		 </html>
