<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>

</h:head>

<h:body>




	<p:panel style="min-height:900px;margin-left: 20px;margin-right: 20px;">
	 
		<ui:insert name="menu">
			<ui:include src="/SHELL-transport/Headertr.xhtml" />
		</ui:insert>
		<p:panel id="basic2" closable="true"
			style="min-height:900px;margin-left: 50px;margin-right: 50px;background-image: url(../2.png)">

			<br />
			<br />
			<br />
			<br />
			 
				<h:form>
					<div align="left">
						<h:panelGrid columns="2">
							<h:commandLink title="imprimer">
								<p:graphicImage url="/images/imprimante-icone.png"
									style="width:25px" />
								<p:printer target="imprimer"></p:printer>
							</h:commandLink>
						</h:panelGrid>
						<table>
							<tr>
								<td><h:outputText value="ÃƒÂ  partir du :"
										style="font-size:12px " /></td>
								<td><p:calendar id="popup" pattern="dd-MM-yyyy" mask="true" value="#{EtattransportBean.date1}"
										size="10" >

									</p:calendar></td>

								<td><h:outputText value="jusqu'au :"
										style="font-size:12px " /></td>
								<td><p:calendar id="popup2" value="#{EtattransportBean.date2}"
										size="10" pattern="dd-MM-yyyy" mask="true">

									</p:calendar></td>
							</tr>

							<tr>
								<td><h:outputText value="Vehicule" style="font-size:12px " /></td>
								<td><p:selectOneMenu value="#{EtattransportBean.matricule}"
										style="width:200px;font-size:12px " filter="true"
										filterMatchMode="contains">
										<f:selectItem itemLabel="selectionner vehicule" />
										<f:selectItems value="#{EtattransportBean.listVehicules}" />

									</p:selectOneMenu></td>

								<td><h:outputText value="Chauffeur" style="font-size:12px " /></td>
								<td><p:selectOneMenu value="#{EtattransportBean.chauffeur}"
										style="width:200px;font-size:12px " filter="true"
										filterMatchMode="contains">
										<f:selectItem itemLabel="selectionner Chauffeur" />
										<f:selectItems value="#{EtattransportBean.listChauffeurs}" />

									</p:selectOneMenu></td>
							</tr>


							<tr>
								<td />
								<td><p:commandButton styleClass="ui-priority-primary"
										value="Recherche" action="#{EtattransportBean.getetatLivraisons1}"
										style="width:150px;font-size:12px;height:30;color:#0000ff;background-color:#abc8e2;" /></td>
							</tr>
						</table>

					</div>
					<p:outputPanel id="imprimer"
						style="width:99%;background-color: #F5F4F0;">
						<table>
							<tr>
								<td><p:panel style="width:300px;">
										<b><h:outputText value="ETAT DES LIVRAISON du :"
												style=" font-style: italic;font-size: large;font-size:20px;" />
										</b>
									</p:panel></td>
								<td><h:outputText value="#{EtattransportBean.date1s } "
										style=" font-style: italic;font-size: large;" /></td>
								<td colspan="2" />
								<td><h:outputText value=" #{ EtattransportBean.date2s}"
										style=" font-style: italic;font-size: large;" /></td>
							</tr>
						</table>
						<br />
						<h:outputText
							value=" #{EtattransportBean.matricule}  #{EtattransportBean.chauffeur}"
							style=" font-style: italic;font-size: large;" />

						<br />
						<br />
						<br />
						<br />

						<table border="1" style="width: 100%; text-align: center
									 ;
									text-align: left;
									margin-bottom: 0px;
									border-color: #000000; 
									border-bottom-color: #ffffff;
									border-right-color: #ffffff
									;border-left-color: #ffffff
									;border-top-color:  #ffffff;
									">
							<tr style="background-color: #FAED94;">
								<td><h:outputText style="font-size:12px ;color:#483d8b"
										value="Identifiant" /></td>
								<td><h:outputText style="font-size:12px ;color:#483d8b"
										value="Date" /></td>
								<td><h:outputText style="font-size:12px ;color:#483d8b"
										value="Heure" /></td>
								<td><h:outputText style="font-size:12px ;color:#483d8b"
										value="Vehicule" /></td>
								<td><h:outputText style="font-size:12px ;color:#483d8b"
										value="Chauffeur" /></td>
								<td><h:outputText style="font-size:12px ;color:#483d8b"
										value="Client" /></td>
								<td><h:outputText style="font-size:12px ;color:#483d8b"
										value="Prix TRS" /></td>
								<td><h:outputText style="font-size:12px ;color:#483d8b"
										value="Gasoil" /></td>
								<td><h:outputText style="font-size:12px ;color:#483d8b"
										value="Petrole" /></td>
								<td><h:outputText style="font-size:12px ;color:#483d8b"
										value="SSP" /></td>
								<td><h:outputText style="font-size:12px ;color:#483d8b"
										value="G 50" /></td>

							</tr>
							<ui:repeat var="bl" value="#{EtattransportBean.listBonlivraison}">
								<tr>
									<td><h:outputText style="font-size:12px "
											value="#{bl.codes}" /></td>
									<td><h:outputText style="font-size:12px "
											value="#{bl.dates}" /></td>
									<td><h:outputText style="font-size:12px "
											value="#{bl.heure}" /></td>
									<td><h:outputText style="font-size:12px "
											value="#{bl.vhecule.matricule}" /></td>
									<td><h:outputText style="font-size:12px "
											value="#{bl.chauffeur.nompenom}" /></td>
									<td><h:outputText style="font-size:12px "
											value="#{bl.client.nom}" /></td>
									<td><h:outputText style="font-size:12px "
											value="#{bl.transport}" /></td>
									<!-- 
									  <ui:repeat var="c" value="#{bl.listeligne}">  
										<h:panelGroup rendered="#{c.produit!=null}">
									 -->

											<td><h:outputText style="font-size:12px "
													value="#{bl.gasoil}"   rendered="#{bl.gasoil >0}"/></td>
											<td><h:outputText style="font-size:12px "
													value="#{bl.petrole}"  rendered="#{bl.petrole >0}" /></td>
											<td><h:outputText style="font-size:12px "
													value="#{bl.ssp}"  rendered="#{bl.ssp >0}" /></td>
											<td><h:outputText style="font-size:12px "
													value="#{bl.g50}"   rendered="#{bl.g50 >0}"/></td>
										<!-- </h:panelGroup>
									  </ui:repeat>   --> 
								</tr>
							</ui:repeat>
							<tr>
								<td><h:outputText style="font-size:12px "
										value="#{EtattransportBean.listBonlivraison.size()}" /></td>
								<td colspan="5" />
								<td><h:outputText style="font-size:12px "
										value="#{EtattransportBean.totaltransport}" rendered="#{EtattransportBean.totaltransport >0}"/></td>
								<td><h:outputText style="font-size:12px "
										value="#{EtattransportBean.gasoil}" rendered="#{EtattransportBean.gasoil >0}"/></td>
								<td><h:outputText style="font-size:12px "
										value="#{EtattransportBean.petrole}" rendered="#{EtattransportBean.petrole >0}" /></td>
								
								<td><h:outputText style="font-size:12px "
										value="#{EtattransportBean.ssp}" rendered="#{EtattransportBean.ssp>0}"/></td>
										<td><h:outputText style="font-size:12px "
										value="#{EtattransportBean.g50}" rendered="#{EtattransportBean.g50 >0}"/></td>

							</tr>
						</table>



					</p:outputPanel>



				</h:form>
			 
		 </p:panel>
		 </p:panel>
		 </h:body>
		 </html>
