<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>

</h:head>

<h:body>




	<p:panel style="min-height:900px;margin-left: 20px;margin-right: 20px;">
		 
		<ui:insert name="menu">
			<ui:include src="/SHELL-transport/Headertr.xhtml" />
		</ui:insert>
		<p:panel id="basic2" closable="true"
			style="min-height:900px;margin-left: 50px;margin-right: 50px;background-image: url(../2.png)">

			<br />
			<br />
			<br />
			<br />

			<h:form>
				<div align="left">
					<h:panelGrid columns="2">
						<h:commandLink title="imprimer">
							<p:graphicImage url="/images/imprimante-icone.png"
								style="width:25px" />
							<p:printer target="imprimer"></p:printer>
						</h:commandLink>
					</h:panelGrid>
					<table>
						<tr>
							<td><h:outputText value="ÃƒÂ  partir du :"
									style="font-size:12px " /></td>
							<td><p:calendar id="popup"
									value="#{FamilledepenseBean.date1}" size="10">
									<!-- <p:ajax update="etatvente  ttc ht tva timbre" listener="#{FamilledepenseBean.getetatventebydate1}"   /> -->
								</p:calendar></td>

							<td><h:outputText value="jusqu'au :" style="font-size:12px " /></td>
							<td><p:calendar id="popup2"
									value="#{FamilledepenseBean.date2}" size="10">
									<!--  <f:ajax listener="#{FamilledepenseBean.getetatventebydate}" render="etatvente  ttc ht tva timbre" />-->
								</p:calendar></td>
						</tr>




						<tr>
							<td />
							<td><p:commandButton value="Recherche"
									action="#{FamilledepenseBean.calculrapportcamion}"
									style="width:150px;font-size:12px;height:30;color:#0000ff;background-color:#abc8e2;" /></td>
						</tr>
					</table>

				</div>

				<p:outputPanel id="imprimer" style="width:99%">
					<h:outputText
						value="RAPPORT CAMION du #{FamilledepenseBean.dates1} #{FamilledepenseBean.dates2}"
						style=" font-style: italic;font-size: large;" />

					<br />
					<br />
					<br />
					<br />

					<p:dataTable id="fd" var="fd"
						value="#{FamilledepenseBean.listcarburant}"
						widgetVar="articleTable" rowKey="#{fd.id}"
						style="margin-bottom:10px"
						emptyMessage="aucune depense dans la base">

						<p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="NÃ‚Â° VÃƒÂ©hicule" />
							</f:facet>
							<h:outputText style="font-size:12px " value="#{fd.matricule}" />
						</p:column>
						<p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="DÃƒÂ©pense carburant" />
							</f:facet>
							<h:outputText style="font-size:12px "
								value="#{fd.depensecarburants}" />
						</p:column>

						<p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="Autres DÃƒÂ©penses" />
							</f:facet>
							<h:outputText style="font-size:12px " value="#{fd.autredepenses}" />
						</p:column>

						<p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="Salaires chauffeurs" />
							</f:facet>
							<h:outputText style="font-size:12px "
								value="#{fd.salairchauffeurs}" />
						</p:column>

						<p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b" value="N CH" />
							</f:facet>
							<h:outputText style="font-size:12px " value="#{fd.chauffeur}" />
						</p:column>

						<p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="Total DÃƒÂ©penses" />
							</f:facet>
							<h:outputText style="font-size:12px " value="#{fd.totaldepenses}" />
						</p:column>

						<p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="Total Transport" />
							</f:facet>
							<h:outputText style="font-size:12px "
								value="#{fd.totaltransports}" />
						</p:column>

						<p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b" value="D.F" />
							</f:facet>
							<h:outputText style="font-size:12px " value="#{fd.dfs}" />
						</p:column>


						<p:columnGroup type="footer">
							<p:row>
								<p:column style="text-align:center" footerText="TOTAL" />
								<p:column style="text-align:center"
									footerText="#{FamilledepenseBean.totalcarburants}" />
								<p:column style="text-align:center"
									footerText="#{FamilledepenseBean.totalautrecarburants}" />

								<p:column style="text-align:center"
									footerText="N#{FamilledepenseBean.totalsalaires}" />
								<p:column style="text-align:center" footerText="######" />
								<p:column footerText="#{FamilledepenseBean.totaldepenses}"
									style="text-align:center" />

								<p:column style="text-align:center"
									footerText="N#{FamilledepenseBean.totaltransports}" />
								<p:column style="text-align:center"
									footerText="#{FamilledepenseBean.totaldfs}" />



							</p:row>
						</p:columnGroup>

					</p:dataTable>
				</p:outputPanel>
			</h:form>
		</p:panel>
	</p:panel>
</h:body>
</html>
