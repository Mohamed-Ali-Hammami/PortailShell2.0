<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>

</h:head>
<p:tab title="TVA">
	<div align="center">
		<br /> <br />	 
							<br />
							 
							<h:form id="form3">		
							<p:growl showDetail="true" id="msgs"/>					
							<p:dataTable id="tvae" var="v" style="background:#a2b5bf;width:50%;"
							value="#{ParametrageBean.listtvas}"  
							 paginator="true" editable="true"
							rows="6" paginatorPosition="bottom" selectionMode="single"
							selection="#{ParametrageBean.tva}" rowKey="#{v.id}">
                           <p:ajax event="rowEdit" listener="#{ParametrageBean.onRowEdit4}"  />
							<p:column>
								<f:facet name="header">
									<h:outputText style="font-size:12px ;color:#483d8b" value="TVA" />
								</f:facet> 
					    	<p:cellEditor>
								<f:facet name="output"><h:outputText style="font-size:12px "
									value="#{v.valeur}" />
									</f:facet>
								<f:facet name="input"><p:inputText  id="tvainput" value="#{v.valeur}" style="width:96%"/>	</f:facet>
								 </p:cellEditor> 
							</p:column>
							
							
							 <p:column style="width:40px"  >
							<f:facet name="header">
									<h:outputText style="font-size:9px;color:#483d8b"
										value="modifier" />
								</f:facet>
							<p:rowEditor/>
							</p:column>
							</p:dataTable>
							<p:dialog widgetVar="modifDialog" minHeight="800" minWidth="600"
							header="Modifier TVA">
							<h:panelGroup  >
								<div align="center">
									<br /> 
									 
									<h:outputText value="modifier" style="font-size:12px " />
									<p:spacer />
									<h:inputText style="font-size:12px " value="#{ParametrageBean.valeur}"
										 /> 
									<br />
									<br />
								 
										<p:commandButton value="modifier" style="width:150px"
											action="#{ParametrageBean.modifiertva}" ajax="false"
											  />
									 
								</div>
							</h:panelGroup>
						</p:dialog>
							</h:form>
							 
							 
							
	</div>
</p:tab>
</html>
