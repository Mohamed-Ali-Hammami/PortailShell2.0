<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>

</h:head>

<h:body>




	<p:panel style="min-height:900px;margin-left: 20px;margin-right: 20px;">
		 
		<ui:insert name="menu">
			<ui:include src="/SHELL-transport/Headertr.xhtml" />
		</ui:insert>
		<p:panel id="basic2" closable="true"
			style="min-height:900px;margin-left: 50px;margin-right: 50px;background-image: url(../2.png)">
				<br/> <br/><br/><br/>
				 
				
					<h:form>
					<div align="left">
				<h:panelGrid columns="2">
				<h:commandLink title="imprimer">
									<p:graphicImage url="/images/imprimante-icone.png"
										style="width:25px" />
									<p:printer target="imprimer"></p:printer>
								</h:commandLink>
								
			 
								</h:panelGrid>
				</div>
				
				<p:outputPanel id="imprimer" style="width:99%">
				<h:outputText value="ETAT_Table_Vehicule"  style=" font-style: italic;font-size: large;"/>
				<br/> <br/><br/><br/>
								<p:dataTable id="vhecule" var="vhecule"
									value="#{EtattransportBean.listVhecule}" widgetVar="articleTable"
									 
									rowKey="#{ch.id}" style="margin-bottom:10px"
									emptyMessage="aucune vhecule dans la base"  >
									<p:column   width="400px">
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="Code" />
									</f:facet>
									 
										<b>	<h:outputText style="font-size:12px " value="#{vhecule.id}" /></b>
										 
									 
									
								</p:column>
									<p:column  width="400px">
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="Matricule" />
									</f:facet>
									 
										<b>	<h:outputText style="font-size:12px " value="#{vhecule.matricule}" /></b>
										 
									 
									
								</p:column>
									<p:column>
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="numserie" />
									</f:facet>

									 <b>
									 
											<h:outputText style="font-size:12px "
												value="#{vhecule.numserie}" />
										 </b>
										 
										 
								</p:column>

								
								 
									 


								 
									</p:dataTable>
				</p:outputPanel>
				</h:form>
				 
			 </p:panel>
			 </p:panel>
			 </h:body>
			 </html>
