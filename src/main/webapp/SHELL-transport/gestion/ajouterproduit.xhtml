<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>

</h:head>

<h:body>




	<p:panel style="min-height:900px;margin-left: 20px;margin-right: 20px;">
		 
		<ui:insert name="menu">
			<ui:include src="/SHELL-transport/Headertr.xhtml" />
		</ui:insert>
		<p:panel id="basic2" closable="true"
			style="min-height:900px;margin-left: 50px;margin-right: 50px;background-image: url(../2.png)">
				<div align="center">
						  <br />
						<fieldset style="margin-bottom: 20px;background-color:#eeeec6;">
							<legend>
								<b><h:outputText style="font-size:12px ;color:#2e8b57"
										value="Ajouter Produit au stock" name="outTxtcin" /> </b>
							</legend>
							<br />
							


					<div align="center">
					 <h:form>
						<table>
						
						<tr>

								<td width="20%"><b><h:outputText value="Code :"
											style="font-size:12px " /></b>
											
											</td>
											 
								<td><h:inputText value="#{ProduitBean.codess}" id="code"
										size="30" style="font-size:14px " />
										
										<p:messages
										for="code" autoUpdate="true" closable="true" />
										</td>
							</tr>
							
							
							
							
							<tr>

								<td width="20%"><b><h:outputText value="Nom :"
											style="font-size:12px " /></b></td>

								<td><h:inputText value="#{ProduitBean.nom}" id="nom"
										size="30" style="font-size:14px " required="true"
										requiredMessage="entrer nom article" /> <p:messages
										for="nom" autoUpdate="true" closable="true" />
								</td>
							</tr>
                        
							<tr>

								<td width="20%"><b><h:outputText value="Achat :"
											style="font-size:12px " /></b></td>
								<td><h:inputText value="#{ProduitBean.achat}" id="achat"
										size="30" style="font-size:14px " required="true"
										requiredMessage="entrer prix achat" /> <p:messages for="achat"
										autoUpdate="true" closable="true" /></td>
							</tr>
                          
							<tr>

								<td width="20%"><b><h:outputText value="Tva :"
											style="font-size:12px " /></b></td>
								<td><p:selectOneMenu filter="true"
										filterMatchMode="contains" value="#{ProduitBean.tva}"
										required="true" requiredMessage="entrer tva article"
										style="width:180px;font-size:12px " id="tva">
										<f:selectItem itemLabel="selectionner tva" />
										<f:selectItems value="#{ProduitBean.listtvas}" var="t" itemValue="#{t.valeur}" itemLabel="#{t.valeur}"/>
									</p:selectOneMenu> <p:messages for="tva" autoUpdate="true" closable="true" />
								</td>
							</tr>    
							<tr>

								<td width="20%"><b><h:outputText value="Marge :"
											style="font-size:12px " /></b></td>
								<td><h:inputText value="#{ProduitBean.marge}" id="marge"
										size="30" style="font-size:14px " required="true"
										requiredMessage="entrer marge " /> <p:messages for="marge"
										 closable="true" /></td>
							</tr>

							<tr>

								<td width="20%"><b><h:outputText value="Vente :"
											style="font-size:12px " /></b></td>
								<td><h:inputText value="#{ProduitBean.ventes}" id="vente"
										size="30" style="font-size:14px " required="true"
										requiredMessage="entrer prix de vente article" />
									<p:messages for="vente" autoUpdate="true" closable="true" />
								</td>
							</tr>

							<tr>

								<td width="20%"><b><h:outputText value="Qte min :"
											style="font-size:12px " /></b></td>
								<td><h:inputText value="#{ProduitBean.qtemin}" id="qtemin"
										size="30" style="font-size:14px " required="true"
										requiredMessage="entrer quantite min" /> <p:messages
										for="qtemin" autoUpdate="true" closable="true" />
								</td>
							</tr>

							<tr>

								<td width="20%"><b><h:outputText value=" Famille :"
											style="font-size:12px " /></b></td>
								<td><p:selectOneMenu filter="true"
										filterMatchMode="contains" value="#{ProduitBean.codefamille}"
										required="true" requiredMessage="selectionner famille article"
										style="width:180px;font-size:12px " id="famille">
										<f:selectItem itemLabel="selectionner famille article" />
										<f:selectItems value="#{ProduitBean.listfamile}" var="f" itemValue="#{f.nom}" itemLabel="#{f.nom}"/>
									</p:selectOneMenu> <p:messages for="famille" autoUpdate="true" closable="true" />
								</td>
							</tr>
 
                            
							  
							<tr>

								<td width="400px"><p:commandButton value="Ok" ajax="false"
										style="width:200px;height:30;color:#0000ff;background-color:#abc8e2;font-size:12px"
										action="#{ProduitBean.ajouterProduit}" /></td>

							  </tr>
						</table>
                        </h:form>
                         <h:form>
                         <table>
                         
                         <tr>
                         <td><p:commandButton value="Annuler"
										style="width:200px;height:30;color:#0000ff;background-color:#abc8e2;font-size:12px"
										action="#{ProduitBean.getallProduit}" /></td>
							</tr>  
                         </table>
                          </h:form>
					</div>



				
				
				
					
						</fieldset>
					</div>
				 
	 </p:panel>
	 </p:panel>
	 </h:body>
	 </html>
