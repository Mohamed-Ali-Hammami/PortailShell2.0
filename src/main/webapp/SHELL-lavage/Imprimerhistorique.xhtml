	<html xmlns="http://www.w3.org/1999/xhtml"
		xmlns:h="http://java.sun.com/jsf/html"
		xmlns:f="http://java.sun.com/jsf/core"
		xmlns:p="http://primefaces.org/ui"
		xmlns:ui="http://java.sun.com/jsf/facelets">
	<h:head>
	
	</h:head>
	
	<h:body  style="width:98%;margin:auto;" >
	 <p:panel style="width:100%;margin:auto;min-height:900px;">
		 <ui:insert name="menu">
				<ui:include src="/SHELL-lavage/Header.xhtml" />
			</ui:insert>
			<ui:insert name="menu">
				<ui:include src="/SHELL-lavage/Headerlavage.xhtml" />
			</ui:insert>
			<p:panel id="basic2" closable="true"
				style="min-height:900px;margin-left: 50px;margin-right: 50px;background-image: url(../2.png)">
	
				<h:form id="f">

				<div align="center" >				
					 
                    
				 	<p:commandButton title="imprimer" value="imprimer"   ajax="false" >
							  <p:printer target="imprimer"></p:printer>
							 
						 
					</p:commandButton> 
					<br />
					<br />
                     
					<p:outputPanel id="imprimer" >
					<div style="background-color: lightblue;">
						  <div align="right"  >
						  <h:outputText
									value="  #{ServiceLavageBean.dates1}"
									style="font-size:10px" /> 
						  </div>
						<div align="center">
							<b><h:outputText
									value="Détails rapport de : #{ServiceLavageBean.typalavage}"
									style="font-size:20px" />   </b>


						</div>
						<br /> 
						</div>
						
						<div align="right">
						<p:dataTable id="produit" var="p" style="background-color: lightblue;"   
							value="#{ServiceLavageBean.listRendement}"  
							emptyMessage="aucune ligne dans la base">
							 
								<p:column width="20%" style="border: 0.5px #000000 solid;">
									<f:facet name="header">
										<h:outputText style="font-size:14px ;color:#000000"
											value="Date" />
									</f:facet>


									<h:outputText style="font-size:14px ;color:#000000"
										value="#{p.dates}"  />
								</p:column>

								<p:column style="border: 0.5px #000000 solid;">
									<f:facet name="header">
										<h:outputText style="font-size:14px ;color:#000000"
											value="Heure" />
									</f:facet>


									<h:outputText style="font-size:14px ;color:#000000" value="De #{p.heure_entree} A #{p.heure_sortie}"
										  />
								</p:column>

								 
								
								<p:column  width="10%" style="border: 0.5px #000000 solid;text-aligh:right">
									<f:facet name="header">
										<h:outputText style="font-size:14px ;color:#000000;text-aligh:right"
											value="Personnel"    />
											
											 
									</f:facet>


									<h:outputText style="font-size:14px ;color:#000000"
										value="#{p.laveur}"   />
								</p:column>
								
								<p:column width="10%" style="border: 0.5px #000000 solid;text-aligh:right">
									<f:facet name="header">
										<h:outputText style="font-size:14px ;color:#000000;text-aligh:right"
											value="Service" />
									</f:facet>


									<h:outputText style="font-size:14px ;color:#000000"
										value="#{p.service}"   />
								</p:column>
								
								<p:column width="10%" style="border: 0.5px #000000 solid;text-aligh:right">
									<f:facet name="header">
										<h:outputText style="font-size:14px ;color:#000000;text-aligh:right"
											value="Durée" />
									</f:facet>


									<h:outputText style="font-size:14px ;color:#000000"
										value="#{p.duree}"   />
								</p:column>
								
								

								<p:column width="15%" style="border: 0.5px #000000 solid;text-aligh:right">
									<f:facet name="header">
										<h:outputText style="font-size:14px ;color:#000000;text-aligh:right"
											value="Ecart" />
									</f:facet>


									<h:outputText style="font-size:14px ;color:#000000"
										value="#{p.ecart}"  />
								</p:column>
								
								<p:column width="15%" style="border: 0.5px #000000 solid;text-aligh:right">
									<f:facet name="header">
										<h:outputText style="font-size:14px ;color:#000000;text-aligh:right"
											value="Model" />
									</f:facet>


									<h:outputText style="font-size:14px ;color:#000000"
										value="#{p.marque}/#{p.model}"  />
								</p:column>
								
								 
								
								 
								
								 
								
								
								<p:column width="10%" style="border: 0.5px #000000 solid;text-aligh:right">
									<f:facet name="header">
										<h:outputText style="font-size:14px ;color:#000000;text-aligh:right"
											value="Montant" />
									</f:facet>


									<h:outputText style="font-size:14px ;color:#000000"
										value="#{p.montantv}"   />
								</p:column>
								
								
								
						  		 
				      	<p:columnGroup type="footer">
									<p:row>
										<p:column colspan="7" style="text-align:right"
											footerText="Totals: #{ServiceLavageBean.listRendement.size()}" />
										<p:column footerText="#{ServiceLavageBean.total}" style="text-align:left" />
										  
									</p:row>
								</p:columnGroup>	
				  
						</p:dataTable></div><br/>
						
					 
                              
						 <br/>
						 
						 	 
						
						<br/>
					</p:outputPanel>
				</div>
			</h:form>
	 </p:panel>
	 </p:panel>
	 </h:body>
	 </html>
