<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets">
    <h:panelGroup layout="block" styleClass="shell-module-layout lavage-shell-fragment">
			
			<h:form>
			
				<h:outputText value="Etat de rendement #{ServiceLavageBeantypalavage}  DU : #{ServiceLavageBean.dates1}  #{ServiceLavageBean.poste}"/>
						 
						<br/>
						<br/>
						
						 <p:dataTable  var="b" value="#{ServiceLavageBean.listRendement}"  >    
		                   <p:column  style="border: 0.5px #000000 solid;">
		                <f:facet name="header" >
			           <h:outputText value="Date" style="font-size:12px "/> 
						</f:facet>	 
                     <h:outputText value="#{b.dates}" style="font-size:12px "  /> 
		 	   
		       </p:column>   
		       
		          
		       
		  <p:column  style="border: 0.5px #000000 solid;" >
		  <f:facet name="header" >
			 <h:outputText value="Employee" style="font-size:12px "/>
						</f:facet>
						
		 <p style="height:20">
		 	 <h:outputText value="#{b.employee.nom}"  style="font-size:14px "/></p>
		 	 
		 	 
		 	   
		</p:column>	       
		 
		<p:column  style="border: 0.5px #000000 solid;" >
		  <f:facet name="header" >
			     	<h:outputText value="Rendement" style="font-size:12px "/>
						</f:facet>
						
		 <p style="height:20">
		 	 <h:outputText value="#{b.nbvoitures} V/ #{b.nbsemis}  S" rendered="#{b.test !='true'}" style="font-size:14px "/></p>
		 	 
		 	  <h:outputText value=" "   rendered="#{b.test =='true'}" style="font-size:14px "/> 
		 	   
		</p:column>	
		
		<p:column style="border: 0.5px #000000 solid;">
		  <f:facet name="header" >
			           <h:outputText value="Montant" style="font-size:12px "/>
						</f:facet>
						
		 
		 	 
		 	 				
		 <p style="height:20">
		 	 <h:outputText value="#{b.montantv}/ #{b.montants}" rendered="#{b.test !='true'}" style="font-size:14px "/></p>
		<h:outputText value=" "   rendered="#{b.test =='true'}" style="font-size:14px "/> 
		 	   
		</p:column>			
		 
		 		
		<p:column  style="border: 0.5px #000000 solid;" >
		  <f:facet name="header" >
			     	<h:outputText value="Recette Ouvrier" style="font-size:12px "/>
						</f:facet>
						
		 <p style="height:20">
		 	 <h:outputText value="#{b.parouvrier}"  style="font-size:14px "/></p>
		 	 
		 	 
		 	   
		</p:column>	
		 
		 <p:columnGroup type="footer">
									<p:row>
										<p:column colspan="2" style="text-align:right"
											footerText="Totals:" />
										<p:column footerText="#{ServiceLavageBean.totalVLavage}/#{ServiceLavageBean.totalSemilavage} " style="text-align:left" />
										<p:column footerText="#{ServiceLavageBean.totalLavage}/#{ServiceLavageBean.totalSLavage} (#{ServiceLavageBean.totalsv})" style="text-align:left" />									 
										 
									</p:row>
		  </p:columnGroup>
		  	</p:dataTable>
			
			</h:form>
	
    </h:panelGroup>
</ui:composition>
