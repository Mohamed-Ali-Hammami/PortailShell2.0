<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets">
    <h:panelGroup layout="block" styleClass="shell-module-layout lavage-shell-fragment">
            <fieldset style="margin-bottom:20px; background-color:#eeeec6;">
                <legend>
                    <b>
                        <h:outputText value="List Vehicule" 
                                      style="font-size:14px; color:white; background-image:linear-gradient(#FAF281, red);" />
                    </b>
                </legend>

                <h:form id="marqueForm">

                    <!-- New Marque Button -->
                    <div align="right" style="margin-bottom:10px;">
                        <p:commandButton value="Nouveau Marque"
                                         action="#{LavageBean.nouveauMarque}" ajax="false"
                                         style="width:150px; font-size:12px; height:30px; color:white; background-image:linear-gradient(#FAF281, red);" />
                    </div>

                    <!-- Marques DataTable -->
                    <h:panelGroup layout="block" style="text-align:center;">
                        <p:dataTable id="emp" var="tr" value="#{LavageBean.listMarque}"
                                     selection="#{LavageBean.selectedMarque}" selectionMode="single"
                                     rowKey="#{tr.id}" style="margin-bottom:0;"
                                     emptyMessage="Aucune marque disponible">

                            <!-- Marque Column -->
                            <p:column headerText="Marque">
                                <h:outputText value="#{tr.marque}" />
                            </p:column>

                            <!-- Add Model Column -->
                            <p:column style="width:32px; text-align:center;">
                                <f:facet name="header">
                                    <h:outputText style="font-size:9px; color:#483d8b" value="Ajouter Modele" />
                                </f:facet>
                                <p:commandLink action="#{LavageBean.nouveauModel}" title="Add Model" process="@this">
                                    <p:graphicImage url="/images/icone-actualiser.png" style="width:20px;" />
                                    <f:setPropertyActionListener value="#{tr}" target="#{LavageBean.selectedMarque}" />
                                </p:commandLink>
                            </p:column>

                        </p:dataTable>
                    </h:panelGroup>

                    <!-- Optional Dialog for Adding Models (commented) -->
                    <!--
                    <p:dialog header="Ajouter nouveau model" widgetVar="operationDialog" styleClass="dialog"
                              modal="true" id="operationDialog" height="300" width="500" position="top center">
                        <ui:include src="/SHELL-lavage/fragments/ajouterModel.xhtml" />
                    </p:dialog>
                    -->

                </h:form>
            </fieldset>
        
    </h:panelGroup>
</ui:composition>
