<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets">
    <h:panelGroup layout="block" styleClass="shell-module-layout lavage-shell-fragment">
            <fieldset style="margin-bottom: 20px; background-color: #eeeec6;">
                <legend>
                    <b>
                        <h:outputText value="Fiche Huile" 
                                      style="font-size:14px; color:white; background-image:linear-gradient(#FAF281, red);" />
                    </b>
                </legend>

                <!-- Back Button -->
                <div align="right" style="margin-bottom:10px;">
                    <p:commandButton value="Retour" styleClass="bespece"
                                     style="width:150px; font-size:12px; height:30px; color:white; background-image:linear-gradient(#FAF281, red);"
                                     action="#{LavageBean.nouveauModel}" ajax="true" />
                </div>

                <hr />

                <!-- Form for Huile Assignment -->
                <h:form id="huileForm">
                    <p:message for="filtre" display="text" />

                    <p:panel rendered="#{not LavageBean.huileDisponible}"
                             style="margin-bottom:15px; border:1px solid #d9a441; background:#fff6d6; color:#5f4b00;">
                        <h:outputText value="#{LavageBean.huileAvailabilityMessage}" />
                    </p:panel>

                    <h:panelGrid columns="2" columnClasses="label,value" style="margin-bottom:15px;">
                        <h:outputText value="Huile" style="font-size:14px; color:#483d8b" />
                        <p:selectOneMenu value="#{LavageBean.filtre}" required="true"
                                         requiredMessage="Sélectionner Huile" filter="true" filterMatchMode="contains"
                                         style="width:200px; font-size:12px;" id="filtre"
                                         disabled="#{not LavageBean.huileDisponible}">
                            <f:selectItem itemLabel="Sélectionner Huile" />
                            <f:selectItems value="#{LavageBean.listProduit}" var="s" itemValue="#{s.nom}" itemLabel="#{s.nom}" />
                        </p:selectOneMenu>

                        <h:outputText value="Kilométrage" style="font-size:14px; color:#483d8b" />
                        <h:inputText value="#{LavageBean.metrage}" disabled="#{not LavageBean.huileDisponible}" />

                        <h:outputText value="Nombre de vidange" style="font-size:14px; color:#483d8b" />
                        <h:inputText value="#{LavageBean.nbvidange}" disabled="#{not LavageBean.huileDisponible}" />
                    </h:panelGrid>

                    <!-- Submit Button -->
                    <div style="text-align:center; margin-top:10px;">
                        <p:commandButton value="Valider" styleClass="bespece"
                                         style="width:150px; font-size:12px; height:30px; color:white; background-image:linear-gradient(#FAF281, red);"
                                         action="#{LavageBean.saveaffecterHuileToModel}" ajax="false"
                                         disabled="#{not LavageBean.huileDisponible}" />
                    </div>

                    <br />

                    <!-- Data Table of Assigned Huile -->
                    <p:dataTable id="emp2" var="tr" value="#{LavageBean.listAffectaionhuile}"
                                 style="margin-bottom:0;" emptyMessage="Aucune ligne dans le serveur">
                        <p:column headerText="Référence">
                            <h:outputText value="#{tr.produit.nom}" />
                        </p:column>

                        <p:column headerText="Kilométrage">
                            <h:outputText value="#{tr.metrage}" />
                        </p:column>

                        <p:column headerText="Nb Voiture">
                            <h:outputText value="#{tr.nbvidange}" />
                        </p:column>
                    </p:dataTable>

                </h:form>
            </fieldset>

        
    </h:panelGroup>
</ui:composition>
