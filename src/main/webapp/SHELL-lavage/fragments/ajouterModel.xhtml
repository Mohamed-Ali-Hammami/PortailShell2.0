<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets">
    <h:panelGroup layout="block" styleClass="shell-module-layout lavage-shell-fragment">
            <fieldset style="margin-bottom:20px; background-color:#eeeec6;">
                <legend>
                    <b>
                        <h:outputText value="List Vehicule" 
                                      style="font-size:14px; color:white; background-image:linear-gradient(#FAF281, red);" />
                    </b>
                </legend>

                <h:form id="listModelForm">

                    <!-- Model Input -->
                    <h:panelGrid columns="2" columnClasses="label,value" style="margin-bottom:15px;">
                        <h:outputText value="Model:" style="font-size:14px; color:#483d8b" />
                        <h:inputText value="#{LavageBean.model}" />
                    </h:panelGrid>

                    <!-- Submit Button -->
                    <div style="text-align:center; margin-bottom:20px;">
                        <p:commandButton value="Valider" styleClass="bespece"
                                         style="width:150px; font-size:12px; height:30px; color:white; background-image:linear-gradient(#FAF281, red);"
                                         action="#{LavageBean.saveModel}" ajax="false" />
                    </div>

                    <!-- Vehicule DataTable -->
                    <p:dataTable id="emp2" var="tr" value="#{LavageBean.listModel}" 
                                 rowKey="#{tr.id}" selection="#{LavageBean.selctedModel}"
                                 selectionMode="single" style="margin-bottom:0;" 
                                 emptyMessage="Aucune ligne dans le serveur">

                        <p:column headerText="Model">
                            <h:outputText value="#{tr.model}" />
                        </p:column>

                        <p:column style="width:32px; text-align:center;">
                            <f:facet name="header">
                                <h:outputText style="font-size:9px; color:#483d8b" value="+Filtre" />
                            </f:facet>
                            <p:commandLink action="#{LavageBean.affecterFilterToModel}" title="+ Filtre" process="@this">
                                <p:graphicImage url="/images/rouge.png" style="width:20px;" />
                                <f:setPropertyActionListener value="#{tr}" target="#{LavageBean.selctedModel}" />
                            </p:commandLink>
                        </p:column>

                    </p:dataTable>

                </h:form>

            </fieldset>
        
    </h:panelGroup>
</ui:composition>
