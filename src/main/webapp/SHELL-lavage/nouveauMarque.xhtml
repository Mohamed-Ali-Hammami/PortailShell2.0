<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>
	<title>Shell-Lavage</title>
</h:head>

<h:body style="background-color:#CECECE">

	<div align="center">
	<ui:insert name="menu">
			<ui:include src="/SHELL-lavage/Header.xhtml" />
		</ui:insert>
		<ui:insert name="menu">
			<ui:include src="/SHELL-lavage/Headerlavage.xhtml" />
		</ui:insert>
		<p:growl id="msgs" showDetail="true" />
		<p:panel id="basic"
			style="min-height:900px;margin-left: 50px;margin-right: 50px ;background-image: url(../2.png)">
			
			 <fieldset style="margin-bottom: 20px; background-color: #eeeec6;">
						<legend>
							<b><h:outputText
									style="font-size:14px ;color:white;background-image:linear-gradient( #FAF281, red);"
									value="Ajouter   Banque " name="outTxtcin" /> </b>
						</legend>
						<div align="center">



							<h:form>
								<table>
									<tr>

										<td width="20%"><b><h:outputText value="Nom :"
													style="font-size:12px " /></b></td>
										<td><h:inputText style="font-size:14px " id="nom" tabindex="1"
												size="30" value="#{LavageBean.marque}" styleClass="inpdes" required="true"
												requiredMessage="entrer marque vehicule" /> <p:messages
												for="nom" closable="true" autoUpdate="true" /></td>
									</tr>
									
							 
									 
								 

									<tr>

										<td width="320px"><p:commandButton value="Ajouter"
											 ajax="false"
												style="width:150px;font-size:12px;height:30;color:white;background-image:linear-gradient( #FAF281, red);"
												action="#{LavageBean.saveMarque}" /></td>
									</tr>
								</table>
								
							</h:form>
							
							<script>
			
			function init() {				 
				$('.inpdes').focus();
			}
			</script>
						</div>
					</fieldset>
            
		</p:panel>
		</div>
 
</h:body>
</html>
