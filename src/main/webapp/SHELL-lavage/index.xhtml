<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets"
    xmlns:c="http://java.sun.com/jsp/jstl/core"
    template="/WEB-INF/templates/app.xhtml">
    <ui:define name="title">Shell-Lavage</ui:define>
    <ui:define name="moduleNav">
        <ui:include src="/SHELL-lavage/HeaderlavageNav.xhtml" />
    </ui:define>
    <ui:define name="content">
        <c:choose>
            <c:when test="#{empty param.view or param.view eq 'indexLavage' or param.view eq 'services-en-cours'}">
                <h:outputText value="#{ServiceLavageBean.getLavageEcours()}" style="display:none" />
                <ui:include src="/SHELL-lavage/fragments/indexLavage.xhtml" />
            </c:when>
            <c:when test="#{param.view eq 'allMarque' or param.view eq 'marque-modele'}">
                <h:outputText value="#{LavageBean.getAllMArque()}" style="display:none" />
                <ui:include src="/SHELL-lavage/fragments/allMarque.xhtml" />
            </c:when>
            <c:when test="#{param.view eq 'affectationFiltreModel' or param.view eq 'affectation-filtre'}">
                <h:outputText value="#{LavageBean.affecterFilterToModel()}" style="display:none" />
                <ui:include src="/SHELL-lavage/fragments/affectationFiltreModel.xhtml" />
            </c:when>
            <c:when test="#{param.view eq 'affectationHuileModel' or param.view eq 'affectation-huile'}">
                <h:outputText value="#{LavageBean.affecterHuileToModel()}" style="display:none" />
                <ui:include src="/SHELL-lavage/fragments/affectationHuileModel.xhtml" />
            </c:when>
            <c:when test="#{param.view eq 'historiqueServices' or param.view eq 'historique-services'}">
                <h:outputText value="#{ServiceLavageBean.historiqueServices()}" style="display:none" />
                <ui:include src="/SHELL-lavage/fragments/historiqueServices.xhtml" />
            </c:when>
            <c:when test="#{param.view eq 'historiqueDujour' or param.view eq 'historique-jour'}">
                <h:outputText value="#{ServiceLavageBean.historiqueDuJour()}" style="display:none" />
                <ui:include src="/SHELL-lavage/fragments/historiqueDujour.xhtml" />
            </c:when>
            <c:when test="#{param.view eq 'rapport'}">
                <h:outputText value="#{ServiceLavageBean.rapport()}" style="display:none" />
                <ui:include src="/SHELL-lavage/fragments/rapport.xhtml" />
            </c:when>
            <c:when test="#{param.view eq 'rapportLavage'}">
                <h:outputText value="#{RendementBean.rapportLavage()}" style="display:none" />
                <ui:include src="/SHELL-lavage/fragments/rapportLavage.xhtml" />
            </c:when>
            <c:when test="#{param.view eq 'rapportVidange'}">
                <h:outputText value="#{RendementBean.rapportVidange()}" style="display:none" />
                <ui:include src="/SHELL-lavage/fragments/rapportVidange.xhtml" />
            </c:when>
            <c:when test="#{param.view eq 'nouveauMarque'}">
                <h:outputText value="#{LavageBean.nouveauMarque()}" style="display:none" />
                <ui:include src="/SHELL-lavage/fragments/nouveauMarque.xhtml" />
            </c:when>
            <c:when test="#{param.view eq 'ajouterModel'}">
                <h:outputText value="#{LavageBean.nouveauModel()}" style="display:none" />
                <ui:include src="/SHELL-lavage/fragments/ajouterModel.xhtml" />
            </c:when>
            <c:when test="#{param.view eq 'imprimer'}">
                <ui:include src="/SHELL-lavage/fragments/imprimer.xhtml" />
            </c:when>
            <c:when test="#{param.view eq 'imprimer2'}">
                <ui:include src="/SHELL-lavage/fragments/imprimer2.xhtml" />
            </c:when>
            <c:when test="#{param.view eq 'Imprimerhistorique'}">
                <ui:include src="/SHELL-lavage/fragments/Imprimerhistorique.xhtml" />
            </c:when>
            <c:when test="#{param.view eq 'infoService'}">
                <ui:include src="/SHELL-lavage/fragments/infoService.xhtml" />
            </c:when>
            <c:otherwise>
                <h:outputText value="#{ServiceLavageBean.getLavageEcours()}" style="display:none" />
                <ui:include src="/SHELL-lavage/fragments/indexLavage.xhtml" />
            </c:otherwise>
        </c:choose>
    </ui:define>
</ui:composition>
