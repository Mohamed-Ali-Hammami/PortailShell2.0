<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
	<link type="text/css" rel="stylesheet" href="#{request.contextPath}/style.css" />

	<h:form>
		<p:growl id="messages" />

		<p:menubar styleClass="shell-module-menubar" autoDisplay="true">
			<p:menuitem icon="ui-icon-home" url="#{request.contextPath}/shellpaie/index.xhtml" style="font-size:10px" />
			<p:menuitem value="Employers" url="#{request.contextPath}/shellpaie/index.xhtml?view=employees" style="font-size:10px" />
			<p:menuitem value="Avances" url="#{request.contextPath}/shellpaie/index.xhtml?view=avances" style="font-size:10px" />
			<p:menuitem value="Pointage" url="#{request.contextPath}/shellpaie/index.xhtml?view=pointage" style="font-size:10px" />
			<p:submenu label="Paie" style="font-size:10px">
				<p:menuitem value="Pointage" url="#{request.contextPath}/shellpaie/index.xhtml?view=pointage" style="font-size:10px" />
				<p:menuitem value="Employer declare" url="#{request.contextPath}/shellpaie/index.xhtml?view=paie-declaree" style="font-size:10px" />
				<p:menuitem value="Employer Non declare" url="#{request.contextPath}/shellpaie/index.xhtml?view=paie-non-declaree" style="font-size:10px" />
			</p:submenu>
			<p:menuitem value="Fiche de paie" url="#{request.contextPath}/shellpaie/index.xhtml?view=fiche-paie" style="font-size:10px" />
			<p:menuitem value="Gestion" url="#{request.contextPath}/shellpaie/index.xhtml?view=gestion-elements" style="font-size:10px" />
			<p:menuitem value="Recapitulatif par mois" url="#{request.contextPath}/shellpaie/index.xhtml?view=edition" style="font-size:10px" />
			<p:menuitem value="Historique des employers" url="#{request.contextPath}/shellpaie/index.xhtml?view=historique" style="font-size:10px" />
			<p:submenu label="Journal salarier" style="font-size:10px">
				<p:menuitem value="Salarier declare" url="#{request.contextPath}/shellpaie/index.xhtml?view=journal-declare" style="font-size:10px" />
				<p:menuitem value="Salarier non declare" url="#{request.contextPath}/shellpaie/index.xhtml?view=journal-non-declare" style="font-size:10px" />
				<p:menuitem value="Recapitulatif" url="#{request.contextPath}/shellpaie/index.xhtml?view=journal-total" style="font-size:10px" />
				<p:menuitem value="Ordre de virement" url="#{request.contextPath}/shellpaie/index.xhtml?view=ordre-virement" style="font-size:10px" />
			</p:submenu>
			<p:menuitem value="Administration" url="#{request.contextPath}/shellpaie/index.xhtml?view=administration" style="font-size:10px" />
			<p:submenu label="Gestion des conges" style="font-size:10px">
				<p:menuitem value="Pointage" url="#{request.contextPath}/shellpaie/index.xhtml?view=conge-pointage" style="font-size:10px" />
				<p:menuitem value="Etat des conges" url="#{request.contextPath}/shellpaie/index.xhtml?view=conge-etat" style="font-size:10px" />
				<p:menuitem value="Journal" url="#{request.contextPath}/shellpaie/index.xhtml?view=conge-journal" style="font-size:10px" />
			</p:submenu>
			<p:submenu label="Primes de fin d'annee" style="font-size:10px">
				<p:menuitem value="Note" url="#{request.contextPath}/shellpaie/index.xhtml?view=prime-note" style="font-size:10px" />
				<p:menuitem value="Etat des primes" url="#{request.contextPath}/shellpaie/index.xhtml?view=prime-etat" style="font-size:10px" />
				<p:menuitem value="Journal" url="#{request.contextPath}/shellpaie/index.xhtml?view=prime-journal" style="font-size:10px" />
			</p:submenu>

			<f:facet name="options">
				<p:commandLink id="nonAjax" action="#{LoginBean.logout}" ajax="false" styleClass="shell-logout-link">
					<p:graphicImage url="/images/logout.png" />
					<h:outputText value="#{msg['logout.user']}" />
				</p:commandLink>
			</f:facet>
		</p:menubar>
	</h:form>
</ui:composition>
