<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>

</h:head>

<h:body>




	<p:panel style="min-height:900px;margin-left: 20px;margin-right: 20px;">
		<ui:insert name="menu">
			<ui:include src="/shellpaie/Header.xhtml" />
		</ui:insert>
		<ui:insert name="menu">
			<ui:include src="/shellpaie/Headerpaie.xhtml" />
		</ui:insert>
		<p:panel id="basic2" closable="true"
			style="min-height:900px;margin-left: 50px;margin-right: 50px;background-image: url(../2.png)">
				<h:form>
				<div align="right"> 
				<table>
							<tr>	
								 	<td><p:commandButton value="Nouveau"
										action="#{PretBean.nouveauPret}" ajax="false"
										style="width:150px;font-size:12px;height:30;color:white;background-image:linear-gradient( #FAF281, red);" /></td>
                       

							</tr>
							</table></div>
							</h:form>
							
							<br/><br/>
					<h:form>
                      <p:dataTable id="emp" var="pret" editable="true"
								  value="#{PretBean.listpret}"
								widgetVar="articleTable" selectionMode="single"
								selection="#{PretBean.selectedPret}"
								filteredValue="#{PretBean.filtredPret}"
								rowKey="#{pret.id}" style="margin-bottom:10px"
								emptyMessage="aucune pret en cours" paginator="true"
								rows="100" paginatorPosition="bottom" resizableColumns="true"
								liveResize="true">
								 
								<p:column>
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="CODE" />
									</f:facet>
									<h:outputText style="font-size:12px "
										value="#{pret.id}" />
								</p:column>

								 <p:column>
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="employer" />
									</f:facet>
									<h:outputText style="font-size:12px "
										value="#{pret.employee.nom} #{pret.employee.prenom}" />
								</p:column>
								
								 <p:column>
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="MONTANT DU PRET" />
									</f:facet>
									<h:outputText style="font-size:12px "
										value="#{pret.montant_pret}" />
								</p:column>
								
								<p:column>
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="TAUX" />
									</f:facet>
									<h:outputText style="font-size:12px "
										value="#{pret.taux}" />
								</p:column>
								
								<p:column>
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="NOMBRE DE MOIS" />
									</f:facet>
									<h:outputText style="font-size:12px "
										value="#{pret.nbmois}" />
								</p:column>						
								 
 

							</p:dataTable>
                                   
                          
					</h:form>
				 </p:panel>
				 </p:panel>
				 </h:body>
				 </html>
