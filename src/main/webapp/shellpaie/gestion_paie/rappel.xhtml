<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>

</h:head>

<h:body>
	<p:panel style="min-height:900px;margin-left: 20px;margin-right: 20px;">
		<ui:insert name="menu">
			<ui:include src="/shellpaie/Header.xhtml" />
		</ui:insert>
		<ui:insert name="menu">
			<ui:include src="/shellpaie/Headerpaie.xhtml" />
		</ui:insert>
		<p:panel id="basic2" closable="true"
			style="min-height:900px;margin-left: 50px;margin-right: 50px;background-image: url(../2.png)">
			<h:form>
				<div align="center">

					<h:panelGrid columns="9">

						<h:outputText value="Annee : " style="font-weight: bold" />
						<p:selectOneMenu value="#{RappelBean.annee}"
							style="width:50px;font-size:12px " id="annee" turefilter="true"
							filterMatchMode="contains">
							 <f:selectItem itemLabel="Annee"   />
						 <f:ajax render="mois1"></f:ajax>
							<f:selectItems value="#{RappelBean.listannee}"   itemValue="#{a.annee}" var="a" itemLabel="#{a.annee}"/>
						</p:selectOneMenu>
                       <h:outputText value="#{RappelBean.annee}"  id="a"></h:outputText>
                     
						 
						<p:selectOneMenu value="#{RappelBean.mois}"
							style="width:50px;font-size:12px " id="mois1" turefilter="true"
							filterMatchMode="contains">
						<f:selectItem itemLabel="Mois"   />
							     <f:selectItems  value="#{RappelBean.listMois}"   />
							      	<p:ajax listener="#{RappelBean.updatedate}" />       					 
						         </p:selectOneMenu>
					    
					   
					 
					   <h:outputText value="Annee2 : " style="font-weight: bold" />
					   
						<p:selectOneMenu value="#{RappelBean.annee2}"
							style="width:50px;font-size:12px " id="annee2" turefilter="true"
							filterMatchMode="contains">
							 <f:selectItem itemLabel="Annee"   />
							 
							<f:selectItems value="#{RappelBean.listannee2}"   itemLabel="#{a.annee}" var="a" itemValue="#{a.annee}"/>
						</p:selectOneMenu>
  

						<h:outputLabel for="mois" value="Mois:" />
						<p:selectOneMenu value="#{RappelBean.mois2}"
							style="width:50px;font-size:12px " id="mois" turefilter="true"
							filterMatchMode="contains">
						<f:selectItem itemLabel="Mois"  />
							     <f:selectItems  value="#{RappelBean.listMois2}"   />
							<p:ajax listener="#{RappelBean.updatedate}"  />       						 
						         </p:selectOneMenu>
						         
					    
					</h:panelGrid>
				 
                    <br/>


                    <h:panelGrid columns="2">

					<p:commandButton value="Valider" ajax="false"
						style="width:200px;height:30;color:white;background-image:linear-gradient( #FAF281, red);font-size:12px"
						action="#{RappelBean.validerRappel}" />
						
					 
										
										</h:panelGrid>
										
				 <p:dataTable id="emp" var="p" editable="true" rowIndexVar="rowId"
						value="#{RappelBean.listEmployee}" editMode="cell"
						widgetVar="articleTable" rowKey="#{p.id}"
						emptyMessage="aucun employer dans la base">
						<p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="EMPLOYER" />
							</f:facet>
							<h:outputText style="font-size:12px " value="#{p.code}" />
						</p:column>
						<p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="EMPLOYER" />
							</f:facet>
							<h:outputText style="font-size:12px " value="#{p.nom}" />
						</p:column>
						
						
						<p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="Categorie" />
							</f:facet>
							<h:outputText style="font-size:12px " value="C#{p.contrat.cat.valeur}E#{p.contrat.degree.valeur}" />
						</p:column>

						<p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="NOMBRE DE JOURS TRAVAILLÉS" />
							</f:facet>

                     

							<h:inputText value="#{RappelBean.nbjour}" id="id"
								onkeyup="nexts2(this);" styleClass="inpdes"
								style="background-color:transparent;border:none;">
								<p:ajax listener="#{RappelBean.updatepontage}" process="@this"
									partialSubmit="true">

								</p:ajax>
								<f:attribute name="test" value="#{rowId}" />
							</h:inputText>
						</p:column>
					</p:dataTable>
						
						<script>
					function init() {
						var index = 0;
						$('.inpdes').eq(index).focus();
						$('.inpdes').eq(index).select();
					}
					function nexts2(input) {
						$(document)
								.keypress(
										function(event) {
											var keycode = (event.keyCode ? event.keyCode
													: event.which);
											if (keycode == '13') {
												$(input).closest('tr').next(
														'tr').find(
														'input[type=text]')
														.focus();
												$(input).closest('tr').next(
														'tr').find(
														'input[type=text]')
														.select();
												return false;
											}

										});
					}
				</script>

				</div>
			</h:form>
		</p:panel>
	</p:panel>
</h:body>
</html>
