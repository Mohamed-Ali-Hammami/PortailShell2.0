<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>

</h:head>

<h:body onload="init()">




	<p:panel style="min-height:900px;margin-left: 20px;margin-right: 20px;">
		<ui:insert name="menu">
			<ui:include src="/shellpaie/Header.xhtml" />
		</ui:insert>
		<ui:insert name="menu">
			<ui:include src="/shellpaie/Headerpaie.xhtml" />
		</ui:insert>
		<p:panel id="basic2" closable="true"
			style="min-height:900px;margin-left: 50px;margin-right: 50px;background-image: url(../2.png)">
			<h:form>
				<div align="center">
					<table>
						<tr>


							<td><p:commandButton value="Valider" ajax="false"
									style="width:200px;height:30;color:white;background-image:linear-gradient( #FAF281, red);font-size:12px"
									action="#{PretBean.ValiderPointage}" /></td>
						</tr>
					</table>
				</div>
				<br />
				<br />


				<h:panelGrid columns="2" cellpadding="5">

					<h:outputText value="Annee : " style="font-weight: bold" />
					<p:selectOneMenu value="#{PretBean.annee}"
						style="width:200px;font-size:12px " id="annee" turefilter="true"
						filterMatchMode="contains">
						<!-- <p:ajax listener="#{PretBean.GetMoisByAnnee}" /> -->
						<f:selectItems value="#{PretBean.listannee}" />
					</p:selectOneMenu>

					<h:outputText value="Mois : " style="font-weight: bold" />
					<p:selectOneMenu value="#{PretBean.moi}"
						style="width:200px;font-size:12px " id="mois" turefilter="true"
						filterMatchMode="contains">
						<p:ajax update="imprimer" />
						<f:selectItems value="#{PretBean.listMois}" />
					</p:selectOneMenu>

				</h:panelGrid>

				<p:commandButton value="Imprimer"
					style="width:200px;height:30;color:white;background-image:linear-gradient( #FAF281, red);font-size:12px">
					<p:printer target="imprimer" />
				</p:commandButton>
				<br />
				<br />
				<p:outputPanel id="imprimer">
					<H1>
						<h:outputText value="Pointage Mois #{PretBean.moi}" />
					</H1>

					<p:dataTable id="emp" var="p" editable="true" rowIndexVar="rowId"
						value="#{PretBean.listpointage}" editMode="cell"
						widgetVar="articleTable" rowKey="#{p.id}"
						emptyMessage="aucun employer dans la base">
						<p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="EMPLOYER" />
							</f:facet>
							<h:outputText style="font-size:12px " value="#{p.employee.code}" />
						</p:column>
						<p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="EMPLOYER" />
							</f:facet>
							<h:outputText style="font-size:12px " value="#{p.employee.nom}" />
						</p:column>

						<p:column>
							<f:facet name="header">
								<h:outputText style="font-size:12px ;color:#483d8b"
									value="NOMBRE DE JOURS TRAVAILLÉS" />
							</f:facet>

                     

							<h:inputText value="#{PretBean.nb_jour}" id="id"
								onkeyup="nexts2(this);" styleClass="inpdes"
								style="background-color:transparent;border:none;">
								<p:ajax listener="#{PretBean.updatepontage}" process="@this"
									partialSubmit="true">

								</p:ajax>
								<f:attribute name="test" value="#{rowId}" />
							</h:inputText>
						</p:column>
					</p:dataTable>
				</p:outputPanel>
				<script>
					function init() {
						var index = 0;
						$('.inpdes').eq(index).focus();
						$('.inpdes').eq(index).select();
					}
					function nexts2(input) {
						$(document)
								.keypress(
										function(event) {
											var keycode = (event.keyCode ? event.keyCode
													: event.which);
											if (keycode == '13') {
												$(input).closest('tr').next(
														'tr').find(
														'input[type=text]')
														.focus();
												$(input).closest('tr').next(
														'tr').find(
														'input[type=text]')
														.select();
												return false;
											}

										});
					}
				</script>

			</h:form>
		</p:panel>
	</p:panel>
</h:body>
</html>
