<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>

</h:head>

<h:body>




	<p:panel style="min-height:900px;margin-left: 20px;margin-right: 20px;">
		<ui:insert name="menu">
			<ui:include src="/shellpaie/Header.xhtml" />
		</ui:insert>
		<ui:insert name="menu">
			<ui:include src="/shellpaie/Headerpaie.xhtml" />
		</ui:insert>
		<p:panel id="basic2" closable="true"
			style="min-height:900px;margin-left: 50px;margin-right: 50px;background-image: url(../2.png)">
				<h:form>
				<div align="right"> 
				<table>
							<tr>	
								 	<td><p:commandButton value="Nouveau"
										action="#{AvanceBean.nouvelleAvance}" ajax="false"
										style="width:150px;font-size:12px;height:30;color:white;background-image:linear-gradient( #FAF281, red);" /></td>
                       

							</tr>
							</table></div>
							</h:form>
							
							<br/><br/>
					<h:form>
					<h:panelGrid columns="2" cellpadding="5">
							<h:outputText value="Annee : " style="font-weight: bold" />
							<p:selectOneMenu value="#{AvanceBean.annees}" 
								style="width:200px;font-size:12px " id="annee" filter="true"
								filterMatchMode="contains">
								 
								<f:selectItem itemLabel="Veuillez choisir l'annee"  />
								<f:selectItems value="#{AvanceBean.listannee}" />
							</p:selectOneMenu>
                             <!-- event="onchange" -->
							<h:outputText value="Mois : " style="font-weight: bold" />
							<p:selectOneMenu value="#{AvanceBean.moi}" 
								style="width:200px;font-size:12px " id="mois" filter="true"
								filterMatchMode="contains">
								  
								<f:selectItem itemLabel="Veuillez choisir un mois"  />
								<f:selectItems value="#{AvanceBean.listMois}"  />
								<f:ajax listener="#{AvanceBean.getAllavances}" render="paie imprimer" />  
							</p:selectOneMenu>
							</h:panelGrid>
							<br/>
						 
							<p:commandButton value="Imprimer"
											style="width:200px;height:30;color:white;background-image:linear-gradient( #FAF281, red);font-size:12px">
											<p:printer target="imprimer" />
										</p:commandButton>
								<br/>	<br/>
								
								<p:outputPanel id="imprimer">
							<H1>	 <h:outputText value="Avances du  Mois #{AvanceBean.moi}"/></H1>
							
							  <p:dataTable id="paie" var="avance"  
								  value="#{AvanceBean.listAvenc}"  
								widgetVar="articleTable"  
								 
								filteredValue="#{AvanceBean.filtredAvenc}"
								  style="margin-bottom:10px"
								emptyMessage="aucune avance en cours" >  
					 
								 
								<p:ajax event="rowEdit" listener="#{AvanceBean.onRowEdit}"
									 />
								<p:column>
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="CODE" />
									</f:facet>
									<h:outputText style="font-size:12px "
										value="#{avance.employee.code}" />
								</p:column>

								 <p:column filterBy="#{avance.employee.nom}" filterMatchMode="contains">
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="employer" />
									</f:facet>
								
										
											<p:cellEditor>
										<f:facet name="output">
											<h:outputText style="font-size:12px " 
										value="#{avance.employee.nom}" />
										</f:facet>
										<f:facet name="input">
											<p:inputText id="codeInput2" value="#{avance.employee.matricule}"
												style="width:96%" />
												
												 
										</f:facet>

									</p:cellEditor>
									
								</p:column>
								
								 <p:column>
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="MONTANT" />
									</f:facet>
									 
										<p:cellEditor>
										<f:facet name="output">
											<h:outputText style="font-size:12px " value="#{avance.montant_avances}" />
										</f:facet>
										<f:facet name="input">
											<p:inputText id="codeInput" value="#{avance.montant_avance}"
												style="width:96%" />
										</f:facet>

									</p:cellEditor>
								</p:column>
								
								<p:column>
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="MOIS" />
									</f:facet>
									<h:outputText style="font-size:12px "
										value="#{avance.moi}" />
								</p:column>
								
								<p:column>
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="ANNEE" />
									</f:facet>
									<h:outputText style="font-size:12px "
										value="#{avance.annee}" />
								</p:column>
								
								 <p:column style="width:32px;text-align: center">
                       <p:commandButton    icon="ui-icon-search" title="View" action="#{AvanceBean.Visualiser}">
                         <f:setPropertyActionListener value="#{avance}" target="#{AvanceBean.selectedAvance}" />
                           </p:commandButton>
                                  </p:column> 
 
                           <p:column style="width:40px">
									<f:facet name="header">
										<h:outputText style="font-size:9px;color:#483d8b"
											value="modifier" />
									</f:facet>
									<p:rowEditor />
								</p:column>
							</p:dataTable>
                                </p:outputPanel>   
                          
					</h:form>
				 </p:panel>
				 </p:panel>
				 </h:body>
				 </html>
