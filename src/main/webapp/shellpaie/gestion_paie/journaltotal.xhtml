<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>

</h:head>

<h:body>




	<p:panel style="min-height:900px;margin-left: 20px;margin-right: 20px;">
		<ui:insert name="menu">
			<ui:include src="/shellpaie/Header.xhtml" />
		</ui:insert>
		<ui:insert name="menu">
			<ui:include src="/shellpaie/Headerpaie.xhtml" />
		</ui:insert>
		<p:panel id="basic2" closable="true"
			style="min-height:900px;margin-left: 50px;margin-right: 50px;background-image: url(../2.png)">
					<h:form>
						 , 
						<br />
						<br />
						<table>
								<tr>
									 <td/>
									<td><p:commandButton value="Imprimer"
											style="width:200px;height:30;color:white;background-image:linear-gradient( #FAF281, red);font-size:12px"
											   >
											  <p:printer target="imprimer"/>
											  </p:commandButton>
											  </td>
									 </tr>
									 
									 <tr>
									 
									<td>
						<h:panelGrid columns="2" cellpadding="5">
							<h:outputText value="Annee : " style="font-weight: bold" />
							<p:selectOneMenu value="#{PaisBeans.annees}" 
								style="width:200px;font-size:12px " id="annee" filter="true"
								filterMatchMode="contains">
								<f:ajax listener="#{PaisBeans.getMoisByAnnees}" render="mois"  />
								<f:selectItem itemLabel="Veuillez choisir annee"  />
								<f:selectItems value="#{PaisBeans.listannee}" />
							</p:selectOneMenu>
                             <!-- event="onchange" -->
							<h:outputText value="Mois : " style="font-weight: bold" />
							<p:selectOneMenu value="#{PaisBeans.mois}" 
								style="width:200px;font-size:12px " id="mois" filter="true"
								filterMatchMode="contains">
								
								<f:selectItem itemLabel="Veuillez choisir un mois"  />
								<f:selectItems value="#{PaisBeans.listMois}"  />
								<f:ajax listener="#{PaisBeans.journal3}" render="paie" />
							</p:selectOneMenu>

                         
						</h:panelGrid></td></tr></table>
						<br/><br/><br/><br/>
						 <p:outputPanel  id="imprimer"  >
						 <table>
								<tr>
									<td width="300px"><p:graphicImage
											url="/images/shell.jpg" style="width:180px" /><br />

									</td>

									<td style="text-align: center"><b><h:outputText
												value="FETHI SASSI" style="font-size:24px" /></b> <br />
										<h:outputText value="SHELL SIJOUMIE" style="font-size:24px" /> <br />
										  <br /></td>
								</tr>
							</table>
							<p:separator/>	<br/><br/><br/>
						<div align="center">
						
                      <h:panelGroup id="paie" >
                      <h:outputText value="JOURNAL DES SALAIRES DU MOIS DE #{PaisBeans.mois} #{PaisBeans.annees}" style="font-size:16px" />
                       <table border="1" style="width: 100%">
                       <tr>
                        <td style="border: thin solid #F2EFEE;"> </td>
                       <td style="border: thin solid #F2EFEE;"><b><h:outputText value="Employers Declarées " style="font-size:12px" /></b></td>
                           <td style="border: thin solid #F2EFEE;"><b><h:outputText value="Employers Non Declarées " style="font-size:12px" /></b></td>
                      <td style="border: thin solid #F2EFEE;"><b><h:outputText value="Total " style="font-size:12px" /></b></td>
                      
                       </tr>
                        <tr>                       
                        <td style="border: thin solid #F2EFEE;"><h:outputText value="Montant " style="font-size:12px" /></td>
                        <td style="border: thin solid #F2EFEE;"><h:outputText value="#{PaisBeans.recap1.formul.salaire_nets}"
									style="font-size:12px" /></td>
									
									<td style="border: thin solid #F2EFEE;"><h:outputText value="#{PaisBeans.recap2.formul.salaire_nets}"
									style="font-size:12px" /></td>
						 <td style="border: thin solid #F2EFEE;"><h:outputText value="#{PaisBeans.recap1.formul.irpps}"
									style="font-size:12px" /></td>
                        </tr>
                       <tr> <td style="border: thin solid #F2EFEE;"><h:outputText value="Acompte " style="font-size:12px" /></td>
                        <td style="border: thin solid #F2EFEE;"><h:outputText value="#{PaisBeans.recap1.formul.avances}"
									style="font-size:12px" /></td>
									
									<td style="border: thin solid #F2EFEE;"><h:outputText value="#{PaisBeans.recap2.formul.avances}"
									style="font-size:12px" /></td> 
						<td style="border: thin solid #F2EFEE;"><h:outputText value="#{PaisBeans.recap1.formul.retenue_cnsss}"
									style="font-size:12px" /></td>
                       </tr>
                       <tr> <td style="border: thin solid #F2EFEE;"><h:outputText value="Reste " style="font-size:12px" /></td>
                       <td style="border: thin solid #F2EFEE;"><h:outputText value="#{PaisBeans.recap1.formul.net_apayers}"
									style="font-size:12px" /></td>
									
						 <td style="border: thin solid #F2EFEE;"><h:outputText value="#{PaisBeans.recap2.formul.net_apayers}"
									style="font-size:12px" /></td>
                         
									
					<td style="border: thin solid #F2EFEE;"><h:outputText value="#{PaisBeans.recap1.formul.salaire_bruts}"
									style="font-size:12px" /></td>
					  </tr>
						 </table>
						
						 
						 
                              
						 
                         </h:panelGroup>
                         </div>
                         </p:outputPanel>
					</h:form>
				</p:panel>
				</p:panel>
				</h:body>
				</html>
