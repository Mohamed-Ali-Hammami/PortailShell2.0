<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>

</h:head>

<h:body>




	<p:panel style="min-height:900px;margin-left: 20px;margin-right: 20px;">
		<ui:insert name="menu">
			<ui:include src="/shellpaie/Header.xhtml" />
		</ui:insert>
		<ui:insert name="menu">
			<ui:include src="/shellpaie/Headerpaie.xhtml" />
		</ui:insert>
		<p:panel id="basic2" closable="true"
			style="min-height:900px;margin-left: 50px;margin-right: 50px;background-image: url(../2.png)">
				<h:form>
					<div align="center">
						<table>
							<tr>
								<td ><p:commandButton value="Retour"
										style="width:200px;height:30;color:white;background-image:linear-gradient( #FAF281, red);font-size:12px"
										action="#{PaieBean.allGestions}" /></td>

								<td><p:commandButton value="Valider"
										style="width:200px;height:30;color:white;background-image:linear-gradient( #FAF281, red);font-size:12px"
										action="#{PaieBean.ajouterGestion}" /></td>
							</tr>
						</table>
					</div>
					<br/><br/>
					 
						 
							<h:panelGrid columns="1" cellpadding="5">
								 
								<h:outputText value="Libelle : " style="font-weight: bold" /> 
								<h:inputText value="#{PaieBean.libelle}" id="libelle" required="true" requiredMessage="entrer libelle"/>
						           <h:outputText value="Valeur : " style="font-weight: bold" /> 
								<h:inputText value="#{PaieBean.prime}" id="valeur" required="true" requiredMessage="entrer valeur"/>
						         
								<h:outputText value="Signe : " style="font-weight: bold" /> 
								<p:selectOneMenu  value="#{PaieBean.signe}"  
						        style="width:200px;font-size:12px " id="mois" turefilter="true" filterMatchMode="contains"
						        required="true" requiredMessage="entrer mois ">
							     <f:selectItem itemLabel="veuillez choisir un signe"   />	
							     <f:selectItems value="#{PaieBean.signes}"   />							 
						         </p:selectOneMenu>	
						         
								 
								 

							</h:panelGrid>
						 
								
						 
								
								
								
								 
	</h:form>
				 </p:panel>
				 </p:panel>
				 </h:body>
