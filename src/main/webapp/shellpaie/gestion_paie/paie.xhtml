<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>

</h:head>

<h:body> 
	<p:panel style="min-height:900px;margin-left: 20px;margin-right: 20px;">
		<ui:insert name="menu">
			<ui:include src="/shellpaie/Header.xhtml" />
		</ui:insert>
		<ui:insert name="menu">
			<ui:include src="/shellpaie/Headerpaie.xhtml" />
		</ui:insert>
		<p:panel id="basic2" closable="true"
			style="min-height:900px;margin-left: 50px;margin-right: 50px;background-image: url(../2.png)">
					<h:form>
						<div align="center">
						<p:messages autoUpdate="true" closable="true" id="messages"/>
							<table>
								<tr>
									<td><p:commandButton value="Supprimer" id="s"  
											style="width:200px;height:30;color:white;background-image:linear-gradient( #FAF281, red);font-size:12px"
											  action="#{PaisBeans.supprimerpaie}"/></td>
									<td><p:commandButton value="Valider"   ajax="false"
											style="width:200px;height:30;color:white;background-image:linear-gradient( #FAF281, red);font-size:12px"
											  action="#{PaisBeans.validerPaie}"/>
											  
											  
											  
											  </td>
											  								</tr>
							</table>
						</div>
						<br />
						<br />
						<h:panelGrid columns="2" cellpadding="5">
							<h:outputText value="Annee : " style="font-weight: bold" />
							<p:selectOneMenu value="#{PaisBeans.annees}" 
								style="width:200px;font-size:12px " id="annee" filter="true"
								filterMatchMode="contains">
								<f:ajax listener="#{PaisBeans.getMoisByAnnees}" render="mois"  />
								<f:selectItem itemLabel="Veuillez choisir annee"  />
								<f:selectItems value="#{PaisBeans.listannee}" />
							</p:selectOneMenu>
                             <!-- event="onchange" -->
							<h:outputText value="Mois : " style="font-weight: bold" />
							<p:selectOneMenu value="#{PaisBeans.mois}" 
								style="width:200px;font-size:12px " id="mois" filter="true"
								filterMatchMode="contains">
								
								<f:selectItem itemLabel="Veuillez choisir un mois"  />
								<f:selectItems value="#{PaisBeans.listMois}"  />
								<f:ajax listener="#{PaisBeans.getPaiBymoiAndAnnee}" render="paie" />
							</p:selectOneMenu>

                         
						</h:panelGrid>
						
                      <h:panelGroup id="paie" >
                       <div align="left">
						<ui:repeat var="p" value="#{PaisBeans.listPaie}" >
							 <h:panelGrid columns="2"  >
							 <h:outputText value="Mois  : " style="font-size:12px" />
							  <h:outputText value="#{PaisBeans.mois}" style="font-size:12px" />
							</h:panelGrid>
							 <h:panelGrid columns="4"  >
							
								<h:outputText value="Matricule : " style="font-size:12px" />
								<h:outputText value="#{p.employee.matricule}"
									style="font-size:12px" />
								 

								<h:outputText value="Nom et prénom  : "
									style="font-size:12px" />
								<h:outputText value="#{p.employee.nom}"
									style="font-size:12px" />
									
									<h:outputText value="CIN : "
									style="font-size:12px" />
								<h:outputText value="#{p.employee.cin}"
									style="font-size:12px" />
									
									<h:outputText value="Matricule CNSS : "
									style="font-size:12px" />
								<h:outputText value="#{p.employee.code_cnss}"
									style="font-size:12px" />
									
									<h:outputText value="Adresse : "
									style="font-size:12px" />
								<h:outputText value="#{p.employee.adresse}"
									style="font-size:12px" />
									<h:panelGroup rendered="#{p.employee.RIB!=''}">
									<h:outputText value="RIB: "
									style="font-size:12px" />
								<h:outputText value="#{p.employee.RIB}"
									style="font-size:12px" />
								 </h:panelGroup>
								 

								<h:outputText value="Etat civile  : " style="font-size:12px" />
								<h:outputText value="#{p.employee.etat}"
									style="font-size:12px" />
								 

								<h:outputText value="Nombre d'enfants à charge   : "
									style="font-size:12px" />
								<h:outputText value="#{p.employee.nb_enfant_enCharge}"
									style="font-size:12px" />
							</h:panelGrid>
						
						 
							 
							<table border="0" style="width: 100%">
							<tr style="background-color:#FA9581;"><td style="width: 30%">
								<h:outputText value="     " style="font-size:12px" /></td>
								<td style="width: 30%"><h:outputText value="GAIN " style="font-size:12px" /></td>
								<td><h:outputText value="RETENUE " style="font-size:12px" /></td>
							 </tr>
                           
							 

                               <tr>
								<td style="border: thin solid #F2EFEE;"><h:outputText value="Salaire de base (#{p.formulaire_Paie.nb_heure} jours) "
									style="font-size:12px" /></td>
								<td style="border: thin solid #F2EFEE;"><h:outputText value="#{p.formulaire_Paie.salairedebases}"
									style="font-size:12px" /></td>
								<td style="border: thin solid #F2EFEE;"><h:outputText value="    " style="font-size:12px" /></td>
								 </tr>

								
								<ui:repeat var="g" value="#{p.listGestion}">
								<tr>
									<td style="border: thin solid #F2EFEE;"><h:outputText value="#{g.lignegestion.gestion.libelle}" style="font-size:12px" /></td>
									
<!-- 
<td style="border: thin solid #F2EFEE;"><h:outputText value="#{p.formulaire_Paie.nb_heure*g.valeurdeprime*8}"
										style="font-size:12px" /></td>
 -->
                               <td style="border: thin solid #F2EFEE;"><h:outputText value="#{g.valeurdeprimeaffichers}"
										style="font-size:12px" /></td>
									<td style="border: thin solid #F2EFEE;"><h:outputText value="    " style="font-size:12px" /></td>
								</tr>	 
								</ui:repeat>
                                
								<tr><td style="border: thin solid #F2EFEE;"><h:outputText value="Salaire brut "
									style="font-size:12px" /></td>
								<td style="border: thin solid #F2EFEE;"><h:outputText value="#{p.formulaire_Paie.salaire_bruts}"
									style="font-size:12px" /></td>
								<td style="border: thin solid #F2EFEE;"><h:outputText value="    " style="font-size:12px" /></td>
								</tr>
							 
							
								<tr ><td style="border: thin solid #F2EFEE;"><h:outputText value="retenue CNSS"
									style="font-size:12px" /></td>
								
								<td style="border: thin solid#F2EFEE;"><h:outputText value="    " style="font-size:12px" /></td>
								<td style="border: thin solid#F2EFEE;"><h:outputText value="#{p.formulaire_Paie.retenue_cnsss}"
									style="font-size:12px" /></td>
								</tr>
									
								
								<tr><td style="border: thin solid #F2EFEE;"><h:outputText value="Salaire imposable"
									style="font-size:12px" /></td>
								<td style="border: thin solid #F2EFEE;"><h:outputText value="#{p.formulaire_Paie.salaire_imposables}"
									style="font-size:12px" /></td>
								<td style="border: thin solid #F2EFEE;"><h:outputText value="    " style="font-weight: bold" />
								 </td>
								 </tr>
								<tr><td style="border: thin solid #F2EFEE;">
							 	<h:outputText value="IRPP"
									style="font-size:12px" /></td>
								
								<td style="border: thin solid #F2EFEE;"><h:outputText value="    " style="font-size:12px" />
								 </td>
								 <td style="border: thin solid #F2EFEE;"><h:outputText value="#{p.formulaire_Paie.irpps}"
									style="font-size:12px" /></td>
								 </tr>
								 <h:panelGroup rendered="#{p.formulaire_Paie.redevance !=0}">
										<tr>
											<td style="border: thin solid #F2EFEE;"><h:outputText
													value="Redevance" style="font-size:12px" /></td>

											<td style="border: thin solid #F2EFEE;"><h:outputText
													value="    " style="font-size:12px" /></td>
											<td style="border: thin solid #F2EFEE;"><h:outputText
													value="#{p.formulaire_Paie.redevances}" style="font-size:12px" /></td>
										</tr>
									 </h:panelGroup>
								<tr><td style="border: thin solid #F2EFEE;">
								<h:outputText value="Salaire net"
									style="font-size:12px" /></td>
								<td style="border: thin solid #F2EFEE;"><h:outputText value="#{p.formulaire_Paie.salaire_nets}"
									style="font-size:12px" /></td>
								<td style="border: thin solid #F2EFEE;"><h:outputText value="    " style="font-size:12px" />
								 
								</td>
								</tr>
								<h:panelGroup rendered="#{p.formulaire_Paie.avance!=0}">
								  <tr ><td style="border: thin solid #F2EFEE;">
								<h:outputText value="Avance"
									style="font-size:12px" /></td>
								 
								<td style="border: thin solid #F2EFEE;"><h:outputText value="    " style="font-size:12px" />
								 
								 </td>
								 <td style="border: thin solid #F2EFEE;"><h:outputText value="#{p.formulaire_Paie.avances}"
									style="font-size:12px" /></td>
								 </tr>
								 </h:panelGroup>
								   
								 
								 
								  <tr><td style="border: thin solid #F2EFEE;">
								<h:outputText value="Net à payer"
									style="font-size:12px" /></td>
								<td style="border: thin solid #F2EFEE;"><h:outputText value="#{p.formulaire_Paie.net_apayers}"
									style="font-size:12px" /></td>
								<td style="border: thin solid #F2EFEE;"><h:outputText value="    " style="font-size:12px" />
								 
								 </td>
								  
								 </tr>
						 </table>
						
						 
							<br />
							<br />
                              
							<br />
							<br />
                              
						</ui:repeat>
						</div>
                         </h:panelGroup>
                         
					</h:form>
				</p:panel>
				</p:panel>
				</h:body>
				</html>
