<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>
	<meta http-equiv="content-type" content="text/html; charset=UTF-8"
		charset="UTF-8"></meta>
	<link type="text/css" rel="stylesheet" href="style.css" />
	<title>SHELL SIJOUMI</title>

</h:head>
<h:body>

	<div align="left">
		<table>
			<tr>
				<td width="780"><b><h:outputText value="FETHI SASSI    " style="font-size:14px" /></b>

					<p:graphicImage url="/images/shell.jpg" style="width:80" />
					<p:spacer /> </td>
				<td width="780" >
				<p:notificationBar position="bottom" effect="slide"
						styleClass="top" widgetVar="bar">
						 
					</p:notificationBar> 
					
					 
					
						</td>
				<td width="780" />
				<td align="center"><p:panel style="width:110px">

						<b><h:outputText style="font-size:10px;"
								value="#{loginMgmtBean.user.nom} #{loginMgmtBean.user.prenom} !" />
						</b>
					</p:panel></td>
			</tr>
		</table>
	</div>
	<h:form>
		<p:growl id="messages" />

		<p:menubar style="height:30px" autoDisplay="true">
			<p:menuitem icon="ui-icon-home" action="#{PaieBean.index}"
				style="font-size:10px" />
			<p:menuitem value="    Employers  " action="#{PaieBean.getAllEmployee}"
				style="font-size:10px" />
					  
			<p:menuitem value="   | Avances  "
				action="#{AvanceBean.getAllavance}" style="font-size:10px" />
			 
   

			<p:menuitem value="| Pointage  "
				action="#{PretBean.Pointage}" style="font-size:10px" />
			<p:submenu label="    | Paie  " style="font-size:10px">	
			<p:menuitem value=" Employer declare  "
				action="#{PaisBeans.getAllPai}" style="font-size:10px" />
				
			<p:menuitem value=" Employer Non declare  "
				action="#{PaisBeans.getAllPai2}" style="font-size:10px" />
				 
				</p:submenu>
		    <p:menuitem value="| Fiche de paie  "
				action="#{PaisBeans.getAllFicchePaie}" style="font-size:10px" />
				
		   <p:menuitem value="| Gestion  "
				action="#{PaieBean.allGestions}" style="font-size:10px" />
				
		  <p:menuitem value="| Récapitulatif par mois  "
				action="#{PaisBeans.recapulatif}" style="font-size:10px" />
				
		 <p:menuitem value="| Historique des employers  "
				action="#{PaisBeans.historique_empl}" style="font-size:10px" />
			<p:submenu label="    | Journal salarier  " style="font-size:10px">	
		 <p:menuitem value="   salarier declaré  "
				action="#{PaisBeans.journal}" style="font-size:10px" />
				
		<p:menuitem value="   salarier non declaré  "
				action="#{PaisBeans.journalNondeclare}" style="font-size:10px" />
				<p:menuitem value="   Récapitulatif  "
				action="#{PaisBeans.journaltotal}" style="font-size:10px" />
			<p:menuitem value="   Ordre de virement  "
				action="#{PaisBeans.virement}" style="font-size:10px" />
		</p:submenu>
		<p:menuitem value="      | Administration  "
					action="#{ParametrageBean.listparamettre}"  style="font-size:10px" />
		 			
					
	    <p:submenu label="    |  Gestion des congés  " style="font-size:10px">	
		 		
		<p:menuitem value="   Pointage "
				action="#{CongeBean.Pointageconge}" style="font-size:10px" />
				<p:menuitem value="   etat des congés   "
				action="#{CongeBean.etatPointage}" style="font-size:10px" />
		
			<p:menuitem value="   Journal  "
				action="#{CongeBean.journalconge}" style="font-size:10px" />
		</p:submenu>
		
		 <p:submenu label="    |  primes de fin d'années  " style="font-size:10px">	
		 		
		<p:menuitem value="   Note "
				action="#{NoteBean.note}" style="font-size:10px" />
				<p:menuitem value="   etat des primes   "
				action="#{NoteBean.etatprime}" style="font-size:10px" />
		
			<p:menuitem value="   Journal  "
				action="#{NoteBean.journalprime}" style="font-size:10px" />
		</p:submenu>
	
			
			<f:facet name="options">
				<p:inputText style="margin-right:2px;font-size:10px"
					placeholder="Search" />				
				<p:commandLink id="nonAjax" action="#{loginMgmtBean.logout}"
					ajax="false">
					<p:graphicImage url="/images/logout.png" />
					<h:outputText value="#{msg['logout.user']}"
						style="color:#db0b32;font-size:10px;" />
				</p:commandLink>
			</f:facet>
		</p:menubar>
	</h:form>



</h:body>
</html>
