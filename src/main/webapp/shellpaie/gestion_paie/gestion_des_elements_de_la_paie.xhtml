<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>

</h:head>

<h:body>




	<p:panel style="min-height:900px;margin-left: 20px;margin-right: 20px;">
		<ui:insert name="menu">
			<ui:include src="/shellpaie/Header.xhtml" />
		</ui:insert>
		<ui:insert name="menu">
			<ui:include src="/shellpaie/Headerpaie.xhtml" />
		</ui:insert>
		<p:panel id="basic2" closable="true"
			style="min-height:900px;margin-left: 50px;margin-right: 50px;background-image: url(../2.png)">
				<h:form>
				<div align="right"> 
				<table>
							<tr> 
								 	<td><p:commandButton value="Nouveau"
										action="#{PaieBean.nouvelleGestion}" ajax="false"
										style="width:150px;font-size:12px;height:30;color:white;background-image:linear-gradient( #FAF281, red);" /></td>
                       

							</tr>
							</table></div>
							</h:form>
							
							<br/><br/>
					<h:form>
                      <p:dataTable id="emp" var="g"  
								  value="#{PaieBean.listGestion}"
								widgetVar="articleTable"  	selectionMode="single" editable="true"							 
								rowKey="#{g.id}" style="margin-bottom:10px" selection="#{PaieBean.selectedgestion}"
								emptyMessage="aucun element dans la base" paginator="true"
								rows="100" paginatorPosition="bottom" resizableColumns="true"
								liveResize="true">
								 <p:ajax event="rowEdit" listener="#{PaieBean.onRowEdit}"
									 />
								<p:column>
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="Libelle" />
									</f:facet>
									<h:outputText style="font-size:12px "
										value="#{g.libelle}" />
								</p:column>

								 <p:column>
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="Signe" />
									</f:facet>
									<h:outputText style="font-size:12px "
										value="#{g.signe}" />
								</p:column>
								
								
								 <p:column>
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="Valeur" />
									</f:facet>
									
										<p:cellEditor>
										<f:facet name="output">
											<h:outputText style="font-size:12px " value="#{g.valeurdeprime}" />
										</f:facet>
										<f:facet name="input">
											<h:inputText style="font-size:12px "
										value="#{g.valeurdeprime}" />
										</f:facet>

									</p:cellEditor>
								</p:column>
								
                           <p:column style="width:40px">
									<f:facet name="header">
										<h:outputText style="font-size:9px;color:#483d8b"
											value="modifier" />
									</f:facet>
									<p:rowEditor />
								</p:column>
								 
							</p:dataTable>
                                   
                          
					</h:form>
				 </p:panel>
				 </p:panel>
				 </h:body>
				 </html>
