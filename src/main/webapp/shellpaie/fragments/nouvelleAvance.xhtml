<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets">
    <h:panelGroup layout="block" styleClass="shell-module-layout paie-shell-fragment">
        <p:panel styleClass="shell-home-panel paie-shell-panel">
				<h:form>
				<p:messages closable="true" autoUpdate="true" />
					<h:panelGroup layout="block" style="text-align:center;">
						<table>
							<tr>
								<td ><p:commandButton value="Retour"
										style="width:200px;height:30;color:white;background-image:linear-gradient( #FAF281, red);font-size:12px"
										action="#{AvanceBean.getAllavance}" /></td>

								<td><p:commandButton value="Valider"
										style="width:200px;height:30;color:white;background-image:linear-gradient( #FAF281, red);font-size:12px"
										action="#{AvanceBean.nouvellesAvances}" /></td>
							</tr>
						</table>
					</h:panelGroup>
					<br/><br/>
					 
						 
							<h:panelGrid columns="1" cellpadding="5">
								 
								<h:outputText value="Employer : " style="font-size:12px" /> 
								<p:selectOneMenu  value="#{AvanceBean.nom}"  
						        style="width:200px;font-size:12px " id="emp" filter="true" filterMatchMode="contains"
						             >
						        
							    <f:selectItem itemLabel="Veuillez choisir un employer"  />
							     <f:selectItems value="#{AvanceBean.listeEmployee}" itemValue="#{e.nom}" var="e"  itemLabel="#{e.nom}"  />
							     <p:ajax listener="#{AvanceBean.getEmployeeByNom}" />							 
						         </p:selectOneMenu>
						         <p:messages for="emp"
												closable="true" autoUpdate="true" />
								<h:outputText value="Mois : " style="font-size:12px" /> 
								<p:selectOneMenu  value="#{AvanceBean.moi}" rendered="true" 
						        style="width:200px;font-size:12px " id="mois" turefilter="true" filterMatchMode="contains">
							    <p:ajax listener="#{AvanceBean.getMoisBymoi}" />
							     <f:selectItems value="#{AvanceBean.listMois}"   />							 
						         </p:selectOneMenu>	
						         <p:messages for="mois"
												closable="true" autoUpdate="true" />
								 <h:outputText value="Annee : " style="font-size:12px" /> 
								<p:selectOneMenu  value="#{AvanceBean.annees}"  
						        style="width:200px;font-size:12px " id="annee" turefilter="true" filterMatchMode="contains">
							    <p:ajax listener="#{AvanceBean.getAnneeByAnnees}" />
							     <f:selectItems value="#{AvanceBean.listannee}"   />							 
						         </p:selectOneMenu>
								<p:messages for="annee"
												closable="true" autoUpdate="true" />
								<h:outputText value="Montant : " style="font-size:12px" /> 
								<h:inputText style="font-size:12px" value="#{AvanceBean.montant}" id="montant"   required="true" requiredMessage="entrer montant " />
								<p:messages for="montant"
												closable="true" autoUpdate="true" />
								 

							</h:panelGrid>
						 
								
								
								
								 
	</h:form>
			
        </p:panel>
    </h:panelGroup>
</ui:composition>
