<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets">
    <h:panelGroup layout="block" styleClass="shell-module-layout paie-shell-fragment">
        <p:panel styleClass="shell-home-panel paie-shell-panel">
					<h:form>
						 
							<table>
								<tr>
									<td> </td>
									<td><p:commandButton value="Imprimer" id="v" 
											style="width:200px;height:30;color:white;background-image:linear-gradient( #FAF281, red);font-size:12px"
											   >
											   <p:printer target="imprimer"/>
											  </p:commandButton>
											  </td>
								</tr>
								<tr>
								<td>
								<h:panelGrid columns="2" cellpadding="5">
							<h:outputText value="Annee : " style="font-weight: bold" />
							<p:selectOneMenu value="#{PaisBeans.annees}" 
								style="width:200px;font-size:12px " id="annee" filter="true"
								filterMatchMode="contains">
								<f:ajax listener="#{PaisBeans.getMoisByAnnees}" render="mois"  />
								<f:selectItem itemLabel="Veuillez choisir annee"  />
								<f:selectItems value="#{PaisBeans.listannee}" />
							</p:selectOneMenu>
                             <!-- event="onchange" -->
							<h:outputText value="Mois : " style="font-weight: bold" />
							<p:selectOneMenu value="#{PaisBeans.mois}" 
								style="width:200px;font-size:12px " id="mois" filter="true"
								filterMatchMode="contains">
								<f:ajax listener="#{PaisBeans.getPaiBymoiAndAnnee2}" render="paie" />
								<f:selectItem itemLabel="Veuillez choisir un mois"  />
								<f:selectItems value="#{PaisBeans.listMois}"  />
							</p:selectOneMenu>

                         
						</h:panelGrid>
								</td>
								<td/>
								</tr>
							</table>
						 
						  
						
						<br />
							<br /><br />
							<br />
						  <p:outputPanel  id="imprimer"  >
						  <h:panelGroup layout="block" style="text-align:center;">						  
						  <table>
								<tr>					 

									<td style="text-align: center"><b><h:outputText
												value="FETHI SASSI" style="font-size:24px" /></b> <br />
										<h:outputText value="Matricule CNSS : #{PaisBeans.societe.matricuefiscale} " style="font-size:24px" /> <br />
										<h:outputText value="Adresse : #{PaisBeans.societe.address.num} #{PaisBeans.societe.address.rue} #{PaisBeans.societe.address.ville}"
											style="font-size:14px" /> <br /></td>
								</tr>
							</table>
							</h:panelGroup>
							<br />
							<br />
							<br />
							<br />
							<h:panelGroup layout="block" style="text-align:left;">
                      <h:panelGroup id="paie" >
                       
						<ui:repeat var="p" value="#{PaisBeans.listPai}" >
							 <h:panelGrid columns="2"  >
							 <h:outputText value="Mois  : " style="font-size:12px" />
							  <h:outputText value="#{PaisBeans.mois}" style="font-size:12px" />
							</h:panelGrid>
							 
						
						 
							 
							<table border="0" style="width: 100%">
							<tr style="background-color: #FA9581;"><td style="width: 30%">
								<h:outputText value="     " style="font-size:12px" /></td>
								<td style="width: 30%"><h:outputText value="GAIN " style="font-size:12px" /></td>
								<td><h:outputText value="RETENUE " style="font-size:12px" /></td>
							 </tr>
                           
							 

                               <tr>
								<td style="border: thin solid #F2EFEE;"><h:outputText value="Salaire de base"
									style="font-size:12px" /></td>
								<td style="border: thin solid #F2EFEE;"><h:outputText value="#{p.formul.salairedebases}"
									style="font-size:12px" /></td>
								<td style="border: thin solid #F2EFEE;"><h:outputText value="    " style="font-size:12px" /></td>
								 </tr>

								
								 
                                
								<tr><td style="border: thin solid #F2EFEE;"><h:outputText value="Salaire brut "
									style="font-size:12px" /></td>
								<td style="border: thin solid #F2EFEE;"><h:outputText value="#{p.formul.salaire_bruts}"
									style="font-size:12px" /></td>
								<td style="border: thin solid #F2EFEE;"><h:outputText value="    " style="font-size:12px" /></td>
								</tr>
							 
							
								<tr ><td style="border: thin solid #F2EFEE;"><h:outputText value="retenue CNSS"
									style="font-size:12px" /></td>
								
								<td style="border: thin solid#F2EFEE;"><h:outputText value="    " style="font-size:12px" /></td>
								<td style="border: thin solid#F2EFEE;"><h:outputText value="#{p.formul.retenue_cnsss}"
									style="font-size:12px" /></td>
								</tr>
									
								
								<tr><td style="border: thin solid #F2EFEE;"><h:outputText value="Salaire imposable"
									style="font-size:12px" /></td>
								<td style="border: thin solid #F2EFEE;"><h:outputText value="#{p.formul.salaire_imposables}"
									style="font-size:12px" /></td>
								<td style="border: thin solid #F2EFEE;"><h:outputText value="    " style="font-weight: bold" />
								 </td>
								 </tr>
								<tr><td style="border: thin solid #F2EFEE;">
							 	<h:outputText value="IRPP"
									style="font-size:12px" /></td>
								
								<td style="border: thin solid #F2EFEE;"><h:outputText value="    " style="font-size:12px" />
								 </td>
								 <td style="border: thin solid #F2EFEE;"><h:outputText value="#{p.formul.irpps}"
									style="font-size:12px" /></td>
								 </tr>
								<tr><td style="border: thin solid #F2EFEE;">
								<h:outputText value="Salaire net"
									style="font-size:12px" /></td>
								<td style="border: thin solid #F2EFEE;"><h:outputText value="#{p.formul.salaire_nets}"
									style="font-size:12px" /></td>
								<td style="border: thin solid #F2EFEE;"><h:outputText value="    " style="font-size:12px" />
								 
								</td>
								</tr>
								  <tr><td style="border: thin solid #F2EFEE;">
								<h:outputText value="Avance"
									style="font-size:12px" /></td>
								 
								<td style="border: thin solid #F2EFEE;"><h:outputText value="    " style="font-size:12px" />
								 
								 </td>
								 <td style="border: thin solid #F2EFEE;"><h:outputText value="#{p.formul.avances}"
									style="font-size:12px" /></td>
								 </tr>
								 
								   
								 
								 
								  <tr><td style="border: thin solid #F2EFEE;">
								<h:outputText value="Net à payer"
									style="font-size:12px" /></td>
								<td style="border: thin solid #F2EFEE;"><h:outputText value="#{p.formul.net_apayers}"
									style="font-size:12px" /></td>
								<td style="border: thin solid #F2EFEE;"><h:outputText value="    " style="font-size:12px" />
								 
								 </td>
								  
								 </tr>
						 </table>
						
						 
							<br />
							<br />
                              
							<br />
							<br />
                              
						</ui:repeat>
                         </h:panelGroup>
                          </h:panelGroup>
                         </p:outputPanel>
                        
					</h:form>
        </p:panel>
    </h:panelGroup>
</ui:composition>
