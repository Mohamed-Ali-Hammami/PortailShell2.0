<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets">
    <h:panelGroup layout="block" styleClass="shell-module-layout paie-shell-fragment">
        <p:panel styleClass="shell-home-panel paie-shell-panel">
			<h:form>
				<h:panelGroup layout="block" style="text-align:center;">
					<table>
						<tr>


							<td><p:commandButton value="Valider"
									style="width:200px;height:30;color:white;background-image:linear-gradient( #FAF281, red);font-size:12px"
									action="#{PaieBean.validerpointageemployee}" /></td>
						</tr>
					</table>
				</h:panelGroup>
				<br />
				<br />


				<h:panelGrid columns="2" cellpadding="5">




					<h:outputText value="Annee : " style="font-weight: bold" />
					<p:selectOneMenu value="#{PaieBean.annee}"
						style="width:200px;font-size:12px " id="annee" turefilter="true"
						filterMatchMode="contains">

						<f:selectItems value="#{PaieBean.listannee}" />
					</p:selectOneMenu>

					<h:outputText value="Mois : " style="font-weight: bold" />
					<p:selectOneMenu value="#{PaieBean.mois}"
						style="width:200px;font-size:12px " id="mois" filter="true"
						filterMatchMode="contains">

						<f:selectItem itemLabel="Veuillez choisir un mois" />
						<f:selectItems value="#{PaieBean.listMois}" />

					</p:selectOneMenu>
					<br />
					<br />
					<br />
				</h:panelGrid>

				<h:panelGrid columns="2" cellpadding="5">

					<h:outputText value="entrer le nombre du jour "
						style="font-size:12px " />
					<h:inputText value="#{PaieBean.nb_jour}" />
				</h:panelGrid>
				<p:messages id="message" autoUpdate="true" closable="true" />
				<br />





			</h:form>
		
        </p:panel>
    </h:panelGroup>
</ui:composition>
