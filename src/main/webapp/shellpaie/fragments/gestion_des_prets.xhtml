<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets">
    <h:panelGroup layout="block" styleClass="shell-module-layout paie-shell-fragment">
        <p:panel styleClass="shell-home-panel paie-shell-panel">
				<h:form>
				<h:panelGroup layout="block" style="text-align:right;"> 
				<table>
							<tr>	
								 	<td><p:commandButton value="Nouveau"
										action="#{PretBean.nouveauPret}" ajax="false"
										style="width:150px;font-size:12px;height:30;color:white;background-image:linear-gradient( #FAF281, red);" /></td>
                       

							</tr>
							</table></h:panelGroup>
							</h:form>
							
							<br/><br/>
					<h:form>
                      <p:dataTable id="emp" var="pret" editable="true"
								  value="#{PretBean.listpret}"
								widgetVar="articleTable" selectionMode="single"
								selection="#{PretBean.selectedPret}"
								filteredValue="#{PretBean.filtredPret}"
								rowKey="#{pret.id}" style="margin-bottom:10px"
								emptyMessage="aucune pret en cours" paginator="true"
								rows="100" paginatorPosition="bottom" resizableColumns="true"
								liveResize="true">
								 
								<p:column>
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="CODE" />
									</f:facet>
									<h:outputText style="font-size:12px "
										value="#{pret.id}" />
								</p:column>

								 <p:column>
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="employer" />
									</f:facet>
									<h:outputText style="font-size:12px "
										value="#{pret.employee.nom}" />
								</p:column>
								
								 <p:column>
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="MONTANT DU PRET" />
									</f:facet>
									<h:outputText style="font-size:12px "
										value="#{pret.montant_pret}" />
								</p:column>
								
								<p:column>
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="TAUX" />
									</f:facet>
									<h:outputText style="font-size:12px "
										value="#{pret.taux}" />
								</p:column>
								
								<p:column>
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="NOMBRE DE MOIS" />
									</f:facet>
									<h:outputText style="font-size:12px "
										value="#{pret.nbmois}" />
								</p:column>						
								 
 

							</p:dataTable>
                                   
                          
					</h:form>
				 
        </p:panel>
    </h:panelGroup>
</ui:composition>
