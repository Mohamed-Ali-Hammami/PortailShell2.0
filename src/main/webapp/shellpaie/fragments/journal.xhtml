<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets">
    <h:panelGroup layout="block" styleClass="shell-module-layout paie-shell-fragment">
        <p:panel styleClass="shell-home-panel paie-shell-panel">
					<h:form>
						 , 
						<br />
						<br />
						<table>
								<tr>
									 <td/>
									<td><p:commandButton value="Imprimer"
											style="width:200px;height:30;color:white;background-image:linear-gradient( #FAF281, red);font-size:12px"
											   >
											  <p:printer target="imprimer"/>
											  </p:commandButton>
											  </td>
									 </tr>
									 
									 <tr>
									 
									<td>
						<h:panelGrid columns="2" cellpadding="5">
							<h:outputText value="Annee : " style="font-weight: bold" />
							<p:selectOneMenu value="#{PaisBeans.annees}" 
								style="width:200px;font-size:12px " id="annee" filter="true"
								filterMatchMode="contains">
								<f:ajax listener="#{PaisBeans.getMoisByAnnees}" render="mois"  />
								<f:selectItem itemLabel="Veuillez choisir annee"  />
								<f:selectItems value="#{PaisBeans.listannee}" />
							</p:selectOneMenu>
                             <!-- event="onchange" -->
							<h:outputText value="Mois : " style="font-weight: bold" />
							<p:selectOneMenu value="#{PaisBeans.mois}" 
								style="width:200px;font-size:12px " id="mois" filter="true"
								filterMatchMode="contains">
								
								<f:selectItem itemLabel="Veuillez choisir un mois"  />
								<f:selectItems value="#{PaisBeans.listMois}"  />
								<f:ajax listener="#{PaisBeans.journal2}" render="paie" />
							</p:selectOneMenu>

                         
						</h:panelGrid></td></tr></table>
						<br/><br/><br/><br/>
						 <p:outputPanel  id="imprimer"  >
						<h:panelGroup layout="block" style="text-align:center;">
						
                      <h:panelGroup id="paie" >
                      <h:outputText value="JOURNAL DES SALAIRES DU MOIS DE #{PaisBeans.mois} #{PaisBeans.annees}" style="font-size:16px" />
                       <table border="1" style="width: 100%">
                       <tr>
                        <td> </td>
                       <td><h:outputText value="Nom " style="font-size:12px" /></td>
                         <td><h:outputText value="JR  " style="font-size:12px" /></td>
                           <td><h:outputText value="Sal base " style="font-size:12px" /></td>
                               <td><h:outputText value="I.Prés " style="font-size:12px" /></td>
                               <td><h:outputText value="I.Trasn" style="font-size:12px" /></td> 
                               
                                 <td><h:outputText value="I.Res" style="font-size:12px" /></td> 
                               
                                <td><h:outputText value="Sal Brut " style="font-size:12px" /></td>
                                  
                                  <td><h:outputText value="CNSS " style="font-size:12px" /></td>
                                   <td><h:outputText value="Impot  " style="font-size:12px" /></td>
                                    <td><h:outputText value="Redevance  " style="font-size:12px" /></td>
                                    <td><h:outputText value="Sal Net  " style="font-size:12px" /></td>
                                     <td><h:outputText value="Acompte  " style="font-size:12px" /></td>
                                      <td><h:outputText value="Reste  " style="font-size:12px" /></td>
                                       <td><h:outputText value="Signature  " style="font-size:12px" /></td>
                       </tr>
                        
						<ui:repeat var="p" value="#{PaisBeans.listPaie}" >
						<tr height="50">
							 <td  >
							  
							  <h:outputText value="#{p.employee.matricule}" style="font-size:12px" /></td>
							  <td  > <h:outputText value="#{p.employee.nom} " style="font-size:12px" /></td>
							   
								<td  ><h:outputText value="#{p.formulaire_Paie.nb_heure}"
									style="font-size:12px" /></td>
								<td  ><h:outputText value="#{p.formulaire_Paie.salairedebases}"
									style="font-size:12px" /></td>
								 
								  
								<ui:repeat var="g" value="#{p.listGestion}">							 
									 
									<td  ><h:outputText value="#{g.valeurdeprimeaffichers}"
										style="font-size:12px" /></td>
									
								 
								</ui:repeat>
								 <h:panelGroup rendered="#{p.listGestion.size()==2}">
									 <td>
									 <h:outputText value="#{g.valeurdeprimeaffichers}"
										style="font-size:12px" />
									 </td>
									 </h:panelGroup>
								 
								<td><h:outputText value="#{p.formulaire_Paie.salaire_bruts}"
									style="font-size:12px" /></td>	 
								 
								<td ><h:outputText value="#{p.formulaire_Paie.retenue_cnsss}"
									style="font-size:12px" /></td>
								 
									 
								 <td  ><h:outputText value="#{p.formulaire_Paie.irpps}"
									style="font-size:12px" /></td>
								  <td  ><h:outputText value="#{p.formulaire_Paie.redevances}"
									style="font-size:12px" /></td>
								<td  ><h:outputText value="#{p.formulaire_Paie.salaire_nets}"
									style="font-size:12px" /></td>
								  
								 <td  ><h:outputText value="#{p.formulaire_Paie.avances}"
									style="font-size:12px" /></td>
								 
								 
								   
								 
								  
								<td  ><h:outputText value="#{p.formulaire_Paie.net_apayers}"
									style="font-size:12px" /></td>
									<td>
									<h:outputText value=""  
									style="font-size:12px" />
									</td>
								 </tr>
								 </ui:repeat>
								 <ui:repeat var="p" value="#{PaisBeans.listPai}">								 
								 <tr>
								 <td  /><td  /><td  />
								 <td  ><h:outputText value="#{p.formul.salairedebases}"
									style="font-size:12px" /></td>
								 
								  
								<ui:repeat var="g" value="#{p.listGestion}">
								 
									 
									<td  ><h:outputText value="#{g.totalaffichers} "
										style="font-size:12px" /></td>
									 
								  
								</ui:repeat>
                                
								 
								<td  ><h:outputText value="#{p.formul.salaire_bruts}"
									style="font-size:12px" /></td>	 
								 
								<td style="border: thin solid#F2EFEE;"><h:outputText value="#{p.formul.retenue_cnsss}"
									style="font-size:12px" /></td>
								 
									 
								 <td  ><h:outputText value="#{p.formul.irpps}"
									style="font-size:12px" /></td>
									
									 <td  ><h:outputText value="#{p.formul.redevances}"
									style="font-size:12px" /></td>
								 
								<td  ><h:outputText value="#{p.formul.salaire_nets}"
									style="font-size:12px" /></td>
								  
								 <td  ><h:outputText value="#{p.formul.avances}"
									style="font-size:12px" /></td>
								 
								 
								   
								 
								  
								<td  ><h:outputText value="#{p.formul.net_apayers}"
									style="font-size:12px" /></td>
									
								 </tr>
								 </ui:repeat>
						 </table>
						
						 
						 
                              
						 
                         </h:panelGroup>
                         </h:panelGroup>
                         </p:outputPanel>
					</h:form>
        </p:panel>
    </h:panelGroup>
</ui:composition>
