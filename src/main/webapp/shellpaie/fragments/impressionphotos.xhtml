<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets">
    <h:panelGroup layout="block" styleClass="shell-module-layout paie-shell-fragment">
        <p:panel styleClass="shell-home-panel paie-shell-panel">
			<h:form>
				<table>
					<tr>

						<td style="text-align: left"><h:selectBooleanCheckbox value="#{PaieBean.pompiste}"
								style="width:100px;height:20px" />  
								<h:outputText value="Pompiste"
									style="font-size:12px " />
						 </td>

						<td><h:selectBooleanCheckbox value="#{PaieBean.laveur}"
								style="width:100px;height:20px" />  
								<h:outputText value="LAVEUR"
									style="font-size:12px " />
							 </td>
					</tr>
					<tr>
						<td><h:selectBooleanCheckbox value="#{PaieBean.vidangeur}"
								style="width:100px;height:20px" />  
								<h:outputText value="VIDANGEUR"
									style="font-size:12px " />
							 </td>

						<td><h:selectBooleanCheckbox value="#{PaieBean.chefDePiste}"
								style="width:100px;height:20px" /> 
								<h:outputText value="Chef De Piste"
									style="font-size:12px " />
							 </td>
					</tr>
					
					
						<tr>

						<td style="text-align: left"><h:selectBooleanCheckbox value="#{PaieBean.femmeDemenage}"
								style="width:100px;height:20px" />  
								<h:outputText value="Femme De menage"
									style="font-size:12px " />
							 </td>

						<td><h:selectBooleanCheckbox value="#{PaieBean.caissier}"
								style="width:100px;height:20px" />  
								<h:outputText value="Caissier"
									style="font-size:12px " />
							 </td>
					</tr>
					<tr>
						<td><h:selectBooleanCheckbox value="#{PaieBean.agentAdministratif}"
								style="width:100px;height:20px" />  
								<h:outputText value="Agent Administratif"
									style="font-size:12px " />
							 </td>

						<td><h:selectBooleanCheckbox value="#{PaieBean.responsableShop}"
								style="width:100px;height:20px" />  
								<h:outputText value="Responsable Shop"
									style="font-size:12px " />
							 
							
							</td>
							
							<td>
							
							<p:commandButton value="Valider" ajax="false" style="width:200px;height:30;color:white;background-image:linear-gradient( #FAF281, red);font-size:12px"
										
								actionListener="#{PaieBean.getimpressionPhotos}">
								 
							</p:commandButton>
							</td>
							
							<td>
						<p:commandButton value="Imprimer"
										style="width:200px;height:30;color:white;background-image:linear-gradient( #FAF281, red);font-size:12px"
										 >
										  <p:printer target="imprimer"/>
										 </p:commandButton>
							</td>
					</tr>
				 
				</table>
			</h:form>

			<br />
			<br />
			
			 <p:outputPanel  id="imprimer"  >
			 
			 <h:panelGroup layout="block" style="text-align:center;">
			         <b>   <h:outputText value="Liste des #{PaieBean.fonction}"   style="font-size:16px ;color:#483d8b"></h:outputText></b>
			 
			 </h:panelGroup>
			
			<h:form>
				<p:dataTable id="emp" var="emp" value="#{PaieBean.listEmp}"
					widgetVar="articleTable"  
					style="margin-bottom:10px;"
					emptyMessage="aucun employer dans la base" paginator="true"
					rows="100" paginatorPosition="bottom" resizableColumns="true"
					liveResize="true">
					 
					<p:column width="5%"  style="border: 0.5px #000000 solid;text-aligh:right">
						<f:facet name="header">
							<h:outputText style="font-size:12px ;color:#483d8b"
								value="MAT" />
						</f:facet>
						<h:outputText style="font-size:12px " value="#{emp.code}" />
					</p:column>

					<p:column  style="border: 0.5px #000000 solid;text-aligh:right">
						<f:facet name="header">
							<h:outputText style="font-size:12px ;color:#483d8b" value="CIN" />
						</f:facet>
						<h:outputText style="font-size:12px " value="#{emp.cin}" />
					</p:column>

					 

					<p:column  style="border: 0.5px #000000 solid;text-aligh:right" >
						<f:facet name="header">
							<h:outputText style="font-size:12px ;color:#483d8b" value="NOM" />
						</f:facet>
						<h:outputText style="font-size:12px " value="#{emp.nom}" />
					</p:column>


					 
					 
					
					<p:column  style="border: 0.5px #000000 solid;text-aligh:right">
						<f:facet name="header">
							<h:outputText style="font-size:12px ;color:#483d8b" value="Tel" />
						</f:facet>
						<h:outputText style="font-size:12px " value="#{emp.tel}" />
					</p:column>
					
					 	 	
					 	<p:column   style="border: 0.5px #000000 solid;text-aligh:right">
									<f:facet name="header">
										<h:outputText style="font-size:14px ;color:#000000;text-aligh:right"
											value="PHOTOS" />
									</f:facet>
									  <h:graphicImage width="70px;" value="data:image/jpg;base64,#{emp.cins}"    style="max-width: 120px; max-height: 130px;" />
					 	</p:column>
					 	
					  <p:column   style="border: 0.5px #000000 solid;text-aligh:right">
									<f:facet name="header">
										<h:outputText style="font-size:14px ;color:#000000;text-aligh:right"
											value="CIN" />
									</f:facet>
									<h:graphicImage width="70px;" value="data:image/jpg;base64,#{emp.photos}"    style="max-width: 120px; max-height: 130px;" />
									    
					 </p:column>

				 

				</p:dataTable>


			</h:form>
</p:outputPanel>
	
        </p:panel>
    </h:panelGroup>
</ui:composition>
