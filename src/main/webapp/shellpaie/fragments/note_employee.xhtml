<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://java.sun.com/jsf/facelets">
    <h:panelGroup layout="block" styleClass="shell-module-layout paie-shell-fragment">
        <p:panel styleClass="shell-home-panel paie-shell-panel">
    <h:outputScript target="body">
        window.setTimeout(function () {
            try { init(); } catch (e) {}
        }, 0);
    </h:outputScript>
				<h:form>
					<h:panelGroup layout="block" style="text-align:center;">
						<table>
							<tr>
								

								<td><p:commandButton value="Valider" ajax="false"
										style="width:200px;height:30;color:white;background-image:linear-gradient( #FAF281, red);font-size:12px"
										action="#{PaieBean.validernote}" /></td>
							</tr>
						</table>
						
						<h:panelGrid columns="2" cellpadding="5">
								 
								 
								
						         
								 <h:outputText value="Annee : " style="font-weight: bold" /> 
								<p:selectOneMenu  value="#{PaieBean.annee}"  
						        style="width:200px;font-size:12px " id="annee" turefilter="true" filterMatchMode="contains">
							     <p:ajax listener="#{PaieBean.getEmployeeBynote}" update="emp" oncomplete="init()" partialSubmit="true" process="@this"/>  
							     <f:selectItems value="#{PaieBean.listannee}"   />							 
						         </p:selectOneMenu>
						       

							<br/><br/><br/>
							</h:panelGrid>
					</h:panelGroup>
					<br/><br/>
					<br/>
								 
								 <p:dataTable id="emp" var="p" editable="true"
								  value="#{PaieBean.listNotes}" editMode="cell"
								widgetVar="articleTable" 								 
								rowKey="#{p.id}"  
								emptyMessage="aucune note dans la base"  
								   >
								   
								 <p:column>
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="EMPLOYER" />
									</f:facet>
									<h:outputText style="font-size:12px "
										value="#{p.employee.nom} " />
								</p:column>
								 
									<p:column >
									<f:facet name="header">
										<h:outputText style="font-size:12px ;color:#483d8b"
											value="NOTE" />
									</f:facet>
									 
											 
									 
											<h:inputText id="qteInput" value="#{p.note}" style="background-color:transparent;border:none;"
												  onkeyup="nexts2(this);"  styleClass="inpdes" >
												 	 <p:ajax listener="#{PaieBean.updatenote}" process="@this"
									partialSubmit="true">

								</p:ajax>
								<f:attribute name="test" value="#{rowId}" />
												</h:inputText>
													
											 
								</p:column>
								</p:dataTable>
								 <script>
					function init() {
						var index = 0;
						$('.inpdes').eq(index).focus();
						$('.inpdes').eq(index).select();
					}
					function nexts2(input) {
						$(document)
								.keypress(
										function(event) {
											var keycode = (event.keyCode ? event.keyCode
													: event.which);
											if (keycode == '13') {
												$(input).closest('tr').next(
														'tr').find(
														'input[type=text]')
														.focus();
												$(input).closest('tr').next(
														'tr').find(
														'input[type=text]')
														.select();
												return false;
											}

										});
					}
				</script>
								  
								
								 
	</h:form>
				
        </p:panel>
    </h:panelGroup>
</ui:composition>
