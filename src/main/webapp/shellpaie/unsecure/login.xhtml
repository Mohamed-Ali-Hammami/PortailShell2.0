<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
  "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:ui="http://java.sun.com/jsf/facelets"
xmlns:p="http://primefaces.org/ui"  >
<h:head>	<title>Authentification</title>
	<link rel="shortcut icon" type="image/x-icon" href="/images/logo.png" />
</h:head>
<h:body style="background-color:#a2b5bf">
	<script type="text/javascript">
//<![CDATA[
		window.addEventListener('load', function() {
			var form = document.getElementById('loginFormId');
			if (form) {
				form.action = window.location.pathname + window.location.search;
			}
		});
//]]>
	</script>
	<br />
	<br />
	<br />
	<br />
	<br />
	<br />
	<br />
	<div align="center">
		<p:growl id="msgss" showDetail="true" />

		<p:panel  style="width:450px;height:200px;background-color:#eeeec6;font-size:12px " header="Connexion"> 
			  
			<br></br>
			<br></br>
			<div align="center" style="">
    <table align="center"><tr><td>
        <h:form  id="loginFormId" prependId="false">
        <tr>
                 
                    
                     <td>   <h:outputText id="outTxtUserNameId" value="#{msg['secure.username']} " name="outTxtUserNameNm" style="font-size:12px;color:#006400;background-color:#a2b5bf"/></td>
                       <td> <h:inputText id="userName" required="true" value="#{LoginBean.userName}" size="30" requiredMessage="#{msg['secure.error']}"> </h:inputText>
                        <h:outputLabel id="outLblUserNameId" for="userName" name="outLblUserNameNm" style="font-size:12px;color:#006400;background-color:#a2b5bf"/>
                   </td> </tr>
                     
                    <tr> <td> <h:outputText id="outTxtPasswordId" value="#{msg['secure.password']} " name="outTxtPasswordNm" style="font-size:12px;color:#006400;background-color:#a2b5bf" /></td>
                     <td>   <h:inputSecret id="password"  required="true" value="#{LoginBean.password}" size="30" name="inTxtPasswordNm"  ></h:inputSecret>
                        <h:outputLabel id="outLblPasswordId" for="password" name="outLblPasswordNm"></h:outputLabel>
                        </td></tr>
                        
                        
               <tr><td></td>
                <td>
                    <h:commandButton id="btnLoginId" value="#{msg['secure.signin']} "   action="#{LoginBean.logintopaie}" style=" background: #7abcff; /* Old browsers */
        background: -moz-linear-gradient(top, #7abcff 0%, #60abf8 44%, #4096ee 100%); /* FF3.6+ */
        background: -webkit-gradient(linear, left top, left bottom, color-stop(0%,#7abcff), color-stop(44%,#60abf8), color-stop(100%,#4096ee)); /* Chrome,Safari4+ */
        background: -webkit-linear-gradient(top, #7abcff 0%,#60abf8 44%,#4096ee 100%); /* Chrome10+,Safari5.1+ */
        background: -o-linear-gradient(top, #7abcff 0%,#60abf8 44%,#4096ee 100%); /* Opera 11.10+ */
        background: -ms-linear-gradient(top, #7abcff 0%,#60abf8 44%,#4096ee 100%); /* IE10+ */
        background: linear-gradient(top, #7abcff 0%,#60abf8 44%,#4096ee 100%);"></h:commandButton></td>
                    
                
                </tr>
                <h:panelGrid columns="2">
				 
			</h:panelGrid>
			
        </h:form></td></tr></table>
    	</div>
			<div>
				<font color="red"><p:messages id="messages" autoUpdate="true"
						closable="true" style="color:red" /></font> 
			</div> 
			
		</p:panel>
	</div>
</h:body>
</html>
